          const key = `${parseInt(rmdMatch2[1],10)}${rmdMatch2[2].toUpperCase()}`;
          if (rmdSim[key]) {
            const s = rmdSim[key];
            if (s.cage1 === cage.id) s.cage1 = null;
            else if (s.cage2 === cage.id) s.cage2 = null;
          }
        }
        scheduledSteps.push({
          action: 'rmd_to_frame', cage, frame, date: day,
          note: `${cage.locationDetail || 'RMD'} → ${frame.name}${retNote}`,
          isReturningFrame: isReturning,
        });
      } else {
        warnings.push(`⚠ No suitable frame for cage ${cage.name} from RMD (width ${cage.width}m${needsWaler(cage)?' + waler':''})`);
        scheduledSteps.push({ action: 'no_frame', cage, frame: null, date: boatDate, note: `No suitable frame for ${cage.name}` });
      }

    } else {
      // Cage still in facility — going direct to boat
      const guidedFrameId = guidanceFrameForCage[cage.name.toLowerCase()];
      const frame = guidedFrameId
        ? resolveGuidedFrame(guidedFrameId, cage.name)
        : findBoatFrame(cage, boatDate, boatReservedFrameIds);
      if (frame) {
        boatReservedFrameIds.add(frame.id);
        frameSim[frame.id]?.cages.push(cage.id);
        if (frameSim[frame.id]) frameSim[frame.id].fixedForShipping = true;
        const isReturning = !!frameSim[frame.id]?.returningOn;
        if (needsWaler(cage) && !frame.hasWaler) warnings.push(`⚠ Cage ${cage.name} needs waler but ${frame.name} has none`);
        const retNote = isReturning ? ` [frame returns ${fmt(frameSim[frame.id].returningOn)}]` : '';
        const earliest = frameSim[frame.id]?.returningOn || null;
        const day = latestDayByDeadline(boatDate, earliest);
        useMove(day);
        scheduledSteps.push({
          action: 'facility_to_frame', cage, frame, date: day,
          note: `Facility → ${frame.name}${retNote}`,
          isReturningFrame: isReturning,
        });
      } else {
        warnings.push(`⚠ No suitable frame for cage ${cage.name} from facility (width ${cage.width}m${needsWaler(cage)?' + waler':''})`);
        scheduledSteps.push({ action: 'no_frame', cage, frame: null, date: boatDate, note: `No suitable frame for ${cage.name}` });
      }
    }
  }

  // ── Fix-for-shipping steps ─────────────────────────────────────────────
  // All frames used for boat cages need fixing down before boat date.
  // Includes: new movements (rmd_to_frame, facility_to_frame, reframe)
  // AND already_framed cages where a pending planned movement puts them in a frame
  // (those frames aren't yet fixedForShipping in STATE, only in frameSim).
  const boatFrames = [...new Set(
    scheduledSteps
      .filter(s => {
        if (!boatReservedFrameIds.has(s.frame?.id)) return false;
        if (s.action === 'no_frame') return false;
        // For already_framed: include only if flagged needsFix (pending movement) or frame not yet fixed
        if (s.action === 'already_framed') {
          if (s.needsFix) return true; // has pending move into frame, fix step needed
          const stateFrame = STATE.frames.find(f => f.id === s.frame?.id);
          return !stateFrame?.fixedForShipping;
        }
        return true;
      })
      .map(s => s.frame)
  )].filter(Boolean).filter(f => !f.fixedForShipping);

  for (const frame of boatFrames) {
    // For already_framed with pending move: fix can only happen after that move's date
    const pendingStep = scheduledSteps.find(s => s.frame?.id === frame.id && s.pendingMove);
    const moveStep    = scheduledSteps.find(s => s.frame?.id === frame.id && s.action !== 'already_framed' && s.action !== 'no_frame');
    const loadDay     = pendingStep?.pendingMove?.date || moveStep?.date || boatDate;
    // Fix step on or after load day, on or before boat date
    const fixDay = workDays.filter(d => d >= loadDay && d <= boatDate).slice(-1)[0] || boatDate;
    useMove(fixDay);
    scheduledSteps.push({
      isFixStep: true, frame,
      date: fixDay,
      note: `Fix frame ${frame.name} for shipping (bolt cage to frame)`,
    });
  }

  // ── Sort chronologically ───────────────────────────────────────────────
  scheduledSteps.sort((a, b) => {
    // Within the same date: facility exits first, then RMD drops, then boat framing, then fix steps
    const order = {
      facility_exit_to_frame: 0,
      facility_exit_frame_to_rmd: 1,
      facility_exit_frame_storage: 1,
      facility_to_rmd: 1,
      rmd_to_frame: 2,
      facility_to_frame: 2,
      reframe: 2,
      already_framed: 3,
    };
    const dateA = a.date || '';
    const dateB = b.date || '';
    if (dateA !== dateB) return dateA.localeCompare(dateB);
    if (a.isFixStep) return 1;
    if (b.isFixStep) return -1;
    return (order[a.action] ?? 5) - (order[b.action] ?? 5);
  });

  // ── Daily move count warnings ──────────────────────────────────────────
  const countsByDay = {};
  scheduledSteps.forEach(s => { if (s.date) countsByDay[s.date] = (countsByDay[s.date] || 0) + 1; });
  Object.entries(countsByDay).forEach(([day, count]) => {
    if (count > DAILY_LIMIT) {
      warnings.push(`ℹ ${fmt(day)}: ${count} moves planned (recommended max is ${DAILY_LIMIT} — some may need rescheduling)`);
    }
  });

  // Catch-22 warning: no frames at facility and no returns before boat date
  const framesAtFacility = Object.values(frameSim).filter(s => s.location === 'facility' && !s.fixedForShipping).length;
  const returningBeforeBoat = Object.values(frameSim).filter(s => s.returningOn && s.returningOn <= boatDate).length;
  if (framesAtFacility === 0 && returningBeforeBoat === 0) {
    warnings.push(`🚨 CATCH-22: No frames available at facility and none returning before ${fmt(boatDate)}. You must ship cages to the client to get frames back — otherwise production will stop.`);
  }

  // ── Build display list ─────────────────────────────────────────────────
  const moves = [];
  let lastDate = null;
  let moveNum = 1;

  // Summary counts
  const exitCount     = scheduledSteps.filter(s => s.action === 'facility_exit_to_frame').length;
  const rmdCount      = scheduledSteps.filter(s => s.action === 'facility_exit_frame_to_rmd').length;
  const storeCount    = scheduledSteps.filter(s => s.action === 'facility_exit_frame_storage').length;
  const boatMoveCount = scheduledSteps.filter(s => ['rmd_to_frame','facility_to_frame','reframe'].includes(s.action)).length;
  const alreadyFramed = scheduledSteps.filter(s => s.action === 'already_framed');
  const pendingFramed = alreadyFramed.filter(s => s.needsFix);
  const fullyReady    = alreadyFramed.filter(s => !s.needsFix);
  const boatCount     = boatMoveCount + alreadyFramed.length;
  const noFrame       = scheduledSteps.filter(s => s.action === 'no_frame');

  {
    const summaryParts = [];
    if (exitCount > 0)        summaryParts.push(`${exitCount} facility exit${exitCount!==1?'s':''} planned`);
    if (boatMoveCount > 0)    summaryParts.push(`${boatMoveCount} new boat movement${boatMoveCount!==1?'s':''}`);
    if (pendingFramed.length) summaryParts.push(`${pendingFramed.length} cage${pendingFramed.length!==1?'s':''} already being moved into frame — fix only`);
    if (fullyReady.length)    summaryParts.push(`${fullyReady.length} cage${fullyReady.length!==1?'s':''} already in frame & ready`);
    if (storeCount > 0)       summaryParts.push(`${storeCount} cage(s) held in frame (RMD full)`);
    if (summaryParts.length > 0) {
      moves.push({ type: '📋 Plan Summary', desc: summaryParts.join(' · '), category: 'info' });
    }
  }

  // ── Learning summary ─────────────────────────────────────────────────
  // Show what the planner learned from history and which assignments were influenced
  {
    const appliedFramePrefs = scheduledSteps
      .filter(s => s.frame && s.cage && learnedPrefs.framePrefByCageId[s.cage.id] === s.frame.id)
      .map(s => `${s.cage.name}→${s.frame.name}`);
    const appliedRmdPrefs = scheduledSteps
      .filter(s => s.rmdSlot && s.cage && learnedPrefs.rmdPrefByCageId[s.cage.id] === `${s.rmdSlot.number}${s.rmdSlot.side}`)
      .map(s => `${s.cage.name}→RMD-${s.rmdSlot.number}${s.rmdSlot.side}`);
    const appliedParts = [...appliedFramePrefs, ...appliedRmdPrefs];
    const learnDesc = learnedPrefs.summary
      + (appliedParts.length > 0 ? ` Preferences applied: ${appliedParts.join(', ')}.` : learnedPrefs.totalCompleted > 0 ? ' No preferences matched this plan.' : '');
    moves.push({ type: '🧠 Learning', desc: learnDesc, category: 'info' });
  }

  noFrame.forEach(s => {
    moves.push({ type: '⚠ No Frame', desc: s.note, category: 'warning' });
  });

  scheduledSteps
    .filter(s => s.action !== 'no_frame')
    .forEach(step => {
      if (step.date !== lastDate) {
        const dayMoveCount = countsByDay[step.date] || 0;
        const overLimit = dayMoveCount > DAILY_LIMIT ? ` ⚠ ${dayMoveCount}/${DAILY_LIMIT} moves` : ` (${dayMoveCount} move${dayMoveCount!==1?'s':''})`;
        moves.push({ type: '📅', desc: `${fmt(step.date)}${overLimit}`, category: 'date-header' });
        lastDate = step.date;
      }

      if (step.action === 'already_framed') {
        const readyLabel = step.needsFix
          ? `⏳ Pending → ${step.frame.name}`
          : '✓ Ready';
        moves.push({ type: readyLabel, desc: `Cage ${step.cage.name} — ${step.note}`, category: 'info' });
      } else if (step.isFixStep) {
        moves.push({ type: `🔩 Fix · Move ${moveNum++}`, desc: step.note, category: 'move' });
      } else if (step.action === 'facility_exit_to_frame') {
        const walerNote = needsWaler(step.cage) ? ' ⚠ waler req.' : '';
        moves.push({
          type: `📦 Exit Facility · Move ${moveNum++}`,
          desc: `${step.note}${walerNote}`,
          category: 'facility-rmd', cage: step.cage, frame: step.frame,
        });
      } else if (step.action === 'facility_exit_frame_to_rmd') {
        moves.push({
          type: `🏪 Into RMD · Move ${moveNum++}`,
          desc: step.note,
          category: 'facility-rmd', cage: step.cage, frame: step.frame, rmdSlot: step.rmdSlot,
        });
      } else if (step.action === 'facility_exit_frame_storage') {
        moves.push({
          type: `🗄 Frame Storage · Move ${moveNum++}`,
          desc: step.note,
          category: 'facility-rmd', cage: step.cage, frame: step.frame,
        });
      } else if (step.action === 'facility_to_rmd') {
        moves.push({
          type: `📦 Facility→RMD · Move ${moveNum++}`,
          desc: `${step.cage.name}: ${step.note}`,
          category: 'facility-rmd', cage: step.cage, rmdSlot: step.rmdSlot,
        });
      } else {
        const typeLabel = step.action === 'rmd_to_frame'    ? '🏗 RMD→Frame (boat)'
          : step.action === 'reframe'          ? '🔄 Reframe'
          : '🏭 Facility→Frame (boat)';
        const retTag  = step.isReturningFrame ? ' 🔁 returning frame' : '';
        const walerNote = needsWaler(step.cage) ? ' ⚠ waler req.' : '';
        moves.push({
          type: `${typeLabel} · Move ${moveNum++}${retTag}`,
          desc: `${step.cage.name}: ${step.note}${walerNote}`,
          category: step.isReturningFrame ? 'returning-frame' : 'move',
          cage: step.cage, frame: step.frame,
        });
      }
    });

  bpGeneratedMovements = { moves, warnings, assignments: scheduledSteps, framesUsed: boatFrames, scheduledSteps };
  render();

}
// ── Plan Preview Popup — Map View ────────────────────────────────────────────
// Converts scheduledSteps into fake movements (same schema as STATE.plannedMovements),
// then temporarily swaps STATE.plannedMovements + mvDayDate to render the existing
// renderMovementsDayView() map inside a fullscreen overlay.
// A separate state var (bpPreviewDate) tracks the selected day so it never
// interferes with the real Movements tab.
let bpPreviewDate = null;

function openBoatPlanPreview() {
  if (!bpGeneratedMovements) return;
  const { scheduledSteps, warnings } = bpGeneratedMovements;

  // Remove any existing preview
  const existing = document.getElementById('bp-preview-overlay');
  if (existing) existing.remove();

  // ── Colour + label helpers ─────────────────────────────────────────────────
  const ACTION_META = {
    facility_exit_to_frame:     { col:'#2563b0', icon:'🏭', label:'Facility → Frame (transit)'   },
    facility_exit_frame_to_rmd: { col:'#7040c0', icon:'📦', label:'Cage into RMD (via frame)'     },
    facility_exit_frame_storage:{ col:'#0d9488', icon:'🏭', label:'Facility → Frame (storage)'    },
    facility_to_rmd:            { col:'#0d9488', icon:'🏭', label:'Facility → RMD'                },
    rmd_to_frame:               { col:'#27a060', icon:'📦', label:'RMD → Frame (boat)'            },
    facility_to_frame:          { col:'#2563b0', icon:'🏭', label:'Facility → Frame (boat)'       },
    reframe:                    { col:'#e05c1a', icon:'🔄', label:'Reframe'                       },
    already_framed:             { col:'#888',    icon:'✅', label:'Already in frame'               },
    no_frame:                   { col:'#c0392b', icon:'⚠️', label:'No frame found'                },
    fix:                        { col:'#c08520', icon:'🔩', label:'Fix frame for shipping'         },
  };

  // Group steps by date
  const byDate = {};
  scheduledSteps.forEach(step => {
    const d = step.date || '(no date)';
    if (!byDate[d]) byDate[d] = [];
    byDate[d].push(step);
  });
  const dates = Object.keys(byDate).sort();

  if (!dates.length) { alert('No scheduled steps to preview.'); return; }

  // ── Warning strip ──────────────────────────────────────────────────────────
  const warnHTML = warnings.length
    ? warnings.map(w => {
        const isErr = w.startsWith('🚨');
        return `<div style="padding:7px 12px;background:${isErr?'#fef2f2':'#fef0e6'};border:1px solid ${isErr?'#fca5a5':'#e8c8a0'};border-radius:6px;font-size:12px;color:${isErr?'#c0392b':'var(--orange)'};margin-bottom:6px">${esc(w)}</div>`;
      }).join('')
    : '';

  // ── Build day sections ─────────────────────────────────────────────────────
  let totalMoves = 0;
  const daySectionsHTML = dates.map(d => {
    const steps = byDate[d];
    const movesOnDay = steps.filter(s => s.action !== 'already_framed' && s.action !== 'no_frame' && !s.isInfoOnly).length;
    totalMoves += movesOnDay;

    const rowsHTML = steps.map((step, i) => {
      const actionKey = step.isFixStep ? 'fix' : (step.action || (step.isFacilityExit ? 'facility_exit_to_frame' : 'facility_to_frame'));
      const meta = ACTION_META[actionKey] || { col:'var(--accent)', icon:'↔', label: actionKey };
      const cageName = step.cage?.name || step.frame?.name || '?';
      const frameName = step.frame?.name || '—';
      const rmdLabel = step.rmdSlot ? `RMD-${step.rmdSlot.number}${step.rmdSlot.side}` : '—';
      const isWarning = actionKey === 'no_frame';
      const rowBg = isWarning ? 'background:#fef2f2;' : (i % 2 === 0 ? '' : 'background:var(--bg-elevated);');

      // Build destination column
      let dest = '—';
      if (step.isFixStep) dest = frameName;
      else if (actionKey === 'facility_exit_to_frame') dest = step.rmdSlot ? `${frameName} (→ RMD-${step.rmdSlot.number}${step.rmdSlot.side})` : frameName;
      else if (actionKey === 'facility_exit_frame_to_rmd') dest = step.rmdSlot ? `RMD-${step.rmdSlot.number}${step.rmdSlot.side} (${step.rmdSlot.slot})` : '—';
      else if (actionKey === 'facility_exit_frame_storage') dest = frameName + (step.pairedWith ? ` (paired w/ ${step.pairedWith})` : '');
      else if (actionKey === 'facility_to_rmd') dest = rmdLabel;
      else if (actionKey === 'rmd_to_frame' || actionKey === 'facility_to_frame') dest = frameName;
      else if (actionKey === 'reframe') dest = frameName;
      else if (actionKey === 'already_framed') dest = frameName;

      return `<tr style="${rowBg}">
        <td style="padding:6px 8px;font-size:11px;width:24px;text-align:center">${meta.icon}</td>
        <td style="padding:6px 8px;font:700 12px var(--font-mono);color:${isWarning?'#c0392b':meta.col}">${esc(cageName)}</td>
        <td style="padding:6px 8px;font-size:11px;color:var(--text-secondary)">${esc(meta.label)}</td>
        <td style="padding:6px 8px;font-size:11px;color:var(--text-muted)">${esc(dest)}</td>
        <td style="padding:6px 8px;font-size:10px;color:var(--text-muted);max-width:260px">${esc(step.note || '')}</td>
      </tr>`;
    }).join('');

    const isBoatDay = d === bpBoatDate;
    return `
      <div style="margin-bottom:16px">
        <div style="display:flex;align-items:center;gap:10px;margin-bottom:6px">
          <div style="font:700 13px var(--font-display);color:${isBoatDay?'var(--accent)':'var(--text-primary)'}">
            ${isBoatDay ? '🚢 ' : '📅 '}${fmt(d)}${isBoatDay ? ' — Boat Date' : ''}
          </div>
          <div style="font-size:11px;color:var(--text-muted);background:var(--bg-elevated);border-radius:10px;padding:2px 8px">${steps.length} step${steps.length!==1?'s':''}</div>
        </div>
        <table style="width:100%;border-collapse:collapse;border:1px solid var(--border);border-radius:8px;overflow:hidden">
          <thead>
            <tr style="background:var(--bg-elevated)">
              <th style="padding:5px 8px;font-size:10px;color:var(--text-muted);text-align:left;width:24px"></th>
              <th style="padding:5px 8px;font-size:10px;color:var(--text-muted);text-align:left">Cage/Frame</th>
              <th style="padding:5px 8px;font-size:10px;color:var(--text-muted);text-align:left">Action</th>
              <th style="padding:5px 8px;font-size:10px;color:var(--text-muted);text-align:left">Destination</th>
              <th style="padding:5px 8px;font-size:10px;color:var(--text-muted);text-align:left">Note</th>
            </tr>
          </thead>
          <tbody>${rowsHTML}</tbody>
        </table>
      </div>`;
  }).join('');

  // ── Build overlay ──────────────────────────────────────────────────────────
  const overlay = document.createElement('div');
  overlay.id = 'bp-preview-overlay';
  overlay.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,0.55);z-index:1100;display:flex;align-items:flex-start;justify-content:center;padding:20px;overflow-y:auto';
  overlay.onclick = e => { if (e.target === overlay) overlay.remove(); };

  overlay.innerHTML = `
    <div style="background:var(--bg-base);border-radius:12px;width:100%;max-width:1100px;
                box-shadow:0 20px 60px rgba(0,0,0,0.35);display:flex;flex-direction:column">

      <!-- Header -->
      <div style="display:flex;align-items:center;gap:12px;padding:16px 20px;
                  border-bottom:1px solid var(--border);border-radius:12px 12px 0 0;
                  background:var(--bg-base);position:sticky;top:0;z-index:10;flex-shrink:0">
        <span style="font-size:22px">📋</span>
        <div style="flex:1;min-width:0">
          <div style="font:700 16px var(--font-display)">Plan Preview — 🚢 ${esc(bpBoatDate ? fmt(bpBoatDate) : '')}</div>
          <div style="font-size:11px;color:var(--text-muted)">${scheduledSteps.length} steps across ${dates.length} day${dates.length!==1?'s':''}</div>
        </div>
        <button class="btn btn-primary btn-sm" onclick="document.getElementById('bp-preview-overlay').remove();commitBoatPlan()">✅ Add to Planner</button>
        <button class="btn btn-secondary btn-sm" onclick="document.getElementById('bp-preview-overlay').remove()">✕ Close</button>
      </div>

      <!-- Warnings -->
      ${warnHTML ? `<div style="padding:12px 20px 0;flex-shrink:0">${warnHTML}</div>` : ''}

      <!-- Scrollable content -->
      <div style="padding:16px 20px;overflow-y:auto;flex:1">
        ${daySectionsHTML}
      </div>
    </div>`;

  document.body.appendChild(overlay);
}
async function commitBoatPlan() {
  if (!bpGeneratedMovements) return;
  const {scheduledSteps} = bpGeneratedMovements;
  const newMovements = [];

  scheduledSteps.forEach(step => {
    if (step.isFacilityExit && !step.action) {
      newMovements.push({
        id: uid(), date: step.date,
        type: 'Facility Exit Deadline',
        typeKey: 'facility-to-frame',
        description: step.note,
        shift: 'day', notes: `Boat plan — load date: ${fmt(bpBoatDate)}`,
        cageId: step.cage?.id || null,
        frameId: null, completed: false,
      });
    } else if (step.isFixStep) {
      newMovements.push({
        id: uid(), date: step.date,
        type: 'Fix for Shipping',
        typeKey: 'frame-fix-shipping',
        description: step.note,
        shift: 'day', notes: `Boat plan — load date: ${fmt(bpBoatDate)}${bpTripId ? ' · Trip: '+(getBoatTrip(bpTripId)?.label||'') : ''}`,
        cageId: null,
        frameId: step.frame?.id || null, completed: false,
      });
    } else if (step.action === 'facility_to_rmd') {
      newMovements.push({
        id: uid(), date: step.date,
        type: 'Facility → RMD',
        typeKey: 'facility-to-rmd',
        description: `${step.cage.name}: ${step.note}`,
        shift: 'day', notes: `Boat plan — load date: ${fmt(bpBoatDate)}`,
        cageId: step.cage.id,
        frameId: null,
        rmdNumber: step.rmdSlot?.number || null,
        rmdSide: step.rmdSlot?.side || null,
        rmdSlot: step.rmdSlot?.slot || 'cage1',
        completed: false,
      });
    } else if (step.action === 'facility_exit_frame_to_rmd') {
      const rmdLabel = step.rmdSlot ? `RMD-${step.rmdSlot.number}${step.rmdSlot.side}` : 'RMD';
      newMovements.push({
        id: uid(), date: step.date,
        type: 'Frame → RMD (exit storage)',
        typeKey: 'frame-to-rmd',
        description: `Cage ${step.cage.name}: ${step.frame?.name || 'frame'} → ${rmdLabel} for storage`,
        shift: 'day', notes: `Facility exit — cage must leave by ${fmt(step.deadline)} · Boat plan: ${fmt(bpBoatDate)}`,
        cageId: step.cage.id,
        frameId: step.frame?.id || null,
        rmdNumber: step.rmdSlot?.number || null,
        rmdSide: step.rmdSlot?.side || null,
        rmdSlot: step.rmdSlot?.slot || null,
        completed: false,
      });
    } else if (step.action === 'facility_exit_to_frame') {
      const walerNote = needsWaler(step.cage) ? ' [waler req.]' : '';
      newMovements.push({
        id: uid(), date: step.date,
        type: 'Facility → Frame (exit)',
        typeKey: 'facility-to-frame',
        description: `${step.cage.name}: ${step.note}${walerNote}`,
        shift: 'day', notes: `Facility exit — must leave by ${fmt(step.deadline)} · Boat plan: ${fmt(bpBoatDate)}`,
        cageId: step.cage.id,
        frameId: step.frame?.id || null, completed: false,
      });
    } else if (step.action === 'facility_exit_frame_storage') {
      const walerNote = needsWaler(step.cage) ? ' [waler req.]' : '';
      newMovements.push({
        id: uid(), date: step.date,
        type: 'Facility → Frame (RMD full, frame storage)',
        typeKey: 'facility-to-frame',
        description: `${step.cage.name}: ${step.note}${walerNote}`,
        shift: 'day', notes: `Facility exit — RMD full, cage held in frame · Boat plan: ${fmt(bpBoatDate)}`,
        cageId: step.cage.id,
        frameId: step.frame?.id || null, completed: false,
      });
    } else {
      const typeKey = step.action === 'rmd_to_frame' ? 'rmd-to-frame'
        : step.action === 'reframe' ? 'frame-to-frame'
        : 'facility-to-frame';
      const typeLabel = step.action === 'rmd_to_frame' ? 'RMD → Frame'
        : step.action === 'reframe' ? 'Reframe'
        : 'Facility → Frame';
      const walerNote = needsWaler(step.cage) ? ' [waler req.]' : '';
      newMovements.push({
        id: uid(), date: step.date,
        type: typeLabel,
        typeKey,
        description: `${step.cage.name}: ${step.note}${walerNote}`,
        shift: 'day', notes: `Boat plan — load date: ${fmt(bpBoatDate)}`,
        cageId: step.cage.id,
        frameId: step.frame?.id || null, completed: false,
      });
      if (step.action === 'reframe' && step.frame) {
        newMovements.push({
          id: uid(), date: step.date,
          type: 'Reframe → Frame',
          typeKey: 'rmd-to-frame',
          description: `${step.cage.name}: Load into ${step.frame.name}${step.frame.width ? ` [${step.frame.width}m]` : ''}${walerNote}`,
          shift: 'day', notes: `Boat plan — load date: ${fmt(bpBoatDate)}`,
          cageId: step.cage.id,
          frameId: step.frame?.id || null, completed: false,
        });
      }
    }
  });

  STATE.plannedMovements.push(...newMovements);

  // Store committed IDs for undo
  const days = new Set(scheduledSteps.map(s => s.date).filter(Boolean));
  const liftCount = newMovements.filter(m => m.typeKey !== 'frame-fix-shipping' && !m.type.includes('Deadline')).length;
  const exitCount = newMovements.filter(m => m.type.includes('exit')).length;
  bpLastCommit = {
    ids: newMovements.map(m => m.id),
    label: `${liftCount} movements across ${days.size} day${days.size!==1?'s':''}${exitCount > 0 ? ` (incl. ${exitCount} facility exit${exitCount!==1?'s':''})` : ''}`,
    liftCount,
    exitCount,
    fixCount: newMovements.filter(m=>m.typeKey==='frame-fix-shipping').length,
  };

  // ── Save a generated plan snapshot to the audit log ──────────────────────
  {
    if (!STATE.savedPlans) STATE.savedPlans = [];
    const planRef = 'BP-' + new Date().toISOString().slice(0,10) + '-' + Math.floor(Math.random()*9000+1000);
    const boatCageNames = [...bpSelectedCages].map(id => getCage(id)?.name).filter(Boolean).join(', ');
    const planSnapshot = {
      id: uid(),
      ref: planRef,
      boatDate: bpBoatDate,
      label: bpLastCommit.label,
      boatCages: boatCageNames,
      warnings: bpGeneratedMovements?.warnings || [],
      steps: scheduledSteps.map(s => ({
        date: s.date,
        action: s.action || (s.isFixStep ? 'fix' : s.isFacilityExit ? 'facility_exit_to_frame' : 'facility_to_frame'),
        cageName: s.cage?.name || s.frame?.name || '?',
        frameName: s.frame?.name || null,
        rmdSlot: s.rmdSlot ? `RMD-${s.rmdSlot.number}${s.rmdSlot.side}` : null,
        note: s.note || '',
      })),
      movementIds: newMovements.map(m => m.id),
      createdAt: new Date().toISOString(),
    };
    STATE.savedPlans.unshift(planSnapshot);
    if (STATE.savedPlans.length > 50) STATE.savedPlans = STATE.savedPlans.slice(0, 50);
    bpLastCommit.planRef = planRef;
  }

  bpSelectedCages.clear();
  bpGeneratedMovements = null;
  render();
  await Promise.all(newMovements.map(m => addMovementToAPI(m)));
}

async function undoBoatPlan() {
  if (!bpLastCommit) return;
  const { ids, label } = bpLastCommit;
  if (!confirm(`Undo boat plan? This will remove ${ids.length} movement${ids.length!==1?'s':''} (${label}) that were just added to the planner.`)) return;
  // Remove from STATE
  STATE.plannedMovements = STATE.plannedMovements.filter(m => !ids.includes(m.id));
  bpLastCommit = null;
  render();
  // Delete from API in background
  await Promise.all(ids.map(id => deleteMovementFromAPI(id)));
}

function renderBoatPlanner() {
  const today = new Date();
  const in7Days = new Date(today); in7Days.setDate(in7Days.getDate() + 7);

  // Boat date cutoff — show all facility cages that must leave by or before the boat loading date
  const boatCutoff = bpBoatDate ? new Date(bpBoatDate + 'T23:59:59') : in7Days;

  // Cages to show: those leaving facility before the boat date OR already in RMD/frame
  const eligibleCages = STATE.cages.filter(c => {
    if (c.location === 'shipped') return false;
    if (c.location === 'rmd' || c.location === 'rss' || c.location === 'frame') return true;
    if (c.location === 'facility' && c.departureDate) {
      const dep = new Date(c.departureDate + 'T12:00:00');
      return dep <= boatCutoff;
    }
    // Also include facility cages explicitly assigned to the selected trip
    if (c.location === 'facility' && bpTripId && c.proposedTripId === bpTripId) return true;
    return false;
  }).sort((a,b) => {
    // Sort: facility with departure first (by date), then rmd, then frame
    if (a.location === 'facility' && b.location === 'facility') {
      const da = a.departureDate || 'zzz'; const db = b.departureDate || 'zzz';
      return da.localeCompare(db) || a.name.localeCompare(b.name, undefined, {numeric:true});
    }
    const order = {facility:0, rmd:1, frame:2};
    if (order[a.location] !== order[b.location]) return order[a.location] - order[b.location];
    return a.name.localeCompare(b.name, undefined, {numeric:true});
  });

  // Upcoming departures (cages with departure dates in next 7 days)
  const upcoming = STATE.cages
    .filter(c => c.departureDate && c.location !== 'shipped')
    .sort((a,b) => a.departureDate.localeCompare(b.departureDate));

  const cageCardsHTML = (() => {
    if (eligibleCages.length === 0) return '<div class="empty-msg">No cages departing before the boat date, and no cages in RMD or frames. Set a boat date or assign cages to a trip to see them here.</div>';

    // Group by proposedTripId (falling back to proposedShipDay date for legacy cages)
    const groups = {};
    const NO_GROUP = '__none__';
    eligibleCages.forEach(c => {
      const key = c.proposedTripId || (c.proposedShipDay ? 'legacy:'+c.proposedShipDay : NO_GROUP);
      if (!groups[key]) groups[key] = [];
      groups[key].push(c);
    });

    // Sort group keys: trip groups by load date, then legacy date groups, then ungrouped
    const sortedKeys = Object.keys(groups).sort((a, b) => {
      if (a === NO_GROUP) return 1;
      if (b === NO_GROUP) return -1;
      // Get sort date for each key
      function keyDate(k) {
        if (k.startsWith('legacy:')) return k.replace('legacy:','');
        const trip = getBoatTrip(k);
        return trip ? (trip.loadDate||trip.departDate||trip.returnDate||'') : '';
      }
      return keyDate(a).localeCompare(keyDate(b));
    });

    const hasGroups = sortedKeys.some(k => k !== NO_GROUP);

    return sortedKeys.map(key => {
      const groupCages = groups[key];
      let groupHeader = '';
      if (key !== NO_GROUP) {
        let headerLabel = '';
        if (key.startsWith('legacy:')) {
          const date = key.replace('legacy:','');
          headerLabel = `🚢 Ship Day: ${fmt(date)}`;
        } else {
          const trip = getBoatTrip(key);
          if (trip) {
            const dateStr = trip.loadDate ? ` · Load: ${fmt(trip.loadDate)}` : trip.departDate ? ` · Depart: ${fmt(trip.departDate)}` : '';
            headerLabel = `🚢 Trip: ${esc(trip.label||'Unnamed')}${dateStr}`;
          } else {
            headerLabel = '🚢 Unknown Trip';
          }
        }
        groupHeader = `<div style="grid-column:1/-1;font:700 12px var(--font-mono);color:var(--purple);padding:6px 0 4px;border-bottom:1px solid var(--border);margin-bottom:4px">${headerLabel} <span style="font-weight:400;color:var(--text-muted)">(${groupCages.length} cage${groupCages.length>1?'s':''})</span></div>`;
      } else if (hasGroups) {
        groupHeader = `<div style="grid-column:1/-1;font:700 12px var(--font-mono);color:var(--text-muted);padding:6px 0 4px;border-bottom:1px solid var(--border);margin-bottom:4px">No trip assigned</div>`;
      }

      const cards = groupCages.map(c => {
        const sel = bpSelectedCages.has(c.id);
        const daysLeft = c.departureDate ? Math.ceil((new Date(c.departureDate+'T12:00:00') - new Date()) / 86400000) : null;
        const isOverdue = daysLeft !== null && daysLeft < 0;
        const isUrgent = daysLeft !== null && daysLeft <= 3 && !isOverdue;
        const isSoon = daysLeft !== null && daysLeft <= 7 && !isUrgent && !isOverdue;
        const depColor = isOverdue ? 'var(--red)' : isUrgent ? 'var(--red)' : isSoon ? 'var(--orange)' : 'var(--text-muted)';
        const depTag = c.departureDate
          ? `<span style="color:${depColor};font-weight:${isOverdue||isUrgent?'700':'400'}">📅 ${fmt(c.departureDate)} (${isOverdue ? 'OVERDUE' : daysLeft+'d'})</span>`
          : '';
        const urgentBorder = isOverdue ? 'border-left:3px solid var(--red)' : isUrgent ? 'border-left:3px solid var(--orange)' : '';
        const locTag = `<span class="badge badge-${locBadge(c.location)}" style="font-size:9px;padding:1px 5px">${esc(locLabel(c))}</span>`;
        const isRmdExit = c.location === 'facility' && c.departureDate && !c.proposedTripId;
        const exitTag = isRmdExit ? `<span style="font:600 9px var(--font-mono);padding:1px 6px;background:#f0e8fa;color:var(--purple);border:1px solid #c8b0e8;border-radius:10px">→ RMD</span>` : '';
        return `<div class="bp-cage-card ${sel?'selected':''}" onclick="toggleBPCage('${c.id}')" style="${urgentBorder}">
          <div class="bp-check">${sel?'✓':''}</div>
          <div class="bp-cage-info">
            <div class="bp-cage-name">${esc(c.name)} ${locTag} ${exitTag}</div>
            <div class="bp-cage-meta">${c.width}m × ${c.height}m × ${c.length}m · ${c.weight}t ${depTag}</div>
          </div>
        </div>`;
      }).join('');

      return groupHeader + cards;
    }).join('');
  })();

  // Generated movements panel
  let movementsHTML = '';
  if (bpGeneratedMovements) {
    const {moves, warnings} = bpGeneratedMovements;
    const warningsHTML = warnings.map(w => {
      const isInfo = w.startsWith('ℹ');
      return `<div class="bp-warning" style="${isInfo ? 'background:#e6f0fa;border-color:#a0c8e8;color:var(--blue)' : ''}">${esc(w)}</div>`;
    }).join('');
    const movesListHTML = moves.map(m => {
      if (m.category === 'date-header') {
        return `<li style="list-style:none;border-top:2px solid var(--border);margin-top:8px;padding-top:6px"><span style="font:700 11px var(--font-mono);color:var(--blue)">${esc(m.type)} — ${esc(m.desc)}</span></li>`;
      }
      const typeColor = m.category === 'info' ? 'var(--green)'
        : m.category === 'warning' ? 'var(--orange)'
        : m.category === 'facility-exit' ? 'var(--purple)'
        : m.category === 'returning-frame' ? '#0e7490'
        : m.category === 'facility-rmd' ? 'var(--purple)'
        : 'var(--accent)';
      return `<li><div class="bp-movement-desc"><span class="bp-movement-type" style="color:${typeColor}">${esc(m.type)}</span> — ${esc(m.desc)}</div></li>`;
    }).join('');
    const hasMoves = moves.some(m => m.category === 'move' || m.category === 'returning-frame' || m.category === 'facility-rmd');


    movementsHTML = `
      <div class="card">
        <div class="card-title">Generated Movement Plan for ${fmt(bpBoatDate)}</div>
        ${warningsHTML}
        ${movesListHTML ? `<ul class="bp-movement-list">${movesListHTML}</ul>` : '<div class="empty-msg">No movements needed.</div>'}
        ${hasMoves ? `
          <div style="margin-top:16px;border-top:1px solid var(--border);padding-top:14px">
            <div style="font:700 11px var(--font-mono);color:var(--text-muted);text-transform:uppercase;letter-spacing:.06em;margin-bottom:6px">💬 Guidance for Re-generation</div>
            <div style="font-size:11px;color:var(--text-muted);margin-bottom:8px;line-height:1.5">
              Tell the planner how to handle specific cages before regenerating. Examples:<br>
              <span style="font-family:var(--font-mono);background:var(--bg-elevated);padding:1px 5px;border-radius:3px">put cage 445 in RMD-03A</span> &nbsp;
              <span style="font-family:var(--font-mono);background:var(--bg-elevated);padding:1px 5px;border-radius:3px">skip cage 320</span> &nbsp;
              <span style="font-family:var(--font-mono);background:var(--bg-elevated);padding:1px 5px;border-radius:3px">use TF-15 for cage 424</span>
            </div>
            <textarea id="bp-guidance-input" rows="3" placeholder="Enter guidance here, one instruction per line…"
              style="width:100%;font:400 12px var(--font-display);padding:8px 10px;border-radius:6px;border:1px solid var(--border);background:var(--bg-input);resize:vertical;margin-bottom:10px"
              oninput="bpGuidance=this.value">${esc(bpGuidance)}</textarea>
            <div style="display:flex;gap:6px;margin-bottom:8px;flex-wrap:wrap">
              <button class="btn btn-secondary btn-sm" onclick="bpSetAIGuidance('re-examine the existing planned movements and this new plan, identify any conflicts or inefficiencies, and suggest a better schedule')">🤖 Ask AI to improve</button>
              <button class="btn btn-secondary btn-sm" onclick="bpSetAIGuidance('look at the day-by-day workload and rebalance so no day is overloaded, keeping within the daily movement limit')">⚖ Rebalance days</button>
              <button class="btn btn-secondary btn-sm" onclick="bpSetAIGuidance('check waler requirements for all cages and make sure every cage that needs a waler is assigned to a frame that has one')">🔩 Fix waler issues</button>
              <button class="btn btn-secondary btn-sm" onclick="bpSetAIGuidance('prioritise cages with the earliest departure dates and make sure they are scheduled earliest in the plan')">⏰ Prioritise by date</button>
            </div>
            <div class="form-actions">
              <button class="btn btn-primary" onclick="openBoatPlanPreview()" title="Review movements day-by-day before committing">📅 Preview Plan</button>
              <button class="btn btn-primary" onclick="commitBoatPlan()">✅ Add to Planner</button>
              <button class="btn btn-secondary" onclick="generateBoatMovements()" title="Re-run the plan generator with your guidance applied">🔄 Re-generate with Guidance</button>
              <button class="btn btn-secondary" onclick="bpGuidance='';bpGeneratedMovements=null;render()">Clear</button>
            </div>
          </div>` : `<div class="form-actions" style="margin-top:12px">
          <button class="btn btn-secondary" onclick="bpGuidance='';bpGeneratedMovements=null;render()">Clear</button>
        </div>`}
      </div>`;
  }

  // Upcoming departures panel — grouped by working week (Mon–Fri)
  const upcomingHTML = (() => {
    if (upcoming.length === 0) return '<div class="empty-msg">No cages have a Leaves Facility date set.</div>';

    // Helper: get the Monday (start of working week) for a given date string
    function getWeekMonday(dateStr) {
      const d = new Date(dateStr + 'T12:00:00');
      const day = d.getDay(); // 0=Sun,1=Mon,...,6=Sat
      const diff = day === 0 ? -6 : 1 - day; // shift Sunday back 6, others to Monday
      const mon = new Date(d);
      mon.setDate(d.getDate() + diff);
      return mon.toISOString().slice(0,10);
    }

    function getWeekFriday(mondayStr) {
      const d = new Date(mondayStr + 'T12:00:00');
      d.setDate(d.getDate() + 4);
      return d.toISOString().slice(0,10);
    }

    // Group cages by their working-week Monday key, preserving date order
    const weekGroups = {};
    const weekOrder = [];
    upcoming.forEach(c => {
      const monKey = getWeekMonday(c.departureDate);
      if (!weekGroups[monKey]) { weekGroups[monKey] = []; weekOrder.push(monKey); }
      weekGroups[monKey].push(c);
    });

    const todayMon = getWeekMonday(todayStr());

    return weekOrder.map(monKey => {
      const friKey = getWeekFriday(monKey);
      const isCurrentWeek = monKey === todayMon;
      const isPastWeek = monKey < todayMon;
      const weekLabel = isCurrentWeek ? 'This Week' : isPastWeek ? 'Overdue / Past' : `w/c ${fmt(monKey)}`;
      const weekColor = isPastWeek ? 'var(--red)' : isCurrentWeek ? 'var(--orange)' : 'var(--blue)';
      const weekBg = isPastWeek ? 'rgba(201,48,48,0.07)' : isCurrentWeek ? 'rgba(184,92,26,0.07)' : 'rgba(37,99,176,0.06)';

      const rows = weekGroups[monKey].map(c => {
        const daysLeft = Math.ceil((new Date(c.departureDate+'T12:00:00') - new Date()) / 86400000);
        const urgColor = daysLeft < 0 ? 'var(--red)' : daysLeft <= 7 ? 'var(--orange)' : 'var(--green)';
        return `<div style="display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-bottom:1px solid var(--border);font-size:13px">
          <span style="font-weight:600">${esc(c.name)}</span>
          <span class="badge badge-${locBadge(c.location)}">${esc(locLabel(c))}</span>
          <span style="color:${urgColor};font-family:var(--font-mono);font-size:11px">${fmt(c.departureDate)} (${daysLeft < 0 ? 'OVERDUE' : daysLeft+'d'})</span>
        </div>`;
      }).join('');

      return `<div style="margin-bottom:10px">
        <div style="display:flex;align-items:center;gap:6px;padding:5px 8px;background:${weekBg};border-radius:5px;margin-bottom:4px">
          <span style="font:700 10px var(--font-mono);color:${weekColor};text-transform:uppercase;letter-spacing:0.06em">${weekLabel}</span>
          <span style="font-size:10px;color:var(--text-muted)">${fmt(monKey)} – ${fmt(friKey)}</span>
          <span style="margin-left:auto;font:600 10px var(--font-mono);color:${weekColor}">${weekGroups[monKey].length} cage${weekGroups[monKey].length>1?'s':''}</span>
        </div>
        ${rows}
      </div>`;
    }).join('');
  })();

  return `
    <h2 class="section-title" style="margin-bottom:4px">🚢 Boat Planner</h2>
    <div style="font-size:12px;color:var(--text-muted);margin-bottom:16px">Showing all cages with a departure date on or before the boat loading date, plus all cages already in RMD or frames. Select a trip or set a date to filter. Frame availability reflects existing planned movements.</div>
    <div style="display:grid;grid-template-columns:1fr 340px;gap:16px">
      <div>
        <div class="card">
          <div class="flex-between" style="margin-bottom:12px">
            <div class="card-title" style="margin:0">Select Cages for Next Boat (${bpSelectedCages.size} selected)</div>
            <div style="display:flex;gap:8px;align-items:center">
              <div>
                <label style="margin-bottom:2px">Boat Trip</label>
                <select style="width:220px" onchange="bpSetTrip(this.value)">
                  <option value="">— Select a trip —</option>
                  ${(STATE.boatTrips||[]).slice().sort((a,b)=>{const da=a.loadDate||a.departDate||'';const db=b.loadDate||b.departDate||'';return da.localeCompare(db);}).map(t=>{
                    const dateStr = t.loadDate ? ` (${fmt(t.loadDate)})` : t.departDate ? ` (${fmt(t.departDate)})` : '';
                    return `<option value="${t.id}" ${bpTripId===t.id?'selected':''}>${esc(t.label||'Trip')}${dateStr}</option>`;
                  }).join('')}
                </select>
              </div>
              <div style="align-self:flex-end">
                <label style="margin-bottom:2px">Or manual date</label>
                <input type="date" value="${bpBoatDate}" onchange="bpBoatDate=this.value;bpTripId=null;bpGeneratedMovements=null;render()" style="width:150px"/>
              </div>
              ${bpSelectedCages.size > 0 ? `<button class="btn btn-primary" onclick="generateBoatMovements()" style="align-self:flex-end">⚙ Generate Plan</button>` : ''}
              ${bpSelectedCages.size > 0 ? `<button class="btn btn-secondary" onclick="bpSelectedCages.clear();bpGeneratedMovements=null;render()" style="align-self:flex-end">Clear</button>` : ''}
            </div>
          </div>
          <div class="bp-cage-grid">${cageCardsHTML}</div>
        </div>
        ${bpLastCommit ? `
          <div style="display:flex;align-items:center;gap:10px;padding:10px 14px;background:#e6f5ec;border:1px solid #b0dcc0;border-radius:8px;margin-bottom:12px">
            <span style="font-size:16px">✅</span>
            <div style="flex:1;font-size:13px;color:var(--green)"><strong>Plan added to planner</strong> — ${esc(bpLastCommit.label)}</div>
            <button class="btn btn-danger btn-sm" onclick="undoBoatPlan()">↩ Undo</button>
          </div>` : ''}
        ${movementsHTML}
      </div>
      <div>
        <div class="card">
          <div class="card-title">Upcoming Cages Out of Facility</div>
          ${upcomingHTML}
        </div>
          <div class="card" style="margin-top:0">
          <div class="card-title">Frame Availability</div>
          ${STATE.frames.filter(f=>f.location==='facility').map(f => {
            const plannedExtra = (STATE.plannedMovements.filter(m=>!m.completed && m.typeKey==='facility-to-frame' && m.frameId===f.id)).length;
            const totalCages = f.cages.length + plannedExtra;
            const cls = totalCages === 0 ? 'badge-green' : totalCages === 1 ? 'badge-yellow' : 'badge-red';
            const lbl = totalCages === 0 ? 'Empty' : totalCages === 1 ? `1 cage${plannedExtra > 0 ? ' (planned)' : ''}` : 'Full';
            return `<div style="display:flex;justify-content:space-between;align-items:center;padding:3px 0;font-size:12px">
              <span style="font-family:var(--font-mono)">${esc(f.name)}</span>
              <span style="color:var(--text-muted)">${f.width}m</span>
              <span class="badge ${cls}">${lbl}</span>
            </div>`;
          }).join('')}
          ${(() => {
            const returningFrames = STATE.frames.filter(f =>
              (f.location === 'client' || f.location === 'boat') && f.returnDate && bpBoatDate && f.returnDate <= bpBoatDate
            );
            if (!returningFrames.length) return '';
            return `<div style="margin-top:10px;padding-top:8px;border-top:1px dashed var(--border)">
              <div style="font:700 10px var(--font-mono);color:#0e7490;margin-bottom:6px;letter-spacing:0.06em">🔁 RETURNING BEFORE BOAT DATE</div>
              ${returningFrames.map(f => `
                <div style="display:flex;justify-content:space-between;align-items:center;padding:3px 0;font-size:12px">
                  <span style="font-family:var(--font-mono);color:#0e7490">${esc(f.name)}</span>
                  <span style="color:var(--text-muted)">${f.width}m</span>
                  <span style="font-size:10px;color:#0e7490;font-weight:600">↩ ${fmt(f.returnDate)}</span>
                </div>`).join('')}
            </div>`;
          })()}
        </div>
      </div>
    </div>
  `;
}

// MOVEMENTS MAP TAB

let mvFilter = 'all';
let mvDayView = false;   // false = "all movements" map, true = day-by-day view
let mvDayDate = null;    // ISO date string of the currently viewed day (null = auto-select today/first day)

// ── Click-to-Plan state ──
// mvPick = null (idle) | { cageId, cageName, fromLocation, fromDetail }
let mvPick = null;

// ── Click-to-Plan Functions ──
// Step 1: user clicks a cage icon → set mvPick and re-render to show destination targets
function mvPickCage(cageId) {
  const cage = getCage(cageId);
  if (!cage) return;
  // If already picking this cage, cancel
  if (mvPick && mvPick.cageId === cageId) { mvPick = null; render(); return; }
  mvPick = { cageId, cageName: cage.name, fromLocation: cage.location, fromDetail: cage.locationDetail || '' };
  render();
}

// Step 2: user clicks a destination → show date modal and add movement
function mvPickDestination(destType, destId, destLabel) {
  if (destType === 'rss') {
    // Direct click-to-plan: set planFormType to the appropriate rss move type
    const cage = getCage(mvPick ? mvPick.cageId : '');
    if (cage) {
      if (cage.location === 'rss') { planFormType = 'rss-to-frame'; }
      else { planFormType = 'facility-to-rss'; }
    }
    planFormOpen = true;
    mvPick = null;
    render();
    return;
  }
  if (!mvPick) return;
  const cage = getCage(mvPick.cageId);
  if (!cage) { mvPick = null; render(); return; }

  // Determine movement typeKey
  let typeKey = '';
  if (mvPick.fromLocation === 'facility' && destType === 'frame') typeKey = 'facility-to-frame';
  else if (mvPick.fromLocation === 'facility' && destType === 'rmd') typeKey = 'facility-to-rmd';
  else if (mvPick.fromLocation === 'rmd' && destType === 'frame') typeKey = 'rmd-to-frame';
  else if (mvPick.fromLocation === 'frame' && destType === 'rmd') typeKey = 'frame-to-rmd';
  else if (mvPick.fromLocation === 'frame' && destType === 'frame') typeKey = 'frame-to-frame';
  else {
    alert(`Cannot plan movement from ${mvPick.fromLocation} to ${destType}.`);
    return;
  }

  // Build description
  const typeLabel = MOVE_TYPES.find(t => t.value === typeKey)?.label || typeKey;
  const frameWidthTag = (f) => f && f.width ? ` [${f.width}m]` : '';
  let parts = [];
  if (typeKey === 'frame-to-frame') {
    const srcFrame = STATE.frames.find(f => f.cages.includes(mvPick.cageId));
    parts = [cage.name, srcFrame ? (srcFrame.name + frameWidthTag(srcFrame)) : '', destLabel];
  } else {
    parts = [cage.name, destLabel];
  }
  const desc = parts.filter(Boolean).join(' → ');

  // Show date picker modal
  const overlay = document.createElement('div');
  overlay.id = 'mv-pick-date-overlay';
  overlay.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,0.55);z-index:3000;display:flex;align-items:center;justify-content:center';
  overlay.innerHTML = `
    <div style="background:var(--bg-card);border:1px solid var(--border);border-radius:12px;padding:24px 28px;width:360px;box-shadow:0 8px 40px rgba(0,0,0,0.25)">
      <div style="font:700 16px var(--font-display);color:var(--text-primary);margin-bottom:4px">Plan Movement</div>
      <div style="font-size:13px;color:var(--text-secondary);margin-bottom:16px">${esc(desc)}</div>
      <div style="font:600 10px var(--font-mono);color:var(--text-muted);text-transform:uppercase;letter-spacing:.06em;margin-bottom:4px">Movement Date</div>
      <input type="date" id="mv-pick-date-input" value="${todayStr()}" style="margin-bottom:14px;font-size:14px">
      <div style="font:600 10px var(--font-mono);color:var(--text-muted);text-transform:uppercase;letter-spacing:.06em;margin-bottom:4px">Shift</div>
      <select id="mv-pick-shift" style="margin-bottom:18px;font-size:13px"><option value="day">Day Shift</option><option value="night">Night Shift</option></select>
      <div style="display:flex;gap:8px">
        <button class="btn btn-primary" style="flex:1" onclick="mvConfirmPick('${typeKey}','${destType}','${destId}')">✓ Add to Plan</button>
        <button class="btn btn-secondary" onclick="document.getElementById('mv-pick-date-overlay').remove();mvPick=null;render()">Cancel</button>
      </div>
    </div>`;
  document.body.appendChild(overlay);
}

async function mvConfirmPick(typeKey, destType, destId) {
  if (!mvPick) return;
  const cage = getCage(mvPick.cageId);
  if (!cage) return;

  const dateInput = document.getElementById('mv-pick-date-input');
  const shiftInput = document.getElementById('mv-pick-shift');
  const date = dateInput ? dateInput.value : todayStr();
  const shift = shiftInput ? shiftInput.value : 'day';
  if (!date) { alert('Please select a date.'); return; }

  const overlay = document.getElementById('mv-pick-date-overlay');
  if (overlay) overlay.remove();

  let frameId = '', rmdSlot = '';
  let resolvedFrameId = '';

  if (destType === 'frame') {
    frameId = destId;
    resolvedFrameId = destId;
  } else if (destType === 'rmd') {
    rmdSlot = destId; // e.g. "3A"
  }

  const frame = getFrame(resolvedFrameId);
  const frameWidthTag = (f) => f && f.width ? ` [${f.width}m]` : '';

  let parts = [];
  if (typeKey === 'frame-to-frame') {
    const srcFrame = STATE.frames.find(f => f.cages.includes(mvPick.cageId));
    parts = [cage.name, srcFrame ? (srcFrame.name + frameWidthTag(srcFrame)) : '', frame ? (frame.name + frameWidthTag(frame)) : destId];
  } else {
    parts = [cage.name];
    if (frame) parts.push(frame.name + frameWidthTag(frame));
    if (rmdSlot) parts.push('RMD-' + rmdSlot);
  }
  const desc = parts.filter(Boolean).join(' → ');
  const typeLabel = MOVE_TYPES.find(t => t.value === typeKey)?.label || typeKey;

  const move = {
    id: uid(), type: typeLabel, typeKey, cageId: mvPick.cageId,
    frameId: resolvedFrameId, rmdSlot, date, shift,
    notes: '', completed: false, description: desc,
    createdAt: new Date().toISOString(),
    sortOrder: STATE.plannedMovements.length
  };
  if (typeKey === 'frame-to-frame') {
    const srcFrame = STATE.frames.find(f => f.cages.includes(mvPick.cageId));
    if (srcFrame) move.srcFrameId = srcFrame.id;
  }
  // For frame-to-rmd, auto-resolve frameId from cage's current location
  if (typeKey === 'frame-to-rmd' && !move.frameId) {
    const currentFrame = STATE.frames.find(f => f.cages.includes(mvPick.cageId));
    if (currentFrame) move.frameId = currentFrame.id;
  }

  STATE.plannedMovements.push(move);
  mvPick = null;
  render();
  await addMovementToAPI(move);
}

// ── Movement Edit Modal ──
function openMvCageMovements(cageId) {
  const cage = getCage(cageId);
  if (!cage) return;
  _mvEditCageId = cageId;
  renderMvCageEditModal();
}

let _mvEditCageId = null;

function renderMvCageEditModal() {
  const existing = document.getElementById('mv-cage-edit-overlay');
  if (existing) existing.remove();
  if (!_mvEditCageId) return;

  const cage = getCage(_mvEditCageId);
  if (!cage) return;
  const moves = STATE.plannedMovements.filter(m => m.cageId === _mvEditCageId && !m.completed);

  const MVCOLS = {'rmd-to-frame':'#27a060','frame-to-rmd':'#7040c0','frame-to-frame':'#e05c1a','facility-to-frame':'#2563b0','facility-to-rmd':'#0d9488','frame-fix-shipping':'#c08520','frame-return-from-client':'#0e7490'};

  function resolveDesc(m) {
    const frame = getFrame(m.frameId);
    const srcFrame = getFrame(m.srcFrameId);
    if (m.typeKey === 'rmd-to-frame') return `RMD-${m.rmdSlot||'?'} → ${frame?frame.name:'?'}`;
    if (m.typeKey === 'frame-to-rmd') return `${frame?frame.name:'?'} → RMD-${m.rmdSlot||'?'}`;
    if (m.typeKey === 'facility-to-frame') return `Facility → ${frame?frame.name:'?'}`;
    if (m.typeKey === 'frame-to-frame') return `${srcFrame?srcFrame.name:'?'} → ${frame?frame.name:'?'}`;
    if (m.typeKey === 'frame-fix-shipping') return `Fix ${frame?frame.name:'frame'} for shipping`;
    if (m.typeKey === 'frame-return-from-client') return `${frame?frame.name:'frame'} → Facility`;
    return m.description || m.type || m.typeKey;
  }

  const movesHTML = moves.length === 0
    ? `<div class="empty-msg" style="margin-bottom:12px">No pending movements for this cage.</div>`
    : moves.map((m, i) => {
        const col = MVCOLS[m.typeKey] || 'var(--accent)';
        const desc = resolveDesc(m);
        const shiftLabel = m.shift === 'night' ? '🌙 Night' : '☀ Day';
        return `<div style="border:1px solid var(--border);border-radius:8px;padding:12px 14px;margin-bottom:10px;background:var(--bg-elevated)">
          <div style="display:flex;align-items:center;gap:8px;margin-bottom:8px">
            <div style="width:22px;height:22px;border-radius:50%;background:${col};color:#fff;font:700 11px var(--font-mono);display:flex;align-items:center;justify-content:center;flex-shrink:0">${i+1}</div>
            <div style="flex:1;min-width:0">
              <div style="font:600 12px var(--font-mono);color:${col}">${esc(m.type||m.typeKey)}</div>
              <div style="font-size:11px;color:var(--text-muted);margin-top:1px">${esc(desc)}</div>
            </div>
            <span style="font-size:10px;color:var(--text-muted)">${shiftLabel}</span>
          </div>
          <div style="display:flex;align-items:center;gap:8px;margin-bottom:8px">
            <label style="margin:0;white-space:nowrap">Date</label>
            <input type="date" value="${m.date||''}" style="flex:1;font:600 12px var(--font-mono);color:var(--accent)"
              onchange="mvEditReschedule('${m.id}',this.value)" />
          </div>
          ${m.notes ? `<div style="font-size:11px;color:var(--text-muted);margin-bottom:8px;font-style:italic">${esc(m.notes)}</div>` : ''}
          <div style="margin-bottom:8px">
            <input class="move-note-edit" placeholder="Add completion note…" value="${esc(m.completionNote||'')}"
              oninput="setMoveNote('${m.id}',this.value)"
              style="width:100%;font-size:12px" />
          </div>
          <div style="display:flex;gap:6px">
            <button class="btn btn-primary btn-sm" onclick="mvEditComplete('${m.id}')">✓ Mark Complete</button>
            <button class="btn btn-danger btn-sm" onclick="mvEditDelete('${m.id}')">🗑 Delete</button>
          </div>
        </div>`;
      }).join('');

  const overlay = document.createElement('div');
  overlay.id = 'mv-cage-edit-overlay';
  overlay.className = 'search-overlay';
  overlay.onclick = (e) => { if (e.target === overlay) { _mvEditCageId = null; overlay.remove(); } };
  overlay.innerHTML = `
    <div class="search-modal" style="width:540px;max-height:85vh;display:flex;flex-direction:column">
      <div class="search-input-row">
        <span style="font-size:18px">📦</span>
        <div style="flex:1">
          <div style="font:700 15px var(--font-display);color:var(--text-primary)">Cage ${esc(cage.name)} — Planned Movements</div>
          <div style="font-size:11px;color:var(--text-muted)">${cage.width}m × ${cage.height}m × ${cage.length}m · ${cage.weight}t · <span style="font-weight:600">${locLabel(cage)}</span></div>
        </div>
        <button class="btn btn-secondary btn-sm" onclick="_mvEditCageId=null;document.getElementById('mv-cage-edit-overlay').remove()">✕</button>
      </div>
      <div style="flex:1;overflow-y:auto;padding:14px 18px">
        ${movesHTML}
        <button class="btn btn-primary btn-sm" style="width:100%;margin-top:4px"
          onclick="_mvEditCageId=null;document.getElementById('mv-cage-edit-overlay').remove();planFormOpen=true;render()">
          + Add New Movement
        </button>
      </div>
    </div>`;
  document.body.appendChild(overlay);
}

async function mvEditReschedule(id, newDate) {
  // Reuse the exact same rescheduleMove from the planner
  await rescheduleMove(id, newDate);
  renderMvCageEditModal(); // refresh modal with updated date
}

async function mvEditComplete(id) {
  // Reuse the exact same completeMove from the planner — handles location updates, history, API calls
  await completeMove(id);
  // After completing, re-render modal (cage may have no moves left)
  if (_mvEditCageId) {
    const remaining = STATE.plannedMovements.filter(m => m.cageId === _mvEditCageId && !m.completed).length;
    if (remaining > 0) {
      renderMvCageEditModal();
    } else {
      _mvEditCageId = null;
      document.getElementById('mv-cage-edit-overlay')?.remove();
    }
  }
}

async function mvEditDelete(id) {
  if (!confirm('Delete this planned movement?')) return;
  // Reuse the exact same deleteMove from the planner
  await deleteMove(id);
  if (_mvEditCageId) {
    const remaining = STATE.plannedMovements.filter(m => m.cageId === _mvEditCageId && !m.completed).length;
    if (remaining > 0) {
      renderMvCageEditModal();
    } else {
      _mvEditCageId = null;
      document.getElementById('mv-cage-edit-overlay')?.remove();
    }
  }
}

// ─────────────────────────────────────────────────────────────────────────────
// DAY-BY-DAY MOVEMENTS VIEW
// Reuses the full map renderer but filtered to one day's moves.
// Prior-day pending moves are simulated so cage positions reflect the start
// of the selected day.
// ─────────────────────────────────────────────────────────────────────────────
function renderMovementsDayView() {
  const allPending = STATE.plannedMovements.filter(m => !m.completed);

  // Sorted unique dates across ALL movements (pending + completed) for navigation
  const dates = [...new Set(STATE.plannedMovements.map(m => m.date).filter(Boolean))].sort();
  // Always include today so the user can see the current simulation state even
  // if no movements are planned today.
  const _today = todayStr();
  if (!dates.includes(_today)) { dates.push(_today); dates.sort(); }
  // Always append the next working day after the latest planned date so the user
  // can see the full simulation state even with no movements on that day.
  if (dates.length > 0) {
    const lastDate = dates[dates.length - 1];
    const nextWD = (() => {
      const d = new Date(lastDate + 'T12:00:00');
      do { d.setDate(d.getDate() + 1); } while (d.getDay() === 0 || d.getDay() === 6);
      return d.toISOString().slice(0, 10);
    })();
    if (!dates.includes(nextWD)) dates.push(nextWD);
  }
  if (dates.length === 0) {
    return `<div class="card" style="text-align:center;padding:40px">
      <div style="font-size:32px;margin-bottom:10px">✅</div>
      <div style="font-weight:600">No pending movements</div>
      <button class="btn btn-secondary btn-sm" style="margin-top:12px" onclick="mvDayView=false;render()">↔ Back to Map</button>
    </div>`;
  }

  // Default to today or first pending date
  const today = todayStr();
  const pendingDates = [...new Set(allPending.map(m => m.date).filter(Boolean))].sort();
  if (!mvDayDate || !dates.includes(mvDayDate)) {
    mvDayDate = today; // today is always in dates; prefer it as the default
  }

  const dayIdx  = dates.indexOf(mvDayDate);
  const prevDay = dayIdx > 0 ? dates[dayIdx - 1] : null;
  const nextDay = dayIdx < dates.length - 1 ? dates[dayIdx + 1] : null;

  // Movements FOR this day (all: pending + completed)
  const dayMoves = STATE.plannedMovements.filter(m => m.date === mvDayDate);
  // Prior PENDING moves to simulate forward (not yet completed, scheduled before this day)
  const priorMoves = allPending.filter(m => m.date && m.date < mvDayDate)
    .sort((a, b) => (a.date||'').localeCompare(b.date||''));

  // Completed moves that happened AFTER the viewed date — must be reversed to reconstruct past state
  const futureDoneMoves = STATE.plannedMovements.filter(m =>
    m.completed && m.date && m.date > mvDayDate
  ).sort((a, b) => (b.date||'').localeCompare(a.date||''));
  // Also reverse completed moves ON this day (we want start-of-day, before today's moves ran)
  const sameDayDoneMoves = STATE.plannedMovements.filter(m =>
    m.completed && m.date && m.date === mvDayDate
  );
  const allMovesToReverse = [...futureDoneMoves, ...sameDayDoneMoves];

  // ── Simulate cage locations at START of this day ─────────────────────────────
  // Strategy:
  //   1. Start from current STATE (reflects all completed moves so far)
  //   2. UNDO completed moves that happened on or after the viewed date
  //   3. APPLY prior pending moves that were scheduled before this day
  const cageLocSim = new Map();
  STATE.cages.forEach(c => cageLocSim.set(c.id, {
    location: c.location, locationDetail: c.locationDetail || '',
    frameId: c.location === 'frame' ? (STATE.frames.find(f => f.cages.includes(c.id))?.id || null) : null
  }));
  STATE.cages.forEach(c => {
    if (c.location === 'rmd') cageLocSim.set(c.id, { location:'rmd', locationDetail: c.locationDetail||'', frameId:null });
  });

  // Build simulated RMD occupancy from current STATE
  const simRmdState = {};
  STATE.rmdSlots.forEach(r => {
    simRmdState[r.number] = {
      A: { cage1: r.A.cage1||null, cage2: r.A.cage2||null },
      B: { cage1: r.B.cage1||null, cage2: r.B.cage2||null },
    };
  });

  // Helper: remove a cageId from wherever it appears in simRmdState
  function simRmdRemoveCage(cageId) {
    Object.values(simRmdState).forEach(rmd => {
      ['A','B'].forEach(side => {
        ['cage1','cage2'].forEach(slot => {
          if (rmd[side][slot] === cageId) rmd[side][slot] = null;
        });
      });
    });
  }

  // Helper: add a cage to an RMD slot based on movement data
  function simRmdAddCage(m) {
    let rn = m.rmdNumber != null ? parseInt(m.rmdNumber) : null;
    let side = m.rmdSide ? m.rmdSide.toUpperCase() : null;
    let preferredSlot = null;
    if (rn == null && m.rmdSlot) {
      const match = String(m.rmdSlot).match(/^(\d+)\s*([ABab])/);
      if (match) { rn = parseInt(match[1]); side = match[2].toUpperCase(); }
      const slotMatch = String(m.rmdSlot).match(/:?(cage[12])$/i);
      if (slotMatch) preferredSlot = slotMatch[1];
    }
    if (rn != null && side) {
      if (!simRmdState[rn]) simRmdState[rn] = {A:{cage1:null,cage2:null},B:{cage1:null,cage2:null}};
      const target = preferredSlot && !simRmdState[rn][side][preferredSlot]
        ? preferredSlot
        : ['cage1','cage2'].find(s => !simRmdState[rn][side][s]);
      if (target) simRmdState[rn][side][target] = m.cageId;
    }
  }

  // Step 1: UNDO completed moves that happened on or after the viewed date
  allMovesToReverse.forEach(m => {
    if (!m.cageId) return;
    if (m.typeKey === 'rmd-to-frame') {
      // Cage was in RMD before this move — put it back
      let rn = m.rmdNumber != null ? parseInt(m.rmdNumber) : null;
      let side = m.rmdSide ? m.rmdSide.toUpperCase() : null;
      if (rn == null) {
        // Try to find old RMD location from location history or description
        const hist = STATE.cages.find(c=>c.id===m.cageId)?.locationHistory;
        const prev = hist ? [...hist].reverse().find(h => h.location === 'rmd' && h.date <= m.date) : null;
        if (prev?.detail) {
          const match = prev.detail.match(/(\d+)\s*([ABab])/);
          if (match) { rn = parseInt(match[1]); side = match[2].toUpperCase(); }
        }
      }
      if (rn != null && side) {
        if (!simRmdState[rn]) simRmdState[rn] = {A:{cage1:null,cage2:null},B:{cage1:null,cage2:null}};
        const target = ['cage1','cage2'].find(s => !simRmdState[rn][side][s]);
        if (target) {
          simRmdState[rn][side][target] = m.cageId;
          cageLocSim.set(m.cageId, { location:'rmd', locationDetail:`RMD-${rn}${side}`, frameId:null });
        }
      }
    }
    else if (m.typeKey === 'facility-to-frame') {
      // Cage was in facility before — put it back
      cageLocSim.set(m.cageId, { location:'facility', locationDetail:'', frameId:null });
    }
    else if (m.typeKey === 'frame-to-rmd' || m.typeKey === 'facility-to-rmd') {
      // Cage was in a frame/facility before — remove from RMD, restore
      simRmdRemoveCage(m.cageId);
      const prevFrameId = m.frameId || null;
      if (prevFrameId) {
        cageLocSim.set(m.cageId, { location:'frame', locationDetail: getFrame(prevFrameId)?.name||'', frameId: prevFrameId });
      } else {
        cageLocSim.set(m.cageId, { location:'facility', locationDetail:'', frameId:null });
      }
    }
    else if (m.typeKey === 'frame-to-frame') {
      // Cage was in the source frame — restore
      const srcFrameId = m.srcFrameId || null;
      if (srcFrameId) {
        cageLocSim.set(m.cageId, { location:'frame', locationDetail: getFrame(srcFrameId)?.name||'', frameId: srcFrameId });
      }
    }
    else if (m.typeKey === 'frame-to-rss') {
      // Cage was in a frame before — restore it there
      const prevFrameId = m.frameId || null;
      if (prevFrameId) {
        cageLocSim.set(m.cageId, { location:'frame', locationDetail: getFrame(prevFrameId)?.name||'', frameId: prevFrameId });
      } else {
        cageLocSim.set(m.cageId, { location:'facility', locationDetail:'', frameId:null });
      }
    }
    else if (m.typeKey === 'rmd-to-rss') {
      // Cage was in RMD before — restore
      simRmdAddCage(m);
      const slot = m.rmdNumber != null ? `RMD-${m.rmdNumber}${m.rmdSide||''}` : (m.rmdSlot||'RMD');
      cageLocSim.set(m.cageId, { location:'rmd', locationDetail: slot, frameId:null });
    }
  });

  // Step 2: APPLY prior pending moves forward (these haven't happened yet in STATE)
  priorMoves.forEach(m => {
    if (!cageLocSim.has(m.cageId)) return;
    if (m.typeKey === 'rmd-to-frame' || m.typeKey === 'facility-to-frame' || m.typeKey === 'frame-to-frame') {
      simRmdRemoveCage(m.cageId);
      cageLocSim.set(m.cageId, { location:'frame', locationDetail: getFrame(m.frameId)?.name||'', frameId: m.frameId||null });
    } else if (m.typeKey === 'frame-to-rmd' || m.typeKey === 'facility-to-rmd') {
      const slot = m.rmdNumber != null ? `RMD-${m.rmdNumber}${m.rmdSide||''}` : (m.rmdSlot||'RMD');
      cageLocSim.set(m.cageId, { location:'rmd', locationDetail: slot, frameId:null });
      simRmdAddCage(m);
    } else if (m.typeKey === 'frame-to-rss' || m.typeKey === 'rmd-to-rss') {
      simRmdRemoveCage(m.cageId);
      cageLocSim.set(m.cageId, { location:'rss', locationDetail:'Roof Slab Storage', frameId:null });
    }
  });

  // Build simulated frame occupancy from final cageLocSim
  const simFrameCages = {};
  STATE.frames.forEach(f => { simFrameCages[f.id] = []; });
  allPending.forEach(m => { if (m.frameId && !(m.frameId in simFrameCages)) simFrameCages[m.frameId] = []; });
  allMovesToReverse.forEach(m => { if (m.frameId && !(m.frameId in simFrameCages)) simFrameCages[m.frameId] = []; });
  cageLocSim.forEach((loc, cid) => {
    if (loc.location==='frame' && loc.frameId && simFrameCages[loc.frameId]!==undefined)
      simFrameCages[loc.frameId].push(cid);
  });

  // Day tab strip
  const lastPlannedDate = dates.length > 1 ? dates[dates.length - 2] : null; // second-to-last = last with actual moves
  const ghostDay = dates[dates.length - 1]; // the appended next-working-day
  const dayTabsHTML = dates.map(d => {
    const cnt = allPending.filter(m => m.date === d).length;
    const isActive = d === mvDayDate;
    const isTod = d === today;
    const isGhost = d === ghostDay && cnt === 0; // simulation-only day with no planned moves
    const label = isTod ? `Today` : fmtShort(d);
    const borderCol = isActive ? 'var(--accent)' : isTod ? 'var(--blue)' : isGhost ? '#9bb8c8' : 'var(--border)';
    const bgCol = isActive ? 'var(--accent)' : isGhost && !isActive ? '#eef4f7' : 'var(--bg-elevated)';
    const textCol = isActive ? '#fff' : isTod ? 'var(--blue)' : isGhost ? '#5a8090' : 'var(--text-secondary)';
    const ghostHint = isGhost ? ` <span style="font-size:9px;opacity:.7;font-style:italic">sim</span>` : '';
    return `<button onclick="mvDayDate='${d}';render()" style="
      padding:5px 12px;border-radius:20px;font-size:11px;font-weight:${isActive?700:500};
      border:2px ${isGhost&&!isActive?'dashed':'solid'} ${borderCol};
      background:${bgCol};
      color:${textCol};
      cursor:pointer;white-space:nowrap;transition:all .15s
    ">${label}${cnt>0?` <span style="font-size:10px;opacity:.8">${cnt}</span>`:''}${ghostHint}</button>`;
  }).join('');

  // Frames that have logically returned to facility in the simulation
  // (pending frame-return-from-client moves dated before the viewed day)
  const simReturnedFrameIds = new Set(
    priorMoves
      .filter(m => m.typeKey === 'frame-return-from-client' && m.frameId)
      .map(m => m.frameId)
  );

  // Now render the full map, passing our day-context overrides
  return renderMovementsMap({ dayMoves, simFrameCages, simRmdState, cageLocSim, dayIdx, dates, prevDay, nextDay, dayTabsHTML, simReturnedFrameIds });
}

function renderMovementsMap(dayCtx) {
  // dayCtx is passed when called from renderMovementsDayView
  const isDayView = !!dayCtx;
  if (!isDayView && mvDayView) return renderMovementsDayView();

  const _mvShipDays = getShipmentDays();
  // In day view: use simulated day's moves; otherwise all pending
  const pendingMoves = isDayView ? dayCtx.dayMoves : STATE.plannedMovements
    .filter(m => !m.completed)
    .sort((a, b) => {
      const ao = a.sortOrder != null ? a.sortOrder : 999999;
      const bo = b.sortOrder != null ? b.sortOrder : 999999;
      if (ao !== bo) return ao - bo;
      return (a.date || '').localeCompare(b.date || '');
    });

  // Build a global position index (1-based) keyed by movement id — matches planner order
  const _mvGlobalPos = {};
  pendingMoves.forEach((m, i) => { _mvGlobalPos[m.id] = i + 1; });

  // In day view: show all moves for that day (no type filter — day view is already scoped)
  const filtered = isDayView ? pendingMoves : (mvFilter === 'all' ? pendingMoves : pendingMoves.filter(m => m.typeKey === mvFilter));
  const ct = {};
  pendingMoves.forEach(m => { ct[m.typeKey] = (ct[m.typeKey]||0)+1; });

  const filterBtns = [
    {k:'all',              label:`All (${pendingMoves.length})`},
    {k:'rmd-to-frame',     label:`RMD → Frame (${ct['rmd-to-frame']||0})`},
    {k:'frame-to-rmd',     label:`Frame → RMD (${ct['frame-to-rmd']||0})`},
    {k:'frame-to-frame',   label:`Frame → Frame (${ct['frame-to-frame']||0})`},
    {k:'facility-to-frame',label:`Facility → Frame (${ct['facility-to-frame']||0})`},
    {k:'facility-to-rmd',label:`Facility → RMD (${ct['facility-to-rmd']||0})`},
    {k:'frame-to-rss',   label:`Frame → Roof Slab (${ct['frame-to-rss']||0})`},
    {k:'rmd-to-rss',    label:`RMD → Roof Slab (${ct['rmd-to-rss']||0})`},
    {k:'rss-to-rmd',    label:`Roof Slab → RMD (${ct['rss-to-rmd']||0})`},
    {k:'frame-fix-shipping',label:`Fix Shipping (${ct['frame-fix-shipping']||0})`},
    {k:'frame-return-from-client',label:`🚢 Frame Return (${ct['frame-return-from-client']||0})`},
  ].map(b=>`<button class="filter-btn ${mvFilter===b.k?'active':''}" onclick="mvFilter='${b.k}';render()">${b.label}</button>`).join('');

  // Helper: resolve rmdSlot from a movement into "NNA" format (e.g. "1A", "10B")
  // m.rmdSlot may be a cage-slot key like "cage1" (from boat planner) — ignore those.
  // m.rmdNumber + m.rmdSide is the authoritative source for boat-planner movements.
  function resolveRmdSlot(m) {
    // Prefer rmdNumber+rmdSide (set by boat planner) — always authoritative
    if (m.rmdNumber != null) return String(m.rmdNumber) + (m.rmdSide || '');
    // rmdSlot may be a "NNA" string (manually planned) OR a cage-slot key like "cage1" (boat planner legacy)
    // Only use it if it looks like a real slot reference (starts with a digit or contains a digit)
    if (m.rmdSlot && /^\d/.test(String(m.rmdSlot))) return m.rmdSlot;
    // Fall back: read from cage's current RMD locationDetail
    if (m.typeKey === 'rmd-to-frame' || m.typeKey === 'frame-to-rmd' || m.typeKey === 'facility-to-rmd') {
      const cage = getCage(m.cageId);
      if (cage && cage.location === 'rmd' && cage.locationDetail) {
        const detailMatch = String(cage.locationDetail).match(/(\d+)\s*([ABab]?)\s*$/);
        if (detailMatch) return String(parseInt(detailMatch[1], 10)) + (detailMatch[2] || '');
        return cage.locationDetail;
      }
    }
    return '';
  }

  const activeRmds   = new Set(filtered.map(m=>resolveRmdSlot(m)).filter(Boolean).map(s=>{
    const match = String(s).match(/(\d+)/);
    return match ? String(parseInt(match[1],10)) : String(s).replace(/[ABab]$/,'');
  }));

  // Helper: resolve frameId for a movement (handles old data where frame-to-rmd has no frameId)
  function resolveFrameId(m) {
    if (m.frameId) return m.frameId;
    if (m.typeKey === 'frame-to-rmd' || m.typeKey === 'rmd-to-frame') {
      const cage = getCage(m.cageId);
      if (cage && cage.location === 'frame') {
        const f = STATE.frames.find(fr => fr.cages.includes(m.cageId));
        if (f) return f.id;
      }
      // Also check pending facility-to-frame moves (cage may still be at facility pre-lift)
      const pending = STATE.plannedMovements.find(
        pm => !pm.completed && pm.cageId === m.cageId && pm.typeKey === 'facility-to-frame' && pm.frameId
      );
      if (pending) return pending.frameId;
    }
    return '';
  }

  const activeFrames = new Set(filtered.map(m => resolveFrameId(m)).filter(Boolean));
  // Also include srcFrameId for frame-to-frame movements so the source frame card is rendered
  filtered.forEach(m => { if (m.typeKey === 'frame-to-frame' && m.srcFrameId) activeFrames.add(m.srcFrameId); });

  // ── RMD cards HTML ──
  function buildRmdCard(rmdNum) {
    const r = getRMDByNum(rmdNum);
    if (!r) return '';
    // In day view use simulated RMD state; otherwise real state
    const rmdData = isDayView && dayCtx.simRmdState[rmdNum]
      ? { A: dayCtx.simRmdState[rmdNum].A, B: dayCtx.simRmdState[rmdNum].B }
      : { A: r.A, B: r.B };
    const isActive = activeRmds.has(String(rmdNum));
    const movesForRmd = filtered.filter(m => String(resolveRmdSlot(m)).replace(/[ABab]$/,'') === String(rmdNum));
    const sides = ['A','B'];
    const slotKeys = ['cage1','cage2'];
    const slotLabels = {cage1:'Inside', cage2:'Outside'};
    let slotsHTML = '';
    sides.forEach(side => {
      slotsHTML += `<div style="font:700 8px var(--font-mono);color:var(--text-muted);text-transform:uppercase;letter-spacing:.05em;margin:5px 0 3px">${
        mvPick ? `<button onclick="mvPickDestination('rmd','${rmdNum}${side}','RMD-${rmdNum} Side ${side}')" style="font:700 9px var(--font-mono);background:#1a2235;color:#e8a830;border:1.5px solid #e8a830;border-radius:5px;padding:2px 8px;cursor:pointer;text-transform:uppercase;letter-spacing:.05em">▶ RMD-${rmdNum} Side ${side}</button>` : `Side ${side}`
      }</div>`;
      let sideHasContent = false;
      slotKeys.forEach(sk => {
        const cid = rmdData[side][sk];
        const cage = cid ? getCage(cid) : null;
        if (cage) {
          sideHasContent = true;
          const mvOut = movesForRmd.some(m => m.cageId===cid && m.typeKey==='rmd-to-frame');
          const mvIn  = movesForRmd.some(m => m.cageId===cid && m.typeKey==='frame-to-rmd');
          const _mvShade = shipmentShadeClass(cage, _mvShipDays);
          let bg;
          if (_mvShade && mvOut) { bg = 'background:#fff8c5;border-color:#e8b800;'; }
          else if (_mvShade === 'next') bg = 'background:#3b1d6e;border-color:#7040c0;';
          else if (_mvShade === 'second') bg = 'background:#c8b8e8;border-color:#9070c8;';
          else if (cage.shippingPreference2) bg = 'background:#dbeafe;border-color:#3b82f6;';
          else if (cage.shippingPreference) bg = 'background:#fff8c5;border-color:#e8d850;';
          else if (mvOut) bg = 'background:#fff7ed;border-color:#f5a742;';
          else if (mvIn) bg = 'background:#f0faf4;border-color:#4aad72;';
          else bg = 'border-color:var(--border);';
          const nameStyle = (_mvShade && mvOut) ? 'color:#7a5000;' : _mvShade === 'next' ? 'color:#e0ccff;' : _mvShade === 'second' ? 'color:#4a2a7a;' : cage.shippingPreference2 ? 'color:#1e40af;' : cage.shippingPreference ? 'color:#7a5c00;' : '';
          const detailStyle = (_mvShade && mvOut) ? 'color:#a07000;' : _mvShade === 'next' ? 'color:#c0a8ee;' : _mvShade === 'second' ? 'color:#6a4a9a;' : cage.shippingPreference2 ? 'color:#3b82f6;' : '';
          const slotLabel = slotLabels[sk];
          const slotTag = `<span style="font:600 8px var(--font-mono);padding:1px 4px;border-radius:3px;margin-right:3px;flex-shrink:0;${sk==='cage1'?'background:#1e3a5f;color:#7dd3fc;':'background:#064e3b;color:#6ee7b7;'}">${slotLabel}</span>`;
          const arrow = mvOut ? '<span style="color:#c08520;font-weight:800;margin-right:4px">→</span>'
                      : mvIn  ? '<span style="color:#27a060;font-weight:800;margin-right:4px">←</span>' : '';
          const hasMoves = STATE.plannedMovements.filter(m=>m.cageId===cid&&!m.completed).length > 0;
          const isPickedCage = mvPick && mvPick.cageId === cid;
          const pickBtnHTML = `<button onclick="mvPickCage('${cid}')" title="Click to plan movement for cage ${esc(cage.name)}" style="border:none;background:${isPickedCage?'var(--accent)':'rgba(192,133,32,0.15)'};color:${isPickedCage?'#fff':'var(--accent)'};border-radius:4px;padding:1px 5px;font-size:9px;cursor:pointer;margin-left:4px;flex-shrink:0;font-weight:700">${isPickedCage?'✓':'🏷'}</button>`;
          const cageNameHTML = `<span style="font:600 10px var(--font-mono);${nameStyle}cursor:pointer;text-decoration:underline dotted;text-underline-offset:2px;display:inline-flex;align-items:center;" onclick="openMvCageMovements('${cid}')" title="Click to view/edit movements for cage ${esc(cage.name)}">${hDot(cage.height)}${tagDot(cage)}${esc(cage.name)}${hasMoves?` <span style="font-size:8px;background:rgba(192,133,32,0.2);color:var(--accent);border-radius:3px;padding:0 3px">${STATE.plannedMovements.filter(m=>m.cageId===cid&&!m.completed).length}</span>`:''}</span>${pickBtnHTML}`;
          slotsHTML += `<div style="font-size:10px;padding:3px 6px;border-radius:4px;border:1px solid;background:var(--bg-input);margin-bottom:2px;${bg}">
