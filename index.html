  render();
}

function printActionedLog() {
  const fromLabel = alDateFrom ? fmt(alDateFrom) : null;
  const toLabel   = alDateTo   ? fmt(alDateTo)   : null;
  const rangeText = fromLabel && toLabel ? `${fromLabel} – ${toLabel}`
                  : fromLabel ? `From ${fromLabel}`
                  : toLabel   ? `Up to ${toLabel}`
                  : 'All dates';
  const tableHTML = document.getElementById('al-table-wrap')?.innerHTML || '';
  const statsHTML = document.getElementById('al-stats')?.innerHTML || '';
  const win = window.open('', '_blank');
  win.document.write(`<!DOCTYPE html><html><head><title>Actioned Log — ${rangeText}</title>
  <style>
    body { font-family: Arial, sans-serif; font-size: 12px; color: #1a1f2e; padding: 24px; }
    h1 { font-size: 18px; font-weight: 700; margin-bottom: 2px; }
    .sub { font-size: 11px; color: #666; margin-bottom: 16px; }
    .stats { display: flex; gap: 12px; margin-bottom: 16px; flex-wrap: wrap; }
    .stat-box { border: 1px solid #ddd; border-radius: 6px; padding: 8px 14px; text-align: center; min-width: 80px; }
    .stat-val { font-size: 18px; font-weight: 700; font-family: monospace; color: #c08520; }
    .stat-lbl { font-size: 9px; color: #888; margin-top: 2px; }
    table { width: 100%; border-collapse: collapse; }
    th { text-align: left; padding: 7px 10px; font-size: 9px; text-transform: uppercase; letter-spacing: .06em; color: #666; border-bottom: 2px solid #ccc; background: #f5f5f5; }
    td { border-bottom: 1px solid #eee; padding: 8px 10px; vertical-align: top; font-size: 11px; }
    textarea { border: 1px solid #ccc; border-radius: 4px; padding: 4px 6px; font-size: 11px; width: 100%; min-height: 44px; resize: none; font-family: Arial, sans-serif; }
    .print-btn { margin-top: 16px; padding: 10px 24px; background: #c08520; color: #fff; border: none; border-radius: 6px; font-size: 14px; font-weight: 700; cursor: pointer; }
    @media print { .print-btn { display: none; } }
  </style></head><body>
  <h1>✓ Actioned Log</h1>
  <div class="sub">Cage Tracker — Printed ${new Date().toLocaleDateString('en-GB', {day:'2-digit',month:'short',year:'numeric'})} | ${rangeText}</div>
  <div class="stats">${statsHTML}</div>
  ${tableHTML}
  <button class="print-btn" onclick="window.print()">🖨 Print / Save as PDF</button>
  </body></html>`);
  win.document.close();
}

function buildActionedLogTable() {
  const completed = STATE.plannedMovements.filter(m => m.completed);
  const MOVE_TYPE_LABELS = {
    'rmd-to-frame':'RMD → Frame','frame-to-rmd':'Frame → RMD','frame-to-frame':'Frame → Frame',
    'facility-to-frame':'Facility → Frame','facility-to-rmd':'Facility → RMD',
    'frame-fix-shipping':'Fix for Shipping','frame-return-from-client':'Frame Return',
  };
  const MOVE_TYPE_COLORS = {
    'rmd-to-frame':'#27a060','frame-to-rmd':'#7040c0','frame-to-frame':'#e05c1a',
    'facility-to-frame':'#2563b0','facility-to-rmd':'#0d9488',
    'frame-fix-shipping':'#c08520','frame-return-from-client':'#0e7490',
  };
  const RMD_TYPES = new Set(['rmd-to-frame','frame-to-rmd','facility-to-rmd']);
  const dates = getAlDates();
  if (dates.length === 0) {
    return `<div style="padding:24px;color:var(--text-muted);font-style:italic;font-size:13px">No entries for the selected date range.</div>`;
  }
  const rowsHTML = dates.map(date => {
    const dayMoves = completed.filter(m => (m.date||'').slice(0,10) === date);
    const logEntry = (STATE.actionedLog || {})[date] || {};
    const downtimeNotes = logEntry.downtimeNotes || '';
    const dayShiftAlloc = logEntry.dayShiftAlloc || '';
    const rmdMoveCount = dayMoves.filter(m => RMD_TYPES.has(m.typeKey)).length;
    const hoursEquiv = rmdMoveCount * 2;
    const byType = {};
    dayMoves.forEach(m => { const tk = m.typeKey||'unknown'; if(!byType[tk]) byType[tk]=[]; byType[tk].push(m); });
    const movesHTML = Object.entries(byType).map(([tk, moves]) => {
      const label = MOVE_TYPE_LABELS[tk] || tk;
      const color = MOVE_TYPE_COLORS[tk] || 'var(--text-secondary)';
      return moves.map(m => {
        const cage = getCage(m.cageId);
        const note = m.completionNote ? ` <span style="color:var(--text-muted);font-style:italic">— "${esc(m.completionNote)}"</span>` : '';
        let daysInRmdHTML = '';
        if (tk === 'rmd-to-frame' && cage && cage.intoRmd) {
          const exitDate = m.completedAt ? new Date(m.completedAt) : (m.date ? new Date(m.date + 'T12:00:00') : null);
          if (exitDate) {
            const entryDate = new Date(cage.intoRmd + 'T12:00:00');
            const daysInRmd = Math.round((exitDate - entryDate) / 86400000);
            if (daysInRmd >= 0) {
              daysInRmdHTML = ` <span style="font-size:9px;padding:1px 5px;background:#e6f5ec;color:var(--green);border:1px solid #b0dcc0;border-radius:10px;font-family:var(--font-mono);font-weight:600;margin-left:4px">${daysInRmd}d in RMD</span>`;
            }
          }
        }
        return `<div style="display:flex;align-items:baseline;gap:4px;padding:1px 0">
          <span style="font:700 10px var(--font-mono);color:${color};min-width:110px;flex-shrink:0">${label}</span>
          <span style="font:600 11px var(--font-mono)">${cage ? esc(cage.name) : '?'}</span>
          <span style="font-size:10px;color:var(--text-muted)">— ${esc(m.description||label)}</span>${note}${daysInRmdHTML}
        </div>`;
      }).join('');
    }).join('');
    // Shipping & frame return audit events for this date
    const dayAuditEvents = (STATE.auditEvents || []).filter(ev => {
      if (!ev.timestamp) return false;
      return new Date(ev.timestamp).toISOString().slice(0,10) === date;
    });
    const auditEventsHTML = dayAuditEvents.map(ev => {
      const isShip = ev.type.includes('Shipped');
      const col = isShip ? '#7040c0' : '#0e7490';
      const bg  = isShip ? '#f0e8fa' : '#ecfeff';
      return `<div style="display:flex;align-items:baseline;gap:4px;padding:1px 0">
        <span style="font:700 10px var(--font-mono);color:${col};min-width:110px;flex-shrink:0;background:${bg};border-radius:4px;padding:1px 5px">${esc(ev.type)}</span>
        <span style="font:600 11px var(--font-mono);color:${col}">${esc(ev.description)}</span>
        ${ev.detail ? `<span style="font-size:10px;color:var(--text-muted)">— ${esc(ev.detail)}</span>` : ''}
      </div>`;
    }).join('');
    const totalCount = dayMoves.length + dayAuditEvents.length;
    return `<tr style="vertical-align:top">
      <td style="font:700 12px var(--font-mono);color:var(--accent);white-space:nowrap;padding:10px 12px">${fmt(date)}</td>
      <td style="padding:10px 12px;min-width:260px">
        ${movesHTML || ''}
        ${auditEventsHTML}
        ${!movesHTML && !auditEventsHTML ? '<span style="color:var(--text-muted);font-style:italic;font-size:11px">No movements</span>' : ''}
        <div style="margin-top:4px;font-size:10px;color:var(--text-muted)">${totalCount} movement${totalCount!==1?'s':''} total</div>
      </td>
      <td style="padding:10px 12px;min-width:180px">
        <textarea id="al-dt-${date}" placeholder="Enter downtime notes…"
          onchange="saveActionedLogEntry('${date}','downtimeNotes',this.value)"
          style="width:100%;min-height:52px;font-size:11px;resize:vertical;background:var(--bg-input);border:1px solid var(--border);border-radius:5px;padding:5px 7px;color:var(--text-primary)"
        >${esc(downtimeNotes)}</textarea>
      </td>
      <td style="padding:10px 12px;text-align:center;white-space:nowrap">
        <div style="font:700 22px var(--font-mono);color:${rmdMoveCount>0?'var(--accent)':'var(--text-muted)'}">${rmdMoveCount}</div>
        <div style="font-size:9px;color:var(--text-muted);margin-top:1px">RMD moves</div>
      </td>
      <td style="padding:10px 12px;text-align:center;white-space:nowrap">
        <div style="font:700 22px var(--font-mono);color:${hoursEquiv>0?'#0e7490':'var(--text-muted)'}">${hoursEquiv}h</div>
        <div style="font-size:9px;color:var(--text-muted);margin-top:1px">@ 2h/move</div>
      </td>
      <td style="padding:10px 12px;min-width:180px">
        <textarea id="al-ds-${date}" placeholder="Day shift allocation notes…"
          onchange="saveActionedLogEntry('${date}','dayShiftAlloc',this.value)"
          style="width:100%;min-height:52px;font-size:11px;resize:vertical;background:var(--bg-input);border:1px solid var(--border);border-radius:5px;padding:5px 7px;color:var(--text-primary)"
        >${esc(dayShiftAlloc)}</textarea>
      </td>
    </tr>`;
  }).join('');
  return `<table style="width:100%;border-collapse:collapse">
    <thead>
      <tr style="border-bottom:2px solid var(--border);background:var(--bg-deep)">
        <th style="padding:10px 12px;text-align:left;font:700 10px var(--font-mono);color:var(--text-muted);text-transform:uppercase;letter-spacing:.06em;white-space:nowrap">Date</th>
        <th style="padding:10px 12px;text-align:left;font:700 10px var(--font-mono);color:var(--text-muted);text-transform:uppercase;letter-spacing:.06em">Movements</th>
        <th style="padding:10px 12px;text-align:left;font:700 10px var(--font-mono);color:var(--text-muted);text-transform:uppercase;letter-spacing:.06em;white-space:nowrap">Down Time</th>
        <th style="padding:10px 12px;text-align:center;font:700 10px var(--font-mono);color:var(--text-muted);text-transform:uppercase;letter-spacing:.06em;white-space:nowrap">Non-Normal Ops<br><span style="font-weight:400;font-size:9px">(RMD in/out)</span></th>
        <th style="padding:10px 12px;text-align:center;font:700 10px var(--font-mono);color:var(--text-muted);text-transform:uppercase;letter-spacing:.06em;white-space:nowrap">Hours<br><span style="font-weight:400;font-size:9px">(2h / move)</span></th>
        <th style="padding:10px 12px;text-align:left;font:700 10px var(--font-mono);color:var(--text-muted);text-transform:uppercase;letter-spacing:.06em;white-space:nowrap">Day Shift Allocation</th>
      </tr>
    </thead>
    <tbody>${rowsHTML}</tbody>
  </table>`;
}

function renderActionedLog() {
  const completed = STATE.plannedMovements.filter(m => m.completed);
  const allDateSet = new Set(completed.map(m => (m.date||'').slice(0,10)).filter(Boolean));
  Object.keys(STATE.actionedLog || {}).forEach(d => allDateSet.add(d));
  if (allDateSet.size === 0) {
    return `<div class="card"><h2 class="card-title">Actioned Log</h2><div class="empty-msg">No completed movements yet. Complete movements from the Planner tab to populate this log.</div></div>`;
  }
  const allDates = [...allDateSet].sort();
  const minDate = allDates[0];
  const maxDate = allDates[allDates.length - 1];
  return `
    <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:16px;flex-wrap:wrap;gap:10px">
      <h2 class="section-title" style="margin:0">✓ Actioned Log</h2>
      <div id="al-stats" style="display:flex;gap:10px;flex-wrap:wrap"></div>
    </div>
    <div class="card" style="padding:12px 16px;margin-bottom:14px">
      <div style="display:flex;align-items:flex-end;gap:12px;flex-wrap:wrap">
        <div>
          <label style="display:block;font:600 10px var(--font-mono);color:var(--text-muted);text-transform:uppercase;letter-spacing:.06em;margin-bottom:4px">From</label>
          <input type="date" id="al-from" value="${alDateFrom}" min="${minDate}" max="${maxDate}" style="width:150px">
        </div>
        <div>
          <label style="display:block;font:600 10px var(--font-mono);color:var(--text-muted);text-transform:uppercase;letter-spacing:.06em;margin-bottom:4px">To</label>
          <input type="date" id="al-to" value="${alDateTo}" min="${minDate}" max="${maxDate}" style="width:150px">
        </div>
        <button class="btn btn-primary" onclick="alApplyFilter()" style="height:36px">Apply</button>
        <button class="btn btn-secondary" onclick="alClearFilter()" style="height:36px">Show All</button>
        <button class="btn btn-secondary" onclick="alAddBlankDay()" style="height:36px">+ Add Day</button>
        <button class="btn" onclick="printActionedLog()"
          style="height:36px;background:linear-gradient(135deg,#2563b0,#1a4a8a);color:#fff;border:none;margin-left:auto">
          🖨 Print / Export
        </button>
      </div>
    </div>
    <div class="card" style="overflow-x:auto;padding:0">
      <div id="al-table-wrap">${buildActionedLogTable()}</div>
    </div>`;
  requestAnimationFrame(updateAlStats);
}

function renderAuditLog() {
  const MVCOLS = {'rmd-to-frame':'#27a060','frame-to-rmd':'#7040c0','frame-to-frame':'#e05c1a','facility-to-frame':'#2563b0','facility-to-rmd':'#0d9488','frame-fix-shipping':'#c08520'};
  const MVLABELS = {'rmd-to-frame':'RMD → Frame','frame-to-rmd':'Frame → RMD','frame-to-frame':'Frame → Frame','facility-to-frame':'Facility → Frame','facility-to-rmd':'Facility → RMD','frame-fix-shipping':'Fix for Shipping'};

  let movements = [...STATE.plannedMovements];

  // Apply filters
  if (auditFilter === 'completed') movements = movements.filter(m => m.completed);
  else if (auditFilter === 'pending') movements = movements.filter(m => !m.completed);
  else if (auditFilter !== 'all') movements = movements.filter(m => m.typeKey === auditFilter);

  if (auditSearch) {
    const q = auditSearch.toLowerCase();
    movements = movements.filter(m => {
      const cage = getCage(m.cageId);
      return m.description?.toLowerCase().includes(q)
        || cage?.name?.toLowerCase().includes(q)
        || m.type?.toLowerCase().includes(q)
        || m.notes?.toLowerCase().includes(q);
    });
  }

  // Sort
  movements.sort((a, b) => {
    const da = a.date || '', db = b.date || '';
    const ca = a.completedAt || '', cb = b.completedAt || '';
    if (auditSort === 'date-asc') return da.localeCompare(db) || ca.localeCompare(cb);
    return db.localeCompare(da) || cb.localeCompare(ca);
  });

  // Stats
  const total = STATE.plannedMovements.length;
  const completed = STATE.plannedMovements.filter(m => m.completed).length;
  const pending = total - completed;
  const byType = {};
  STATE.plannedMovements.forEach(m => { byType[m.typeKey] = (byType[m.typeKey]||0)+1; });

  const typeFilterBtns = [
    {k:'all', label:`All (${total})`},
    {k:'completed', label:`✅ Done (${completed})`},
    {k:'pending', label:`⏳ Pending (${pending})`},
    {k:'rmd-to-frame', label:`RMD→Frame (${byType['rmd-to-frame']||0})`},
    {k:'frame-to-rmd', label:`Frame→RMD (${byType['frame-to-rmd']||0})`},
    {k:'frame-to-frame', label:`Frame→Frame (${byType['frame-to-frame']||0})`},
    {k:'facility-to-frame', label:`Facility→Frame (${byType['facility-to-frame']||0})`},
    {k:'facility-to-rmd', label:`Facility→RMD (${byType['facility-to-rmd']||0})`},
    {k:'frame-fix-shipping', label:`Fix Ship (${byType['frame-fix-shipping']||0})`},
  ].map(b => `<button class="filter-btn ${auditFilter===b.k?'active':''}" onclick="auditFilter='${b.k}';render()">${b.label}</button>`).join('');

  const rows = movements.length === 0
    ? `<tr><td colspan="7" style="text-align:center;padding:24px;color:var(--text-muted);font-style:italic">No movements match this filter</td></tr>`
    : movements.map(m => {
        const cage = getCage(m.cageId);
        const frame = getFrame(m.frameId);
        const col = MVCOLS[m.typeKey] || 'var(--accent)';
        const typeLabel = MVLABELS[m.typeKey] || m.type || m.typeKey;
        const statusBadge = m.completed
          ? `<span class="badge badge-green">✅ Done</span>`
          : `<span class="badge badge-yellow">⏳ Pending</span>`;
        const completedAtStr = m.completedAt
          ? `<div style="font-size:9px;color:var(--text-muted);margin-top:2px">Completed ${new Date(m.completedAt).toLocaleDateString('en-GB',{day:'numeric',month:'short',hour:'2-digit',minute:'2-digit'})}</div>`
          : '';
        return `<tr style="opacity:${m.completed?0.75:1}">
          <td style="font-family:var(--font-mono);font-size:11px;color:var(--text-muted);white-space:nowrap">${m.date ? fmt(m.date) : '—'}
            ${m.shift === 'night' ? '<span style="font-size:9px;color:#7040c0;margin-left:4px">🌙 Night</span>' : '<span style="font-size:9px;color:#c08520;margin-left:4px">☀ Day</span>'}
          </td>
          <td>
            <span style="display:inline-block;width:10px;height:10px;border-radius:50%;background:${col};margin-right:5px"></span>
            <span style="font-size:12px;font-weight:600;color:${col}">${esc(typeLabel)}</span>
          </td>
          <td style="font:700 12px var(--font-mono)">${cage ? esc(cage.name) : '—'}</td>
          <td style="font-size:12px;color:var(--text-secondary)">${esc(m.description||'')}</td>
          <td style="font-size:11px;color:var(--text-muted)">${m.notes ? esc(m.notes) : '—'}</td>
          <td>${statusBadge}${completedAtStr}</td>
          <td style="white-space:nowrap">
            ${!m.completed ? `<button class="btn btn-primary btn-xs" onclick="completeMove('${m.id}')">✓ Done</button>` : ''}
            <button class="btn btn-danger btn-xs" style="margin-left:3px" onclick="deleteMovement('${m.id}')">✕</button>
          </td>
        </tr>`;
      }).join('');

  return `
    <div class="flex-between" style="margin-bottom:16px">
      <h2 class="section-title" style="margin:0">📋 Audit Log</h2>
      <div style="font-size:12px;color:var(--text-muted)">${total} total movement${total!==1?'s':''} recorded</div>
    </div>

    <div style="display:flex;gap:10px;margin-bottom:14px;flex-wrap:wrap">
      <div class="stat-card" style="flex:0 0 auto;min-width:110px">
        <div class="stat-val" style="color:var(--green)">${completed}</div>
        <div class="stat-lbl">Completed</div>
      </div>
      <div class="stat-card" style="flex:0 0 auto;min-width:110px">
        <div class="stat-val" style="color:var(--orange)">${pending}</div>
        <div class="stat-lbl">Pending</div>
      </div>
      <div class="stat-card" style="flex:0 0 auto;min-width:110px">
        <div class="stat-val" style="color:var(--accent)">${total > 0 ? Math.round(completed/total*100) : 0}%</div>
        <div class="stat-lbl">Complete Rate</div>
      </div>
      <div class="stat-card" style="flex:0 0 auto;min-width:110px">
        <div class="stat-val" style="color:var(--blue)">${byType['rmd-to-frame']||0}</div>
        <div class="stat-lbl">RMD→Frame</div>
      </div>
      <div class="stat-card" style="flex:0 0 auto;min-width:110px">
        <div class="stat-val" style="color:var(--purple)">${byType['frame-to-rmd']||0}</div>
        <div class="stat-lbl">Frame→RMD</div>
      </div>
      <div class="stat-card" style="flex:0 0 auto;min-width:110px">
        <div class="stat-val" style="color:var(--blue)">${byType['facility-to-frame']||0}</div>
        <div class="stat-lbl">Fac→Frame</div>
      </div>
    </div>

    <div style="display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap;align-items:center">
      ${typeFilterBtns}
      <div style="display:flex;gap:6px;margin-left:auto;align-items:center">
        <input placeholder="Search movements…" value="${esc(auditSearch)}" style="width:200px;font-size:12px"
          oninput="auditSearch=this.value;render()"/>
        <select style="font-size:12px;padding:6px 10px" onchange="auditSort=this.value;render()">
          <option value="date-desc" ${auditSort==='date-desc'?'selected':''}>Newest first</option>
          <option value="date-asc" ${auditSort==='date-asc'?'selected':''}>Oldest first</option>
        </select>
      </div>
    </div>

    <div class="card" style="overflow-x:auto">
      <table>
        <thead><tr>
          <th>Date / Shift</th><th>Type</th><th>Cage</th><th>Description</th><th>Notes</th><th>Status</th><th>Actions</th>
        </tr></thead>
        <tbody>${rows}</tbody>
      </table>
    </div>
    <div style="margin-top:8px;font-size:11px;color:var(--text-muted);text-align:right">Showing ${movements.length} of ${total} movements</div>

    <!-- Generated Boat Plans -->
    ${(() => {
      const plans = (STATE.savedPlans || []);
      if (plans.length === 0) return '';
      const ACTION_META_SHORT = {
        facility_exit_to_frame:     { icon:'🏭', label:'Fac→Frame (transit)'  },
        facility_exit_frame_to_rmd: { icon:'📦', label:'Frame→RMD (via frame)'},
        facility_exit_frame_storage:{ icon:'🏭', label:'Fac→Frame (storage)'  },
        facility_to_rmd:            { icon:'🏭', label:'Fac→RMD'              },
        rmd_to_frame:               { icon:'📦', label:'RMD→Frame (boat)'     },
        facility_to_frame:          { icon:'🏭', label:'Fac→Frame (boat)'     },
        reframe:                    { icon:'🔄', label:'Reframe'              },
        already_framed:             { icon:'✅', label:'Already framed'        },
        no_frame:                   { icon:'⚠️', label:'No frame'             },
        fix:                        { icon:'🔩', label:'Fix for shipping'      },
      };
      const planRows = plans.map(plan => {
        const ts = plan.createdAt ? new Date(plan.createdAt).toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'numeric',hour:'2-digit',minute:'2-digit'}) : '—';
        const warnCount = (plan.warnings||[]).filter(w=>w.startsWith('🚨')).length;
        const warnNote = (plan.warnings||[]).filter(w=>!w.startsWith('🚨')).length;
        const warningBadge = warnCount > 0
          ? `<span style="background:#fef2f2;color:#c0392b;border:1px solid #fca5a5;border-radius:10px;padding:1px 7px;font:600 10px var(--font-mono);margin-left:6px">⚠ ${warnCount} err</span>`
          : warnNote > 0
          ? `<span style="background:#fef0e6;color:var(--orange);border:1px solid #e8c8a0;border-radius:10px;padding:1px 7px;font:600 10px var(--font-mono);margin-left:6px">⚠ ${warnNote} warn</span>`
          : '';
        // Build step table rows grouped by date
        const byDate = {};
        (plan.steps||[]).forEach(s => { const d = s.date||'—'; if(!byDate[d])byDate[d]=[]; byDate[d].push(s); });
        const stepRows = Object.keys(byDate).sort().map(d => {
          const daySteps = byDate[d];
          return daySteps.map((s,i) => {
            const m = ACTION_META_SHORT[s.action] || {icon:'↔',label:s.action||'Move'};
            const dest = s.rmdSlot || s.frameName || '—';
            return `<tr style="${i%2===0?'':'background:var(--bg-elevated)'}">
              <td style="padding:3px 6px;font-size:10px;font-family:var(--font-mono);color:var(--text-muted);white-space:nowrap">${i===0?d:''}</td>
              <td style="padding:3px 6px;font-size:11px">${m.icon}</td>
              <td style="padding:3px 6px;font:600 11px var(--font-mono)">${esc(s.cageName)}</td>
              <td style="padding:3px 6px;font-size:10px;color:var(--text-secondary)">${esc(m.label)}</td>
              <td style="padding:3px 6px;font-size:10px;color:var(--text-muted)">${esc(dest)}</td>
              <td style="padding:3px 6px;font-size:9px;color:var(--text-muted);max-width:200px">${esc(s.note||'')}</td>
            </tr>`;
          }).join('');
        }).join('');
        const warnHTML = (plan.warnings||[]).length ? `<div style="margin-bottom:8px">${plan.warnings.map(w=>`<div style="padding:4px 10px;background:${w.startsWith('🚨')?'#fef2f2':'#fef0e6'};border:1px solid ${w.startsWith('🚨')?'#fca5a5':'#e8c8a0'};border-radius:5px;font-size:11px;color:${w.startsWith('🚨')?'#c0392b':'var(--orange)'};margin-bottom:3px">${esc(w)}</div>`).join('')}</div>` : '';
        const detailId = 'plan-detail-' + plan.id;
        const pendingCount = (plan.movementIds||[]).filter(mid => STATE.plannedMovements.find(m=>m.id===mid&&!m.completed)).length;
        const totalCount = (plan.movementIds||[]).length;
        const doneCount = totalCount - pendingCount;
        return `<div style="border:1px solid var(--border);border-radius:8px;margin-bottom:10px;overflow:hidden">
          <div style="display:flex;align-items:center;gap:10px;padding:10px 14px;background:var(--bg-elevated);cursor:pointer"
               onclick="const d=document.getElementById('${detailId}');d.style.display=d.style.display==='none'?'block':'none'">
            <span style="font:700 12px var(--font-mono);color:var(--accent)">${esc(plan.ref)}</span>
            <span style="font-size:11px;color:var(--text-muted)">${ts}</span>
            <span style="font-size:11px;color:var(--text-secondary)">🚢 ${fmt(plan.boatDate)}</span>
            <span style="font-size:11px;color:var(--text-muted)">${esc(plan.label)}</span>
            ${warningBadge}
            <span style="margin-left:auto;font-size:10px;color:var(--text-muted)">${doneCount}/${totalCount} moves done ▾</span>
          </div>
          <div id="${detailId}" style="display:none;padding:12px 14px">
            ${plan.boatCages ? `<div style="font-size:11px;color:var(--text-muted);margin-bottom:8px"><strong>Boat cages:</strong> ${esc(plan.boatCages)}</div>` : ''}
            ${warnHTML}
            <div style="overflow-x:auto">
              <table style="width:100%;border-collapse:collapse;border:1px solid var(--border);border-radius:6px;overflow:hidden">
                <thead><tr style="background:var(--bg-elevated)">
                  <th style="padding:4px 6px;font-size:9px;color:var(--text-muted);text-align:left">Date</th>
                  <th style="padding:4px 6px;font-size:9px;color:var(--text-muted)"></th>
                  <th style="padding:4px 6px;font-size:9px;color:var(--text-muted);text-align:left">Cage</th>
                  <th style="padding:4px 6px;font-size:9px;color:var(--text-muted);text-align:left">Action</th>
                  <th style="padding:4px 6px;font-size:9px;color:var(--text-muted);text-align:left">Destination</th>
                  <th style="padding:4px 6px;font-size:9px;color:var(--text-muted);text-align:left">Note</th>
                </tr></thead>
                <tbody>${stepRows}</tbody>
              </table>
            </div>
            <div style="margin-top:8px;text-align:right">
              <button class="btn btn-danger btn-xs" onclick="if(confirm('Remove this saved plan from the audit log?')){STATE.savedPlans=(STATE.savedPlans||[]).filter(p=>p.id!=='${plan.id}');render()}">✕ Remove</button>
            </div>
          </div>
        </div>`;
      }).join('');
      return `
        <div class="card" style="margin-top:24px">
          <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
            <div class="card-title" style="margin:0">⚙ Generated Boat Plans <span style="font-weight:400;font-size:11px;color:var(--text-muted)">(${plans.length} saved)</span></div>
          </div>
          ${planRows}
        </div>`;
    })()}

    <!-- Shipping & Frame Return Events -->
    ${(() => {
      const events = (STATE.auditEvents || []);
      if (events.length === 0) return `
        <div class="card" style="margin-top:24px">
          <div class="card-title" style="margin-bottom:8px">🚢 Shipping &amp; Frame Return Log</div>
          <div class="empty-msg">No shipping or frame return events recorded yet. These are captured automatically when you ship frames or mark them as returned.</div>
        </div>`;
      const evRows = events.map(ev => {
        const isShip = ev.type.includes('Shipped');
        const col = isShip ? '#7040c0' : '#0e7490';
        const bg  = isShip ? '#f0e8fa' : '#ecfeff';
        const tsStr = ev.timestamp ? new Date(ev.timestamp).toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'numeric',hour:'2-digit',minute:'2-digit'}) : '—';
        return `<tr>
          <td style="font-family:var(--font-mono);font-size:11px;color:var(--text-muted);white-space:nowrap">${tsStr}</td>
          <td><span style="display:inline-block;padding:2px 9px;border-radius:10px;background:${bg};color:${col};font:700 11px var(--font-mono)">${esc(ev.type)}</span></td>
          <td style="font-weight:600;font-size:13px;color:var(--text-primary)">${esc(ev.description)}</td>
          <td style="font-size:11px;color:var(--text-muted)">${esc(ev.detail||'')}</td>
          <td style="white-space:nowrap">
            <button class="btn btn-danger btn-xs" onclick="deleteAuditEvent('${ev.id}')">✕</button>
          </td>
        </tr>`;
      }).join('');
      return `
        <div class="card" style="margin-top:24px;overflow-x:auto">
          <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
            <div class="card-title" style="margin:0">🚢 Shipping &amp; Frame Return Log <span style="font-weight:400;font-size:11px;color:var(--text-muted)">(${events.length} event${events.length!==1?'s':''})</span></div>
          </div>
          <table>
            <thead><tr>
              <th>Timestamp</th><th>Event</th><th>Description</th><th>Detail</th><th></th>
            </tr></thead>
            <tbody>${evRows}</tbody>
          </table>
        </div>`;
    })()}
  `;
}

async function deleteMovement(id) {
  if (!confirm('Delete this movement record? This cannot be undone.')) return;
  STATE.plannedMovements = STATE.plannedMovements.filter(m => m.id !== id);
  render();
  await deleteMovementFromAPI(id);
}

function deleteAuditEvent(id) {
  if (!confirm('Remove this event from the log?')) return;
  STATE.auditEvents = (STATE.auditEvents || []).filter(e => e.id !== id);
  render();
  deleteAuditEventFromAPI(id);
}

    .sort((a,b) => (a.sortOrder||999999)-(b.sortOrder||999999));

  const done     = dayMoves.filter(m => m.completed).length;

  const inFac  = STATE.cages.filter(c=>c.location==='facility').length;
  const inRMD  = STATE.cages.filter(c=>c.location==='rmd').length;

      <h2 class="section-title" style="margin:0">⎙ Daily Report</h2>
      <div style="display:flex;gap:8px">
        <button class="btn btn-danger btn-sm" onclick="clearReportMovements()">🗑 Clear Range Data</button>

          <button class="btn btn-secondary btn-sm" onclick="

            reportSingleDay=toISO(d);reportFrom=reportSingleDay;reportTo=reportSingleDay;render()">◄ Prev</button>
          <button class="btn btn-secondary btn-sm" onclick="

          <button class="btn btn-secondary btn-sm" onclick="reportSingleDay=todayStr();reportFrom=reportSingleDay;reportTo=reportSingleDay;render()">Today</button>

        <div style="margin-left:auto;display:flex;gap:8px;flex-wrap:wrap">
          <div class="report-summary-cell" style="background:var(--bg-elevated);border:1px solid var(--border);border-radius:6px;padding:6px 14px;text-align:center">
            <div class="report-summary-val" style="color:var(--accent);font-size:18px">${dayMoves.length}</div>

            <div class="report-summary-val" style="color:${overLimit?'var(--red)':'var(--orange)'};font-size:18px">${pending}${overLimit?' ⚠':''}</div>

async function printDailyReport() {
  const btn = document.getElementById('report-print-btn');
  const statusEl = document.getElementById('report-map-status');
  if (btn) { btn.disabled = true; btn.textContent = '⏳ Capturing map…'; }
  if (statusEl) statusEl.textContent = 'Capturing movement map — please wait…';

  // Switch Movements tab to day-by-day view for the chosen date, then capture
  let mapImgDataUrl = null;
  try {
    const prevTab      = activeTab;
    const prevDayView  = mvDayView;
    const prevDayDate  = mvDayDate;
    const prevZoom     = tabZoom['movements'] || 1;

    // Switch to movements tab, day view, zoom=1 so screen px === DOM px
    mvDayView = true;
    mvDayDate = reportSingleDay;
    activeTab = 'movements';
    tabZoom['movements'] = 1;
    render();

    // Let DOM fully settle, zoom transform applied, arrows drawn
    await new Promise(r => setTimeout(r, 800));

    // Force zoom=1 directly on the wrap element just in case
    const zoomWrap = document.getElementById('zoom-wrap-movements');
    if (zoomWrap) zoomWrap.style.transform = 'scale(1)';

    // Redraw arrows at zoom=1
    mvRedraw();
    await new Promise(r => setTimeout(r, 350));

    // Inline CSS custom properties onto mv-map-wrapper so html2canvas resolves them
    const wrapperEl = document.getElementById('mv-map-wrapper');
    if (wrapperEl && typeof html2canvas !== 'undefined') {
      // Temporarily make the SVG use concrete px values (html2canvas can't read CSS vars)
      const svgEl = document.getElementById('mv-svg-arrows');
      if (svgEl) {
        svgEl.querySelectorAll('path, line, polyline, polygon, circle').forEach(el => {
          const cs = window.getComputedStyle(el);
          // Resolve any CSS-var colours to concrete values
          ['stroke', 'fill'].forEach(attr => {
            const val = el.getAttribute(attr) || '';
            if (val.startsWith('var(')) {
              const resolved = cs.getPropertyValue(
                val.replace(/^var\(/, '').replace(/\)$/, '').trim()
              ).trim();
              if (resolved) el.setAttribute(attr, resolved);
            }
          });
        });
      }

      const canvas = await html2canvas(wrapperEl, {
        backgroundColor: '#ffffff',
        scale: 1.5,
        useCORS: true,
        logging: false,
        // Scroll the capture target to top-left so coordinates are consistent
        scrollX: 0,
        scrollY: -window.scrollY,
        windowWidth:  wrapperEl.scrollWidth,
        windowHeight: wrapperEl.scrollHeight,
      });
      mapImgDataUrl = canvas.toDataURL('image/png');
    }

    // Restore everything
    tabZoom['movements'] = prevZoom;
    mvDayView = prevDayView;
    mvDayDate = prevDayDate;
    activeTab  = prevTab;
    render();
  } catch(e) {
    console.warn('Map capture failed:', e);
  }

  const dayMoves = STATE.plannedMovements.filter(m => m.date === reportSingleDay)
    .sort((a,b) => (a.sortOrder||999999)-(b.sortOrder||999999));
  const pending = dayMoves.filter(m=>!m.completed).length;
  const done    = dayMoves.filter(m=>m.completed).length;
  const overLimit = pending > MAX_MOVES;

  const movesTableRows = dayMoves.map((m,i) => `
    <tr class="${m.completed?'done':''}">
      <td style="width:28px;text-align:center">${i+1}</td>
      <td>${esc(m.type)}</td>
      <td><strong>${esc(m.description)}</strong>${m.notes?`<br><span style="font-weight:400;color:#666;font-size:11px">${esc(m.notes)}</span>`:''}</td>
      <td style="text-align:center">${m.shift==='night'?'🌙 Night':'☀ Day'}</td>
      <td style="text-align:center;font-weight:700;color:${m.completed?'#1a8a4a':'#9a6010'}">${m.completed?'✓ Done':'Pending'}</td>
    </tr>`).join('');

  const mapSection = mapImgDataUrl
    ? `<div style="margin-top:24px">
        <h2 style="font-size:15px;color:#333;border-bottom:1px solid #ccc;padding-bottom:6px;margin-bottom:10px">📍 Movement Map — ${fmt(reportSingleDay)}</h2>
        <img src="${mapImgDataUrl}" style="width:100%;border:1px solid #ccc;border-radius:6px" alt="Movement map"/>
       </div>`
    : `<div style="margin-top:16px;padding:12px;background:#fff8e6;border:1px solid #e8d080;border-radius:6px;font-size:12px;color:#856404">
        Movement map could not be captured. To include it, view the Movements tab in Day-by-Day view first, then print again.
       </div>`;

  const w = window.open('', '_blank');
  w.document.write(`<!DOCTYPE html><html><head>
  <title>Daily Movement Report — ${fmt(reportSingleDay)}</title>
  <style>
    body { font-family: Arial, sans-serif; padding: 24px; color: #222; font-size: 13px; }
    h1 { font-size: 20px; margin-bottom: 4px; }
    .sub { color: #666; font-size: 12px; margin-bottom: 20px; }
    .stats { display: flex; gap: 12px; margin-bottom: 20px; flex-wrap: wrap; }
    .stat { border: 1px solid #ddd; border-radius: 6px; padding: 8px 18px; text-align: center; min-width: 80px; }
    .stat-val { font-size: 22px; font-weight: 700; font-family: monospace; }
    .stat-lbl { font-size: 10px; color: #888; margin-top: 2px; }
    h2 { font-size: 15px; color: #333; border-bottom: 1px solid #ccc; padding-bottom: 6px; margin: 20px 0 10px; }
    table { width: 100%; border-collapse: collapse; margin-top: 8px; }
    th { background: #f5f5f5; border: 1px solid #ddd; padding: 7px 10px; text-align: left; font-size: 11px; text-transform: uppercase; letter-spacing: .04em; color: #555; }
    td { border: 1px solid #eee; padding: 8px 10px; vertical-align: top; }
    .done td { color: #aaa; text-decoration: line-through; }
    .inv-grid { display: grid; grid-template-columns: repeat(4,1fr); gap: 8px; margin-top: 8px; }
    .inv-cell { background: #f9f9f9; border: 1px solid #eee; border-radius: 5px; padding: 8px; text-align: center; }
    .inv-val { font-size: 20px; font-weight: 700; font-family: monospace; }
    .inv-lbl { font-size: 10px; color: #888; }
    .warn { color: #c93030; font-size: 11px; margin-left: 8px; }
    .print-btn { margin-top: 20px; padding: 10px 24px; background: #c08520; color: #fff; border: none; border-radius: 6px; font-size: 14px; font-weight: 700; cursor: pointer; }
    @media print { .print-btn { display: none; } body { padding: 12px; } }
  </style>
  </head><body>
  <h1>Daily Movement Report</h1>
  <div class="sub">
    📅 ${fmt(reportSingleDay)} &nbsp;|&nbsp;
    Generated: ${new Date().toLocaleString('en-GB')} &nbsp;|&nbsp;
    Daily limit: ${MAX_MOVES} movements
  </div>

  <div class="stats">
    <div class="stat"><div class="stat-val" style="color:#c08520">${dayMoves.length}</div><div class="stat-lbl">Total moves</div></div>
    <div class="stat"><div class="stat-val" style="color:${overLimit?'#c93030':'#b85c1a'}">${pending}${overLimit?'  ⚠':''}</div><div class="stat-lbl">Pending${overLimit?'<br><span class="warn">Over limit</span>':''}</div></div>
    <div class="stat"><div class="stat-val" style="color:#1a8a4a">${done}</div><div class="stat-lbl">Completed</div></div>
  </div>

  <h2>Movements${overLimit?`<span class="warn">⚠ Exceeds daily limit of ${MAX_MOVES}</span>`:''}
  </h2>
  ${dayMoves.length
    ? `<table>
        <thead><tr><th>#</th><th>Type</th><th>Description</th><th style="text-align:center">Shift</th><th style="text-align:center">Status</th></tr></thead>
        <tbody>${movesTableRows}</tbody>
       </table>`
    : `<p style="color:#999;font-style:italic">No movements planned for this day.</p>`}

  ${mapSection}

  <h2>Current Inventory Snapshot</h2>
  <div class="inv-grid">
    <div class="inv-cell"><div class="inv-val" style="color:#2563b0">${STATE.cages.filter(c=>c.location==='facility').length}</div><div class="inv-lbl">In Facility</div></div>
    <div class="inv-cell"><div class="inv-val" style="color:#1a8a4a">${STATE.cages.filter(c=>c.location==='rmd').length}</div><div class="inv-lbl">In RMD</div></div>
    <div class="inv-cell"><div class="inv-val" style="color:#2563b0">${STATE.cages.filter(c=>c.location==='rss').length}</div><div class="inv-lbl">Roof Slab</div></div>
    <div class="inv-cell"><div class="inv-val" style="color:#b85c1a">${STATE.cages.filter(c=>c.location==='frame').length}</div><div class="inv-lbl">In Frames</div></div>
    <div class="inv-cell"><div class="inv-val" style="color:#7040c0">${STATE.cages.filter(c=>c.location==='shipped').length}</div><div class="inv-lbl">Shipped</div></div>
  </div>

  <h2>Frame Status</h2>
  <table>
    <thead><tr><th>Location</th><th>Count</th></tr></thead>
    <tbody>
      <tr><td>At Facility</td><td>${STATE.frames.filter(f=>f.location==='facility').length}</td></tr>
      <tr><td>On Boat</td><td>${STATE.frames.filter(f=>f.location==='boat').length}</td></tr>
      <tr><td>With Client</td><td>${STATE.frames.filter(f=>f.location==='client').length}</td></tr>
      <tr><td>Fixed for Shipping</td><td>${STATE.frames.filter(f=>f.fixedForShipping).length}</td></tr>
      <tr><td>Frames with Waler</td><td>${STATE.frames.filter(f=>f.hasWaler).length}</td></tr>
    </tbody>
  </table>

  <button class="print-btn" onclick="window.print()">🖨 Print / Save as PDF</button>
  </body></html>`);
  w.document.close();

  if (btn)      { btn.disabled = false; btn.textContent = '🖨 Print Report'; }
  if (statusEl) statusEl.textContent = '';
}

// BOAT PLANNER
// ═══════════════════════════════════════════════════════════════════════════════
let bpBoatDate = todayStr();
let bpSelectedCages = new Set();
let bpGeneratedMovements = null;
let bpTripId = null;
let bpLastCommit = null; // { ids: [...], label: string } — set after commitBoatPlan for undo
let bpGuidance = ''; // user-provided guidance text for re-generation

function bpSetAIGuidance(text) {
  bpGuidance = text;
  render();
  // Trigger re-generation automatically
  setTimeout(() => generateBoatMovements(), 100);
}

function bpSetTrip(tripId) {
  bpTripId = tripId || null;
  if (bpTripId) {
    const trip = getBoatTrip(bpTripId);
    if (trip) bpBoatDate = trip.loadDate || trip.departDate || bpBoatDate;
  }
  bpGeneratedMovements = null;
  render();
}

function toggleBPCage(id) {
  if (bpSelectedCages.has(id)) bpSelectedCages.delete(id);
  else bpSelectedCages.add(id);
  bpGeneratedMovements = null;
  bpGuidance = '';
  render();
}

async function generateBoatMovements() {
  if (bpSelectedCages.size === 0) return alert('Please select at least one cage to plan for the boat.');
  if (!bpBoatDate) return alert('Please set a boat loading date.');

  // ═══════════════════════════════════════════════════════════════════════
  // GENERATE PLAN — Rewritten to match real operational logic:
  //
  // PRIORITY 1 (HIGHEST): Get facility cages out → into frames → into RMD
  //   Keeps production running. Uses 2 moves: Facility→Frame, then Frame→RMD.
  //   If RMD is full, cage stays in frame (frame-as-storage).
  //   Frames used for facility exit are freed after drop-off and can be reused.
  //
  // PRIORITY 2: Prepare boat cages for shipping
  //   RMD→Frame (1 cage per frame, fixed for shipping).
  //   Facility→Frame for boat cages (direct, 1 cage per frame).
  //
  // PRODUCTION STOPPAGE DETECTION:
  //   If on any day no facility cage can be moved out (no frame available),
  //   flag that day as a production block.
  //
  // CATCH-22 WARNING:
  //   If frames are all away and none returning before boat date, warn that
  //   shipping cages is needed to get frames back.
  // ═══════════════════════════════════════════════════════════════════════

  // ── Parse guidance hints ─────────────────────────────────────────────
  // Uses token-matching rather than rigid regexes: scan each line for any
  // known cage name and any known frame name. This handles natural language
  // like "TF-3 for 320", "320 → TF-3", "put 320 in TF-3", "use TF-3 for cage 320", etc.
  const guidanceCageSkips    = new Set();
  const guidanceFrameForCage = {};
  const guidanceRmdForCage   = {};
  const guidanceParseLog     = []; // human-readable log of what was/wasn't parsed

  if (bpGuidance && bpGuidance.trim()) {
    // Build lookup maps: lowercased name → object, sorted longest-first so
    // "tf-10" is matched before "tf-1" (prevents short names matching substrings of longer ones)
    const cageNames  = STATE.cages.map(c => c.name.toLowerCase()).sort((a,b) => b.length - a.length);
    const frameNames = STATE.frames.map(f => f.name.toLowerCase()).sort((a,b) => b.length - a.length);
    const cageByName  = Object.fromEntries(STATE.cages.map(c => [c.name.toLowerCase(), c]));
    const frameByName = Object.fromEntries(STATE.frames.map(f => [f.name.toLowerCase(), f]));

    const gLines = bpGuidance.split(/[\n,;]+/).map(s => s.trim()).filter(Boolean);
    gLines.forEach(line => {
      const lower = line.toLowerCase();

      // ── Skip instruction ────────────────────────────────────────────
      const skipMatch = lower.match(/\bskip\b/);
      if (skipMatch) {
        // Find any cage name mentioned on this line (longest-first to avoid partial matches)
        const skipped = cageNames.find(n => lower.includes(n));
        if (skipped) {
          guidanceCageSkips.add(skipped);
          guidanceParseLog.push(`ℹ Skip: cage ${cageByName[skipped].name}`);
        } else {
          guidanceParseLog.push(`⚠ "skip" instruction but no matching cage found: "${line}"`);
        }
        return;
      }

      // ── RMD instruction — check before frame (RMD slots look like "8A") ──
      // Look for "rmd-NX" or "rmd NX" or just "NX" where N=number, X=A/B
      const rmdTokenMatch = lower.match(/\brmd[-\s]?(\d+)\s*([ab])\b/i)
                         || lower.match(/\b(\d{1,2})([ab])\b/i);
      if (rmdTokenMatch) {
        const rNum  = parseInt(rmdTokenMatch[1], 10);
        const rSide = rmdTokenMatch[2].toUpperCase();
        // Find cage name on this line (longest-first to avoid partial matches)
        const cageName = cageNames.find(n => lower.includes(n));
        if (cageName) {
          guidanceRmdForCage[cageName] = { number: rNum, side: rSide, slot: null };
          guidanceParseLog.push(`ℹ RMD: cage ${cageByName[cageName].name} → RMD-${rNum}${rSide}`);
          return;
        } else {
          guidanceParseLog.push(`⚠ RMD slot ${rNum}${rSide} found but no matching cage on line: "${line}"`);
          return;
        }
      }

      // ── Frame instruction — find any frame name on this line ────────
      const frameName = frameNames.find(n => lower.includes(n));
      if (frameName) {
        const cageName = cageNames.find(n => lower.includes(n));
        if (cageName) {
          guidanceFrameForCage[cageName] = frameByName[frameName].id;
          const f = frameByName[frameName];
          const awayNote = (f.location === 'client' || f.location === 'boat')
            ? ` (frame currently away${f.returnDate ? ', returns ' + fmt(f.returnDate) : ', no return date set'})`
            : '';
          guidanceParseLog.push(`ℹ Frame: cage ${cageByName[cageName].name} → ${f.name}${awayNote}`);
          return;
        } else {
          guidanceParseLog.push(`⚠ Frame ${frameByName[frameName].name} found but no matching cage on line: "${line}"`);
          return;
        }
      }

      // ── Unrecognised line ───────────────────────────────────────────
      guidanceParseLog.push(`⚠ Could not parse guidance line: "${line}"`);
    });
    // (guidanceParseLog is flushed into warnings[] below, after warnings is declared)
  }

  // ── Build working-day list ────────────────────────────────────────────
  const DAILY_LIMIT = STATE.settings.movementsPerDay || MAX_MOVES;
  const boatDate    = bpBoatDate; // ISO string
  const todayD      = new Date(); todayD.setHours(12,0,0,0);
  const boatD       = new Date(boatDate + 'T12:00:00');

  const workDays = [];
  {
    let d = new Date(todayD);
    while (d <= boatD) {
      const dow = d.getDay();
      if (dow !== 0 && dow !== 6) workDays.push(toISO(d));
      d.setDate(d.getDate() + 1);
    }
  }
  if (workDays.length === 0) workDays.push(boatDate);

  // Respect already-planned movements (don't go over daily limit)
  const existingCounts = {};
  STATE.plannedMovements.filter(m => !m.completed).forEach(m => {
    if (m.date) existingCounts[m.date] = (existingCounts[m.date] || 0) + 1;
  });

  // ── Identify cages ────────────────────────────────────────────────────
  // BOAT CAGES: user-selected, to be shipped on this trip (1 per frame, fixed)
  const boatCages = [...bpSelectedCages]
    .map(id => getCage(id)).filter(Boolean)
    .filter(c => !guidanceCageSkips.has(c.name.toLowerCase()));

  // FACILITY EXIT CAGES: need to leave facility (not selected as boat cages,
  // have a departure date on/before boat date, still in facility)
  const facilityExitCages = STATE.cages.filter(c =>
    c.location === 'facility' &&
    c.departureDate &&
    c.departureDate <= boatDate &&
    !c.proposedTripId &&
    !bpSelectedCages.has(c.id) &&
    !guidanceCageSkips.has(c.name.toLowerCase())
  ).sort((a, b) => a.departureDate.localeCompare(b.departureDate));

  // Skip cages already planned
  const alreadyPlannedCageIds = new Set(
    STATE.plannedMovements
      .filter(m => !m.completed && (m.typeKey === 'facility-to-frame' || m.typeKey === 'facility-to-rmd'))
      .map(m => m.cageId)
  );
  const exitCagesToPlan = facilityExitCages.filter(c => !alreadyPlannedCageIds.has(c.id));

  const warnings = [];
  const scheduledSteps = [];

  // Flush guidance parse log now that warnings[] is declared
  if (guidanceParseLog.length) guidanceParseLog.forEach(msg => warnings.push(msg));

  // ── SIMULATED STATE ───────────────────────────────────────────────────
  // We simulate the state of frames and RMD across the planning window.
  // frameSim[frameId] = { frame, cages: [cageId, ...], location, fixedForShipping }
  // rmdSim[`NX`] = { cage1: cageId|null, cage2: cageId|null }

  const frameSim = {};
  // Boat-selected cages already in a frame will be RE-framed for shipping.
  // Strip them from frameSim so their current frame appears available to the planner.
  const boatCageIds = new Set(boatCages.map(c => c.id));
  STATE.frames.forEach(f => {
    frameSim[f.id] = {
      frame: f,
      location: f.location,
      cages: f.cages.filter(cid => !boatCageIds.has(cid)),
      fixedForShipping: f.fixedForShipping || false,
      returningOn: (f.location === 'client' || f.location === 'boat') && f.returnDate ? f.returnDate : null,
    };
  });

  // ── REPLAY EXISTING PLANNED MOVEMENTS INTO frameSim ──────────────────
  // STATE.frames only reflects completed moves. Pending planned movements that
  // assign cages to frames must be replayed here so the planner sees
  // already-committed frame assignments and doesn't double-book.
  STATE.plannedMovements
    .filter(m => !m.completed && m.frameId)
    .forEach(m => {
      const fs = frameSim[m.frameId];
      if (!fs) return;
      if (m.typeKey === 'facility-to-frame' || m.typeKey === 'rmd-to-frame' || m.typeKey === 'frame-to-frame') {
        if (m.cageId && !fs.cages.includes(m.cageId) && !boatCageIds.has(m.cageId)) {
          fs.cages.push(m.cageId);
        }
      }
      if (m.typeKey === 'frame-fix-shipping') {
        fs.fixedForShipping = true;
      }
    });

  // RMD sim: initialise from current STATE — all 4 slots per side
  const rmdSim = {};
  STATE.rmdSlots.forEach(r => {
    for (const side of SIDES) {
      const key = `${r.number}${side}`;
      rmdSim[key] = {
        cage1: r[side].cage1 || null,
        cage2: r[side].cage2 || null,
      };
    }
  });

  // Replay pending planned frame-to-rmd and facility-to-rmd movements into rmdSim.
  // (STATE only reflects completed moves — pending movements must be replayed here.)
  // IMPORTANT: also free the transit frame — the frame returns to facility after depositing the cage.
  //
  // NOTE: movements are saved with rmdSlot as a combined string (e.g. "8A"), NOT separate
  // rmdNumber + rmdSide fields. Parse either form so both old and new movements are handled.
  {
    function parseRmdRef(m) {
      if (m.rmdNumber != null && m.rmdSide) {
        return { number: parseInt(m.rmdNumber, 10), side: String(m.rmdSide).toUpperCase() };
      }
      if (m.rmdSlot) {
        const match = String(m.rmdSlot).match(/^(\d+)\s*([ABab])/);
        if (match) return { number: parseInt(match[1], 10), side: match[2].toUpperCase() };
      }
      return null;
    }
    ['frame-to-rmd', 'facility-to-rmd'].forEach(typeKey => {
      STATE.plannedMovements
        .filter(m => !m.completed && m.typeKey === typeKey && m.cageId)
        .forEach(m => {
          const ref = parseRmdRef(m);
          if (!ref) return;
          const key = `${ref.number}${ref.side}`;
          if (!rmdSim[key]) rmdSim[key] = { cage1: null, cage2: null };
          // Assign to first available slot (cage1 first, then cage2)
          if (!rmdSim[key].cage1) {
            rmdSim[key].cage1 = m.cageId;
          } else if (!rmdSim[key].cage2) {
            rmdSim[key].cage2 = m.cageId;
          }
          // Free the transit frame if present — cage is now committed to RMD
          if (m.frameId && frameSim[m.frameId]) {
            frameSim[m.frameId].cages = frameSim[m.frameId].cages.filter(id => id !== m.cageId);
          }
        });
    });
  }

  // ── LEARN FROM MOVEMENT HISTORY ──────────────────────────────────────
  // Mine completed movements to build soft preferences for frame and RMD
  // slot selection. These are applied as a scoring bonus — they don't
  // override hard rules (width, waler, capacity) but do break ties in
  // favour of historically-used assignments.
  //
  // Three preference signals are extracted:
  //   1. Per-cage frame affinity   — cage X has often gone into frame F
  //   2. Width-band frame affinity — cages ~Y metres wide usually go into Wm frames
  //   3. Per-cage RMD slot affinity — cage X has often gone to slot NX
  //   4. Height-category RMD affinity — Tall/Medium/Short cages tend toward certain slots

  const learnedPrefs = (() => {
    const completed = (STATE.plannedMovements || []).filter(m => m.completed);

    // ── Frame preferences ─────────────────────────────────────────────
    const frameCounts  = {};  // cageId  → { frameId: count }
    const widthCounts  = {};  // widthBand (0.1m rounded) → { frameWidth: count }

    completed
      .filter(m => (m.typeKey === 'rmd-to-frame' || m.typeKey === 'facility-to-frame') && m.cageId && m.frameId)
      .forEach(m => {
        const cage  = getCage(m.cageId);
        const frame = getFrame(m.frameId);
        if (!cage || !frame) return;

        // Per-cage: how many times did this cage go into this specific frame?
        if (!frameCounts[m.cageId]) frameCounts[m.cageId] = {};
        frameCounts[m.cageId][m.frameId] = (frameCounts[m.cageId][m.frameId] || 0) + 1;

        // Width band: bucket cage width to nearest 0.1m, track which frame width was used
        const band = String(Math.round(cage.width * 10) / 10);
        if (!widthCounts[band]) widthCounts[band] = {};
        widthCounts[band][String(frame.width)] = (widthCounts[band][String(frame.width)] || 0) + 1;
      });

    // ── RMD slot preferences ──────────────────────────────────────────
    const rmdCageCounts   = {};  // cageId  → { rmdKey: count }
    const rmdHeightCounts = {};  // heightCat → { rmdKey: count }

    completed
      .filter(m => (m.typeKey === 'frame-to-rmd' || m.typeKey === 'facility-to-rmd') && m.cageId)
      .forEach(m => {
        const cage = getCage(m.cageId);
        if (!cage) return;
        // Parse the RMD key from rmdSlot or rmdNumber+rmdSide
        let rmdKey = null;
        if (m.rmdNumber != null && m.rmdSide) {
          rmdKey = `${parseInt(m.rmdNumber, 10)}${String(m.rmdSide).toUpperCase()}`;
        } else if (m.rmdSlot) {
          const match = String(m.rmdSlot).match(/^(\d+)\s*([ABab])/);
          if (match) rmdKey = `${match[1]}${match[2].toUpperCase()}`;
        }
        if (!rmdKey) return;

        if (!rmdCageCounts[m.cageId]) rmdCageCounts[m.cageId] = {};
        rmdCageCounts[m.cageId][rmdKey] = (rmdCageCounts[m.cageId][rmdKey] || 0) + 1;

        const cat = hCat(cage.height);
        if (!rmdHeightCounts[cat]) rmdHeightCounts[cat] = {};
        rmdHeightCounts[cat][rmdKey] = (rmdHeightCounts[cat][rmdKey] || 0) + 1;
      });

    // Helper: get the most-frequent key from a frequency map
    function topKey(freq) {
      if (!freq || Object.keys(freq).length === 0) return null;
      return Object.entries(freq).sort((a, b) => b[1] - a[1])[0][0];
    }

    // Flatten to simple "best choice" lookups
    const framePrefByCageId = Object.fromEntries(
      Object.entries(frameCounts).map(([cid, freq]) => [cid, topKey(freq)])
    );
    const framePrefByWidthBand = Object.fromEntries(
      Object.entries(widthCounts).map(([band, freq]) => [band, parseFloat(topKey(freq))])
    );
    const rmdPrefByCageId = Object.fromEntries(
      Object.entries(rmdCageCounts).map(([cid, freq]) => [cid, topKey(freq)])
    );
    const rmdPrefByHeightCat = Object.fromEntries(
      Object.entries(rmdHeightCounts).map(([cat, freq]) => [cat, topKey(freq)])
    );

    // Build a human-readable summary of what was learned (shown in plan output)
    const learnedFrameCount  = Object.keys(framePrefByCageId).length;
    const learnedWidthCount  = Object.keys(framePrefByWidthBand).length;
    const learnedRmdCount    = Object.keys(rmdPrefByCageId).length;
    const totalCompleted     = completed.length;
    const summary = totalCompleted === 0
      ? 'No completed movements yet — preferences will build as you complete moves.'
      : `Analysed ${totalCompleted} completed movement${totalCompleted !== 1 ? 's' : ''}. ` +
        `Frame preferences learned for ${learnedFrameCount} cage${learnedFrameCount !== 1 ? 's' : ''} ` +
        `and ${learnedWidthCount} width band${learnedWidthCount !== 1 ? 's' : ''}. ` +
        `RMD slot preferences learned for ${learnedRmdCount} cage${learnedRmdCount !== 1 ? 's' : ''}.`;

    return { framePrefByCageId, framePrefByWidthBand, rmdPrefByCageId, rmdPrefByHeightCat, summary, totalCompleted };
  })();

  // Track RMD boat-departing cages — used by Phase 2 access-order checks.
  // Do NOT pre-vacate their slots here: those cages are still physically in RMD
  // until Phase 2 actually schedules them out. Pre-vacating caused Phase 1 to
  // assign incoming facility exit cages into slots that were still occupied,
  // producing plans with 3 cages in a 2-cage side. Slots are freed individually
  // in Phase 2 when each rmd_to_frame move is scheduled (lines below).
  const rmdBoatDeparting = new Set(boatCages.filter(c => c.location === 'rmd' || c.location === 'rss').map(c => c.id));

  // Helper: available capacity on a day
  function movesUsedOnDay(date) { return existingCounts[date] || 0; }
  function capacityOnDay(date) { return Math.max(0, DAILY_LIMIT - movesUsedOnDay(date)); }
  function useMove(date) { existingCounts[date] = (existingCounts[date] || 0) + 1; }

  // Helper: is a frame available at facility on a given date?
  function getAvailableFacilityFrames(date, excludeIds = new Set()) {
    return Object.values(frameSim).filter(s =>
      !excludeIds.has(s.frame.id) &&
      !s.fixedForShipping &&
      (s.location === 'facility' || (s.returningOn && s.returningOn <= date))
    );
  }

  // Helper: find a frame for a cage (exit/transit — 2 cages can share)
  function findExitFrame(cage, date, excludeIds = new Set()) {
    const needsW = needsWaler(cage);
    const candidates = getAvailableFacilityFrames(date, excludeIds)
      .filter(s => cage.width <= s.frame.width && s.cages.length < 2)
      .sort((a, b) => {
        // Prefer partially-filled (pair up), then narrowest fit
        const aPartial = a.cages.length === 1 ? 0 : 1;
        const bPartial = b.cages.length === 1 ? 0 : 1;
        if (aPartial !== bPartial) return aPartial - bPartial;
        return a.frame.width - b.frame.width;
      });

    // Pass 1: waler respected, partial fill first
    for (const s of candidates) {
      if (needsW && !s.frame.hasWaler) continue;
      if (s.cages.length === 1) {
        const partner = getCage(s.cages[0]);
        if (partner && !canFitTwo(partner, cage, s.frame.width)) continue;
      }
      return s.frame;
    }
    // Pass 2: relax waler
    for (const s of candidates) {
      if (s.cages.length === 1) {
        const partner = getCage(s.cages[0]);
        if (partner && !canFitTwo(partner, cage, s.frame.width)) continue;
      }
      return s.frame;
    }
    return null;
  }

  // Helper: find a frame for boat loading (1 cage only, must be empty).
  // Selects the narrowest available frame where frame.width >= cage.width + frameSpare.
  // Applies learned preferences (from movement history) as a soft sorting bonus so
  // historically-used frames are preferred when multiple valid options exist.
  // Waler: if cage needs waler, frame must have waler.
  function findBoatFrame(cage, date, reservedIds = new Set()) {
    const s     = STATE.settings || {};
    const spare = s.frameSpare !== undefined ? s.frameSpare : FRAME_SPARE;
    const needsW = needsWaler(cage);

    const effective = cage.width + spare; // minimum frame width required

    // Learned preference signals for this cage
    const prefFrameId    = learnedPrefs.framePrefByCageId[cage.id] || null;
    const widthBand      = String(Math.round(cage.width * 10) / 10);
    const prefFrameWidth = learnedPrefs.framePrefByWidthBand[widthBand] || null;

    // Filter: empty, wide enough, available at facility or returning by date
    const candidates = getAvailableFacilityFrames(date, reservedIds)
      .filter(s => s.cages.length === 0 && s.frame.width >= effective)
      .sort((a, b) => {
        // Learned preference score: exact cage match = 2 pts, width-band match = 1 pt
        const scoreA = (a.frame.id === prefFrameId ? 2 : 0) + (a.frame.width === prefFrameWidth ? 1 : 0);
        const scoreB = (b.frame.id === prefFrameId ? 2 : 0) + (b.frame.width === prefFrameWidth ? 1 : 0);
        if (scoreA !== scoreB) return scoreB - scoreA; // higher score first
        // Tiebreak: at-facility before returning; then narrowest fit
        const aRet = a.returningOn ? 1 : 0;
        const bRet = b.returningOn ? 1 : 0;
        if (aRet !== bRet) return aRet - bRet;
        return a.frame.width - b.frame.width;
      });

    // Pass 1: respect waler requirement
    for (const c of candidates) {
      if (needsW && !c.frame.hasWaler) continue;
      return c.frame;
    }
    // Pass 2: relax waler (cage doesn't need one, so any frame width is fine)
    if (!needsW) {
      for (const c of candidates) { return c.frame; }
    }
    return null;
  }

  // Helper: find an RMD slot for a cage
  // Rules:
  //   - Each RMD side holds exactly 2 cages: cage1 = inside, cage2 = outside.
  //   - First cage placed goes inside (cage1); second cage goes outside (cage2).
  //   - To remove the inside cage, the outside cage must come out first.
  //   - Tall cages can ONLY go inside (cage1). If cage1 is already taken, a Tall cage has no valid slot.
  //   - Valid pairings (inside → outside): Short+Short, Medium+Medium, Tall+Short, Medium+Short.
  function findRMDSlot(cage) {
    const cageH  = hCat(cage.height);
    const isTall = (cageH === 'Tall');
    const candidates = [];

    for (const r of STATE.rmdSlots) {
      for (const side of SIDES) {
        const key = `${r.number}${side}`;
        const s = rmdSim[key] || { cage1: null, cage2: null };
        if (s.cage1 && s.cage2) continue; // both slots taken

        const filled = (s.cage1 ? 1 : 0) + (s.cage2 ? 1 : 0);

        // Try inside slot (cage1 only — first cage must go inside)
        // Only available if cage1 is empty.
        if (!s.cage1) {
          if (!s.cage2) {
            // Outside slot empty — any cage can go inside
            candidates.push({ number: r.number, side, slot: 'cage1', filled });
          } else {
            const outsideCage = getCage(s.cage2);
            // If outside slot is occupied but cage can't be resolved, treat as incompatible
            // (prevents invalid pairings like Tall+Tall when rmdSim has a pending assignment)
            if (outsideCage && canPairRMD(cage, outsideCage)) {
              candidates.push({ number: r.number, side, slot: 'cage1', filled });
            }
          }
        }

        // Try outside slot (cage2 only — second cage must go outside)
        // Tall cages cannot go outside. cage1 must already be filled before cage2 is valid.
        if (!isTall && s.cage1 && !s.cage2) {
          const insideCage = getCage(s.cage1);
          // If inside cage can't be resolved, treat as incompatible (safe fallback)
          if (insideCage && canPairRMD(insideCage, cage)) {
            candidates.push({ number: r.number, side, slot: 'cage2', filled });
          }
        }
      }
    }

    if (candidates.length === 0) return null;

    // Learned preference signals for this cage's RMD slot
    const prefRmdKey = learnedPrefs.rmdPrefByCageId[cage.id]
                    || learnedPrefs.rmdPrefByHeightCat[cageH]
                    || null;

    // Sort: learned preference first, then partial fills (pack together), then lowest slot number
    candidates.sort((a, b) => {
      const aKey = `${a.number}${a.side}`;
      const bKey = `${b.number}${b.side}`;
      const aPref = aKey === prefRmdKey ? 1 : 0;
      const bPref = bKey === prefRmdKey ? 1 : 0;
      if (aPref !== bPref) return bPref - aPref; // preferred key first
      const ap = a.filled > 0 ? 0 : 1;
      const bp = b.filled > 0 ? 0 : 1;
      if (ap !== bp) return ap - bp;
      if (a.number !== b.number) return a.number - b.number;
      return a.side.localeCompare(b.side);
    });

    return candidates[0];
  }

  // Helper: find a working day on/before a deadline
  function latestDayByDeadline(deadline, earliest = null) {
    const eligible = workDays.filter(d =>
      d <= deadline && (earliest === null || d >= earliest) && capacityOnDay(d) > 0
    );
    if (eligible.length > 0) return eligible[eligible.length - 1];
    // Fallback: ignore capacity constraint
    const eligible2 = workDays.filter(d => d <= deadline && (earliest === null || d >= earliest));
    return eligible2.length > 0 ? eligible2[eligible2.length - 1] : workDays[workDays.length - 1];
  }

  // Helper: find earliest available working day on/after a date
  function earliestDay(fromDate = null) {
    const start = fromDate || toISO(todayD);
    const eligible = workDays.filter(d => d >= start && capacityOnDay(d) > 0);
    if (eligible.length > 0) return eligible[0];
    return workDays.find(d => d >= start) || workDays[workDays.length - 1];
  }

  // ── Helper: resolve a guided frame from guidance, with returning-frame validation ──
  // Returns the frame object if usable, null if it can't be used.
  // Emits warnings if the frame is away and returning late (or has no return date).
  function resolveGuidedFrame(guidedFrameId, cageName) {
    const f = STATE.frames.find(fr => fr.id === guidedFrameId);
    if (!f) {
      warnings.push(`⚠ Guidance: frame not found for cage ${cageName} — ignoring guidance`);
      return null;
    }
    if (f.location === 'facility') return f; // at facility, no issues
    if (f.location === 'client' || f.location === 'boat') {
      if (!f.returnDate) {
        warnings.push(`⚠ Guidance: ${f.name} is currently away (${f.location}) with no return date set — will schedule optimistically but timing may be wrong`);
        return f; // still use it, but flag it
      }
      if (f.returnDate > boatDate) {
        warnings.push(`⚠ Guidance: ${f.name} returns on ${fmt(f.returnDate)}, which is AFTER the boat date (${fmt(boatDate)}). Cannot use this frame — falling back to auto-select.`);
        return null;
      }
      // Returns before boat date — valid, will be scheduled after return date
      warnings.push(`ℹ Guidance: ${f.name} is currently away (${f.location}), returns ${fmt(f.returnDate)} — cage ${cageName} will be scheduled after that.`);
      return f;
    }
    return f; // any other location — use it
  }

  // ── PHASE 1: PLAN FACILITY EXIT CAGES (HIGHEST PRIORITY) ─────────────
  // For each exit cage: Facility → Frame (transit), then Frame → RMD (storage)
  // If RMD is full: cage stays in frame (frame-as-storage).
  // Frame used for transit is freed after drop-off for boat loading.

  const exitReservedFrameIds = new Set(); // frames committed to facility-exit transit
  let productionStoppageDay = null;

  for (const cage of exitCagesToPlan) {
    // Apply guidance RMD override if specified
    const guidedRmd = guidanceRmdForCage[cage.name.toLowerCase()];

    // Find a transit/storage frame for this cage.
    // For frame-as-storage: 2 cages can share a frame (same double-cage rule as transit).
    // findExitFrame already respects canFitTwo + waler rules and prefers partial fills.
    const transitFrame = findExitFrame(cage, cage.departureDate, new Set());
    if (!transitFrame) {
      if (!productionStoppageDay || cage.departureDate < productionStoppageDay) {
        productionStoppageDay = cage.departureDate;
      }
      warnings.push(`⚠ No frame available for cage ${cage.name} to exit facility by ${fmt(cage.departureDate)}. Production may stop on this date.`);
      continue;
    }

    const frameReturnDate = frameSim[transitFrame.id]?.returningOn || null;
    const exitDay = latestDayByDeadline(cage.departureDate, frameReturnDate);

    // Determine RMD destination BEFORE recording any steps, so we emit the
    // correct single step (Facility→Frame→RMD or Facility→Frame-storage).
    let rmdSlot = null;
    if (guidedRmd) {
      const rmdSlotObj = STATE.rmdSlots.find(r => r.number === guidedRmd.number);
      if (rmdSlotObj) {
        const slotKey = guidedRmd.slot || 'cage1';
        rmdSlot = { number: guidedRmd.number, side: guidedRmd.side, slot: slotKey };
        warnings.push(`ℹ Cage ${cage.name}: manual RMD override → RMD-${guidedRmd.number}${guidedRmd.side} (${slotKey})`);
      } else {
        warnings.push(`⚠ Guidance: RMD-${guidedRmd.number} not found — auto-assigning cage ${cage.name}`);
        rmdSlot = findRMDSlot(cage);
      }
    } else {
      rmdSlot = findRMDSlot(cage);
    }

    if (rmdSlot) {
      // ── Path A: Facility → Frame (transit), then Frame → RMD ──────────
      // Two separate moves: lift cage into frame, then crane cage from frame into RMD slot.
      useMove(exitDay);
      frameSim[transitFrame.id].cages.push(cage.id);

      // Record the Facility → Frame (exit) step
      scheduledSteps.push({
        action: 'facility_exit_to_frame',
        cage, frame: transitFrame,
        rmdSlot,
        date: exitDay,
        deadline: cage.departureDate,
        note: `${cage.name}: Facility → ${transitFrame.name} (${transitFrame.width}m${transitFrame.hasWaler ? ' 🔩' : ''}) — transit to RMD-${rmdSlot.number}${rmdSlot.side}`,
      });

      // Update RMD sim
      const rmdKey = `${rmdSlot.number}${rmdSlot.side}`;
      if (!rmdSim[rmdKey]) rmdSim[rmdKey] = { cage1: null, cage2: null };
      rmdSim[rmdKey][rmdSlot.slot] = cage.id;

      // Frame → RMD move: same day if capacity remains, else next available day
      const rmdMoveDay = (() => {
        if (capacityOnDay(exitDay) > 0) { useMove(exitDay); return exitDay; }
        const next = workDays.find(d => d >= exitDay && capacityOnDay(d) > 0);
        if (next) { useMove(next); return next; }
        useMove(exitDay); return exitDay;
      })();

      // Free the transit frame (cage is now in RMD, frame available again)
      frameSim[transitFrame.id].cages = frameSim[transitFrame.id].cages.filter(id => id !== cage.id);

      scheduledSteps.push({
        action: 'facility_exit_frame_to_rmd',
        cage, frame: transitFrame,
        date: rmdMoveDay,
        deadline: cage.departureDate,
        rmdSlot,
        note: `${cage.name}: Into RMD-${rmdSlot.number}${rmdSlot.side} (${rmdSlot.slot}) via ${transitFrame.name}`,
      });

    } else {
      // ── Path B: RMD full — single move: Facility → Frame (stored there) ──
      // Up to 2 cages can share the same frame for storage (canFitTwo rules apply).
      // findExitFrame already found a frame that can accommodate this cage
      // (potentially pairing with another cage already assigned to that frame).
      // We emit ONE step only — the cage goes from facility straight into frame storage.
      useMove(exitDay);
      frameSim[transitFrame.id].cages.push(cage.id);
      // Frame remains occupied — do NOT free it

      const pairedWith = frameSim[transitFrame.id].cages.filter(id => id !== cage.id);
      const pairNote = pairedWith.length > 0
        ? ` (paired with cage ${getCage(pairedWith[0])?.name || pairedWith[0]})`
        : '';
      warnings.push(`ℹ RMD full — cage ${cage.name} stored in ${transitFrame.name}${pairNote}. Frame held until RMD space available.`);

      scheduledSteps.push({
        action: 'facility_exit_frame_storage',
        cage, frame: transitFrame,
        date: exitDay,
        deadline: cage.departureDate,
        note: `${cage.name}: Facility → ${transitFrame.name} (${transitFrame.width}m) — stored, RMD full${pairNote}`,
      });
    }
  }

  if (productionStoppageDay) {
    warnings.push(`🚨 PRODUCTION RISK: Facility exit blocked from ${fmt(productionStoppageDay)} — no frames available. Ship cages to client to get frames returned.`);
  }

  // ── PHASE 2: PLAN BOAT CAGES (SHIP TO CLIENT) ─────────────────────────
  // Rule: 1 cage per frame, frame must be fixed for shipping.
  // Check RMD access order (outside cage must come out before inside cage).

  const boatReservedFrameIds = new Set(); // frames reserved for boat loading

  for (const cage of boatCages) {
    // ── Check if a pending planned movement is already moving this cage into a frame ──
    // If so, we only need to fix it for shipping — no new movement required.
    const pendingToFrame = STATE.plannedMovements.find(m =>
      !m.completed && m.cageId === cage.id &&
      (m.typeKey === 'facility-to-frame' || m.typeKey === 'rmd-to-frame' || m.typeKey === 'frame-to-frame')
    );
    if (pendingToFrame) {
      const plannedFrame = pendingToFrame.frameId
        ? STATE.frames.find(f => f.id === pendingToFrame.frameId)
        : null;
      if (plannedFrame) {
        // Cage already has a planned movement into this frame — only need to fix for shipping.
        // Do NOT mark fixedForShipping=true here — that prevents the fix step being generated below.
        boatReservedFrameIds.add(plannedFrame.id);
        scheduledSteps.push({
          action: 'already_framed',
          cage, frame: plannedFrame, date: boatDate,
          note: `Already planned into ${plannedFrame.name} ✓ — only needs fixing for shipping`,
          pendingMove: pendingToFrame,
          needsFix: true,
        });
        continue;
      }
    }

    if (cage.location === 'frame') {
      // Already in a frame — check if it's suitable
      const currentFrame = STATE.frames.find(f => f.cages.includes(cage.id));
      if (!currentFrame) {
        warnings.push(`⚠ Cannot find frame for cage ${cage.name}`);
        scheduledSteps.push({ action: 'no_frame', cage, frame: null, date: boatDate, note: `Cannot find frame for cage ${cage.name}` });
        continue;
      }
      const issues = [];
      if (cage.width > currentFrame.width) issues.push(`frame ${currentFrame.name} too narrow`);
      if (needsWaler(cage) && !currentFrame.hasWaler) issues.push(`no waler on ${currentFrame.name}`);
      // Check for multiple cages — use frameSim which includes pending planned assignments
      const simCagesInFrame = (frameSim[currentFrame.id]?.cages || []).filter(cid => cid !== cage.id);
      if (simCagesInFrame.length > 0) issues.push(`${currentFrame.name} has multiple cages — must reframe to single cage`);

      if (issues.length === 0) {
        boatReservedFrameIds.add(currentFrame.id);
        if (frameSim[currentFrame.id]) {
          if (!frameSim[currentFrame.id].cages.includes(cage.id)) frameSim[currentFrame.id].cages.push(cage.id);
          frameSim[currentFrame.id].fixedForShipping = true;
        }
        scheduledSteps.push({ action: 'already_framed', cage, frame: currentFrame, date: boatDate, note: `Already in ${currentFrame.name} ✓` });
      } else {
        // Need to reframe
        const guidedFrameId = guidanceFrameForCage[cage.name.toLowerCase()];
        const better = guidedFrameId
          ? resolveGuidedFrame(guidedFrameId, cage.name)
          : findBoatFrame(cage, boatDate, boatReservedFrameIds);
        if (better) {
          boatReservedFrameIds.add(better.id);
          frameSim[better.id]?.cages.push(cage.id);
          if (frameSim[better.id]) frameSim[better.id].fixedForShipping = true;
          warnings.push(`⚠ Cage ${cage.name} reframed: ${issues.join(', ')}`);
          const day = earliestDay();
          useMove(day);
          scheduledSteps.push({ action: 'reframe', cage, frame: better, fromFrame: currentFrame, date: day, note: `Reframe: ${currentFrame.name} → ${better.name}` });
        } else {
          warnings.push(`⚠ No suitable frame for cage ${cage.name} (${issues.join(', ')})`);
          scheduledSteps.push({ action: 'no_frame', cage, frame: null, date: boatDate, note: `No suitable frame for ${cage.name}` });
        }
      }

    } else if (cage.location === 'rmd' || cage.location === 'rss') {
      // Check inside/outside access order
      const detail = cage.locationDetail || '';
      const rmdMatch2 = detail.match(/(\d+)\s*([ABab])$/);
      let blocked = false;
      if (rmdMatch2) {
        const rNum = parseInt(rmdMatch2[1], 10);
        const rSide = rmdMatch2[2].toUpperCase();
        const key = `${rNum}${rSide}`;
        const simSide = rmdSim[key] || {};
        const rRow = STATE.rmdSlots.find(x => x.number === rNum);
        if (rRow) {
          const sd = rRow[rSide];
          let mySlot = null;
          if (sd.cage1 === cage.id) mySlot = 'cage1';
          else if (sd.cage2 === cage.id) mySlot = 'cage2';
          if (mySlot === 'cage1' && sd.cage2 && !rmdBoatDeparting.has(sd.cage2)) {
            // Check if outside cage is already being handled in THIS generated plan
            const handledInThisPlan = scheduledSteps.some(s =>
              s.cage && s.cage.id === sd.cage2 && s.action !== 'no_frame'
            );
            // Also check if outside cage has an existing manually-planned movement
            // that will remove it from RMD before or on the boat date
            const existingPlanForBlocker = STATE.plannedMovements.find(m =>
              !m.completed && m.cageId === sd.cage2 &&
              (m.typeKey === 'rmd-to-frame' || m.typeKey === 'frame-to-frame')
            );
            if (!handledInThisPlan && !existingPlanForBlocker) {
              const blocker = getCage(sd.cage2);
              warnings.push(`⚠ Cage ${cage.name} is in inside slot (${detail} cage1) — blocked by outside cage ${blocker ? blocker.name : sd.cage2}. Remove outside cage first.`);
              blocked = true;
            }
            // If the outside cage is already planned to move, record the earliest
            // date the inside cage can be scheduled (must be after the blocker leaves)
            if (!blocked && existingPlanForBlocker && existingPlanForBlocker.date) {
              const blockerName = getCage(sd.cage2)?.name || sd.cage2;
              warnings.push(`ℹ Cage ${cage.name} (inside slot) — outside cage ${blockerName} already planned to move on ${fmt(existingPlanForBlocker.date)}. Scheduling inside cage after that.`);
              cage._earliestOutDate = existingPlanForBlocker.date;
            }
          }
        }
      }

      if (blocked) {
        scheduledSteps.push({ action: 'no_frame', cage, frame: null, date: boatDate, note: `Blocked by outside cage in RMD — ${detail}` });
        continue;
      }

      const guidedFrameId = guidanceFrameForCage[cage.name.toLowerCase()];
      const frame = guidedFrameId
        ? resolveGuidedFrame(guidedFrameId, cage.name)
        : findBoatFrame(cage, boatDate, boatReservedFrameIds);
      if (frame) {
        boatReservedFrameIds.add(frame.id);
        frameSim[frame.id]?.cages.push(cage.id);
        if (frameSim[frame.id]) frameSim[frame.id].fixedForShipping = true;
        const isReturning = !!frameSim[frame.id]?.returningOn;
        if (needsWaler(cage) && !frame.hasWaler) warnings.push(`⚠ Cage ${cage.name} needs waler but ${frame.name} has none`);
        const retNote = isReturning ? ` [frame returns ${fmt(frameSim[frame.id].returningOn)}]` : '';
        // earliest date = latest of: frame return date, blocker's planned move date
        const frameReturn = frameSim[frame.id]?.returningOn || null;
        const blockerClears = cage._earliestOutDate || null;
        const earliest = [frameReturn, blockerClears].filter(Boolean).sort().pop() || null;
        const day = latestDayByDeadline(boatDate, earliest);
        useMove(day);
        // Free RMD slot in sim — check all 4 slot positions
        if (rmdMatch2) {
