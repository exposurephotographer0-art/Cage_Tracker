let frameFilter = 'all';
let frameSort = 'number';
let frameEditing = null;

function renderFrames() {
  const filtered = STATE.frames.filter(f=> frameFilter==='all' || f.location===frameFilter);

  // Apply sort
  const sortedFiltered = [...filtered].sort((a, b) => {
    if (frameSort === 'return-date') {
      // Frames with a returnDate first, sorted ascending; frames without go to end
      if (a.returnDate && b.returnDate) return a.returnDate.localeCompare(b.returnDate);
      if (a.returnDate) return -1;
      if (b.returnDate) return 1;
    }
    // Default: sort by number extracted from name, then alphabetically
    return a.name.localeCompare(b.name, undefined, {numeric: true});
  });
  const counts = {all:STATE.frames.length, facility:STATE.frames.filter(f=>f.location==='facility').length, boat:STATE.frames.filter(f=>f.location==='boat').length, client:STATE.frames.filter(f=>f.location==='client').length};
  const availCages = STATE.cages.filter(c=>c.location==='facility'||c.location==='rmd'||c.location==='rss').sort((a,b)=>a.name.localeCompare(b.name,undefined,{numeric:true}));

  let cardsHTML = sortedFiltered.map(f=>{
    const fCages = f.cages.map(cid=>getCage(cid)).filter(Boolean);
    const isEditing = frameEditing===f.id;
    const locColors = {facility:'green',boat:'blue',client:'purple'};

    const _frmShipDays = getShipmentDays();
    let cageListHTML = fCages.map(c=>{
      const _shade = shipmentShadeClass(c, _frmShipDays);
      const _bg = _shade ? shipmentShadeBg(_shade)+'border-radius:4px;padding:2px 6px;display:flex;justify-content:space-between;align-items:center;' : (c.shippingPreference2 ? shipPref2SlotBg(c)+'border-radius:4px;padding:2px 6px;display:flex;justify-content:space-between;align-items:center;' : c.shippingPreference ? shipPrefSlotBg(c)+'border-radius:4px;padding:2px 6px;display:flex;justify-content:space-between;align-items:center;' : '');
      const _nc = shipmentShadeNameColor(_shade) || shipPrefNameColor(c);
      return `<div class="frame-cage-item" style="${_bg}">
        <span style="${_nc}">${esc(c.name)} · ${c.width}m · ${hCat(c.height)} · ${lCat(c.length)} · ${c.weight}t${needsWaler(c) ? ' <span style="color:var(--yellow);font-size:10px" title="Cage below waler length threshold — needs waler for shipping">⚠ waler req.</span>' : ''}</span>
        <button class="remove-btn" onclick="removeCageFromFrame('${f.id}','${c.id}')" title="Remove cage from frame">×</button>
      </div>`;
    }).join('');

    let actionsHTML = '';
    if (f.location==='facility' && !isEditing) {
      actionsHTML = `<button class="btn btn-secondary btn-sm btn-block" onclick="frameEditing='${f.id}';render()">Actions ▾</button>`;
    }
    if (isEditing && f.location==='facility') {
      let cageOpts = availCages.map(c=>`<option value="${c.id}">${esc(c.name)} (${c.width}m, ${c.weight}t)</option>`).join('');
      let widthOpts = FRAME_WIDTHS.map(w=>`<option value="${w}" ${f.width===w?'selected':''}>${w}m wide</option>`).join('');
      actionsHTML = `<div class="frame-actions">
        <select onchange="updateFrameWidth('${f.id}',this.value)">${widthOpts}</select>
        ${f.cages.length < 2 ? `<select onchange="assignCageToFrame('${f.id}',this.value);this.value=''"><option value="">+ Add cage...</option>${cageOpts}</select>` : ''}
        <button class="btn ${f.hasWaler?'btn-blue btn-secondary':'btn-secondary'} btn-sm" style="${f.hasWaler?'color:var(--blue);border-color:rgba(91,156,238,0.3)':''}" onclick="toggleWaler('${f.id}')">${f.hasWaler?'🔩 Remove Waler':'+ Add Waler'}</button>
        ${f.cages.length === 1 ? `<button class="btn ${f.fixedForShipping?'btn-danger':'btn-primary'} btn-sm" onclick="toggleShipping('${f.id}')">${f.fixedForShipping?'Unfix from Shipping':'Fix for Shipping'}</button>` : ''}
        <select onchange="updateFrameLoc('${f.id}',this.value)">
          <option value="facility" selected>At Facility</option><option value="boat">On Boat</option><option value="client">With Client</option>
        </select>
        <button class="btn btn-secondary btn-sm" onclick="frameEditing=null;render()">Close</button>
      </div>`;
    }
    if (f.location === 'boat') {
      actionsHTML = `<button class="btn btn-secondary btn-sm btn-block" style="margin-top:6px" onclick="updateFrameLoc('${f.id}','facility')">Return to Facility</button>`;
    }
    if (f.location === 'client') {
      const retDaysLeft = f.returnDate ? Math.ceil((new Date(f.returnDate+'T12:00:00') - new Date()) / 86400000) : null;
      const retBadge = retDaysLeft !== null ? (retDaysLeft < 0 ? '<span style="color:var(--red);font-size:10px">OVERDUE</span>' : retDaysLeft <= 7 ? `<span style="color:var(--orange);font-size:10px">⚠ ${retDaysLeft}d</span>` : `<span style="color:var(--text-muted);font-size:10px">${retDaysLeft}d</span>`) : '';

      // All trips — those with unload dates can be directly linked
      const allTrips = (STATE.boatTrips||[]).sort((a,b)=>(a.unloadDate||a.returnDate||'').localeCompare(b.unloadDate||b.returnDate||''));
      const tripOpts = allTrips.map(t => {
        const sel = f.returnTripId === t.id ? 'selected' : '';
        const dateInfo = t.unloadDate ? ` — Unload: ${fmt(t.unloadDate)}` : t.returnDate ? ` — Return: ${fmt(t.returnDate)}` : ' (no unload date)';
        return `<option value="${t.id}" ${sel}>${esc(t.label||'Unnamed')}${dateInfo}</option>`;
      }).join('');
      const noTripsMsg = allTrips.length === 0 ? '<option value="" disabled>No trips configured — add via Shipping tab</option>' : '';
      const linkedTrip = f.returnTripId ? getBoatTrip(f.returnTripId) : null;

      actionsHTML = `<div style="margin-top:8px">
        <label style="font:600 9px var(--font-mono);color:var(--text-muted);text-transform:uppercase;letter-spacing:.06em;margin-bottom:3px;display:block">🚢 Return Trip (direct link)</label>
        <div style="display:flex;gap:6px;align-items:center;margin-bottom:6px">
          <select style="flex:1;font-size:11px;padding:4px 8px" onchange="setFrameReturnTrip('${f.id}',this.value)">
            <option value="" ${!f.returnTripId?'selected':''}>— Not linked to trip —</option>
            ${noTripsMsg}
            ${tripOpts}
          </select>
          ${linkedTrip && linkedTrip.unloadDate ? `<span style="font-size:10px;white-space:nowrap;font-family:var(--font-mono);color:#0e7490">${fmt(linkedTrip.unloadDate)}</span>` : ''}
          ${retBadge}
        </div>
        <button class="btn btn-primary btn-sm btn-block" onclick="returnFromClient('${f.id}')">🏭 Return to Facility (unload cage)</button>
      </div>`;
    }

    return `<div class="card frame-card ${f.fixedForShipping?'shipping-ready':''}">
      <div class="flex-between" style="margin-bottom:4px">
        <span class="frame-name">${esc(f.name)}</span>
        <span class="badge badge-${locColors[f.location]||'accent'}">${f.location}</span>
      </div>
      <div class="frame-meta">
        Width: <span style="color:var(--text-secondary);font-family:var(--font-mono)">${f.width}m</span>
        ${f.hasWaler ? '<span class="badge badge-blue" style="margin-left:6px">🔩 WALER</span>' : '<span class="badge badge-yellow" style="margin-left:6px;opacity:0.5">NO WALER</span>'}
        ${f.fixedForShipping ? '<span class="badge badge-accent" style="margin-left:6px">✓ SHIPPING</span>' : ''}
      </div>
      ${cageListHTML}
      ${actionsHTML}
    </div>`;
  }).join('');

  const _framesTabShipDays = getShipmentDays();

  // Utilisation stats
  const totalFrames = STATE.frames.length;
  const loaded2 = STATE.frames.filter(f=>f.cages.length===2).length;
  const loaded1 = STATE.frames.filter(f=>f.cages.length===1).length;
  const empty = STATE.frames.filter(f=>f.cages.length===0&&f.location==='facility').length;
  const away = STATE.frames.filter(f=>f.location!=='facility').length;
  const readyShip = STATE.frames.filter(f=>f.fixedForShipping&&f.location==='facility').length;
  const p2 = totalFrames ? Math.round(loaded2/totalFrames*100) : 0;
  const p1 = totalFrames ? Math.round(loaded1/totalFrames*100) : 0;
  const pE = totalFrames ? Math.round(empty/totalFrames*100) : 0;
  const pA = totalFrames ? Math.round(away/totalFrames*100) : 0;

  const utilHTML = totalFrames === 0 ? '' : `
    <div class="card" style="margin-bottom:12px;padding:12px 16px">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
        <span style="font:700 12px var(--font-mono);color:var(--accent)">Frame Utilisation — ${totalFrames} total</span>
        <span style="font-size:11px;color:var(--text-muted)">${readyShip} ready to ship</span>
      </div>
      <div class="frame-util-bar">
        ${p2>0?`<div class="frame-util-segment" style="width:${p2}%;background:var(--green)" title="${loaded2} fully loaded (2 cages)"></div>`:''}
        ${p1>0?`<div class="frame-util-segment" style="width:${p1}%;background:var(--orange)" title="${loaded1} half loaded (1 cage)"></div>`:''}
        ${pE>0?`<div class="frame-util-segment" style="width:${pE}%;background:var(--border)" title="${empty} empty at facility"></div>`:''}
        ${pA>0?`<div class="frame-util-segment" style="width:${pA}%;background:var(--purple);opacity:0.6" title="${away} away (boat/client)"></div>`:''}
      </div>
      <div style="display:flex;gap:14px;margin-top:6px;font-size:11px;flex-wrap:wrap">
        <span style="color:var(--green)">● ${loaded2} full (2 cages)</span>
        <span style="color:var(--orange)">● ${loaded1} partial (1 cage)</span>
        <span style="color:var(--text-muted)">● ${empty} empty</span>
        <span style="color:var(--purple)">● ${away} away</span>
      </div>
    </div>`;

  return `
    <h2 class="section-title">Frame Management</h2>
    ${utilHTML}
    ${shipmentLegendHTML(_framesTabShipDays)}
    <div class="filter-bar">
      ${['all','facility','boat','client'].map(f=>`
        <button class="filter-btn ${frameFilter===f?'active':''}" onclick="frameFilter='${f}';render()">${f==='all'?'All':f.charAt(0).toUpperCase()+f.slice(1)} (${counts[f]})</button>
      `).join('')}
      <div style="width:1px;height:20px;background:var(--border);margin:0 4px"></div>
      <span style="font:600 10px var(--font-mono);color:var(--text-muted);text-transform:uppercase;white-space:nowrap">Sort:</span>
      <button class="filter-btn ${frameSort==='number'?'active':''}" onclick="frameSort='number';render()" title="Sort by frame number"># Number</button>
      <button class="filter-btn ${frameSort==='return-date'?'active':''}" onclick="frameSort='return-date';render()" title="Sort by expected return date (frames with client/boat first)">📅 Return Date</button>
    </div>
    <div class="frame-grid">${cardsHTML}</div>
  `;
}

function updateFrameWidth(fid,w) { const f=getFrame(fid); f.width=parseFloat(w); render(); saveFrame(f); }
async function updateFrameLoc(fid,loc) {
  const f=getFrame(fid);
  f.location=loc;
  if(loc!=='facility') f.fixedForShipping=false;
  // Clear returnDate when frame returns to facility
  if(loc==='facility') f.returnDate = null;
  if(loc!=='facility') {
    f.cages.forEach(cid=>{
      const c=getCage(cid);
      if(c) { c.location = loc==='boat'||loc==='client' ? 'shipped' : 'facility'; c.locationDetail = loc==='boat'?'In transit':loc==='client'?'With client':''; if (loc!=='facility') c.departureDate = null; }
    });
  } else {
    // Returning to facility via dropdown — cages were already cleared at markDelivered, nothing to do
  }
  render();
  await saveFrame(f);
  await Promise.all(f.cages.map(cid => { const c=getCage(cid); return c ? saveCage(c) : Promise.resolve(); }));
}
async function assignCageToFrame(fid,cid) {
  if(!cid) return;
  const f=getFrame(fid), c=getCage(cid);
  if(f.cages.length>=2) return alert('Frame already has max cages.');
  if(f.cages.length===1) {
    const ex=getCage(f.cages[0]);
    if(ex && !canFitTwo(ex,c,f.width)) return alert(`Cannot fit both cages. Need combined width + 0.2m ≤ ${f.width}m and each ≤ 14t.`);
  }
  f.cages.push(cid);
  c.location='frame'; c.locationDetail=f.name;
  // Remove from any RMD slot
  STATE.rmdSlots.forEach(r=>{ SIDES.forEach(s=>{ if(r[s].cage1===cid) r[s].cage1=null; if(r[s].cage2===cid) r[s].cage2=null; }); });
  if(STATE.rssCages) STATE.rssCages = STATE.rssCages.filter(id=>id!==cid);
  render();
  await saveFrame(f);
  await saveCage(c);
  await saveRMD();
}
async function removeCageFromFrame(fid,cid) {
  const f=getFrame(fid), c=getCage(cid);
  f.cages=f.cages.filter(id=>id!==cid); f.fixedForShipping=false;
  if(c) {
    if(f.location==='boat'||f.location==='client') {
      c.location='shipped'; c.locationDetail='Removed from '+f.name+' (away)';
    } else {
      c.location='facility'; c.locationDetail='';
    }
  }
  render();
  await saveFrame(f);
  if(c) await saveCage(c);
}
function toggleWaler(fid) {
  const f=getFrame(fid);
  f.hasWaler = !f.hasWaler;
  render(); saveFrame(f);
}
function toggleShipping(fid) {
  const f=getFrame(fid);
  if(!f.fixedForShipping && f.cages.length!==1) return alert('Exactly 1 cage must be in frame for shipping.');
  if(!f.fixedForShipping) {
    const cage = getCage(f.cages[0]);
    if(cage && needsWaler(cage) && !f.hasWaler) {
      return alert(`Cage "${cage.name}" is ${cage.length}m long (below ${STATE.settings.walerLengthThreshold||6.5}m threshold) and requires a waler on the frame for shipping. Please add a waler first.`);
    }
  }
  f.fixedForShipping = !f.fixedForShipping;
  render(); saveFrame(f);
}

async function setFrameReturnDate(fid, dateStr) {
  const f = getFrame(fid);
  if (!f) return;
  f.returnDate = dateStr || null;
  render();
  await saveFrame(f);
}

async function setFrameReturnTrip(fid, tripId) {
  const f = getFrame(fid);
  if (!f) return;
  if (!tripId) {
    f.returnTripId = null;
    f.returnDate = null;
  } else {
    const trip = getBoatTrip(tripId);
    f.returnTripId = tripId;
    // Sync returnDate from trip's unload date (or returnDate as fallback)
    f.returnDate = trip ? (trip.unloadDate || trip.returnDate || null) : null;
  }
  render();
  await saveFrame(f);
}

// ═══════════════════════════════════════════════════════════════════════════════
// RMD STORAGE
// ═══════════════════════════════════════════════════════════════════════════════
function renderRMD() {
  const RMD_MAX_LENGTH = 13;
  const avail = STATE.cages.filter(c=>c.location==='facility').sort((a,b)=>a.name.localeCompare(b.name,undefined,{numeric:true}));
  const _rmdTabShipDays = getShipmentDays();

  function getSideGroupLength(sideObj, ...slots) {
    return slots.reduce((sum,s)=>{ const c=sideObj[s]?getCage(sideObj[s]):null; return sum+(c?c.length||0:0); },0);
  }

  function filteredCageOpts(sideObj, groupSlots, ownSlot) {
    const usedLen = getSideGroupLength(sideObj, ...groupSlots.filter(s=>s!==ownSlot));
    return avail.filter(c=>(c.length||0)+usedLen<=RMD_MAX_LENGTH)
      .map(c=>`<option value="${c.id}">${esc(c.name)} (${hCat(c.height)}, ${c.height}m, len:${c.length}m)</option>`).join('');
  }

  function renderSlotEl(idx, r, side, slot, posLabel, groupSlots) {
    const sideObj = r[side];
    const cid = sideObj[slot];
    const cage = cid ? getCage(cid) : null;
    if(cage) {
      const _ts = shipmentShadeClass(cage, _rmdTabShipDays);
      const _tBg = _ts ? shipmentShadeBg(_ts)+'border-radius:4px;padding:1px 4px;' : (cage.shippingPreference2 ? shipPref2SlotBg(cage)+'border-radius:4px;padding:1px 4px;' : cage.shippingPreference ? shipPrefSlotBg(cage)+'border-radius:4px;padding:1px 4px;' : '');
      return `<div class="rmd-slot" style="${_tBg}">
        <span class="rmd-slot-label">${posLabel}</span>
        <div class="rmd-slot-content">
          <span class="rmd-cage-info"><span class="rmd-cage-name" style="${shipmentShadeNameColor(_ts)||shipPrefNameColor(cage)}">${esc(cage.name)}</span><span class="rmd-cage-detail" style="${shipmentShadeDetailColor(_ts)}">${cage.width}m · ${hCat(cage.height)} · ${lCat(cage.length)} · ${cage.weight}t</span></span>
          <button class="remove-btn" onclick="removeFromRMD(${idx},'${side}','${slot}')">×</button>
        </div>
      </div>`;
    } else {
      const usedLen = getSideGroupLength(sideObj, ...groupSlots.filter(s=>s!==slot));
      const remaining = (RMD_MAX_LENGTH-usedLen).toFixed(1);
      const opts = filteredCageOpts(sideObj, groupSlots, slot);
      const gs = groupSlots.join(',');
      return `<div class="rmd-slot">
        <span class="rmd-slot-label">${posLabel}</span>
        <select style="flex:1;font-size:11px;padding:4px 8px;min-width:0;background:var(--bg-input);border:1px solid var(--border);border-radius:4px;color:var(--text-primary)" onchange="assignToRMD(${idx},'${side}','${slot}',this.value,'${gs}');this.value=''">
          <option value="">— empty (≤${remaining}m) —</option>${opts}
        </select>
      </div>`;
    }
  }

  let rmdHTML = STATE.rmdSlots.map((r,idx)=>{
    const cnt = [r.A.cage1,r.A.cage2,r.B.cage1,r.B.cage2].filter(Boolean).length;
    let sidesHTML = SIDES.map(side=>{
      const sObj = r[side];
      const insideLen = getSideGroupLength(sObj,'cage1');
      const outsideLen = getSideGroupLength(sObj,'cage2');
      const iBar = `<span style="font-size:9px;color:${insideLen>RMD_MAX_LENGTH?'var(--red)':'var(--text-muted)'};font-family:var(--font-mono);margin-left:4px">${insideLen.toFixed(1)}/${RMD_MAX_LENGTH}m</span>`;
      const oBar = `<span style="font-size:9px;color:${outsideLen>RMD_MAX_LENGTH?'var(--red)':'var(--text-muted)'};font-family:var(--font-mono);margin-left:4px">${outsideLen.toFixed(1)}/${RMD_MAX_LENGTH}m</span>`;
      return `<div style="margin-bottom:10px">
        <div style="font:700 10px var(--font-mono);color:var(--text-muted);margin-bottom:5px">SIDE ${side}</div>
        <div style="font:600 9px var(--font-mono);color:var(--blue);margin-bottom:3px;padding:2px 4px;background:rgba(37,99,176,0.06);border-radius:3px">INSIDE ${iBar}</div>
        <div style="display:flex;gap:6px;margin-bottom:6px">
          <div style="flex:1;min-width:0">${renderSlotEl(idx,r,side,'cage1','Inside',['cage1'])}</div>
        </div>
        <div style="font:600 9px var(--font-mono);color:var(--green);margin-bottom:3px;padding:2px 4px;background:rgba(26,138,74,0.06);border-radius:3px">OUTSIDE ${oBar}</div>
        <div style="display:flex;gap:6px">
          <div style="flex:1;min-width:0">${renderSlotEl(idx,r,side,'cage2','Outside',['cage2'])}</div>
        </div>
      </div>`;
    }).join('');
    return `<div class="card">
      <div class="flex-between" style="margin-bottom:10px">
        <span style="font:700 16px var(--font-mono);color:var(--accent)">RMD-${r.number}</span>
        <span style="font-size:11px;color:var(--text-muted)">${cnt}/4 occupied</span>
      </div>
      ${sidesHTML}
      ${r.A.overridden||r.B.overridden ? '<span class="badge badge-yellow">⚠ Override Active</span>' : ''}
    </div>`;
  }).join('');

  return `
    <div style="display:flex;justify-content:flex-end;margin-bottom:10px">
      <div id="zoom-bar-rmd">${zoomBarHTML('rmd')}</div>
    </div>
    <div id="zoom-outer-rmd" class="zoom-outer">
      <div id="zoom-wrap-rmd" class="zoom-wrap">
        <h2 class="section-title">RMD Storage Bays</h2>
        <div style="font-size:12px;color:var(--text-muted);margin-bottom:16px">Each side has 1 inside and 1 outside space. Valid pairings: Short+Short, Medium+Medium, Tall (inside) + Short (outside), or Medium (inside) + Short (outside). To remove the inside cage, the outside cage must come out first.</div>
        ${shipmentLegendHTML(_rmdTabShipDays)}
        <div class="rmd-site-layout">
          ${RMD_LAYOUT.map(row=>{
            let items = row.items.map(item=>{
              const idx2 = STATE.rmdSlots.findIndex(rr=>rr.number===item);
              const r2 = STATE.rmdSlots[idx2];
              if(!r2) return '';
              const cnt2 = [r2.A.cage1,r2.A.cage2,r2.B.cage1,r2.B.cage2].filter(Boolean).length;

              function renderCompact(side, slot, posLabel) {
                const sObj2 = r2[side];
                const cid2 = sObj2[slot];
                const cage2 = cid2 ? getCage(cid2) : null;
                if(cage2) {
                  const _s = shipmentShadeClass(cage2, _rmdTabShipDays);
                  const _b = _s ? shipmentShadeBg(_s)+'border-radius:4px;padding:1px 4px;' : (cage2.shippingPreference2 ? shipPref2SlotBg(cage2)+'border-radius:4px;padding:1px 4px;' : cage2.shippingPreference ? shipPrefSlotBg(cage2)+'border-radius:4px;padding:1px 4px;' : '');
                  const _nc = shipmentShadeNameColor(_s) || shipPrefNameColor(cage2);
                  return '<div class="rmd-slot" style="'+_b+'"><span class="rmd-slot-label">'+posLabel+'</span><div class="rmd-slot-content"><span class="rmd-cage-info"><span class="rmd-cage-name" style="'+_nc+'">'+esc(cage2.name)+'</span><span class="rmd-cage-detail" style="'+shipmentShadeDetailColor(_s)+'">'+cage2.width+'m·'+hCat(cage2.height)+'·'+lCat(cage2.length)+'·'+cage2.weight+'t</span></span><button class="remove-btn" onclick="removeFromRMD('+idx2+',\''+side+'\',\''+slot+'\')">&#215;</button></div></div>';
                } else {
                  const rem2 = RMD_MAX_LENGTH.toFixed(1);
                  const opts2 = avail.filter(c2=>(c2.length||0)<=RMD_MAX_LENGTH).map(c2=>`<option value="${c2.id}">${esc(c2.name)} (${c2.length}m)</option>`).join('');
                  return '<div class="rmd-slot"><span class="rmd-slot-label">'+posLabel+'</span><select class="rmd-slot" style="flex:1;font-size:11px;padding:4px 8px" onchange="assignToRMD('+idx2+',\''+side+'\',\''+slot+'\',this.value,\''+slot+'\');this.value=\'\'"><option value="">≤'+rem2+'m</option>'+opts2+'</select></div>';
                }
              }

              const insA = getSideGroupLength(r2.A,'cage1');
              const outA = getSideGroupLength(r2.A,'cage2');
              const insB = getSideGroupLength(r2.B,'cage1');
              const outB = getSideGroupLength(r2.B,'cage2');
              const sideAhtml = '<div style="margin-bottom:8px"><div style="font:700 10px var(--font-mono);color:var(--text-muted);margin-bottom:4px">SIDE A</div>'
                + '<div style="font:600 8px var(--font-mono);color:var(--blue);margin-bottom:3px">INSIDE ('+insA.toFixed(1)+'m)</div>'
                + '<div style="margin-bottom:4px">'+renderCompact('A','cage1','IN')+'</div>'
                + '<div style="font:600 8px var(--font-mono);color:var(--green);margin-bottom:3px">OUTSIDE ('+outA.toFixed(1)+'m)</div>'
                + renderCompact('A','cage2','OUT')
                + '</div>';
              const sideBhtml = '<div><div style="font:700 10px var(--font-mono);color:var(--text-muted);margin-bottom:4px">SIDE B</div>'
                + '<div style="font:600 8px var(--font-mono);color:var(--blue);margin-bottom:3px">INSIDE ('+insB.toFixed(1)+'m)</div>'
                + '<div style="margin-bottom:4px">'+renderCompact('B','cage1','IN')+'</div>'
                + '<div style="font:600 8px var(--font-mono);color:var(--green);margin-bottom:3px">OUTSIDE ('+outB.toFixed(1)+'m)</div>'
                + renderCompact('B','cage2','OUT')
                + '</div>';

              return '<div class="rmd-site-card"><div class="card"><div class="flex-between" style="margin-bottom:8px"><span style="font:700 16px var(--font-mono);color:var(--accent)">RMD-'+r2.number+'</span><span style="font-size:11px;color:var(--text-muted)">'+cnt2+'/4</span></div>'+sideAhtml+sideBhtml+(r2.A.overridden||r2.B.overridden?'<span class="badge badge-yellow">⚠ Override</span>':'')+'</div></div>';
            }).join('');
            return '<div class="rmd-site-row row-'+row.row+'">'+items+'</div>';
          }).join('')}
          ${renderRSSPanel(avail)}
        </div>
      </div>
    </div>
  `;
}

async function assignToRMD(idx,side,slot,cid,groupSlotsStr) {
  if(!cid) return;
  const r = STATE.rmdSlots[idx];
  const cage = getCage(cid);
  if(!cage) return;
  // Check 13m length constraint for the group
  const RMD_MAX_LENGTH = 13;
  // 13m length check (single cage per slot)
  if((cage.length||0) > RMD_MAX_LENGTH) {
    alert(`Cannot assign: cage length (${(cage.length||0).toFixed(1)}m) exceeds ${RMD_MAX_LENGTH}m RMD limit.`);
    return;
  }
  // Pairing check: cage1 (inside) pairs with cage2 (outside)
  const pairSlot = slot==='cage1' ? 'cage2' : 'cage1';
  const pairCid = r[side][pairSlot];
  if (pairCid) {
    const other = getCage(pairCid);
    if (other && !canPairRMD(
        slot==='cage1' ? cage : other,   // inside
        slot==='cage1' ? other : cage    // outside
      )) {
      if (!confirm(`Height pairing ${hCat(cage.height)} + ${hCat(other.height)} not standard. Override?`)) return;
      r[side].overridden = true;
    }
  }
  r[side][slot] = cid;
  cage.location = 'rmd';
  cage.locationDetail = `${r.number}${side}`;
  render();
  await saveCage(cage);
  await saveRMD();
}

async function removeFromRMD(idx,side,slot) {
  const cid = STATE.rmdSlots[idx][side][slot];
  if(!cid) return;
  STATE.rmdSlots[idx][side][slot] = null;
  const c = getCage(cid);
  if(c) { c.location='facility'; c.locationDetail=''; }
  render();
  if(c) await saveCage(c);
  await saveRMD();
}

const MOVE_TYPES = [
  {value:'facility-to-frame', label:'Facility → Frame'},
  {value:'frame-to-frame',    label:'Frame → Frame'},
  {value:'frame-to-rmd',      label:'Frame → RMD / Roof Slab'},

// Called when cage is selected in RMD→Frame form — auto-selects best fitting frame
function updateFrameSuggestion(cageId) {
  const cage = getCage(cageId);
  const frameEl = document.getElementById('pf-frame');
  if (!cage || !frameEl) return;

  // Find best frame: must fit cage width, prefer smallest adequate frame, check waler
  const sortedFrames = [...STATE.frames]
    .filter(f => f.location === 'facility' && f.cages.length < 2 && cage.width <= f.width)
    .sort((a, b) => {
      // Prefer frames that already have a compatible cage (better space usage)
      const aHas = a.cages.length;
      const bHas = b.cages.length;
      if (aHas !== bHas) return bHas - aHas; // prefer frames that already have one cage
      return a.width - b.width; // then smallest adequate width
    });

  // Waler check — prefer frames with waler if needed
  let best = null;
  if (needsWaler(cage)) {
    best = sortedFrames.find(f => f.hasWaler && (f.cages.length === 0 || canFitTwo(getCage(f.cages[0]), cage, f.width)));
  }
  if (!best) {
    best = sortedFrames.find(f => f.cages.length === 0 || canFitTwo(getCage(f.cages[0]), cage, f.width));
  }

  if (best) {
    frameEl.value = best.id;
    // Briefly highlight the dropdown
    frameEl.style.borderColor = 'var(--accent)';
    frameEl.style.background = '#fdfaf0';
    setTimeout(() => { frameEl.style.borderColor = ''; frameEl.style.background = ''; }, 2000);
  }
}

function buildPlanFormHTML() {
  const typeOpts = MOVE_TYPES.map(t=>`<option value="${t.value}" ${planFormType===t.value?'selected':''}>${t.label}</option>`).join('');

  // Build cage options based on movement type
  let cageOpts = '';
  let frameOpts = '';
  let showFrame = true;
  let showRmd = false;

  if (planFormType === 'frame-to-frame') {
    // Cages currently in frames at facility (or pending into a frame)
    const pendingInFrameCageIds = new Set(
      STATE.plannedMovements.filter(m => !m.completed && m.typeKey === 'facility-to-frame').map(m => m.cageId)
    );
    const inFrameCages = STATE.cages.filter(c =>
      c.location === 'frame' || (c.location === 'facility' && pendingInFrameCageIds.has(c.id))
    ).sort((a,b) => a.name.localeCompare(b.name, undefined, {numeric:true}));
    cageOpts = inFrameCages.map(c => {
      const currentFrame = STATE.frames.find(f => f.cages.includes(c.id));
      const lbl = currentFrame ? `in ${currentFrame.name}` : '(pending → frame)';
      return `<option value="${c.id}">${esc(c.name)} (${lbl})</option>`;
    }).join('');
    // Destination frames: facility frames + frames with a return date (pre-plan)
    const plannedToFrame_ftf = new Set(
      STATE.plannedMovements.filter(m => !m.completed && m.frameId && (m.typeKey === 'rmd-to-frame' || m.typeKey === 'facility-to-frame' || m.typeKey === 'frame-to-frame')).map(m => m.frameId)
    );
    frameOpts = STATE.frames.filter(f => f.location === 'facility' || (f.returnDate && f.location !== 'facility')).sort((a,b) => a.name.localeCompare(b.name, undefined, {numeric:true})).map(f => {
      const plannedNote = plannedToFrame_ftf.has(f.id) ? ' 📋 move planned' : '';
      if (f.location !== 'facility') {
        const returnNote = f.returnDate ? ` ↩ returns ${fmt(f.returnDate)}` : ' (away)';
        return `<option value="${f.id}">${esc(f.name)} (${f.width}m${f.hasWaler ? " 🔩" : ""})${returnNote} — pre-plan${plannedNote}</option>`;
      }
      const fullNote = f.cages.length >= 2 ? ' ⚠ FULL' : f.cages.length === 1 ? ` (has ${getCage(f.cages[0])?.name || '?'})` : ' (empty)';
      return `<option value="${f.id}">${esc(f.name)} (${f.width}m${f.hasWaler ? " 🔩" : ""})${fullNote}${plannedNote}</option>`;
    }).join('');
    showFrame = true;
    showRmd = false;
  } else if (planFormType === 'facility-to-frame') {
    // Cages in facility
    cageOpts = [...STATE.cages.filter(c=>c.location==='facility')].sort((a,b)=>a.name.localeCompare(b.name,undefined,{numeric:true})).map(c=>`<option value="${c.id}">${esc(c.name)} (${hCat(c.height)}, ${c.width}m)</option>`).join('');
    // Include ALL facility frames + frames with a return date (pre-plan for when they return)
    frameOpts = STATE.frames.filter(f=>f.location==='facility' || (f.returnDate && f.location !== 'facility')).sort((a,b)=>a.name.localeCompare(b.name,undefined,{numeric:true})).map(f=>{
      if (f.location !== 'facility') {
        const returnNote = f.returnDate ? ` ↩ returns ${fmt(f.returnDate)}` : ' (away)';
        return `<option value="${f.id}">${esc(f.name)} (${f.width}m${f.hasWaler ? " 🔩" : ""})${returnNote} — pre-plan</option>`;
      }
      const fullNote = f.cages.length >= 2 ? ' ⚠ FULL' : f.cages.length === 1 ? ' (1 cage)' : ' (empty)';
      return `<option value="${f.id}">${esc(f.name)} (${f.width}m${f.hasWaler ? " 🔩" : ""})${fullNote}</option>`;
    }).join('');
    showRmd = false;
  } else if (planFormType === 'frame-to-rmd') {
    // Cages in frames, PLUS cages in facility that have a pending facility-to-frame movement planned
    const pendingInFrameCageIds = new Set(
      STATE.plannedMovements
        .filter(m => !m.completed && m.typeKey === 'facility-to-frame')
        .map(m => m.cageId)
    );
    const frameOrPendingCages = STATE.cages.filter(c =>
      c.location === 'frame' || (c.location === 'facility' && pendingInFrameCageIds.has(c.id))
    ).sort((a,b)=>a.name.localeCompare(b.name,undefined,{numeric:true}));
    cageOpts = frameOrPendingCages.map(c => {
      const label = c.location === 'frame' ? c.locationDetail : `(pending → frame)`;
      return `<option value="${c.id}">${esc(c.name)} (${label})</option>`;
    }).join('');
    showFrame = false;
    showRmd = true;
  } else if (planFormType === 'rmd-to-frame') {
    // Cages in RMD
    cageOpts = [...STATE.cages.filter(c=>c.location==='rmd'||c.location==='rss')].sort((a,b)=>a.name.localeCompare(b.name,undefined,{numeric:true})).map(c=>`<option value="${c.id}">${esc(c.name)} (${c.locationDetail})</option>`).join('');
    frameOpts = STATE.frames.filter(f=>(f.location==='facility'&&f.cages.length<2) || (f.returnDate && f.location !== 'facility')).sort((a,b)=>a.name.localeCompare(b.name,undefined,{numeric:true})).map(f=>{
      if (f.location !== 'facility') {
        const returnNote = f.returnDate ? ` ↩ returns ${fmt(f.returnDate)}` : ' (away)';
        return `<option value="${f.id}">${esc(f.name)} (${f.width}m${f.hasWaler ? " 🔩" : ""})${returnNote} — pre-plan</option>`;
      }
      return `<option value="${f.id}">${esc(f.name)} (${f.width}m${f.hasWaler ? " 🔩" : ""})</option>`;
    }).join('');
    showRmd = false;
  } else if (planFormType === 'rss-to-frame') {
    // Cages in Roof Slab Storage
    cageOpts = [...STATE.cages.filter(c=>c.location==='rss')].sort((a,b)=>a.name.localeCompare(b.name,undefined,{numeric:true})).map(c=>`<option value="${c.id}">${esc(c.name)} (Roof Slab Storage)</option>`).join('');
    frameOpts = STATE.frames.filter(f=>f.location==='facility' || (f.returnDate && f.location !== 'facility')).sort((a,b)=>a.name.localeCompare(b.name,undefined,{numeric:true})).map(f=>{
      if (f.location !== 'facility') {
        const returnNote = f.returnDate ? ` ↩ returns ${fmt(f.returnDate)}` : ' (away)';
        return `<option value="${f.id}">${esc(f.name)} (${f.width}m${f.hasWaler ? " 🔩" : ""})${returnNote} — pre-plan</option>`;
      }
      return `<option value="${f.id}">${esc(f.name)} (${f.width}m${f.hasWaler ? " 🔩" : ""})</option>`;
    }).join('');
    showRmd = false;
  } else if (planFormType === 'rmd-to-rss') {
    cageOpts = [...STATE.cages.filter(c=>c.location==='rmd')].sort((a,b)=>a.name.localeCompare(b.name,undefined,{numeric:true})).map(c=>`<option value="${c.id}">${esc(c.name)} (${c.locationDetail})</option>`).join('');
    showFrame = false;
    showRmd = false;
  } else if (planFormType === 'rss-to-rmd') {
    cageOpts = [...STATE.cages.filter(c=>c.location==='rss')].sort((a,b)=>a.name.localeCompare(b.name,undefined,{numeric:true})).map(c=>`<option value="${c.id}">${esc(c.name)} (Roof Slab Storage)</option>`).join('');
    showFrame = false;
    showRmd = true;
  } else if (planFormType === 'frame-fix-shipping') {
    // Only cages that are alone in a frame (exactly 1 cage in frame)
    const singleCageFrames = STATE.frames.filter(f=>f.location==='facility' && f.cages.length===1 && !f.fixedForShipping);
    cageOpts = singleCageFrames.map(f=>{
      const c = getCage(f.cages[0]);
      return c ? `<option value="${c.id}">${esc(c.name)} (in ${esc(f.name)})</option>` : '';
    }).filter(Boolean).join('');
    showFrame = false;
    showRmd = false;
  } else if (planFormType === 'frame-return-from-client') {
    // Frames currently with client or on boat
    cageOpts = '';
    frameOpts = STATE.frames.filter(f=>f.location==='client'||f.location==='boat').sort((a,b)=>a.name.localeCompare(b.name,undefined,{numeric:true})).map(f=>`<option value="${f.id}">${esc(f.name)} (${f.width}m${f.hasWaler ? ' 🔩' : ''} — ${f.location})</option>`).join('');
    showFrame = true;
    showRmd = false;
  }

  // Build RMD slot dropdown options for Frame-to-RMD — show ALL slots so multi-move planning works
  let rmdSlotOpts = '';
  if (planFormType === 'frame-to-rmd' || planFormType === 'rss-to-rmd') {
    const sortedRmd = [...STATE.rmdSlots].sort((a,b)=>a.number-b.number);
    // Count planned frame-to-rmd moves per side key so we can show how many are already queued
    const plannedToRmd = {};
    STATE.plannedMovements.filter(m => !m.completed && m.typeKey === 'frame-to-rmd' && m.rmdSlot).forEach(m => {
      const key = String(m.rmdSlot).replace(/\s/g,'');
      plannedToRmd[key] = (plannedToRmd[key] || 0) + 1;
    });
    sortedRmd.forEach(r => {
      [...SIDES].sort().forEach(side => {
        const sideKey = r.number + side;
        const occupiedCids = [r[side].cage1, r[side].cage2].filter(Boolean);
        const occupiedCount = occupiedCids.length;
        const plannedCount = plannedToRmd[sideKey] || 0;
        const effectiveOccupied = occupiedCount + plannedCount;
        const cageNames = occupiedCids.map(cid => { const c = getCage(cid); return c ? c.name : '?'; });
        const occupancyNote = occupiedCount === 0 ? 'empty' : 'has: ' + cageNames.join(', ');
        const plannedNote = plannedCount > 0 ? ' \u00b7 ' + plannedCount + ' move' + (plannedCount>1?'s':'') + ' planned' : '';
        const fullWarning = effectiveOccupied >= 4 ? ' \u26a0 FULL' : '';
        rmdSlotOpts += '<option value="' + sideKey + '">RMD-' + r.number + side + ' (' + occupancyNote + plannedNote + fullWarning + ')</option>';
      });
    });
    // Add Roof Slab Storage as a special option
    rmdSlotOpts = '<option value="RSS">🏗 Roof Slab Storage (no slot rules)</option>' + rmdSlotOpts;
    if (!rmdSlotOpts.includes('RMD')) rmdSlotOpts = '<option value="" disabled>No RMD slots configured</option>';
  }

  // For RMD→Frame, annotate frames with suitability note + planned movements
  if (planFormType === 'rmd-to-frame') {
    const plannedToFrame_rtf = new Set(
      STATE.plannedMovements.filter(m => !m.completed && m.frameId && (m.typeKey === 'rmd-to-frame' || m.typeKey === 'facility-to-frame' || m.typeKey === 'frame-to-frame')).map(m => m.frameId)
    );
    frameOpts = STATE.frames.filter(f => f.location === 'facility' || (f.returnDate && f.location !== 'facility')).sort((a,b)=>a.name.localeCompare(b.name,undefined,{numeric:true})).map(f => {
      const plannedNote = plannedToFrame_rtf.has(f.id) ? ' 📋 move planned' : '';

        const returnNote = f.returnDate ? ` ↩ returns ${fmt(f.returnDate)}` : ' (away)';
        return `<option value="${f.id}">${esc(f.name)} (${f.width}m${f.hasWaler ? ' 🔩' : ''})${returnNote} — pre-plan${plannedNote}</option>`;
      }
      const existing = f.cages.length === 1 ? getCage(f.cages[0]) : null;
      const note = f.cages.length >= 2 ? ' ⚠ FULL' : existing ? ` [has ${existing.name}]` : ' [empty]';
      return `<option value="${f.id}">${esc(f.name)} (${f.width}m${f.hasWaler ? ' 🔩' : ''})${note}${plannedNote}</option>`;
    }).join('');
  }

  const frameLbl = planFormType === 'frame-to-frame' ? 'Destination Frame'
    : planFormType === 'rmd-to-frame' ? 'Frame'
    : planFormType === 'frame-return-from-client' ? 'Frame (returning from client)'
    : 'Frame';

  if (!planFormOpen) return '';
  const cageOnChange = planFormType === 'rmd-to-frame' ? 'onchange="updateFrameSuggestion(this.value)"' : '';
  return `<div class="card" id="plan-form">
    <div class="form-grid form-grid-3">
      <div><label>Movement Type</label><select id="pf-type" onchange="onPlanTypeChange(this.value)">${typeOpts}</select></div>
      ${planFormType !== 'frame-return-from-client' ? `<div><label>Cage</label><select id="pf-cage" ${cageOnChange}><option value="">Select cage...</option>${cageOpts}</select></div>` : '<div></div>'}
      ${showFrame ? `<div><label>${frameLbl}</label><select id="pf-frame"><option value="">Select frame...</option>${frameOpts}</select></div>` : '<div id="pf-frame-placeholder"></div>'}
      <div><label>Date</label><input id="pf-date" type="date" value="${todayStr()}"/></div>
      <div><label>Shift</label><select id="pf-shift"><option value="day">Day Shift</option><option value="night">Night Shift</option></select></div>
      ${showRmd ? `<div><label>RMD / Storage Slot</label><select id="pf-rmd"><option value="">Select slot...</option>${rmdSlotOpts}</select></div>` : '<div id="pf-rmd-placeholder"></div>'}
      <div style="grid-column:span 3"><label>Notes</label><input id="pf-notes"/></div>
    </div>
    <div class="form-actions">
      <button class="btn btn-primary" onclick="addMovement()">Add to Plan</button>
      <button class="btn btn-secondary" onclick="planFormOpen=false;render()">Cancel</button>
    </div>
  </div>`;
}

function renderPlanner() {
  const formHTML = buildPlanFormHTML();

  // 2-week days
  const ws = new Date(planWeekStart + 'T12:00:00');
  let weekDays = [];
  for(let i=0;i<14;i++) { const d=new Date(ws); d.setDate(d.getDate()+i); weekDays.push(toISO(d)); }

  // Build departure-date index for visible window
  const depByDay = {};
  STATE.cages.forEach(c => {
    if (c.departureDate && c.location === 'facility') {
      if (!depByDay[c.departureDate]) depByDay[c.departureDate] = [];
      depByDay[c.departureDate].push(c);
    }
  });

  // Build frame return-date index (frames with client that have a returnDate set)
  const returnByDay = {};
  STATE.frames.forEach(f => {
    if (f.returnDate && (f.location === 'client' || f.location === 'boat')) {
      if (!returnByDay[f.returnDate]) returnByDay[f.returnDate] = [];
      returnByDay[f.returnDate].push(f.name);
    }
  });

  // Build boat trip indexes for planner calendar
  const btLoadByDay={}, btDepartByDay={}, btUnloadByDay={}, btReturnByDay={};
  STATE.boatTrips.forEach(t=>{
    if(t.loadDate)   { if(!btLoadByDay[t.loadDate])     btLoadByDay[t.loadDate]=[];     btLoadByDay[t.loadDate].push(t.label); }
    if(t.departDate) { if(!btDepartByDay[t.departDate]) btDepartByDay[t.departDate]=[]; btDepartByDay[t.departDate].push(t.label); }
    if(t.unloadDate) { if(!btUnloadByDay[t.unloadDate]) btUnloadByDay[t.unloadDate]=[]; btUnloadByDay[t.unloadDate].push(t.label); }
    if(t.returnDate) { if(!btReturnByDay[t.returnDate]) btReturnByDay[t.returnDate]=[]; btReturnByDay[t.returnDate].push(t.label); }
  });

  // All movements table — hide completed by default
  let sortedAll = [...STATE.plannedMovements].sort((a,b)=>{
    const ao = a.sortOrder != null ? a.sortOrder : 999999;
    const bo = b.sortOrder != null ? b.sortOrder : 999999;
    if (ao !== bo) return ao - bo;
    return a.date.localeCompare(b.date);
  });

  // Build a global position lookup (pending only, 1-based) used by calendar + table
  const _plannerPosMap = {};
  sortedAll.filter(m => !m.completed).forEach((m, i) => { _plannerPosMap[m.id] = i + 1; });

  function renderWeekDay(day) {
    const dayMoves = STATE.plannedMovements.filter(m=>m.date===day);
    const pending = dayMoves.filter(m=>!m.completed).length;
    const isToday = day===todayStr();
    const dow = new Date(day+'T12:00:00').getDay();
    const isWeekend = dow===0||dow===6;
    const departures = depByDay[day] || [];
    const frameReturns = returnByDay[day] || [];
    const btLoads = btLoadByDay[day] || [];
    const btDeparts = btDepartByDay[day] || [];
    const btUnloads = btUnloadByDay[day] || [];
    const btReturns = btReturnByDay[day] || [];
    const hasMoves = dayMoves.length > 0 || departures.length > 0 || frameReturns.length > 0 || btLoads.length > 0 || btDeparts.length > 0 || btUnloads.length > 0 || btReturns.length > 0;

    let movesHTML = dayMoves.map(m=>{
      const posNum = _plannerPosMap[m.id];
      const numTag = posNum != null ? `<span style="display:inline-flex;align-items:center;justify-content:center;width:14px;height:14px;border-radius:50%;background:rgba(192,133,32,0.2);color:var(--accent);font:700 9px var(--font-mono);flex-shrink:0;margin-right:2px">${posNum}</span>` : '';
      return `<div class="week-move-item ${m.completed?'completed':''}" title="${esc(m.notes||m.description)}" style="${m.typeKey==='frame-return-from-client'?'background:#ecfeff;border:1px solid #a5f3fc;color:#0e7490;':m.typeKey==='frame-to-frame'?'background:#fff3ee;border:1px solid #fdba74;color:#c2410c;':''}">
        ${numTag}${m.typeKey==='frame-return-from-client'?'🚢 ': m.typeKey==='frame-to-frame'?'↕ ': m.shift==='night'?'🌙 ':''}${esc(m.description.slice(0,24))}
      </div>`;
    }).join('');

    return `<div class="week-day ${isToday?'today':''} ${isWeekend&&!hasMoves?'weekend':''} ${hasMoves?'has-moves':''}">
      <div class="week-day-hdr">${fmtShort(day)}</div>
      ${pending>0 ? `<div class="week-move-count ${pending>MAX_MOVES?'over-limit':''}" style="color:${pending>MAX_MOVES?'var(--red)':'var(--green)'}">${pending} moves${pending>MAX_MOVES?' ⚠ OVER':''}</div>` : ''}
      ${departures.map(c=>`<div style="font-size:9px;padding:2px 4px;margin-bottom:1px;border-radius:3px;background:#fce8e8;color:var(--red);border:1px solid #e8b0b0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="Cage ${esc(c.name)} leaves facility — ${c.width}m · ${hCat(c.height)} · ${lCat(c.length)} · ${c.weight}t">🚚 <strong>${esc(c.name)}</strong> <span style="opacity:0.75">${c.width}m · ${hCat(c.height)} · ${lCat(c.length)} · ${c.weight}t</span></div>`).join('')}
      ${frameReturns.map(n=>`<div style="font-size:9px;padding:2px 4px;margin-bottom:1px;border-radius:3px;background:#ecfeff;color:#0e7490;border:1px solid #a5f3fc;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="Frame ${n} expected back">🚢 ${esc(n)} returns</div>`).join('')}
      ${btLoads.map(n=>`<div style="font-size:9px;padding:2px 4px;margin-bottom:1px;border-radius:3px;background:#e0f2fe;color:#075985;border:1px solid #7dd3fc;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="Boat loaded: ${n}">⬇ ${esc(n)}</div>`).join('')}
      ${btDeparts.map(n=>`<div style="font-size:9px;padding:2px 4px;margin-bottom:1px;border-radius:3px;background:#dcfce7;color:#166534;border:1px solid #86efac;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="Boat departs: ${n}">⛵ ${esc(n)}</div>`).join('')}
      ${btUnloads.map(n=>`<div style="font-size:9px;padding:2px 4px;margin-bottom:1px;border-radius:3px;background:#fff7ed;color:#9a3412;border:1px solid #fed7aa;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="Cages unloaded at client: ${n}">📦 ${esc(n)}</div>`).join('')}
      ${btReturns.map(n=>`<div style="font-size:9px;padding:2px 4px;margin-bottom:1px;border-radius:3px;background:#fce7f3;color:#9d174d;border:1px solid #f9a8d4;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="Boat returns: ${n}">🏠 ${esc(n)}</div>`).join('')}
      ${movesHTML}
    </div>`;
  }
  const week1HTML = weekDays.slice(0,7).map(renderWeekDay).join('');
  const week2HTML = weekDays.slice(7).map(renderWeekDay).join('');


  let sorted = plannerShowCompleted ? sortedAll : sortedAll.filter(m => !m.completed);
  const completedCount = sortedAll.filter(m => m.completed).length;
  let tableRows = sorted.length === 0
    ? '<tr><td colspan="9" class="empty-msg" style="text-align:center;padding:20px">' + (plannerShowCompleted ? 'No movements planned' : 'No pending movements — all done!') + '</td></tr>'
    : sorted.map((m, i)=>`
      <tr data-id="${m.id}" draggable="true" style="opacity:${m.completed?'0.5':'1'}" ondragstart="onMoveDragStart(event)" ondragover="onMoveDragOver(event)" ondrop="onMoveDrop(event)" ondragend="onMoveDragEnd(event)" ondragleave="onMoveDragLeave(event)">
        <td style="width:24px;padding:4px 2px"><span class="drag-handle" title="Drag to reorder">⠿</span></td>
        <td style="width:28px;text-align:center;font:700 11px var(--font-mono);color:${m.completed?'var(--text-muted)':'var(--accent)'}">${i+1}</td>
        <td style="font-family:var(--font-mono)">
          ${!m.completed ? `<input type="date" value="${m.date}" title="Click to change date" style="border:none;background:transparent;font:600 12px var(--font-mono);color:var(--accent);cursor:pointer;width:130px;padding:2px 4px;border-radius:4px;border:1px solid transparent" onmouseover="this.style.borderColor='var(--border)'" onmouseout="this.style.borderColor='transparent'" onchange="rescheduleMove('${m.id}',this.value)" />` : `<span>${fmt(m.date)}</span>`}
        </td>
        <td>${m.shift==='night'?'🌙 Night':'☀ Day'}</td>
        <td>${esc(m.type)}</td>
        <td style="font-weight:600;color:var(--text-primary)">${esc(m.description)}</td>
        <td style="color:var(--text-muted)">
          ${esc(m.notes||'')}
          ${m.completed && m.completionNote ? `<div style="font-style:italic;font-size:10px;color:var(--purple)">"${esc(m.completionNote)}"</div>` : ''}
          ${!m.completed ? `<input class="move-note-edit" placeholder="Add note…" value="${esc(m.completionNote||'')}" onchange="setMoveNote('${m.id}',this.value)" title="Completion note (saved when you tick done)"/>` : ''}
        </td>
        <td><span class="badge ${m.completed?'badge-green':'badge-yellow'}">${m.completed?'Done':'Pending'}</span></td>
        <td style="white-space:nowrap">
          ${!m.completed ? `<button class="btn btn-primary btn-xs" onclick="completeMove('${m.id}')">✓</button> ` : ''}
          <button class="btn btn-danger btn-xs" onclick="deleteMove('${m.id}')">Del</button>
        </td>
      </tr>`).join('');

  // Build RMD & Frame summary sidebar for planner
  const _plannerShipDays = getShipmentDays();
  let rmdSummary = STATE.rmdSlots.map(r => {
    const slots4 = [
      {side:'A', slot:'cage1', lbl:'A Inside'},
      {side:'A', slot:'cage2', lbl:'A Outside'},
      {side:'B', slot:'cage1', lbl:'B Inside'},
      {side:'B', slot:'cage2', lbl:'B Outside'},
    ];
    const occupied = slots4.map(s => {
      const cid = r[s.side][s.slot];
      const c = cid ? getCage(cid) : null;
      return { ...s, c };
    });
    const hasAnyCage = occupied.some(s => s.c);
    if (!hasAnyCage) return `<div style="padding:6px 8px;background:var(--bg-elevated);border:1px solid var(--border);border-radius:6px;margin-bottom:6px;opacity:0.45">
      <div style="font:700 11px var(--font-mono);color:var(--text-muted)">RMD-${r.number} — empty</div>
    </div>`;
    const slotsHTML = occupied.map(s => {
      if (!s.c) return `<div style="display:flex;justify-content:space-between;padding:3px 6px;font-size:11px;color:var(--text-muted);font-style:italic">
        <span>${s.lbl}</span><span>—</span>
      </div>`;
      // Determine minimum frame size needed for shipping
      const minFrame = FRAME_WIDTHS.find(w => w >= s.c.width) || FRAME_WIDTHS[FRAME_WIDTHS.length-1];
      const walerNote = needsWaler(s.c) ? ' + waler' : '';
      const _ps = shipmentShadeClass(s.c, _plannerShipDays);
      const _pBg = _ps ? shipmentShadeBg(_ps) : (s.side==='A'?'background:rgba(37,99,176,0.06)':'background:rgba(26,138,74,0.06)');
      const _pNc = shipmentShadeNameColor(_ps) || 'color:var(--text-primary)';
      return `<div style="display:flex;justify-content:space-between;align-items:center;padding:4px 6px;${_pBg};border-radius:4px;margin-bottom:2px">
        <span style="font:600 11px var(--font-mono);${_pNc}">${esc(s.c.name)}</span>
        <span style="font-size:10px;${shipmentShadeDetailColor(_ps)||'color:var(--text-muted)'};">${s.lbl} · ${s.c.width}m · ${hCat(s.c.height)} · ${lCat(s.c.length)} · ${s.c.weight}t</span>
        <span style="font-size:9px;background:#fdf5dc;color:var(--yellow);border:1px solid #e0d8a0;border-radius:3px;padding:1px 5px;margin-left:4px" title="Minimum frame size needed for shipping">▣ ${minFrame}m${walerNote}</span>
      </div>`;
    }).join('');
    return `<div style="padding:8px;background:var(--bg-elevated);border:1px solid var(--border);border-radius:6px;margin-bottom:6px">
      <div style="font:700 12px var(--font-mono);color:var(--accent);margin-bottom:5px">RMD-${r.number} <span style="font-weight:400;color:var(--text-muted);font-size:10px">${occupied.filter(s=>s.c).length}/8 occupied</span></div>
      ${slotsHTML}
    </div>`;
  }).join('');

  let frameSummary = STATE.frames.filter(f=>f.cages.length>0 && f.location==='facility').map(f=>{
    const fCages = f.cages.map(cid=>getCage(cid)).filter(Boolean);
    let cageChips = fCages.map(c=>{
      const _fs = shipmentShadeClass(c, _plannerShipDays);
      const _fBg = _fs ? 'background:'+(_fs==='next'?'#3b1d6e':'#c8b8e8')+';color:'+(_fs==='next'?'#e0ccff':'#4a2a7a')+';border-radius:3px;padding:1px 5px;' : '';
      return `<span style="font-size:11px;${_fBg}">${esc(c.name)} · ${c.width}m · ${hCat(c.height)} · ${lCat(c.length)} · ${c.weight}t</span>`;
    }).join(', ');
    return `<div class="planner-frame-item">
      <span style="font-weight:700;font-family:var(--font-mono)">${esc(f.name)}</span>
      <span>${cageChips}</span>
      <span style="font-size:10px;color:var(--text-muted)">${f.width}m${f.hasWaler?' 🔩':''}${f.fixedForShipping?' ✓SHIP':''}</span>
    </div>`;
  }).join('') || '<div class="empty-msg">No cages in frames</div>';

  return `
    <div class="flex-between" style="margin-bottom:16px">
      <h2 class="section-title" style="margin:0">Movement Planner</h2>
      <div style="display:flex;gap:8px">
        <button class="btn btn-secondary btn-sm" onclick="openMovementsWindow()" title="Open Movements Map in a pop-out window">🗺 Open Movements</button>
        <button class="btn btn-secondary btn-sm" onclick="openDashboardWindow()" title="Open Dashboard in a second window">📊 Open Dashboard</button>
        <button class="btn btn-secondary btn-sm" onclick="autoplanDepartures()" title="Auto-plan cages due to leave the facility into suitable frames">⚡ Auto-Plan Departures</button>
        <button class="btn btn-danger btn-sm" onclick="blankCanvasPlanner()" title="Clear all planned movements and reset calendar">🗑 Blank Canvas</button>
        <button class="btn btn-primary" onclick="planFormOpen=!planFormOpen;render()">+ Plan Movement</button>
      </div>
    </div>
    ${formHTML}
    <div class="planner-layout" style="grid-template-columns:1fr 420px">
      <div>
        <div class="card">
          <div class="week-nav">
            <button class="btn btn-secondary btn-sm" onclick="shiftWeek(-1)">◄ Prev 2 Weeks</button>
            <span class="week-label">${fmt(weekDays[0])} — ${fmt(weekDays[13])}</span>
            <button class="btn btn-secondary btn-sm" onclick="shiftWeek(1)">Next 2 Weeks ►</button>
          </div>
          <div style="display:flex;gap:12px;margin-bottom:8px;font-size:10px;align-items:center;flex-wrap:wrap">
            <span style="padding:2px 6px;background:#fce8e8;color:var(--red);border:1px solid #e8b0b0;border-radius:3px">🚚 Cage leaves facility</span>
            <span style="padding:2px 6px;background:#ecfeff;color:#0e7490;border:1px solid #a5f3fc;border-radius:3px">🚢 Frame returns</span>
            <span style="padding:2px 6px;background:#e0f2fe;color:#075985;border:1px solid #7dd3fc;border-radius:3px">⬇ Boat loaded</span>
            <span style="padding:2px 6px;background:#dcfce7;color:#166534;border:1px solid #86efac;border-radius:3px">⛵ Boat departs</span>
            <span style="padding:2px 6px;background:#fff7ed;color:#9a3412;border:1px solid #fed7aa;border-radius:3px">📦 Cages unloaded</span>
            <span style="padding:2px 6px;background:#fce7f3;color:#9d174d;border:1px solid #f9a8d4;border-radius:3px">🏠 Boat returns</span>
          </div>
          <div style="font:600 10px var(--font-mono);color:var(--text-muted);text-transform:uppercase;letter-spacing:0.06em;margin-bottom:4px">Week 1</div>
          <div class="week-grid" style="margin-bottom:10px">${week1HTML}</div>
          <div style="font:600 10px var(--font-mono);color:var(--text-muted);text-transform:uppercase;letter-spacing:0.06em;margin-bottom:4px">Week 2</div>
          <div class="week-grid">${week2HTML}</div>
        </div>
        <div class="card">
          <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
            <div class="card-title" style="margin:0">All Planned Movements <span style="font-weight:400;font-size:11px;color:var(--text-muted)">(${sorted.length} shown${!plannerShowCompleted && completedCount > 0 ? `, ${completedCount} completed hidden` : ''})</span></div>
            <div style="display:flex;gap:6px">
              <button class="btn btn-secondary btn-sm" onclick="exportMovementsCSV()" title="Export all movements to CSV">📤 CSV</button>
              <button class="btn btn-secondary btn-sm" onclick="plannerShowCompleted=!plannerShowCompleted;render()" title="${plannerShowCompleted ? 'Hide completed movements' : 'Show completed movements'}">
                ${plannerShowCompleted ? '🙈 Hide Done' : '👁 Show Done (' + completedCount + ')'}
              </button>
            </div>
          </div>
          <div style="overflow-x:auto">
            <table><thead><tr>
              <th style="width:24px"></th><th style="width:28px;text-align:center">#</th><th>Date</th><th>Shift</th><th>Type</th><th>Description</th><th>Notes</th><th>Status</th><th>Actions</th>
            </tr></thead><tbody>${tableRows}</tbody></table>
          </div>
        </div>
      </div>
      <div class="planner-sidebar" style="max-height:calc(100vh - 140px);overflow-y:auto">
        <div class="card">
          <div class="card-title">Cages in RMD Storage</div>
          ${shipmentLegendHTML(_plannerShipDays)}
          <div>
          ${rmdSummary}
          </div>
        </div>
        <div class="card">
          <div class="card-title">🏗 Roof Slab Storage</div>
          ${(() => {
            const rssCages = (STATE.rssCages || []).map(id => getCage(id)).filter(Boolean);
            if (!rssCages.length) return '<div class="empty-msg">No cages in Roof Slab Storage</div>';
            return rssCages.map(c => {
              const _rs = shipmentShadeClass(c, _plannerShipDays);
              const _rBg = _rs ? shipmentShadeBg(_rs) : '';
              const _rNc = shipmentShadeNameColor(_rs) || 'color:var(--text-primary)';
              const minFrame = FRAME_WIDTHS.find(w => w >= c.width) || FRAME_WIDTHS[FRAME_WIDTHS.length-1];
              const walerNote = needsWaler(c) ? ' + waler' : '';
              return `<div style="display:flex;justify-content:space-between;align-items:center;padding:4px 6px;${_rBg}background:rgba(37,99,176,0.06);border-radius:4px;margin-bottom:2px">
                <span style="font:600 11px var(--font-mono);${_rNc}">${hDot(c.height)}${tagDot(c)}${esc(c.name)}</span>
                <span style="font-size:9px;background:#fdf5dc;color:var(--yellow);border:1px solid #e0d8a0;border-radius:3px;padding:1px 5px;margin-left:4px" title="Min frame for shipping">▣ ${minFrame}m${walerNote}</span>
              </div>`;
            }).join('');
          })()}
        </div>
        <div class="card">
          <div class="card-title">Cages in Frames (at facility)</div>
          ${frameSummary}
        </div>
        ${(() => {
          const clientFrames = STATE.frames.filter(f => f.location === 'client' || f.location === 'boat');
          if (!clientFrames.length) return '';
          const today = todayStr();
          const rows = clientFrames.map(f => {
            const daysLeft = f.returnDate ? Math.ceil((new Date(f.returnDate+'T12:00:00') - new Date()) / 86400000) : null;
            const retCol = daysLeft === null ? 'color:var(--text-muted)' : daysLeft < 0 ? 'color:var(--red)' : daysLeft <= 7 ? 'color:var(--orange)' : 'color:#0e7490';
            const retLabel = f.returnDate ? fmt(f.returnDate) : '—';
            const retDaysStr = daysLeft !== null ? (daysLeft < 0 ? ` (${Math.abs(daysLeft)}d overdue)` : daysLeft === 0 ? ' (today)' : ` (${daysLeft}d)`) : '';
            return `<div style="display:flex;justify-content:space-between;align-items:center;padding:5px 0;border-bottom:1px solid var(--border);font-size:11px">
              <span style="font:700 11px var(--font-mono)">${esc(f.name)}</span>
              <span style="font-size:10px;padding:1px 6px;border-radius:10px;background:${f.location==='client'?'#f0e8fa':'#e6f0fa'};color:${f.location==='client'?'var(--purple)':'var(--blue)'};font-weight:600">${f.location}</span>
              <span style="${retCol};font-family:var(--font-mono)">${retLabel}${retDaysStr}</span>
            </div>`;
          }).join('');
          return `<div class="card">
            <div class="card-title">🚢 Frames Away (Client / Boat)</div>
            ${rows}
            ${clientFrames.length === 0 ? '<div class="empty-msg">None away</div>' : ''}
          </div>`;
        })()}
      </div>
    </div>
  `;
}

function openDashboardWindow() {
  // Serialize current page HTML and open as blob so it has same-origin access
  const html = document.documentElement.outerHTML;
  const blob = new Blob([html], {type: 'text/html'});
  const url = URL.createObjectURL(blob);
  const win = window.open(url, 'cage-tracker-dashboard', 'width=1280,height=860,scrollbars=yes,resizable=yes');
  if (!win) { alert('Pop-up blocked. Please allow pop-ups for this page.'); return; }
  win.addEventListener('load', () => {
    try {
      // Sync localStorage state to the new window
      const data = localStorage.getItem(STORAGE_KEY);
      if (data) win.localStorage.setItem(STORAGE_KEY, data);
      // Switch to dashboard tab
      setTimeout(() => {
        try { win.activeTab = 'dashboard'; win.render(); } catch(e) {}
      }, 100);
    } catch(e) { console.warn('Dashboard sync error:', e); }
  });
}

function openMovementsWindow() {
  const html = document.documentElement.outerHTML;
  const blob = new Blob([html], {type: 'text/html'});

  win.addEventListener('load', () => {
    setTimeout(() => {
      try { win.activeTab = 'movements'; win.render(); } catch(e) {}
    }, 100);
  });
}

async function addMovement() {
  const type = document.getElementById('pf-type').value;
  const cageId = document.getElementById('pf-cage').value;
  const frameEl = document.getElementById('pf-frame');
  const frameId = frameEl ? frameEl.value : '';
  const date = document.getElementById('pf-date').value;
  const shift = document.getElementById('pf-shift').value;
  const rmdEl = document.getElementById('pf-rmd');
  const rmdSlot = rmdEl ? rmdEl.value.trim() : '';
  const notes = document.getElementById('pf-notes').value.trim();
  if(!date) return alert('Please select a date.');

  const cage = getCage(cageId);

  // For fix-shipping, auto-find the frame the cage is in
  let resolvedFrameId = frameId;
  if (type === 'frame-fix-shipping' && cage) {
    const autoFrame = STATE.frames.find(f=>f.cages.includes(cageId));
    if(autoFrame) resolvedFrameId = autoFrame.id;
  }

  // For frame-to-rmd, auto-find the frame the cage is in (or pending into)
  // If frame-to-rmd with RSS slot, rewrite as facility-to-rss for description clarity
  let effectiveType = type;
  if (type === 'frame-to-rmd' && rmdSlot === 'RSS') {
    effectiveType = 'frame-to-rss'; // RSS slot selected — frame → Roof Slab
  }
  if (type === 'frame-to-rmd' && cage && !resolvedFrameId) {
    // First check: cage is currently in a frame
    const currentFrame = STATE.frames.find(f => f.cages.includes(cageId));
    if (currentFrame) {
      resolvedFrameId = currentFrame.id;
    } else {
      // Second check: cage has a pending facility-to-frame movement — use that target frame
      const pendingMove = STATE.plannedMovements.find(
        m => !m.completed && m.cageId === cageId && m.typeKey === 'facility-to-frame' && m.frameId
      );
      if (pendingMove) resolvedFrameId = pendingMove.frameId;
    }
  }

  const frame = getFrame(resolvedFrameId);
  const parts = [];
  const frameWidthTag = (f) => f && f.width ? ` [${f.width}m]` : '';
  if(effectiveType === 'frame-return-from-client') {
    if(frame) parts.push(frame.name + frameWidthTag(frame));
    parts.push('Facility');
  } else if (effectiveType === 'frame-to-frame') {
    if(cage) parts.push(cage.name);
    const srcFrame = STATE.frames.find(f => f.cages.includes(cageId));
    if(srcFrame) parts.push(srcFrame.name + frameWidthTag(srcFrame));
    if(frame) parts.push(frame.name + frameWidthTag(frame));
  } else if (effectiveType === 'frame-to-rss') {
    if(cage) parts.push(cage.name);
    const srcFr = STATE.frames.find(f => f.cages.includes(cageId));
    if(srcFr) parts.push(srcFr.name);
    parts.push('Roof Slab Storage');
  } else if (effectiveType === 'rmd-to-rss') {
    if(cage) parts.push(cage.name);
    parts.push(cage?.locationDetail || 'RMD');
    parts.push('Roof Slab Storage');
  } else if (effectiveType === 'rss-to-rmd') {
    if(cage) parts.push(cage.name);
    parts.push('Roof Slab Storage');
    if(rmdSlot && rmdSlot !== 'RSS') parts.push('RMD-'+rmdSlot);
  } else if (effectiveType === 'rss-to-frame') {
    if(cage) parts.push(cage.name);
    parts.push('Roof Slab Storage');
    if(frame) parts.push(frame.name + frameWidthTag(frame));
  } else {
    if(cage) parts.push(cage.name);
    if(frame) parts.push(frame.name + frameWidthTag(frame));
    if(rmdSlot && rmdSlot !== 'RSS') parts.push('RMD-'+rmdSlot);
  }
  const desc = parts.join(' → ') || notes || 'Movement';
  const typeLabel = MOVE_TYPES.find(t=>t.value===effectiveType)?.label || effectiveType;

  const move = {
    id:uid(), type:typeLabel, typeKey:effectiveType, cageId, frameId:resolvedFrameId, rmdSlot: rmdSlot !== 'RSS' ? rmdSlot : '',
    date, shift, notes, completed:false, description:desc, createdAt:new Date().toISOString(),
    sortOrder: STATE.plannedMovements.length
  };
  // For frame-to-frame, also store the source frame so completeMove can clear it
  if (effectiveType === 'frame-to-frame') {
    const srcFrame = STATE.frames.find(f => f.cages.includes(cageId));
    if (srcFrame) move.srcFrameId = srcFrame.id;
  }
  STATE.plannedMovements.push(move);
  planFormOpen = false;
  render();
  await addMovementToAPI(move);
}
async function completeMove(id) {
  const m = STATE.plannedMovements.find(x=>x.id===id);
  if(!m) return;

  const cage = getCage(m.cageId);
  const frame = getFrame(m.frameId);

  // Record location history for cage-moving operations
  if (cage) {
    if (m.typeKey === 'facility-to-frame' && frame) recordLocationChange(cage, 'frame', frame.name);
    else if ((m.typeKey === 'rmd-to-frame') && frame) recordLocationChange(cage, 'frame', frame.name);
    else if (m.typeKey === 'rss-to-frame' && frame) recordLocationChange(cage, 'frame', frame.name);
    else if (m.typeKey === 'frame-to-rmd' && m.rmdSlot) recordLocationChange(cage, 'rmd', 'RMD-' + m.rmdSlot);
    else if (m.typeKey === 'frame-to-rss') recordLocationChange(cage, 'rss', 'Roof Slab Storage');
    else if (m.typeKey === 'rmd-to-rss') recordLocationChange(cage, 'rss', 'Roof Slab Storage');
    else if (m.typeKey === 'rss-to-rmd') recordLocationChange(cage, 'rmd', m.rmdSlot ? 'RMD-'+m.rmdSlot : 'RMD');
    else if (m.typeKey === 'facility-to-rmd' && m.rmdNumber != null) recordLocationChange(cage, 'rmd', `RMD-${m.rmdNumber}${m.rmdSide||''}`);
    else if (m.typeKey === 'frame-to-frame' && frame) recordLocationChange(cage, 'frame', frame.name);
  }

  // Execute the actual movement based on type
  if (m.typeKey === 'facility-to-frame' && cage && frame) {
    // Clear cage from any current location
    clearCageFromCurrentLocation(cage.id);
    // Check frame capacity
    if (frame.cages.length >= 2) {
      const override = confirm(`⚠️ Override: ${frame.name} already has max cages.\n\nClick OK to override and complete the movement anyway, or Cancel to abort.`);
      if (!override) return;
    } else if (frame.cages.length === 1) {
      const existing = getCage(frame.cages[0]);
      if (existing && !canFitTwo(existing, cage, frame.width)) {
        const override = confirm(`⚠️ Warning: cages don't fit together in ${frame.name}.\n\nClick OK to override and complete the movement anyway, or Cancel to abort.`);
        if (!override) return;
      }
    }
    frame.cages.push(cage.id);
    cage.location = 'frame';
    cage.locationDetail = frame.name;
    cage.departureDate = null; // cage has left facility
  }
  // rss-to-frame is now handled by rmd-to-frame (which includes rss cages)
  else if (m.typeKey === 'frame-to-rss' && cage) {
    // Remove from its current frame
    const srcFrame = STATE.frames.find(f => f.cages.includes(cage.id));
    if (srcFrame) {
      srcFrame.cages = srcFrame.cages.filter(id => id !== cage.id);
      await api('/api/frames', 'PUT', srcFrame);
    }
    if (!STATE.rssCages) STATE.rssCages = [];
    if (!STATE.rssCages.includes(cage.id)) STATE.rssCages.push(cage.id);
    cage.location = 'rss';
    cage.locationDetail = 'Roof Slab Storage';
    await saveRSS();
  }
  else if (m.typeKey === 'rmd-to-rss' && cage) {
    // Move cage from RMD slot to Roof Slab Storage
    STATE.rmdSlots.forEach(r => { SIDES.forEach(s => { if(r[s].cage1===cage.id) r[s].cage1=null; if(r[s].cage2===cage.id) r[s].cage2=null; }); });
    if (!STATE.rssCages) STATE.rssCages = [];
    if (!STATE.rssCages.includes(cage.id)) STATE.rssCages.push(cage.id);
    cage.location = 'rss';
    cage.locationDetail = 'Roof Slab Storage';
    await saveRMD();
    await saveRSS();
  }
  else if (m.typeKey === 'rss-to-rmd' && cage) {
    // Move cage from Roof Slab Storage to an RMD slot
    if (STATE.rssCages) STATE.rssCages = STATE.rssCages.filter(id => id !== cage.id);
    // Determine target RMD slot
    const rmdSlotStr = m.rmdSlot ? String(m.rmdSlot) : '';
    const rmdMatch = rmdSlotStr.match(/(\d+)([ABab]?)/);
    if (rmdMatch) {
      const rmdNum = parseInt(rmdMatch[1]);
      const side = (rmdMatch[2] || 'A').toUpperCase();
      const rmdIdx = STATE.rmdSlots.findIndex(r => r.number === rmdNum);
      if (rmdIdx >= 0) {
        const r = STATE.rmdSlots[rmdIdx];
        const slot = !r[side].cage1 ? 'cage1' : !r[side].cage2 ? 'cage2' : 'cage1';
        r[side][slot] = cage.id;
        cage.location = 'rmd';
        cage.locationDetail = `RMD-${rmdNum}${side}`;
        await saveRMD();
      }
    } else {
      cage.location = 'facility';
      cage.locationDetail = '';
    }
    await saveRSS();
  }
  else if (m.typeKey === 'frame-to-rmd' && cage) {
    // Parse RMD location — boat planner stores rmdNumber+rmdSide; manual planner may use rmdSlot like "3A"
    let rmdNum = null, side = null;
    if (m.rmdNumber != null) {
      rmdNum = parseInt(m.rmdNumber);
      side = (m.rmdSide || 'A').toUpperCase();
    } else if (m.rmdSlot && /^\d/.test(String(m.rmdSlot))) {
      const rmdMatch = String(m.rmdSlot).match(/^(\d+)\s*([ABab])/);
      if (rmdMatch) { rmdNum = parseInt(rmdMatch[1]); side = rmdMatch[2].toUpperCase(); }
    }
    if (rmdNum != null && side) {
      const rmdIdx = STATE.rmdSlots.findIndex(r=>r.number===rmdNum);
      if (rmdIdx !== -1) {
        const r = STATE.rmdSlots[rmdIdx];
        // Use the specific slot if given, otherwise find the first free slot
        const targetSlot = (m.rmdSlot && (m.rmdSlot === 'cage1' || m.rmdSlot === 'cage2')) ? m.rmdSlot : null;
        const slot = targetSlot && !r[side][targetSlot] ? targetSlot
                   : !r[side].cage1 ? 'cage1' : !r[side].cage2 ? 'cage2' : null;
        if (!slot) {
          const override = confirm(`⚠️ Override: RMD-${rmdNum}${side} is full.\n\nClick OK to override and place the cage anyway (will use cage1 slot), or Cancel to abort.`);
          if (!override) return;
          // Force into cage1, displacing whatever was there
          clearCageFromCurrentLocation(cage.id);
          r[side]['cage1'] = cage.id;
          cage.location = 'rmd';
          cage.locationDetail = `RMD-${rmdNum}${side}`;
          cage.intoRmd = todayStr();
        } else {
        clearCageFromCurrentLocation(cage.id);
        r[side][slot] = cage.id;
        cage.location = 'rmd';
        cage.locationDetail = `RMD-${rmdNum}${side}`;
        cage.intoRmd = todayStr();
        }
      }
    } else {
      // Can't determine RMD slot — just park at facility
      clearCageFromCurrentLocation(cage.id);
      cage.location = 'facility';
      cage.locationDetail = '';
    }
  }
  else if (m.typeKey === 'rmd-to-frame' && cage && frame) {
    clearCageFromCurrentLocation(cage.id);
    if (frame.cages.length >= 2) {
      const override = confirm(`⚠️ Override: ${frame.name} already has max cages.\n\nClick OK to override and complete the movement anyway, or Cancel to abort.`);
      if (!override) return;
    } else if (frame.cages.length === 1) {
      const existing = getCage(frame.cages[0]);
      if (existing && !canFitTwo(existing, cage, frame.width)) {
        const override = confirm(`⚠️ Warning: cages don't fit together in ${frame.name}.\n\nClick OK to override and complete the movement anyway, or Cancel to abort.`);
        if (!override) return;
      }
    }
    frame.cages.push(cage.id);
    cage.location = 'frame';
    cage.locationDetail = frame.name;
    cage.departureDate = null;
    cage.outOfRmd = todayStr();
  }
  else if (m.typeKey === 'facility-to-rmd' && cage && m.rmdNumber != null) {
    const rmdNum = parseInt(m.rmdNumber);
    const side = (m.rmdSide || 'A').toUpperCase();
    const rmdIdx = STATE.rmdSlots.findIndex(r => r.number === rmdNum);
    if (rmdIdx !== -1) {
      const r = STATE.rmdSlots[rmdIdx];
      const slot = !r[side].cage1 ? 'cage1' : !r[side].cage2 ? 'cage2' : null;
      if (!slot) {
        const override = confirm(`⚠️ Override: RMD-${rmdNum}${side} is full.\n\nClick OK to override and place the cage anyway (will use cage1 slot), or Cancel to abort.`);
        if (!override) return;
        clearCageFromCurrentLocation(cage.id);
        r[side]['cage1'] = cage.id;
        cage.location = 'rmd';
        cage.locationDetail = `RMD-${rmdNum}${side}`;
        cage.departureDate = null;
        cage.intoRmd = todayStr();
      } else {
      clearCageFromCurrentLocation(cage.id);
      r[side][slot] = cage.id;
      cage.location = 'rmd';
      cage.locationDetail = `RMD-${rmdNum}${side}`;
      cage.departureDate = null;
      cage.intoRmd = todayStr();
      }
    }
  }
  else if (m.typeKey === 'frame-fix-shipping' && frame) {
    if (frame.cages.length === 1) {
      const c = getCage(frame.cages[0]);
      if (c && needsWaler(c) && !frame.hasWaler) {
        const override = confirm(`⚠️ Override: cage ${c.name} is ${c.length}m (below ${STATE.settings.walerLengthThreshold||6.5}m threshold) and requires a waler, but ${frame.name} has none.\n\nClick OK to override and complete anyway, or Cancel to abort.`);
        if (!override) return;
      }
      frame.fixedForShipping = true;
    } else {
      alert('Frame must have exactly 1 cage to fix for shipping.'); return;
    }
  }
  else if (m.typeKey === 'frame-return-from-client' && frame) {
    frame.location = 'facility';
    frame.fixedForShipping = false;
    frame.returnedAt = todayStr(); // record actual return date for dashboard stats
    // Any cages in this frame should also be cleared (it should be empty, but just in case)
    frame.cages = [];
  }
  else if (m.typeKey === 'frame-to-frame' && cage && frame) {
    // Remove cage from its current frame
    const srcFrame = getFrame(m.srcFrameId) || STATE.frames.find(f => f.cages.includes(cage.id));
    if (srcFrame) {
      srcFrame.cages = srcFrame.cages.filter(id => id !== cage.id);
      if (srcFrame.fixedForShipping) srcFrame.fixedForShipping = false; // moving a cage un-fixes the source frame
    }
    // Check destination frame capacity
    if (frame.cages.length >= 2) {
      const override = confirm(`⚠️ Override: ${frame.name} already has max cages.\n\nClick OK to override and complete the movement anyway, or Cancel to abort.`);
      if (!override) return;
    } else if (frame.cages.length === 1) {
      const existing = getCage(frame.cages[0]);
      if (existing && !canFitTwo(existing, cage, frame.width)) {
        const override = confirm(`⚠️ Warning: cages don't fit together in ${frame.name}.\n\nClick OK to override and complete the movement anyway, or Cancel to abort.`);
        if (!override) return;
      }
    }
    frame.cages.push(cage.id);
    cage.location = 'frame';
    cage.locationDetail = frame.name;
    if (srcFrame) await saveFrame(srcFrame);
  }

  // Clear departure date whenever a cage physically leaves the facility
  if (cage && cage.location !== 'facility') {
    cage.departureDate = null;
  }

  m.completed = true;
  m.completedAt = new Date().toISOString();
  // Preserve any completion note that was typed before ticking done
  // (completionNote is already on m if setMoveNote was called)
  render();
  await updateMovementInAPI(m);
  if (cage) await saveCage(cage);
  if (frame) await saveFrame(frame);
  await saveRMD();
}
