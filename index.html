// MOVEMENT PLANNER
// ═══════════════════════════════════════════════════════════════════════════════
let planFormOpen = false;
let planFormType = 'facility-to-frame';
let plannerShowCompleted = false;
let planWeekStart = (() => { const d=new Date(); d.setDate(d.getDate()-d.getDay()+1); return toISO(d); })();

const MOVE_TYPES = [
  {value:'facility-to-frame', label:'Facility → Frame (out of facility)'},
  {value:'frame-to-frame',    label:'Frame → Frame (swap cage between frames)'},
  {value:'frame-to-rmd', label:'Frame → RMD Storage'},
  {value:'rmd-to-frame', label:'RMD → Frame'},
  {value:'frame-fix-shipping', label:'Fix cage to frame for shipping'},
  {value:'frame-return-from-client', label:'Frame returns from client → Facility'},
];

function onPlanTypeChange(val) {
  planFormType = val;
  render();
}

// Called when cage is selected in RMD→Frame form — auto-selects best fitting frame
function updateFrameSuggestion(cageId) {
  const cage = getCage(cageId);
  const frameEl = document.getElementById('pf-frame');
  if (!cage || !frameEl) return;

  // Find best frame: must fit cage width, prefer smallest adequate frame, check waler
  const sortedFrames = [...STATE.frames]
    .filter(f => f.location === 'facility' && f.cages.length < 2 && cage.width <= f.width)
    .sort((a, b) => {
      // Prefer frames that already have a compatible cage (better space usage)
      const aHas = a.cages.length;
      const bHas = b.cages.length;
      if (aHas !== bHas) return bHas - aHas; // prefer frames that already have one cage
      return a.width - b.width; // then smallest adequate width
    });

  // Waler check — prefer frames with waler if needed
  let best = null;
  if (needsWaler(cage)) {
    best = sortedFrames.find(f => f.hasWaler && (f.cages.length === 0 || canFitTwo(getCage(f.cages[0]), cage, f.width)));
  }
  if (!best) {
    best = sortedFrames.find(f => f.cages.length === 0 || canFitTwo(getCage(f.cages[0]), cage, f.width));
  }

  if (best) {
    frameEl.value = best.id;
    // Briefly highlight the dropdown
    frameEl.style.borderColor = 'var(--accent)';
    frameEl.style.background = '#fdfaf0';
    setTimeout(() => { frameEl.style.borderColor = ''; frameEl.style.background = ''; }, 2000);
  }
}

function buildPlanFormHTML() {
  const typeOpts = MOVE_TYPES.map(t=>`<option value="${t.value}" ${planFormType===t.value?'selected':''}>${t.label}</option>`).join('');

  // Build cage options based on movement type
  let cageOpts = '';
  let frameOpts = '';
  let showFrame = true;
  let showRmd = false;

  if (planFormType === 'frame-to-frame') {
    // Cages currently in frames at facility (or pending into a frame)
    const pendingInFrameCageIds = new Set(
      STATE.plannedMovements.filter(m => !m.completed && m.typeKey === 'facility-to-frame').map(m => m.cageId)
    );
    const inFrameCages = STATE.cages.filter(c =>
      c.location === 'frame' || (c.location === 'facility' && pendingInFrameCageIds.has(c.id))
    ).sort((a,b) => a.name.localeCompare(b.name, undefined, {numeric:true}));
    cageOpts = inFrameCages.map(c => {
      const currentFrame = STATE.frames.find(f => f.cages.includes(c.id));
      const lbl = currentFrame ? `in ${currentFrame.name}` : '(pending → frame)';
      return `<option value="${c.id}">${esc(c.name)} (${lbl})</option>`;
    }).join('');
    // Destination frames: facility frames + frames with a return date (pre-plan)
    const plannedToFrame_ftf = new Set(
      STATE.plannedMovements.filter(m => !m.completed && m.frameId && (m.typeKey === 'rmd-to-frame' || m.typeKey === 'facility-to-frame' || m.typeKey === 'frame-to-frame')).map(m => m.frameId)
    );
    frameOpts = STATE.frames.filter(f => f.location === 'facility' || (f.returnDate && f.location !== 'facility')).sort((a,b) => a.name.localeCompare(b.name, undefined, {numeric:true})).map(f => {
      const plannedNote = plannedToFrame_ftf.has(f.id) ? ' 📋 move planned' : '';
      if (f.location !== 'facility') {
        const returnNote = f.returnDate ? ` ↩ returns ${fmt(f.returnDate)}` : ' (away)';
        return `<option value="${f.id}">${esc(f.name)} (${f.width}m${f.hasWaler ? " 🔩" : ""})${returnNote} — pre-plan${plannedNote}</option>`;
      }
      const fullNote = f.cages.length >= 2 ? ' ⚠ FULL' : f.cages.length === 1 ? ` (has ${getCage(f.cages[0])?.name || '?'})` : ' (empty)';
      return `<option value="${f.id}">${esc(f.name)} (${f.width}m${f.hasWaler ? " 🔩" : ""})${fullNote}${plannedNote}</option>`;
    }).join('');
    showFrame = true;
    showRmd = false;
  } else if (planFormType === 'facility-to-frame') {
    // Cages in facility
    cageOpts = [...STATE.cages.filter(c=>c.location==='facility')].sort((a,b)=>a.name.localeCompare(b.name,undefined,{numeric:true})).map(c=>`<option value="${c.id}">${esc(c.name)} (${hCat(c.height)}, ${c.width}m)</option>`).join('');
    // Include ALL facility frames + frames with a return date (pre-plan for when they return)
    frameOpts = STATE.frames.filter(f=>f.location==='facility' || (f.returnDate && f.location !== 'facility')).sort((a,b)=>a.name.localeCompare(b.name,undefined,{numeric:true})).map(f=>{
      if (f.location !== 'facility') {
        const returnNote = f.returnDate ? ` ↩ returns ${fmt(f.returnDate)}` : ' (away)';
        return `<option value="${f.id}">${esc(f.name)} (${f.width}m${f.hasWaler ? " 🔩" : ""})${returnNote} — pre-plan</option>`;
      }
      const fullNote = f.cages.length >= 2 ? ' ⚠ FULL' : f.cages.length === 1 ? ' (1 cage)' : ' (empty)';
      return `<option value="${f.id}">${esc(f.name)} (${f.width}m${f.hasWaler ? " 🔩" : ""})${fullNote}</option>`;
    }).join('');
    showRmd = false;
  } else if (planFormType === 'frame-to-rmd') {
    // Cages in frames, PLUS cages in facility that have a pending facility-to-frame movement planned
    const pendingInFrameCageIds = new Set(
      STATE.plannedMovements
        .filter(m => !m.completed && m.typeKey === 'facility-to-frame')
        .map(m => m.cageId)
    );
    const frameOrPendingCages = STATE.cages.filter(c =>
      c.location === 'frame' || (c.location === 'facility' && pendingInFrameCageIds.has(c.id))
    ).sort((a,b)=>a.name.localeCompare(b.name,undefined,{numeric:true}));
    cageOpts = frameOrPendingCages.map(c => {
      const label = c.location === 'frame' ? c.locationDetail : `(pending → frame)`;
      return `<option value="${c.id}">${esc(c.name)} (${label})</option>`;
    }).join('');
    showFrame = false;
    showRmd = true;
  } else if (planFormType === 'rmd-to-frame') {
    // Cages in RMD
    cageOpts = [...STATE.cages.filter(c=>c.location==='rmd')].sort((a,b)=>a.name.localeCompare(b.name,undefined,{numeric:true})).map(c=>`<option value="${c.id}">${esc(c.name)} (${c.locationDetail})</option>`).join('');
    frameOpts = STATE.frames.filter(f=>(f.location==='facility'&&f.cages.length<2) || (f.returnDate && f.location !== 'facility')).sort((a,b)=>a.name.localeCompare(b.name,undefined,{numeric:true})).map(f=>{
      if (f.location !== 'facility') {
        const returnNote = f.returnDate ? ` ↩ returns ${fmt(f.returnDate)}` : ' (away)';
        return `<option value="${f.id}">${esc(f.name)} (${f.width}m${f.hasWaler ? " 🔩" : ""})${returnNote} — pre-plan</option>`;
      }
      return `<option value="${f.id}">${esc(f.name)} (${f.width}m${f.hasWaler ? " 🔩" : ""})</option>`;
    }).join('');
    showRmd = false;
  } else if (planFormType === 'frame-fix-shipping') {
    // Only cages that are alone in a frame (exactly 1 cage in frame)
    const singleCageFrames = STATE.frames.filter(f=>f.location==='facility' && f.cages.length===1 && !f.fixedForShipping);
    cageOpts = singleCageFrames.map(f=>{
      const c = getCage(f.cages[0]);
      return c ? `<option value="${c.id}">${esc(c.name)} (in ${esc(f.name)})</option>` : '';
    }).filter(Boolean).join('');
    showFrame = false;
    showRmd = false;
  } else if (planFormType === 'frame-return-from-client') {
    // Frames currently with client or on boat
    cageOpts = '';
    frameOpts = STATE.frames.filter(f=>f.location==='client'||f.location==='boat').sort((a,b)=>a.name.localeCompare(b.name,undefined,{numeric:true})).map(f=>`<option value="${f.id}">${esc(f.name)} (${f.width}m — ${f.location})</option>`).join('');
    showFrame = true;
    showRmd = false;
  }

  // Build RMD slot dropdown options for Frame-to-RMD — show ALL slots so multi-move planning works
  let rmdSlotOpts = '';
  if (planFormType === 'frame-to-rmd') {
    const sortedRmd = [...STATE.rmdSlots].sort((a,b)=>a.number-b.number);
    // Count planned frame-to-rmd moves per side key so we can show how many are already queued
    const plannedToRmd = {};
    STATE.plannedMovements.filter(m => !m.completed && m.typeKey === 'frame-to-rmd' && m.rmdSlot).forEach(m => {
      const key = String(m.rmdSlot).replace(/\s/g,'');
      plannedToRmd[key] = (plannedToRmd[key] || 0) + 1;
    });
    sortedRmd.forEach(r => {
      [...SIDES].sort().forEach(side => {
        const sideKey = r.number + side;
        const occupiedCids = [r[side].cage1, r[side].cage2].filter(Boolean);
        const occupiedCount = occupiedCids.length;
        const plannedCount = plannedToRmd[sideKey] || 0;
        const effectiveOccupied = occupiedCount + plannedCount;
        const cageNames = occupiedCids.map(cid => { const c = getCage(cid); return c ? c.name : '?'; });
        const occupancyNote = occupiedCount === 0 ? 'empty' : 'has: ' + cageNames.join(', ');
        const plannedNote = plannedCount > 0 ? ' \u00b7 ' + plannedCount + ' move' + (plannedCount>1?'s':'') + ' planned' : '';
        const fullWarning = effectiveOccupied >= 4 ? ' \u26a0 FULL' : '';
        rmdSlotOpts += '<option value="' + sideKey + '">RMD-' + r.number + side + ' (' + occupancyNote + plannedNote + fullWarning + ')</option>';
      });
    });
    if (!rmdSlotOpts) rmdSlotOpts = '<option value="" disabled>No RMD slots configured</option>';
  }

  // For RMD→Frame, annotate frames with suitability note + planned movements
  if (planFormType === 'rmd-to-frame') {
    const plannedToFrame_rtf = new Set(
      STATE.plannedMovements.filter(m => !m.completed && m.frameId && (m.typeKey === 'rmd-to-frame' || m.typeKey === 'facility-to-frame' || m.typeKey === 'frame-to-frame')).map(m => m.frameId)
    );
    frameOpts = STATE.frames.filter(f => f.location === 'facility' || (f.returnDate && f.location !== 'facility')).sort((a,b)=>a.name.localeCompare(b.name,undefined,{numeric:true})).map(f => {
      const plannedNote = plannedToFrame_rtf.has(f.id) ? ' 📋 move planned' : '';
      if (f.location !== 'facility') {
        const returnNote = f.returnDate ? ` ↩ returns ${fmt(f.returnDate)}` : ' (away)';
        return `<option value="${f.id}">${esc(f.name)} (${f.width}m${f.hasWaler ? ' 🔩' : ''})${returnNote} — pre-plan${plannedNote}</option>`;
      }
      const existing = f.cages.length === 1 ? getCage(f.cages[0]) : null;
      const note = f.cages.length >= 2 ? ' ⚠ FULL' : existing ? ` [has ${existing.name}]` : ' [empty]';
      return `<option value="${f.id}">${esc(f.name)} (${f.width}m${f.hasWaler ? ' 🔩' : ''})${note}${plannedNote}</option>`;
    }).join('');
  }

  const frameLbl = planFormType === 'frame-to-frame' ? 'Destination Frame'
    : planFormType === 'rmd-to-frame' ? 'Frame'
    : planFormType === 'frame-return-from-client' ? 'Frame (returning from client)'
    : 'Frame';

  if (!planFormOpen) return '';
  const cageOnChange = planFormType === 'rmd-to-frame' ? 'onchange="updateFrameSuggestion(this.value)"' : '';
  return `<div class="card" id="plan-form">
    <div class="form-grid form-grid-3">
      <div><label>Movement Type</label><select id="pf-type" onchange="onPlanTypeChange(this.value)">${typeOpts}</select></div>
      ${planFormType !== 'frame-return-from-client' ? `<div><label>Cage</label><select id="pf-cage" ${cageOnChange}><option value="">Select cage...</option>${cageOpts}</select></div>` : '<div></div>'}
      ${showFrame ? `<div><label>${frameLbl}</label><select id="pf-frame"><option value="">Select frame...</option>${frameOpts}</select></div>` : '<div id="pf-frame-placeholder"></div>'}
      <div><label>Date</label><input id="pf-date" type="date" value="${todayStr()}"/></div>
      <div><label>Shift</label><select id="pf-shift"><option value="day">Day Shift</option><option value="night">Night Shift</option></select></div>
      ${showRmd ? `<div><label>RMD Slot (Suggested)</label><select id="pf-rmd"><option value="">Select slot...</option>${rmdSlotOpts}</select></div>` : '<div id="pf-rmd-placeholder"></div>'}
      <div style="grid-column:span 3"><label>Notes</label><input id="pf-notes"/></div>
    </div>
    <div class="form-actions">
      <button class="btn btn-primary" onclick="addMovement()">Add to Plan</button>
      <button class="btn btn-secondary" onclick="planFormOpen=false;render()">Cancel</button>
    </div>
  </div>`;
}

function renderPlanner() {
  const formHTML = buildPlanFormHTML();

  // 2-week days
  const ws = new Date(planWeekStart + 'T12:00:00');
  let weekDays = [];
  for(let i=0;i<14;i++) { const d=new Date(ws); d.setDate(d.getDate()+i); weekDays.push(toISO(d)); }

  // Build departure-date index for visible window
  const depByDay = {};
  STATE.cages.forEach(c => {
    if (c.departureDate && c.location === 'facility') {
      if (!depByDay[c.departureDate]) depByDay[c.departureDate] = [];
      depByDay[c.departureDate].push(c);
    }
  });

  // Build frame return-date index (frames with client that have a returnDate set)
  const returnByDay = {};
  STATE.frames.forEach(f => {
    if (f.returnDate && (f.location === 'client' || f.location === 'boat')) {
      if (!returnByDay[f.returnDate]) returnByDay[f.returnDate] = [];
      returnByDay[f.returnDate].push(f.name);
    }
  });

  // Build boat trip indexes for planner calendar
  const btLoadByDay={}, btDepartByDay={}, btUnloadByDay={}, btReturnByDay={};
  STATE.boatTrips.forEach(t=>{
    if(t.loadDate)   { if(!btLoadByDay[t.loadDate])     btLoadByDay[t.loadDate]=[];     btLoadByDay[t.loadDate].push(t.label); }
    if(t.departDate) { if(!btDepartByDay[t.departDate]) btDepartByDay[t.departDate]=[]; btDepartByDay[t.departDate].push(t.label); }
    if(t.unloadDate) { if(!btUnloadByDay[t.unloadDate]) btUnloadByDay[t.unloadDate]=[]; btUnloadByDay[t.unloadDate].push(t.label); }
    if(t.returnDate) { if(!btReturnByDay[t.returnDate]) btReturnByDay[t.returnDate]=[]; btReturnByDay[t.returnDate].push(t.label); }
  });

  function renderWeekDay(day) {
    const dayMoves = STATE.plannedMovements.filter(m=>m.date===day);
    const pending = dayMoves.filter(m=>!m.completed).length;
    const isToday = day===todayStr();
    const dow = new Date(day+'T12:00:00').getDay();
    const isWeekend = dow===0||dow===6;
    const departures = depByDay[day] || [];
    const frameReturns = returnByDay[day] || [];
    const btLoads = btLoadByDay[day] || [];
    const btDeparts = btDepartByDay[day] || [];
    const btUnloads = btUnloadByDay[day] || [];
    const btReturns = btReturnByDay[day] || [];
    const hasMoves = dayMoves.length > 0 || departures.length > 0 || frameReturns.length > 0 || btLoads.length > 0 || btDeparts.length > 0 || btUnloads.length > 0 || btReturns.length > 0;

    let movesHTML = dayMoves.map(m=>`
      <div class="week-move-item ${m.completed?'completed':''}" title="${esc(m.notes||m.description)}" style="${m.typeKey==='frame-return-from-client'?'background:#ecfeff;border:1px solid #a5f3fc;color:#0e7490;':m.typeKey==='frame-to-frame'?'background:#fff3ee;border:1px solid #fdba74;color:#c2410c;':''}">
        ${m.typeKey==='frame-return-from-client'?'🚢 ': m.typeKey==='frame-to-frame'?'↕ ': m.shift==='night'?'🌙 ':''}${esc(m.description.slice(0,26))}
      </div>
    `).join('');

    return `<div class="week-day ${isToday?'today':''} ${isWeekend&&!hasMoves?'weekend':''} ${hasMoves?'has-moves':''}">
      <div class="week-day-hdr">${fmtShort(day)}</div>
      ${pending>0 ? `<div class="week-move-count ${pending>MAX_MOVES?'over-limit':''}" style="color:${pending>MAX_MOVES?'var(--red)':'var(--green)'}">${pending} moves${pending>MAX_MOVES?' ⚠ OVER':''}</div>` : ''}
      ${departures.map(c=>`<div style="font-size:9px;padding:2px 4px;margin-bottom:1px;border-radius:3px;background:#fce8e8;color:var(--red);border:1px solid #e8b0b0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="Cage ${esc(c.name)} leaves facility — ${c.width}m · ${hCat(c.height)} · ${lCat(c.length)} · ${c.weight}t">🚚 <strong>${esc(c.name)}</strong> <span style="opacity:0.75">${c.width}m · ${hCat(c.height)} · ${lCat(c.length)} · ${c.weight}t</span></div>`).join('')}
      ${frameReturns.map(n=>`<div style="font-size:9px;padding:2px 4px;margin-bottom:1px;border-radius:3px;background:#ecfeff;color:#0e7490;border:1px solid #a5f3fc;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="Frame ${n} expected back">🚢 ${esc(n)} returns</div>`).join('')}
      ${btLoads.map(n=>`<div style="font-size:9px;padding:2px 4px;margin-bottom:1px;border-radius:3px;background:#e0f2fe;color:#075985;border:1px solid #7dd3fc;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="Boat loaded: ${n}">⬇ ${esc(n)}</div>`).join('')}
      ${btDeparts.map(n=>`<div style="font-size:9px;padding:2px 4px;margin-bottom:1px;border-radius:3px;background:#dcfce7;color:#166534;border:1px solid #86efac;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="Boat departs: ${n}">⛵ ${esc(n)}</div>`).join('')}
      ${btUnloads.map(n=>`<div style="font-size:9px;padding:2px 4px;margin-bottom:1px;border-radius:3px;background:#fff7ed;color:#9a3412;border:1px solid #fed7aa;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="Cages unloaded at client: ${n}">📦 ${esc(n)}</div>`).join('')}
      ${btReturns.map(n=>`<div style="font-size:9px;padding:2px 4px;margin-bottom:1px;border-radius:3px;background:#fce7f3;color:#9d174d;border:1px solid #f9a8d4;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="Boat returns: ${n}">🏠 ${esc(n)}</div>`).join('')}
      ${movesHTML}
    </div>`;
  }
  const week1HTML = weekDays.slice(0,7).map(renderWeekDay).join('');
  const week2HTML = weekDays.slice(7).map(renderWeekDay).join('');

  // All movements table — hide completed by default
  let sortedAll = [...STATE.plannedMovements].sort((a,b)=>{
    const ao = a.sortOrder != null ? a.sortOrder : 999999;
    const bo = b.sortOrder != null ? b.sortOrder : 999999;
    if (ao !== bo) return ao - bo;
    return a.date.localeCompare(b.date);
  });
  let sorted = plannerShowCompleted ? sortedAll : sortedAll.filter(m => !m.completed);
  const completedCount = sortedAll.filter(m => m.completed).length;
  let tableRows = sorted.length === 0
    ? '<tr><td colspan="8" class="empty-msg" style="text-align:center;padding:20px">' + (plannerShowCompleted ? 'No movements planned' : 'No pending movements — all done!') + '</td></tr>'
    : sorted.map(m=>`
      <tr data-id="${m.id}" draggable="true" style="opacity:${m.completed?'0.5':'1'}" ondragstart="onMoveDragStart(event)" ondragover="onMoveDragOver(event)" ondrop="onMoveDrop(event)" ondragend="onMoveDragEnd(event)" ondragleave="onMoveDragLeave(event)">
        <td style="width:24px;padding:4px 2px"><span class="drag-handle" title="Drag to reorder">⠿</span></td>
        <td style="font-family:var(--font-mono)">
          ${!m.completed ? `<input type="date" value="${m.date}" title="Click to change date" style="border:none;background:transparent;font:600 12px var(--font-mono);color:var(--accent);cursor:pointer;width:130px;padding:2px 4px;border-radius:4px;border:1px solid transparent" onmouseover="this.style.borderColor='var(--border)'" onmouseout="this.style.borderColor='transparent'" onchange="rescheduleMove('${m.id}',this.value)" />` : `<span>${fmt(m.date)}</span>`}
        </td>
        <td>${m.shift==='night'?'🌙 Night':'☀ Day'}</td>
        <td>${esc(m.type)}</td>
        <td style="font-weight:600;color:var(--text-primary)">${esc(m.description)}</td>
        <td style="color:var(--text-muted)">
          ${esc(m.notes||'')}
          ${m.completed && m.completionNote ? `<div style="font-style:italic;font-size:10px;color:var(--purple)">"${esc(m.completionNote)}"</div>` : ''}
          ${!m.completed ? `<input class="move-note-edit" placeholder="Add note…" value="${esc(m.completionNote||'')}" onchange="setMoveNote('${m.id}',this.value)" title="Completion note (saved when you tick done)"/>` : ''}
        </td>
        <td><span class="badge ${m.completed?'badge-green':'badge-yellow'}">${m.completed?'Done':'Pending'}</span></td>
        <td style="white-space:nowrap">
          ${!m.completed ? `<button class="btn btn-primary btn-xs" onclick="completeMove('${m.id}')">✓</button> ` : ''}
          <button class="btn btn-danger btn-xs" onclick="deleteMove('${m.id}')">Del</button>
        </td>
      </tr>`).join('');

  // Build RMD & Frame summary sidebar for planner
  const _plannerShipDays = getShipmentDays();
  let rmdSummary = STATE.rmdSlots.map(r => {
    const slots4 = [
      {side:'A', slot:'cage1', lbl:'A Inside'},
      {side:'A', slot:'cage2', lbl:'A Outside'},
      {side:'B', slot:'cage1', lbl:'B Inside'},
      {side:'B', slot:'cage2', lbl:'B Outside'},
    ];
    const occupied = slots4.map(s => {
      const cid = r[s.side][s.slot];
      const c = cid ? getCage(cid) : null;
      return { ...s, c };
    });
    const hasAnyCage = occupied.some(s => s.c);
    if (!hasAnyCage) return `<div style="padding:6px 8px;background:var(--bg-elevated);border:1px solid var(--border);border-radius:6px;margin-bottom:6px;opacity:0.45">
      <div style="font:700 11px var(--font-mono);color:var(--text-muted)">RMD-${r.number} — empty</div>
    </div>`;
    const slotsHTML = occupied.map(s => {
      if (!s.c) return `<div style="display:flex;justify-content:space-between;padding:3px 6px;font-size:11px;color:var(--text-muted);font-style:italic">
        <span>${s.lbl}</span><span>—</span>
      </div>`;
      // Determine minimum frame size needed for shipping
      const minFrame = FRAME_WIDTHS.find(w => w >= s.c.width) || FRAME_WIDTHS[FRAME_WIDTHS.length-1];
      const walerNote = needsWaler(s.c) ? ' + waler' : '';
      const _ps = shipmentShadeClass(s.c, _plannerShipDays);
      const _pBg = _ps ? shipmentShadeBg(_ps) : (s.side==='A'?'background:rgba(37,99,176,0.06)':'background:rgba(26,138,74,0.06)');
      const _pNc = shipmentShadeNameColor(_ps) || 'color:var(--text-primary)';
      return `<div style="display:flex;justify-content:space-between;align-items:center;padding:4px 6px;${_pBg};border-radius:4px;margin-bottom:2px">
        <span style="font:600 11px var(--font-mono);${_pNc}">${esc(s.c.name)}</span>
        <span style="font-size:10px;${shipmentShadeDetailColor(_ps)||'color:var(--text-muted)'};">${s.lbl} · ${s.c.width}m · ${hCat(s.c.height)} · ${lCat(s.c.length)} · ${s.c.weight}t</span>
        <span style="font-size:9px;background:#fdf5dc;color:var(--yellow);border:1px solid #e0d8a0;border-radius:3px;padding:1px 5px;margin-left:4px" title="Minimum frame size needed for shipping">▣ ${minFrame}m${walerNote}</span>
      </div>`;
    }).join('');
    return `<div style="padding:8px;background:var(--bg-elevated);border:1px solid var(--border);border-radius:6px;margin-bottom:6px">
      <div style="font:700 12px var(--font-mono);color:var(--accent);margin-bottom:5px">RMD-${r.number} <span style="font-weight:400;color:var(--text-muted);font-size:10px">${occupied.filter(s=>s.c).length}/8 occupied</span></div>
      ${slotsHTML}
    </div>`;
  }).join('');

  let frameSummary = STATE.frames.filter(f=>f.cages.length>0 && f.location==='facility').map(f=>{
    const fCages = f.cages.map(cid=>getCage(cid)).filter(Boolean);
    let cageChips = fCages.map(c=>{
      const _fs = shipmentShadeClass(c, _plannerShipDays);
      const _fBg = _fs ? 'background:'+(_fs==='next'?'#3b1d6e':'#c8b8e8')+';color:'+(_fs==='next'?'#e0ccff':'#4a2a7a')+';border-radius:3px;padding:1px 5px;' : '';
      return `<span style="font-size:11px;${_fBg}">${esc(c.name)} · ${c.width}m · ${hCat(c.height)} · ${lCat(c.length)} · ${c.weight}t</span>`;
    }).join(', ');
    return `<div class="planner-frame-item">
      <span style="font-weight:700;font-family:var(--font-mono)">${esc(f.name)}</span>
      <span>${cageChips}</span>
      <span style="font-size:10px;color:var(--text-muted)">${f.width}m${f.hasWaler?' 🔩':''}${f.fixedForShipping?' ✓SHIP':''}</span>
    </div>`;
  }).join('') || '<div class="empty-msg">No cages in frames</div>';

  return `
    <div class="flex-between" style="margin-bottom:16px">
      <h2 class="section-title" style="margin:0">Movement Planner</h2>
      <div style="display:flex;gap:8px">
        <button class="btn btn-secondary btn-sm" onclick="openMovementsWindow()" title="Open Movements Map in a pop-out window">🗺 Open Movements</button>
        <button class="btn btn-secondary btn-sm" onclick="openDashboardWindow()" title="Open Dashboard in a second window">📊 Open Dashboard</button>
        <button class="btn btn-secondary btn-sm" onclick="autoplanDepartures()" title="Auto-plan cages due to leave the facility into suitable frames">⚡ Auto-Plan Departures</button>
        <button class="btn btn-danger btn-sm" onclick="blankCanvasPlanner()" title="Clear all planned movements and reset calendar">🗑 Blank Canvas</button>
        <button class="btn btn-primary" onclick="planFormOpen=!planFormOpen;render()">+ Plan Movement</button>
      </div>
    </div>
    ${formHTML}
    <div class="planner-layout" style="grid-template-columns:1fr 420px">
      <div>
        <div class="card">
          <div class="week-nav">
            <button class="btn btn-secondary btn-sm" onclick="shiftWeek(-1)">◄ Prev 2 Weeks</button>
            <span class="week-label">${fmt(weekDays[0])} — ${fmt(weekDays[13])}</span>
            <button class="btn btn-secondary btn-sm" onclick="shiftWeek(1)">Next 2 Weeks ►</button>
          </div>
          <div style="display:flex;gap:12px;margin-bottom:8px;font-size:10px;align-items:center;flex-wrap:wrap">
            <span style="padding:2px 6px;background:#fce8e8;color:var(--red);border:1px solid #e8b0b0;border-radius:3px">🚚 Cage leaves facility</span>
            <span style="padding:2px 6px;background:#ecfeff;color:#0e7490;border:1px solid #a5f3fc;border-radius:3px">🚢 Frame returns</span>
            <span style="padding:2px 6px;background:#e0f2fe;color:#075985;border:1px solid #7dd3fc;border-radius:3px">⬇ Boat loaded</span>
            <span style="padding:2px 6px;background:#dcfce7;color:#166534;border:1px solid #86efac;border-radius:3px">⛵ Boat departs</span>
            <span style="padding:2px 6px;background:#fff7ed;color:#9a3412;border:1px solid #fed7aa;border-radius:3px">📦 Cages unloaded</span>
            <span style="padding:2px 6px;background:#fce7f3;color:#9d174d;border:1px solid #f9a8d4;border-radius:3px">🏠 Boat returns</span>
          </div>
          <div style="font:600 10px var(--font-mono);color:var(--text-muted);text-transform:uppercase;letter-spacing:0.06em;margin-bottom:4px">Week 1</div>
          <div class="week-grid" style="margin-bottom:10px">${week1HTML}</div>
          <div style="font:600 10px var(--font-mono);color:var(--text-muted);text-transform:uppercase;letter-spacing:0.06em;margin-bottom:4px">Week 2</div>
          <div class="week-grid">${week2HTML}</div>
        </div>
        <div class="card">
          <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
            <div class="card-title" style="margin:0">All Planned Movements <span style="font-weight:400;font-size:11px;color:var(--text-muted)">(${sorted.length} shown${!plannerShowCompleted && completedCount > 0 ? `, ${completedCount} completed hidden` : ''})</span></div>
            <div style="display:flex;gap:6px">
              <button class="btn btn-secondary btn-sm" onclick="exportMovementsCSV()" title="Export all movements to CSV">📤 CSV</button>
              <button class="btn btn-secondary btn-sm" onclick="plannerShowCompleted=!plannerShowCompleted;render()" title="${plannerShowCompleted ? 'Hide completed movements' : 'Show completed movements'}">
                ${plannerShowCompleted ? '🙈 Hide Done' : '👁 Show Done (' + completedCount + ')'}
              </button>
            </div>
          </div>
          <div style="overflow-x:auto">
            <table><thead><tr>
              <th style="width:24px"></th><th>Date</th><th>Shift</th><th>Type</th><th>Description</th><th>Notes</th><th>Status</th><th>Actions</th>
            </tr></thead><tbody>${tableRows}</tbody></table>
          </div>
        </div>
      </div>
      <div class="planner-sidebar" style="max-height:calc(100vh - 140px);overflow-y:auto">
        <div class="card">
          <div class="card-title">Cages in RMD Storage</div>
          ${shipmentLegendHTML(_plannerShipDays)}
          <div>
          ${rmdSummary}
          </div>
        </div>
        <div class="card">
          <div class="card-title">Cages in Frames (at facility)</div>
          ${frameSummary}
        </div>
        ${(() => {
          const clientFrames = STATE.frames.filter(f => f.location === 'client' || f.location === 'boat');
          if (!clientFrames.length) return '';
          const today = todayStr();
          const rows = clientFrames.map(f => {
            const daysLeft = f.returnDate ? Math.ceil((new Date(f.returnDate+'T12:00:00') - new Date()) / 86400000) : null;
            const retCol = daysLeft === null ? 'color:var(--text-muted)' : daysLeft < 0 ? 'color:var(--red)' : daysLeft <= 7 ? 'color:var(--orange)' : 'color:#0e7490';
            const retLabel = f.returnDate ? fmt(f.returnDate) : '—';
            const retDaysStr = daysLeft !== null ? (daysLeft < 0 ? ` (${Math.abs(daysLeft)}d overdue)` : daysLeft === 0 ? ' (today)' : ` (${daysLeft}d)`) : '';
            return `<div style="display:flex;justify-content:space-between;align-items:center;padding:5px 0;border-bottom:1px solid var(--border);font-size:11px">
              <span style="font:700 11px var(--font-mono)">${esc(f.name)}</span>
              <span style="font-size:10px;padding:1px 6px;border-radius:10px;background:${f.location==='client'?'#f0e8fa':'#e6f0fa'};color:${f.location==='client'?'var(--purple)':'var(--blue)'};font-weight:600">${f.location}</span>
              <span style="${retCol};font-family:var(--font-mono)">${retLabel}${retDaysStr}</span>
            </div>`;
          }).join('');
          return `<div class="card">
            <div class="card-title">🚢 Frames Away (Client / Boat)</div>
            ${rows}
            ${clientFrames.length === 0 ? '<div class="empty-msg">None away</div>' : ''}
          </div>`;
        })()}
      </div>
    </div>
  `;
}

function openDashboardWindow() {
  // Serialize current page HTML and open as blob so it has same-origin access
  const html = document.documentElement.outerHTML;
  const blob = new Blob([html], {type: 'text/html'});
  const url = URL.createObjectURL(blob);
  const win = window.open(url, 'cage-tracker-dashboard', 'width=1280,height=860,scrollbars=yes,resizable=yes');
  if (!win) { alert('Pop-up blocked. Please allow pop-ups for this page.'); return; }
  win.addEventListener('load', () => {
    try {
      // Sync localStorage state to the new window
      const data = localStorage.getItem(STORAGE_KEY);
      if (data) win.localStorage.setItem(STORAGE_KEY, data);
      // Switch to dashboard tab
      setTimeout(() => {
        try { win.activeTab = 'dashboard'; win.render(); } catch(e) {}
      }, 100);
    } catch(e) { console.warn('Dashboard sync error:', e); }
  });
}

function openMovementsWindow() {
  const html = document.documentElement.outerHTML;
  const blob = new Blob([html], {type: 'text/html'});
  const url = URL.createObjectURL(blob);
  const win = window.open(url, 'cage-tracker-movements', 'width=1400,height=900,scrollbars=yes,resizable=yes');
  if (!win) { alert('Pop-up blocked. Please allow pop-ups for this page.'); return; }
  win.addEventListener('load', () => {
    setTimeout(() => {
      try { win.activeTab = 'movements'; win.render(); } catch(e) {}
    }, 100);
  });
}

async function addMovement() {
  const type = document.getElementById('pf-type').value;
  const cageId = document.getElementById('pf-cage').value;
  const frameEl = document.getElementById('pf-frame');
  const frameId = frameEl ? frameEl.value : '';
  const date = document.getElementById('pf-date').value;
  const shift = document.getElementById('pf-shift').value;
  const rmdEl = document.getElementById('pf-rmd');
  const rmdSlot = rmdEl ? rmdEl.value.trim() : '';
  const notes = document.getElementById('pf-notes').value.trim();
  if(!date) return alert('Please select a date.');

  const cage = getCage(cageId);

  // For fix-shipping, auto-find the frame the cage is in
  let resolvedFrameId = frameId;
  if (type === 'frame-fix-shipping' && cage) {
    const autoFrame = STATE.frames.find(f=>f.cages.includes(cageId));
    if(autoFrame) resolvedFrameId = autoFrame.id;
  }

  // For frame-to-rmd, auto-find the frame the cage is in (or pending into)
  if (type === 'frame-to-rmd' && cage && !resolvedFrameId) {
    // First check: cage is currently in a frame
    const currentFrame = STATE.frames.find(f => f.cages.includes(cageId));
    if (currentFrame) {
      resolvedFrameId = currentFrame.id;
    } else {
      // Second check: cage has a pending facility-to-frame movement — use that target frame
      const pendingMove = STATE.plannedMovements.find(
        m => !m.completed && m.cageId === cageId && m.typeKey === 'facility-to-frame' && m.frameId
      );
      if (pendingMove) resolvedFrameId = pendingMove.frameId;
    }
  }

  const frame = getFrame(resolvedFrameId);
  const parts = [];
  const frameWidthTag = (f) => f && f.width ? ` [${f.width}m]` : '';
  if(type === 'frame-return-from-client') {
    if(frame) parts.push(frame.name + frameWidthTag(frame));
    parts.push('Facility');
  } else if (type === 'frame-to-frame') {
    if(cage) parts.push(cage.name);
    const srcFrame = STATE.frames.find(f => f.cages.includes(cageId));
    if(srcFrame) parts.push(srcFrame.name + frameWidthTag(srcFrame));
    if(frame) parts.push(frame.name + frameWidthTag(frame));
  } else {
    if(cage) parts.push(cage.name);
    if(frame) parts.push(frame.name + frameWidthTag(frame));
    if(rmdSlot) parts.push('RMD-'+rmdSlot);
  }
  const desc = parts.join(' → ') || notes || 'Movement';
  const typeLabel = MOVE_TYPES.find(t=>t.value===type)?.label || type;

  const move = {
    id:uid(), type:typeLabel, typeKey:type, cageId, frameId:resolvedFrameId, rmdSlot,
    date, shift, notes, completed:false, description:desc, createdAt:new Date().toISOString(),
    sortOrder: STATE.plannedMovements.length
  };
  // For frame-to-frame, also store the source frame so completeMove can clear it
  if (type === 'frame-to-frame') {
    const srcFrame = STATE.frames.find(f => f.cages.includes(cageId));
    if (srcFrame) move.srcFrameId = srcFrame.id;
  }
  STATE.plannedMovements.push(move);
  planFormOpen = false;
  render();
  await addMovementToAPI(move);
}
async function completeMove(id) {
  const m = STATE.plannedMovements.find(x=>x.id===id);
  if(!m) return;

  const cage = getCage(m.cageId);
  const frame = getFrame(m.frameId);

  // Record location history for cage-moving operations
  if (cage) {
    if (m.typeKey === 'facility-to-frame' && frame) recordLocationChange(cage, 'frame', frame.name);
    else if (m.typeKey === 'rmd-to-frame' && frame) recordLocationChange(cage, 'frame', frame.name);
    else if (m.typeKey === 'frame-to-rmd' && m.rmdSlot) recordLocationChange(cage, 'rmd', 'RMD-' + m.rmdSlot);
    else if (m.typeKey === 'facility-to-rmd' && m.rmdNumber != null) recordLocationChange(cage, 'rmd', `RMD-${m.rmdNumber}${m.rmdSide||''}`);
    else if (m.typeKey === 'frame-to-frame' && frame) recordLocationChange(cage, 'frame', frame.name);
  }

  // Execute the actual movement based on type
  if (m.typeKey === 'facility-to-frame' && cage && frame) {
    // Clear cage from any current location
    clearCageFromCurrentLocation(cage.id);
    // Check frame capacity
    if (frame.cages.length >= 2) { alert(`Cannot complete: ${frame.name} already has max cages.`); return; }
    if (frame.cages.length === 1) {
      const existing = getCage(frame.cages[0]);
      if (existing && !canFitTwo(existing, cage, frame.width)) {
        const override = confirm(`⚠️ Warning: cages don't fit together in ${frame.name}.\n\nClick OK to override and complete the movement anyway, or Cancel to abort.`);
        if (!override) return;
      }
    }
    frame.cages.push(cage.id);
    cage.location = 'frame';
    cage.locationDetail = frame.name;
    cage.departureDate = null; // cage has left facility
  }
  else if (m.typeKey === 'frame-to-rmd' && cage) {
    // Parse RMD location — boat planner stores rmdNumber+rmdSide; manual planner may use rmdSlot like "3A"
    let rmdNum = null, side = null;
    if (m.rmdNumber != null) {
      rmdNum = parseInt(m.rmdNumber);
      side = (m.rmdSide || 'A').toUpperCase();
    } else if (m.rmdSlot && /^\d/.test(String(m.rmdSlot))) {
      const rmdMatch = String(m.rmdSlot).match(/^(\d+)\s*([ABab])/);
      if (rmdMatch) { rmdNum = parseInt(rmdMatch[1]); side = rmdMatch[2].toUpperCase(); }
    }
    if (rmdNum != null && side) {
      const rmdIdx = STATE.rmdSlots.findIndex(r=>r.number===rmdNum);
      if (rmdIdx !== -1) {
        const r = STATE.rmdSlots[rmdIdx];
        // Use the specific slot if given, otherwise find the first free slot
        const targetSlot = (m.rmdSlot && (m.rmdSlot === 'cage1' || m.rmdSlot === 'cage2')) ? m.rmdSlot : null;
        const slot = targetSlot && !r[side][targetSlot] ? targetSlot
                   : !r[side].cage1 ? 'cage1' : !r[side].cage2 ? 'cage2' : null;
        if (!slot) { alert(`Cannot complete: RMD-${rmdNum}${side} is full.`); return; }
        clearCageFromCurrentLocation(cage.id);
        r[side][slot] = cage.id;
        cage.location = 'rmd';
        cage.locationDetail = `RMD-${rmdNum}${side}`;
      }
    } else {
      // Can't determine RMD slot — just park at facility
      clearCageFromCurrentLocation(cage.id);
      cage.location = 'facility';
      cage.locationDetail = '';
    }
  }
  else if (m.typeKey === 'rmd-to-frame' && cage && frame) {
    clearCageFromCurrentLocation(cage.id);
    if (frame.cages.length >= 2) { alert(`Cannot complete: ${frame.name} already has max cages.`); return; }
    if (frame.cages.length === 1) {
      const existing = getCage(frame.cages[0]);
      if (existing && !canFitTwo(existing, cage, frame.width)) {
        const override = confirm(`⚠️ Warning: cages don't fit together in ${frame.name}.\n\nClick OK to override and complete the movement anyway, or Cancel to abort.`);
        if (!override) return;
      }
    }
    frame.cages.push(cage.id);
    cage.location = 'frame';
    cage.locationDetail = frame.name;
    cage.departureDate = null;
  }
  else if (m.typeKey === 'facility-to-rmd' && cage && m.rmdNumber != null) {
    const rmdNum = parseInt(m.rmdNumber);
    const side = (m.rmdSide || 'A').toUpperCase();
    const rmdIdx = STATE.rmdSlots.findIndex(r => r.number === rmdNum);
    if (rmdIdx !== -1) {
      const r = STATE.rmdSlots[rmdIdx];
      const slot = !r[side].cage1 ? 'cage1' : !r[side].cage2 ? 'cage2' : null;
      if (!slot) { alert(`Cannot complete: RMD-${rmdNum}${side} is full.`); return; }
      clearCageFromCurrentLocation(cage.id);
      r[side][slot] = cage.id;
      cage.location = 'rmd';
      cage.locationDetail = `RMD-${rmdNum}${side}`;
      cage.departureDate = null;
    }
  }
  else if (m.typeKey === 'frame-fix-shipping' && frame) {
    if (frame.cages.length === 1) {
      const c = getCage(frame.cages[0]);
      if (c && needsWaler(c) && !frame.hasWaler) {
        alert(`Cannot complete: cage ${c.name} is ${c.length}m (below ${STATE.settings.walerLengthThreshold||6.5}m threshold) and requires a waler.`); return;
      }
      frame.fixedForShipping = true;
    } else {
      alert('Frame must have exactly 1 cage to fix for shipping.'); return;
    }
  }
  else if (m.typeKey === 'frame-return-from-client' && frame) {
    frame.location = 'facility';
    frame.fixedForShipping = false;
    frame.returnedAt = todayStr(); // record actual return date for dashboard stats
    // Any cages in this frame should also be cleared (it should be empty, but just in case)
    frame.cages = [];
  }
  else if (m.typeKey === 'frame-to-frame' && cage && frame) {
    // Remove cage from its current frame
    const srcFrame = getFrame(m.srcFrameId) || STATE.frames.find(f => f.cages.includes(cage.id));
    if (srcFrame) {
      srcFrame.cages = srcFrame.cages.filter(id => id !== cage.id);
      if (srcFrame.fixedForShipping) srcFrame.fixedForShipping = false; // moving a cage un-fixes the source frame
    }
    // Check destination frame capacity
    if (frame.cages.length >= 2) { alert(`Cannot complete: ${frame.name} already has max cages.`); return; }
    if (frame.cages.length === 1) {
      const existing = getCage(frame.cages[0]);
      if (existing && !canFitTwo(existing, cage, frame.width)) {
        const override = confirm(`⚠️ Warning: cages don't fit together in ${frame.name}.\n\nClick OK to override and complete the movement anyway, or Cancel to abort.`);
        if (!override) return;
      }
    }
    frame.cages.push(cage.id);
    cage.location = 'frame';
    cage.locationDetail = frame.name;
    if (srcFrame) await saveFrame(srcFrame);
  }

  // Clear departure date whenever a cage physically leaves the facility
  if (cage && cage.location !== 'facility') {
    cage.departureDate = null;
  }

  m.completed = true;
  m.completedAt = new Date().toISOString();
  // Preserve any completion note that was typed before ticking done
  // (completionNote is already on m if setMoveNote was called)
  render();
  await updateMovementInAPI(m);
  if (cage) await saveCage(cage);
  if (frame) await saveFrame(frame);
  await saveRMD();
}

async function autoplanDepartures() {
  // Find all cages in 'facility' that have a departureDate set
  const dueToLeave = STATE.cages.filter(c => c.location === 'facility' && c.departureDate);

  if (dueToLeave.length === 0) {
    return alert('No facility cages have a departure date set. Edit cages to add expected departure dates.');
  }

  // Sort by departure date ascending
  dueToLeave.sort((a, b) => a.departureDate.localeCompare(b.departureDate));

  const warnings = [];
  const newMovements = [];
  const DAILY_LIMIT = STATE.settings.movementsPerDay || MAX_MOVES;

  // Build daily count from existing planned movements
  const existingCounts = {};
  STATE.plannedMovements.forEach(m => {
    if (!m.completed) existingCounts[m.date] = (existingCounts[m.date] || 0) + 1;
  });

  // Track frames being used across this auto-plan run (in addition to already loaded frames)
  // A frame is "in use" if it already has cages, or we've assigned it in this run
  const frameAssignments = {}; // cageId -> frameId (planned this run)

  // Available frames at facility (not currently fixed for shipping)
  const facilityFrames = STATE.frames.filter(f => f.location === 'facility' && !f.fixedForShipping);

  // Helper to find the best fitting frame for a cage, considering this run's assignments
  function findFrameForCage(cage) {
    const cageNeedsWaler = needsWaler(cage);
    const sorted = [...facilityFrames].sort((a, b) => a.width - b.width);

    // Count how many cages are virtually assigned to each frame this run
    const virtualCounts = {};
    Object.values(frameAssignments).forEach(fid => {
      virtualCounts[fid] = (virtualCounts[fid] || 0) + 1;
    });

    for (const f of sorted) {
      if (cage.width > f.width) continue;
      const realCount = f.cages.length;
      const virtualExtra = virtualCounts[f.id] || 0;
      const totalCount = realCount + virtualExtra;
      if (totalCount >= 2) continue;

      // Check waler
      if (cageNeedsWaler && !f.hasWaler) continue;

      // Check if pairing fits
      if (totalCount === 1) {
        // Find the partner cage (real or planned)
        const partnerCid = f.cages[0] || Object.keys(frameAssignments).find(cid => frameAssignments[cid] === f.id);
        if (partnerCid) {
          const partner = getCage(partnerCid);
          if (partner && !canFitTwo(partner, cage, f.width)) continue;
        }
      }
      return f;
    }

    // Relax waler restriction
    for (const f of sorted) {
      if (cage.width > f.width) continue;
      const realCount = f.cages.length;
      const virtualExtra = (Object.values(frameAssignments).filter(fid => fid === f.id).length);
      const totalCount = realCount + virtualExtra;
      if (totalCount >= 2) continue;
      if (totalCount === 1) {
        const partnerCid = f.cages[0] || Object.keys(frameAssignments).find(cid => frameAssignments[cid] === f.id);
        if (partnerCid) {
          const partner = getCage(partnerCid);
          if (partner && !canFitTwo(partner, cage, f.width)) continue;
        }
      }
      return f;
    }
    return null;
  }

  // Helper: find a free working day on or before a target date, respecting daily limits
  function findWorkingDay(targetDateStr, lookBackDays = 7) {
    // Try from target date backwards
    let d = new Date(targetDateStr + 'T12:00:00');
    for (let i = 0; i <= lookBackDays; i++) {
      const attempt = new Date(d);
      attempt.setDate(attempt.getDate() - i);
      const dow = attempt.getDay();
      if (dow === 0 || dow === 6) continue; // skip weekends
      const iso = toISO(attempt);
      if ((existingCounts[iso] || 0) < DAILY_LIMIT) return iso;
    }
    // Fallback: try days after target date
    d = new Date(targetDateStr + 'T12:00:00');
    for (let i = 1; i <= lookBackDays; i++) {
      const attempt = new Date(d);
      attempt.setDate(attempt.getDate() + i);
      const dow = attempt.getDay();
      if (dow === 0 || dow === 6) continue;
      const iso = toISO(attempt);
      if ((existingCounts[iso] || 0) < DAILY_LIMIT) return iso;
    }
    return targetDateStr; // last resort
  }

  let planned = 0;
  let skipped = 0;

  for (const cage of dueToLeave) {
    // Check if this cage already has a planned facility-to-frame movement
    const alreadyPlanned = STATE.plannedMovements.some(m =>
      m.cageId === cage.id && !m.completed &&
      (m.typeKey === 'facility-to-frame' || (m.type && m.type.includes('Facility') && m.type.includes('Frame')))
    );
    if (alreadyPlanned) {
      skipped++;
      continue;
    }

    // Find a suitable frame
    const frame = findFrameForCage(cage);
    if (!frame) {
      warnings.push(`⚠ No suitable frame found for cage ${cage.name} (${cage.width}m wide${needsWaler(cage) ? ' + needs waler' : ''}). Check frame availability.`);
      continue;
    }

    // Schedule the movement on the departure date itself (or nearest working day)
    const depDate = cage.departureDate;
    const plannedDate = findWorkingDay(depDate, 10);

    // Register in existingCounts
    existingCounts[plannedDate] = (existingCounts[plannedDate] || 0) + 1;
    frameAssignments[cage.id] = frame.id;

    const walerNote = needsWaler(cage) && !frame.hasWaler ? ' [⚠ waler may be needed]' : '';
    const desc = `${cage.name} → ${frame.name} (${frame.width}m${frame.hasWaler ? ' 🔩' : ''})`;

    newMovements.push({
      id: uid(),
      type: 'Facility → Frame',
      typeKey: 'facility-to-frame',
      cageId: cage.id,
      frameId: frame.id,
      date: plannedDate,
      shift: 'day',
      notes: `Auto-planned · Departs ${fmt(depDate)}${walerNote}`,
      completed: false,
      description: desc,
      createdAt: new Date().toISOString()
    });

    // Also add a fix-for-shipping step if only 1 cage will be in frame after this
    // (schedule it on the same day, it counts as 1 move)
    // We'll let the user manually fix — don't auto-generate fix steps to avoid confusion

    planned++;
  }

  if (planned === 0 && skipped === 0 && warnings.length === 0) {
    return alert('No cages need auto-planning at this time.');
  }

  STATE.plannedMovements.push(...newMovements);

  let msg = `✅ Auto-planned ${planned} movement${planned !== 1 ? 's' : ''}.`;
  if (skipped > 0) msg += ` ${skipped} cage${skipped !== 1 ? 's' : ''} already had planned movements (skipped).`;
  if (warnings.length > 0) msg += '\n\n' + warnings.join('\n');

  render();
  alert(msg);
  await Promise.all(newMovements.map(m => addMovementToAPI(m)));
}

let _dragSrcId = null;

function onMoveDragStart(e) {
  _dragSrcId = e.currentTarget.dataset.id;
  e.currentTarget.classList.add('dragging');
  e.dataTransfer.effectAllowed = 'move';
}

function onMoveDragOver(e) {
  e.preventDefault();
  e.dataTransfer.dropEffect = 'move';
  const row = e.currentTarget;
  if (row.dataset.id !== _dragSrcId) row.classList.add('drag-over');
}

function onMoveDragLeave(e) {
  e.currentTarget.classList.remove('drag-over');
}

function onMoveDragEnd(e) {
  document.querySelectorAll('tr.dragging').forEach(r => r.classList.remove('dragging'));
  document.querySelectorAll('tr.drag-over').forEach(r => r.classList.remove('drag-over'));
  _dragSrcId = null;
}

async function onMoveDrop(e) {
  e.preventDefault();
  const targetId = e.currentTarget.dataset.id;
  if (!targetId || targetId === _dragSrcId || !_dragSrcId) return;

  // Reorder in STATE — use the currently displayed sorted order as the base
  const allMovements = [...STATE.plannedMovements];
  const srcIdx = allMovements.findIndex(m => m.id === _dragSrcId);
  const tgtIdx = allMovements.findIndex(m => m.id === targetId);
  if (srcIdx === -1 || tgtIdx === -1) return;

  const [moved] = allMovements.splice(srcIdx, 1);
  allMovements.splice(tgtIdx, 0, moved);
  allMovements.forEach((m, i) => { m.sortOrder = i; });
  STATE.plannedMovements = allMovements;
  render();

  try {
    await api('/api/movements/reorder', 'PUT', { ids: allMovements.map(m => m.id) });
  } catch(err) {
    console.warn('Reorder save failed', err);
  }
}

function renderBoatDiary() {
  // Build 3-week calendar
  const ws = new Date(btWeekStart+'T12:00:00');
  let allDays = [];
  for(let i=0;i<21;i++) { const d=new Date(ws); d.setDate(d.getDate()+i); allDays.push(toISO(d)); }

  // Index boat trip events by date
  const loadByDay={}, departByDay={}, unloadByDay={}, returnByDay2={};
  STATE.boatTrips.forEach(t=>{
    if(t.loadDate)    { if(!loadByDay[t.loadDate])       loadByDay[t.loadDate]=[];       loadByDay[t.loadDate].push(t); }
    if(t.departDate)  { if(!departByDay[t.departDate])   departByDay[t.departDate]=[];   departByDay[t.departDate].push(t); }
    if(t.unloadDate)  { if(!unloadByDay[t.unloadDate])   unloadByDay[t.unloadDate]=[];   unloadByDay[t.unloadDate].push(t); }
    if(t.returnDate)  { if(!returnByDay2[t.returnDate])  returnByDay2[t.returnDate]=[];  returnByDay2[t.returnDate].push(t); }
  });

  function renderBtDay(day) {
    const isToday = day===todayStr();
    const loads = loadByDay[day]||[];
    const departs = departByDay[day]||[];
    const unloads = unloadByDay[day]||[];
    const returns = returnByDay2[day]||[];
    const hasEvents = loads.length+departs.length+unloads.length+returns.length>0;
    let evHTML = '';
    loads.forEach(t=>{ evHTML+=`<div class="bt-event load" onclick="editBoatTrip('${t.id}')" title="${esc(t.label)}${t.notes?': '+t.notes:''}">⬇ ${esc(t.label)}</div>`; });
    departs.forEach(t=>{ evHTML+=`<div class="bt-event depart" onclick="editBoatTrip('${t.id}')" title="${esc(t.label)}${t.notes?': '+t.notes:''}">⛵ ${esc(t.label)}</div>`; });
    unloads.forEach(t=>{ evHTML+=`<div class="bt-event" style="background:#fff7ed;color:#9a3412;border:1px solid #fed7aa" onclick="editBoatTrip('${t.id}')" title="Cages unloaded at client: ${esc(t.label)}">📦 ${esc(t.label)}</div>`; });
    returns.forEach(t=>{ evHTML+=`<div class="bt-event return" onclick="editBoatTrip('${t.id}')" title="${esc(t.label)}${t.notes?': '+t.notes:''}">🏠 ${esc(t.label)}</div>`; });
    return `<div class="bt-week-day ${isToday?'today':''} ${hasEvents?'has-events':''}">
      <div class="bt-week-day-hdr">${fmtShort(day)}</div>
      ${evHTML}
    </div>`;
  }

  const week1HTML = allDays.slice(0,7).map(renderBtDay).join('');
  const week2HTML = allDays.slice(7,14).map(renderBtDay).join('');
  const week3HTML = allDays.slice(14,21).map(renderBtDay).join('');

  const endDate = allDays[20];

  // Sorted trip list
  const sorted = [...STATE.boatTrips].sort((a,b)=>{
    const da=a.loadDate||a.departDate||a.returnDate||'';
    const db=b.loadDate||b.departDate||b.returnDate||'';
    return da.localeCompare(db);
  });

  let tripRows = sorted.length===0

function renderShipping() {
  const ready = STATE.frames.filter(f=>f.fixedForShipping && f.location==='facility');

  let readyHTML = ready.length === 0
    ? '<div class="empty-msg">No frames fixed for shipping. Go to Frames tab to fix cages to frames.</div>'
    : '<div style="display:flex;flex-wrap:wrap;gap:0">' + ready.map(f=>{
      const cage = f.cages.map(cid=>getCage(cid)).filter(Boolean)[0];
      const sel = shipSelected.includes(f.id);
      return `<div class="ship-frame-select ${sel?'selected':''}" onclick="${shipFormOpen?`toggleShipSelect('${f.id}')`:''}" style="cursor:${shipFormOpen?'pointer':'default'};opacity:${shipFormOpen?1:0.7}">
        <div><div class="ship-frame-name">${esc(f.name)}</div>${cage ? `<div class="ship-frame-cage">${esc(cage.name)}${f.hasWaler?' 🔩':''}</div>` : ''}</div>

    }).join('') + '</div>';

  let formHTML = '';
  if (shipFormOpen) {
    formHTML = `<div class="card">
      <div class="form-grid form-grid-2">
        <div><label>Ship Date</label><input id="sf-date" type="date" value="${todayStr()}"/></div>
        <div><label>Notes</label><input id="sf-notes"/></div>
      </div>

    : [...STATE.shipments].sort((a,b)=>b.date.localeCompare(a.date)).map(sh=>{
      const statusBadge = {['in-transit']:'blue', delivered:'purple', ['frames-returned']:'green'}[sh.status]||'accent';
      const frameNames = sh.frameIds.map(fid=>{ const f=getFrame(fid); return f?f.name:'?'; }).join(', ');

function toggleShipSelect(fid) {
  if(shipSelected.includes(fid)) shipSelected=shipSelected.filter(id=>id!==fid);
  else shipSelected.push(fid);
  render();
}
function addAuditEvent(type, description, detail, relatedIds) {
  const event = {
    id: uid(), type, description, detail: detail || '',
    relatedIds: relatedIds || [],
    timestamp: new Date().toISOString(),
    date: new Date().toISOString().slice(0,10),
  };
  if (!STATE.auditEvents) STATE.auditEvents = [];
  STATE.auditEvents.unshift(event);
  if (STATE.auditEvents.length > 500) STATE.auditEvents = STATE.auditEvents.slice(0, 500);
  saveAuditEventToAPI(event);
}

async function createShipment() {
  if(shipSelected.length===0) return alert('Select frames to ship.');
  const date = document.getElementById('sf-date').value;
  const notes = document.getElementById('sf-notes').value.trim();
  const shipment = {id:uid(), date, notes, frameIds:[...shipSelected], status:'in-transit', createdAt:new Date().toISOString()};
  STATE.shipments.push(shipment);
  const updatedFrames = [];
  const updatedCages = [];
  shipSelected.forEach(fid=>{
    const f=getFrame(fid);
    f.location='boat';
    updatedFrames.push(f);
    f.cages.forEach(cid=>{ const c=getCage(cid); if(c){c.location='shipped';c.locationDetail='In transit'; updatedCages.push(c);} });
  });
  // Audit log entry for shipment
  {
    const frameNames = shipSelected.map(fid => getFrame(fid)?.name || fid).join(', ');
    const cageNames = shipSelected.flatMap(fid => (getFrame(fid)?.cages || []).map(cid => getCage(cid)?.name || cid)).join(', ');
    addAuditEvent('🚢 Shipped', `${shipSelected.length} frame(s) shipped: ${frameNames}`, cageNames ? `Cages aboard: ${cageNames}` : '', shipSelected);
  }
  shipFormOpen=false; shipSelected=[];
  render();
  await addShipmentToAPI(shipment);
  await Promise.all(updatedFrames.map(f => saveFrame(f)));
  await Promise.all(updatedCages.map(c => saveCage(c)));
}
async function markDelivered(sid) {
  const sh = STATE.shipments.find(s=>s.id===sid);
  sh.status = 'delivered';
  const updatedFrames = [];
  sh.frameIds.forEach(fid=>{ const f=getFrame(fid); if(f) { f.location='client'; updatedFrames.push(f); } });
  render();
  await updateShipmentInAPI(sh);
  await Promise.all(updatedFrames.map(f => saveFrame(f)));
}
async function clearShipmentHistory() {
  const count = STATE.shipments.length;
  if (count === 0) return;
  if (!confirm(`Clear all ${count} shipment record${count!==1?'s':''}? This cannot be undone.`)) return;
  const ids = STATE.shipments.map(s=>s.id);
  STATE.shipments = [];
  render();
  await Promise.all(ids.map(id => deleteShipmentFromAPI(id)));
}

async function returnFrames(sid) {
  const sh = STATE.shipments.find(s=>s.id===sid);
  sh.status = 'frames-returned';
  const updatedFrames = [];
  const returnedFrameNames = [];
  sh.frameIds.forEach(fid=>{
    const f=getFrame(fid);
    if(f){ returnedFrameNames.push(f.name + (f.width ? ` [${f.width}m]` : '')); f.location='facility'; f.cages=[]; f.fixedForShipping=false; updatedFrames.push(f); }
  });
  addAuditEvent('↩ Frame Return', `${updatedFrames.length} frame(s) returned to facility`, returnedFrameNames.join(', '), sh.frameIds);
  render();
  await updateShipmentInAPI(sh);
  await Promise.all(updatedFrames.map(f => saveFrame(f)));
}

async function returnFromClient(fid) {
  const f = getFrame(fid);
  if (!f) return;
  const updatedCages = [];
  const cageNames = f.cages.map(cid => getCage(cid)?.name || cid).filter(Boolean);
  f.cages.forEach(cid => {
    const c = getCage(cid);
    if (c) { c.location = 'facility'; c.locationDetail = ''; c.departureDate = null; updatedCages.push(c); }
  });
  addAuditEvent('↩ Frame Return', `${f.name}${f.width ? ` [${f.width}m]` : ''} returned from client`, cageNames.length ? `Cages unloaded: ${cageNames.join(', ')}` : 'No cages aboard', [fid]);
  f.cages = [];
  f.fixedForShipping = false;
  f.location = 'boat';
  render();
  await saveFrame(f);
  await Promise.all(updatedCages.map(c => saveCage(c)));
}

function renderOverview() {
  const chipClass = (h) => hCat(h).toLowerCase();
  const cageChip = (c) => `<span class="overview-cage-chip ${chipClass(c.height)}">${esc(c.name)}</span>`;

  // RMD section - spatial layout, A on top, B on bottom, inside slots face each other
  let rmdRows = RMD_LAYOUT.map(row=>{
    let items = row.items.map(item=>{
      const r = getRMDByNum(item);
      if(!r) return '';
      // Side A: outside (cage2) on top row, inside (cage1) on bottom row
      // Side B: inside (cage1) on top row, outside (cage2) on bottom row
      function chipOrEmpty(side, slot) {
        const cid = r[side][slot];
        if(!cid) return '';
        const c = getCage(cid);
        return c ? cageChip(c) : '';
      }
      let aOut = chipOrEmpty('A','cage2');
      let aIn = chipOrEmpty('A','cage1');
      let bIn = chipOrEmpty('B','cage1');
      let bOut = chipOrEmpty('B','cage2');

      return `<div style="flex:0 0 auto;min-width:160px">
        <div style="font:700 13px var(--font-mono);color:var(--accent);text-align:center;margin-bottom:4px">RMD-${item}</div>
        <div class="overview-side-box" style="margin-bottom:2px">
          <div class="overview-side-label">A outside</div>${aOut || '<span style="font-size:10px;color:var(--text-muted)">—</span>'}
        </div>
        <div class="overview-side-box" style="margin-bottom:2px;border-color:var(--accent);border-style:dashed">
          <div class="overview-side-label">A inside / B inside</div>${aIn} ${bIn || ''} ${!aIn && !bIn ? '<span style="font-size:10px;color:var(--text-muted)">—</span>' : ''}
        </div>
        <div class="overview-side-box">
          <div class="overview-side-label">B outside</div>${bOut || '<span style="font-size:10px;color:var(--text-muted)">—</span>'}
        </div>
      </div>`;
    }).join('');
    return `<div class="rmd-site-row row-${row.row}">${items}</div>`;
  }).join('');

  // Frames with cages
  let framesWithCages = STATE.frames.filter(f=>f.cages.length>0).map(f=>{
    const fCages = f.cages.map(cid=>getCage(cid)).filter(Boolean);
    const cls = f.fixedForShipping ? 'shipping' : 'has-cage';
    let badges = `<div class="overview-frame-badges">`;
    badges += `<span class="badge badge-blue" style="font-size:9px;padding:1px 6px">${f.width}m</span>`;
    if(f.hasWaler) badges += `<span class="badge badge-blue" style="font-size:9px;padding:1px 6px">🔩</span>`;
    if(f.fixedForShipping) badges += `<span class="badge badge-accent" style="font-size:9px;padding:1px 6px">SHIP</span>`;
    const locBdg = f.location!=='facility' ? `<span class="badge badge-purple" style="font-size:9px;padding:1px 6px">${f.location}</span>` : '';
    badges += locBdg + `</div>`;
    let cageInfo = fCages.map(c=>`${cageChip(c)} <span style="font-size:10px;color:var(--text-muted)">${c.height}m × ${c.width}m × ${c.length}m | ${c.weight}t</span>`).join('<br/>');
    return `<div class="overview-frame-card ${cls}">
      <div class="overview-frame-name">${esc(f.name)}</div>
      <div class="overview-frame-info">${cageInfo}</div>
      ${badges}
    </div>`;
  }).join('') || '<div class="empty-msg">No cages in any frames</div>';

  // Empty frames at facility
  let emptyFrames = STATE.frames.filter(f=>f.cages.length===0 && f.location==='facility');
  let emptyFramesSummary = emptyFrames.length > 0
    ? `<div style="font-size:12px;color:var(--text-muted);margin-top:8px">${emptyFrames.length} empty frames at facility: <span style="font-family:var(--font-mono);font-size:11px">${emptyFrames.map(f=>f.name).join(', ')}</span></div>`
    : '';

  // Stats
  const totalInRMD = STATE.cages.filter(c=>c.location==='rmd').length;
  const totalInFrames = STATE.cages.filter(c=>c.location==='frame').length;
  const totalReady = STATE.frames.filter(f=>f.fixedForShipping).length;

  return `
    <div class="flex-between" style="margin-bottom:16px">
      <h2 class="section-title" style="margin:0">Storage & Frame Overview</h2>
      <div style="display:flex;gap:12px;font-size:13px">
        <span><strong style="color:var(--green)">${totalInRMD}</strong> in RMD</span>
        <span><strong style="color:var(--blue)">${totalInFrames}</strong> in Frames</span>
        <span><strong style="color:var(--accent)">${totalReady}</strong> ready to ship</span>
      </div>
    </div>
    <div>
      <div class="card">
        <div class="card-title">RMD Storage Bays</div>
        <div style="display:flex;gap:8px;margin-bottom:10px;font-size:10px">
          <span class="overview-cage-chip short">Short &lt;${STATE.settings.heightShortMax||H_SHORT}m</span>
          <span class="overview-cage-chip medium">Medium ≤${STATE.settings.heightMedMax||H_MED}m</span>
          <span class="overview-cage-chip tall">Tall &gt;${STATE.settings.heightMedMax||H_MED}m</span>
        </div>
        <div class="rmd-site-layout">${rmdRows}</div>
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-top:16px">
        <div class="card">
          <div class="card-title">Frames with Cages (${STATE.frames.filter(f=>f.cages.length>0).length})</div>
          ${framesWithCages}
        </div>
        <div class="card">
          <div class="card-title">Empty Frames at Facility (${emptyFrames.length})</div>
          ${emptyFramesSummary || '<div class="empty-msg">None</div>'}
        </div>
      </div>
    </div>
  `;
}

async function clearReportMovements() {
  const inRange = STATE.plannedMovements.filter(m => m.date >= reportFrom && m.date <= reportTo);
  if (inRange.length === 0) return alert('No movements in the selected date range.');
  if (!confirm(`Clear ${inRange.length} movement${inRange.length!==1?'s':''} between ${fmt(reportFrom)} and ${fmt(reportTo)}? This cannot be undone.`)) return;
  const ids = inRange.map(m=>m.id);
  STATE.plannedMovements = STATE.plannedMovements.filter(m => !(m.date >= reportFrom && m.date <= reportTo));
  render();
  await Promise.all(ids.map(id => deleteMovementFromAPI(id)));
}
