          <tr><td style="padding:4px 8px" colspan="3" style="color:var(--text-muted);font-size:11px">All other combinations (e.g. Tall outside, Short inside) are not permitted.</td></tr>
        </tbody>
      </table>
    </div>

    <div class="card" style="max-width:620px">
      <div class="card-title">&#128295; Waler Requirement</div>
      <p style="font-size:12px;color:var(--text-muted);margin-bottom:14px">Cages shorter than this length require a waler when being shipped on a transport frame.</p>
      ${field('walerLengthThreshold', 'Waler required below length (m)', s.walerLengthThreshold || 6.5, 0.05, 'Cages with length below this value are flagged as needing a waler. Default: 6.5m')}

async function applySettings() {
  const get = id => {
    const el = document.getElementById('setting-' + id);
    return el ? parseFloat(el.value) : null;
  };
  const newSettings = {
    movementsPerDay: Math.max(1, Math.round(get('movementsPerDay') || 4)),
    heightShortMax:  Math.max(0.1, get('heightShortMax') || 2.7),
    heightMedMax:    Math.max(0.1, get('heightMedMax') || 4.7),
    walerLengthThreshold: Math.max(0.1, get('walerLengthThreshold') || 6.5),
    doubleSpareWidth: Math.max(0, get('doubleSpareWidth') !== null ? get('doubleSpareWidth') : 0.2),
    doubleMaxWeight:  Math.max(0, get('doubleMaxWeight') || 14),
    frameSpare:     Math.max(0, get('frameSpare')     !== null ? get('frameSpare')     : 0.2),
    frameTierSmall: Math.max(0.1, get('frameTierSmall') || 1.1),
    frameTierMed:   Math.max(0.1, get('frameTierMed')   || 1.5),
  };
  if (newSettings.heightShortMax >= newSettings.heightMedMax) {
    showError('Short/Medium threshold must be less than Medium/Tall threshold.');
    return;
  }
  if (newSettings.frameTierSmall >= newSettings.frameTierMed) {
    showError('Frame Tier 1 width must be less than Frame Tier 2 width.');
    return;
  }
  STATE.settings = newSettings;
  render();
  // Show saved message after render (element will be recreated)
  setTimeout(() => {
    const msg = document.getElementById('settings-saved-msg');
    if (msg) { msg.style.display = 'inline'; setTimeout(() => { if(msg) msg.style.display = 'none'; }, 3000); }
  }, 50);
  await saveSettings(newSettings);
}


function hidePinScreen() {
  document.getElementById('pin-overlay').style.display = 'none';
  document.getElementById('app-wrapper').style.display = 'flex';
  document.querySelectorAll('.write-only').forEach(el => {
    el.style.display = isReadOnly() ? 'none' : '';
  });
  const badge = document.getElementById('access-badge');
  if (badge) {
    badge.textContent = isReadOnly() ? '👁 READ ONLY' : '✏ READ & WRITE';
    badge.style.background = isReadOnly() ? '#2563b0' : '#1a8a4a';
  }
}

async function submitPin() {
  const pin = document.getElementById('pin-input').value.trim();
  if (!pin) return;
  const btn = document.getElementById('pin-submit-btn');
  const wasLocked = btn.disabled;
  if (!wasLocked) { btn.disabled = true; btn.textContent = 'Checking...'; }
  try {
    const res = await fetch(API_BASE + '/api/auth', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ pin })
    });
    const data = await res.json();

    if (res.status === 429 || data.locked) {
      // Locked out
      showPinScreen(data.error || 'Too many attempts. Please wait.', true, data.remaining || 300);
      return;
    }

    if (data.ok && data.level === 'admin_unlock') {
      // Admin PIN used — IP unlocked, prompt for real PIN
      showPinScreen('');
      const errEl = document.getElementById('pin-error');
      errEl.textContent = '✓ Unlocked by admin. Enter your access PIN.';
      errEl.style.color = '#1a8a4a';
      errEl.style.background = 'rgba(26,138,74,0.1)';
      errEl.style.borderColor = 'rgba(26,138,74,0.3)';
      errEl.style.display = 'block';
      return;
    }

    if (data.ok) {
      _sessionPin = pin;
      _sessionLevel = data.level;
      // Cache PIN for today — won't ask again until tomorrow
      try {
        localStorage.setItem('ct_pin_cache', JSON.stringify({
          pin, level: data.level, date: new Date().toISOString().slice(0,10)
        }));
      } catch(e) {}
      // Reset error style in case admin unlock changed it
      const errEl = document.getElementById('pin-error');
      errEl.style.color = ''; errEl.style.background = ''; errEl.style.borderColor = '';
      hidePinScreen();
      try { await loadState(); } catch(e) { console.error('loadState failed:', e); }
      try { render(); } catch(e) {
        console.error('render failed:', e);
        const main = document.getElementById('main-content');
        if (main) main.innerHTML = `<div style="padding:40px;color:#c93030;font-size:14px">
          <strong>Error rendering page:</strong> ${e.message}<br><br>
          <button onclick="location.reload()" style="padding:8px 16px;background:#e8a830;border:none;border-radius:6px;cursor:pointer;font-weight:600">Reload</button>
        </div>`;
      }
    } else {
      // Wrong PIN — show attempts remaining or generic error
      const msg = data.error || 'Incorrect PIN. Please try again.';
      showPinScreen(msg, false, 0);
    }
  } catch(e) {
    showPinScreen('Connection error. Please try again.', false, 0);
    const btn2 = document.getElementById('pin-submit-btn');
    btn2.disabled = false; btn2.textContent = 'Unlock';
  }
}

function logout() {
  _sessionPin = null;
  _sessionLevel = null;
  try { localStorage.removeItem('ct_pin_cache'); } catch(e) {}
  document.getElementById('pin-overlay').style.display = 'flex';
  document.getElementById('app-wrapper').style.display = 'none';
  const inp = document.getElementById('pin-input');
  if (inp) { inp.value = ''; setTimeout(() => inp.focus(), 100); }
  const errEl = document.getElementById('pin-error');
  if (errEl) { errEl.style.display = 'none'; }
}

document.addEventListener("DOMContentLoaded", async function() {
  // Restore last active tab from session
  try {
    const savedTab = sessionStorage.getItem('ct_activeTab');
    if (savedTab) activeTab = savedTab;
  } catch(e) {}

  // Try today's cached PIN first — skip PIN screen if valid
  try {
    const cached = JSON.parse(localStorage.getItem('ct_pin_cache') || 'null');
    const today = new Date().toISOString().slice(0,10);
    if (cached && cached.pin && cached.date === today) {
      // Attempt silent auth with cached PIN
      const res = await fetch(API_BASE + '/api/auth', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ pin: cached.pin })
      });
      const data = await res.json();
      if (data.ok && (data.level === cached.level || data.level)) {
        _sessionPin = cached.pin;
        _sessionLevel = data.level || cached.level;
        hidePinScreen();
        try { await loadState(); } catch(e) { console.error('loadState failed:', e); }
        try { render(); } catch(e) { console.error('render failed:', e); }
        // Set up Enter key listener still
        document.getElementById('pin-input').addEventListener('keydown', e => {
          if (e.key === 'Enter') submitPin();
        });
        document.getElementById('pin-input').addEventListener('input', e => {
          const btn = document.getElementById('pin-submit-btn');
          if (e.target.value.trim().length > 0) {
            btn.disabled = false;
            if (btn.textContent.startsWith('Locked')) btn.textContent = 'Unlock';
          } else {
            if (_lockoutTimer) { btn.disabled = true; }
          }
        });
        return; // Skip showing PIN screen
      }
    }
  } catch(e) { /* silent fail — fall through to PIN screen */ }

  // Check if IP is already locked before showing screen
  try {
    const res = await fetch(API_BASE + '/api/lockout-status');
    const data = await res.json();
    if (data.locked) {
      showPinScreen('Too many previous attempts.', true, data.remaining);
    } else {
      showPinScreen();
    }
  } catch(e) {
    showPinScreen();
  }
  document.getElementById('pin-input').addEventListener('keydown', e => {
    if (e.key === 'Enter') submitPin();  // always fires, even during lockout (admin PIN)
  });
  // Re-enable the Unlock button as soon as the user starts typing (allows admin PIN during lockout)
  document.getElementById('pin-input').addEventListener('input', e => {
    const btn = document.getElementById('pin-submit-btn');
    if (e.target.value.trim().length > 0) {
      btn.disabled = false;
      if (btn.textContent.startsWith('Locked')) btn.textContent = 'Unlock';
    } else {
      // If they clear the box while locked, re-disable
      if (_lockoutTimer) { btn.disabled = true; }
    }
  });
});

</script>
