// GLOBAL SEARCH
// ═══════════════════════════════════════════════════════════════════════════════
function openGlobalSearch() {
  globalSearchOpen = true; globalSearchQuery = ''; globalSearchIdx = 0;
  renderSearchModal(); // focus is handled inside renderSearchModal on first build
}
function closeGlobalSearch() {
  globalSearchOpen = false;
  const el = document.getElementById('gs-overlay'); if(el) el.remove();
}
function globalSearchResults(q) {
  if (!q || q.length < 1) return [];
  const ql = q.toLowerCase();
  const results = [];
  STATE.cages.forEach(c => {
    if (c.name.toLowerCase().includes(ql) || (c.notes||'').toLowerCase().includes(ql) || (c.locationDetail||'').toLowerCase().includes(ql)) {
      const trip = c.proposedTripId ? getBoatTrip(c.proposedTripId) : null;
      results.push({ type:'cage', id:c.id, name:c.name, meta:`${locLabel(c)} · ${c.width}m × ${c.height}m × ${c.length}m · ${c.weight}t${trip?' · '+tripLabel(trip):''}`, badge:locBadge(c.location), badgeLabel:locLabel(c), action:()=>{ closeGlobalSearch(); switchTab('cages'); setTimeout(()=>{ cageSearch=c.name; render(); },100); } });
    }
  });
  STATE.frames.forEach(f => {
    if (f.name.toLowerCase().includes(ql)) {
      results.push({ type:'frame', id:f.id, name:f.name, meta:`${f.location} · ${f.width}m · ${f.cages.length} cage(s)${f.returnDate?' · returns '+fmt(f.returnDate):''}`, badge:{facility:'green',boat:'blue',client:'purple'}[f.location]||'accent', badgeLabel:f.location, action:()=>{ closeGlobalSearch(); switchTab('frames'); } });
    }
  });
  STATE.boatTrips.forEach(t => {
    if ((t.label||'').toLowerCase().includes(ql) || (t.notes||'').toLowerCase().includes(ql)) {
      results.push({ type:'trip', id:t.id, name:t.label||'Unnamed Trip', meta:`${t.departDate?'Departs '+fmt(t.departDate):''}${t.unloadDate?' · Unloads '+fmt(t.unloadDate):''}`, badge:'accent', badgeLabel:'trip', action:()=>{ closeGlobalSearch(); switchTab('boatplan'); } });
    }
  });
  return results.slice(0, 12);
}
function gsResultsHTML() {
  const results = globalSearchResults(globalSearchQuery);
  if (globalSearchQuery.length === 0)
    return `<div style="padding:18px;text-align:center;color:var(--text-muted);font-size:12px">Type to search cages, frames, or trips…</div>`;
  if (results.length === 0)
    return `<div style="padding:18px;text-align:center;color:var(--text-muted);font-size:12px">No results for "${esc(globalSearchQuery)}"</div>`;
  return results.map((r,i) => `
    <div class="search-result-item ${i===globalSearchIdx?'active':''}" id="gsr-${i}" onclick="gsSelectResult(${i})">
      <div style="flex:1;min-width:0">
        <div class="search-result-name">${esc(r.name)}</div>
        <div class="search-result-meta">${esc(r.meta)}</div>
      </div>
      <span class="badge badge-${r.badge} search-result-badge" style="font-size:10px">${esc(r.badgeLabel)}</span>
    </div>`).join('');
}
function renderSearchModal() {
  if (!globalSearchOpen) { const ex=document.getElementById('gs-overlay'); if(ex) ex.remove(); return; }

  // If modal already exists, only update the results panel — keeps the input
  // element alive so the mobile keyboard never dismisses.
  const existing = document.getElementById('gs-overlay');
  if (existing) {
    const resultsEl = document.getElementById('gs-results');
    if (resultsEl) resultsEl.innerHTML = gsResultsHTML();
    return;
  }

  const overlay = document.createElement('div');
  overlay.id = 'gs-overlay'; overlay.className = 'search-overlay';
  overlay.onclick = e => { if(e.target===overlay) closeGlobalSearch(); };

  overlay.innerHTML = `<div class="search-modal">
    <div class="search-input-row">
      <span class="search-icon">🔍</span>
      <input id="gs-input" placeholder="Search cages, frames, trips…"
        inputmode="search" enterkeyhint="search" autocomplete="off"
        autocorrect="off" autocapitalize="off" spellcheck="false"
        oninput="gsOnInput(this.value)"
        onkeydown="gsOnKey(event)"/>
      <button class="btn btn-secondary btn-sm" onclick="closeGlobalSearch()" style="flex-shrink:0">✕</button>
    </div>
    <div class="search-results" id="gs-results">${gsResultsHTML()}</div>
    <div class="search-hint"><span class="search-kbd">↑↓</span> navigate &nbsp; <span class="search-kbd">Enter</span> jump to &nbsp; <span class="search-kbd">Esc</span> close</div>
  </div>`;
  document.body.appendChild(overlay);
  // Focus after appending — single focus call, no re-render needed
  setTimeout(() => { const inp = document.getElementById('gs-input'); if(inp) inp.focus(); }, 50);
}
function gsOnInput(val) {
  globalSearchQuery = val; globalSearchIdx = 0;
  // Update only the results list, NOT the whole modal (keeps keyboard open on mobile)
  const resultsEl = document.getElementById('gs-results');
  if (resultsEl) resultsEl.innerHTML = gsResultsHTML();
}
function gsOnKey(e) {
  const results = globalSearchResults(globalSearchQuery);
  if (e.key === 'ArrowDown') { globalSearchIdx = Math.min(globalSearchIdx+1, results.length-1); const r=document.getElementById('gs-results'); if(r) r.innerHTML=gsResultsHTML(); e.preventDefault(); }
  else if (e.key === 'ArrowUp') { globalSearchIdx = Math.max(globalSearchIdx-1, 0); const r=document.getElementById('gs-results'); if(r) r.innerHTML=gsResultsHTML(); e.preventDefault(); }
  else if (e.key === 'Enter') { gsSelectResult(globalSearchIdx); }
  else if (e.key === 'Escape') { closeGlobalSearch(); }
}
function gsSelectResult(idx) {
  const results = globalSearchResults(globalSearchQuery);
  if (results[idx]) results[idx].action();
}

function renderDashboard() {
  const cages = STATE.cages;
  const inFac = cages.filter(c=>c.location==='facility').length;
  const inRMD = cages.filter(c=>c.location==='rmd').length;
  const inRSS = cages.filter(c=>c.location==='rss').length;
  const inFrm = cages.filter(c=>c.location==='frame').length;
  const shipped = cages.filter(c=>c.location==='shipped').length;
  const fFac = STATE.frames.filter(f=>f.location==='facility').length;
  const fBoat = STATE.frames.filter(f=>f.location==='boat').length;
  const fClient = STATE.frames.filter(f=>f.location==='client').length;
  const ready = STATE.frames.filter(f=>f.fixedForShipping && f.location==='facility').length;
  const todayMoves = STATE.plannedMovements.filter(m=>m.date===todayStr()&&!m.completed).length;
  const pending = STATE.plannedMovements.filter(m=>!m.completed).length;

  const _dashShipDays = getShipmentDays();

  function renderRMDSlot(side, slot, posLabel, r) {
    const cid = r[side][slot];
    const cage = cid ? getCage(cid) : null;
    if (cage) {
      const shade = shipmentShadeClass(cage, _dashShipDays);
      const slotBg = shade ? shipmentShadeBg(shade) + 'border-radius:4px;padding:2px 4px;' : (cage.shippingPreference2 ? shipPref2SlotBg(cage)+'border-radius:4px;padding:2px 4px;' : cage.shippingPreference ? shipPrefSlotBg(cage)+'border-radius:4px;padding:2px 4px;' : '');
      const nameColor = shipmentShadeNameColor(shade) || shipPref2NameColor(cage) || shipPrefNameColor(cage);
      const detailColor = shipmentShadeDetailColor(shade) || shipPref2DetailColor(cage);
      return `<div class="rmd-slot" onclick="toggleShipPref('${cage.id}')" style="cursor:pointer;${slotBg}" title="${cage.shippingPreference ? 'Click to remove shipping preference' : 'Click to set shipping preference'}">
        <span class="rmd-slot-label">${posLabel}</span>
        <div class="rmd-slot-content">

    <div class="card" style="margin-bottom:14px">
      <div style="display:flex;align-items:center;gap:10px;margin-bottom:12px;flex-wrap:wrap">
        <div class="card-title" style="margin:0">🎨 Shipment Colour Assignment</div>
        <span style="font-size:11px;color:var(--text-muted)">Controls which trips are highlighted purple/lilac across RMD, frames, and movements views</span>
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">
        <div>
          <label style="display:flex;align-items:center;gap:6px;margin-bottom:6px">
            <span style="display:inline-block;width:12px;height:12px;border-radius:3px;background:#3b1d6e;flex-shrink:0"></span>
            Next Shipment
          </label>
          <select id="dash-next-trip" style="font-size:12px">${_tripOpts(_nextId)}</select>
        </div>
        <div>
          <label style="display:flex;align-items:center;gap:6px;margin-bottom:6px">
            <span style="display:inline-block;width:12px;height:12px;border-radius:3px;background:#c8b8e8;flex-shrink:0"></span>
            2nd Shipment
          </label>
          <select id="dash-second-trip" style="font-size:12px">${_tripOpts(_secondId)}</select>
        </div>
      </div>
      <div style="margin-top:10px;display:flex;align-items:center;gap:10px">
        <button class="btn btn-primary btn-sm" onclick="applyShipmentAssignment()">Apply</button>
        <button class="btn btn-secondary btn-sm" onclick="clearShipmentAssignment()">Reset to Auto</button>
        ${_dashShipDays.length ? '<span style="font-size:11px;color:var(--text-muted)">Currently: <span style="background:#3b1d6e;color:#e0ccff;font:700 10px var(--font-mono);padding:1px 8px;border-radius:8px">' + fmt(_dashShipDays[0]) + '</span>' + (_dashShipDays[1] ? ' <span style="background:#c8b8e8;color:#4a2a7a;font:700 10px var(--font-mono);padding:1px 8px;border-radius:8px">' + fmt(_dashShipDays[1]) + '</span>' : '') + '</span>' : ''}
      </div>
    </div>`;

  let rmdMiniHTML = RMD_LAYOUT.map(row=>{
    let items = row.items.map(item=>{
      const r = getRMDByNum(item);
      if (!r) return '';
      const cnt = [r.A.cage1,r.A.cage2,r.B.cage1,r.B.cage2].filter(Boolean).length;
      function renderSidePaired(side) {
        return `<div style="font:600 9px var(--font-mono);color:var(--blue);margin-bottom:2px">Inside</div>
          <div style="display:grid;grid-template-columns:1fr;gap:4px;margin-bottom:4px">
            ${renderRMDSlot(side,'cage1',side+' Inside',r)}
          </div>
          <div style="font:600 9px var(--font-mono);color:var(--green);margin-bottom:2px">Outside</div>
          <div style="display:grid;grid-template-columns:1fr;gap:4px">
            ${renderRMDSlot(side,'cage2',side+' Outside',r)}
          </div>`;
      }
      return `<div class="rmd-site-card" style="cursor:default">
        <div class="card" style="padding:10px">
          <div class="flex-between" style="margin-bottom:6px">
            <span style="font:700 14px var(--font-mono);color:var(--accent)">RMD-${item}</span>
            <span style="font-size:10px;color:var(--text-muted)">${cnt}/8</span>
          </div>
          <div style="font:600 9px var(--font-mono);color:var(--text-muted);margin-bottom:3px;text-transform:uppercase">Side A</div>
          ${renderSidePaired('A')}
          <div style="font:600 9px var(--font-mono);color:var(--text-muted);margin-top:8px;margin-bottom:3px;text-transform:uppercase">Side B</div>
          ${renderSidePaired('B')}
        </div>
      </div>`;

    return `<div class="rmd-site-row row-${row.row}">${items}</div>`;

  let todayMovesHTML = STATE.plannedMovements.filter(m=>m.date===todayStr()&&!m.completed).map(m=>`
    <div style="padding:7px 0;border-bottom:1px solid var(--border);font-size:13px">
      <span style="color:var(--accent);font-weight:600">${esc(m.type)}</span> — ${esc(m.description)}

  return `

        <h2 class="section-title">Dashboard Overview</h2>
        ${renderWarningsPanel()}
        ${renderFrameReturnsStat()}
        ${renderRMDHeatmap()}

function renderNextDueDelivery() {
  const today = new Date();
  // Use proposedShipDay as the primary sort/urgency field
  const activeCages = STATE.cages.filter(c => c.location !== 'shipped' && c.proposedShipDay);
  if (activeCages.length === 0) return '';

  const sorted = [...activeCages].sort((a, b) => a.proposedShipDay.localeCompare(b.proposedShipDay));
  const earliestShipDay = sorted[0].proposedShipDay;

  const cageRows = sorted.map(c => {
    const shipDate = new Date(c.proposedShipDay + 'T12:00:00');
    const daysLeft = Math.ceil((shipDate - today) / 86400000);
    const isNext = c.proposedShipDay === earliestShipDay;
    const isOverdue = daysLeft < 0;
    const isUrgent = !isOverdue && daysLeft <= 3;
    const isWarning = !isOverdue && !isUrgent && daysLeft <= 7;

    let rowBg, highlightBar, urgencyBadge;
    if (isOverdue) {
      rowBg = 'background:linear-gradient(90deg,rgba(201,48,48,0.12) 0%,rgba(201,48,48,0.04) 100%);';
      highlightBar = 'border-left:3px solid var(--red);';
      urgencyBadge = `<span style="background:#c93030;color:#fff;font:700 10px var(--font-mono);padding:2px 8px;border-radius:10px">OVERDUE</span>`;
    } else if (isNext) {
      rowBg = 'background:linear-gradient(90deg,rgba(184,92,26,0.13) 0%,rgba(184,92,26,0.04) 100%);';
      highlightBar = 'border-left:3px solid var(--orange);';
      urgencyBadge = `<span style="background:var(--orange);color:#fff;font:700 10px var(--font-mono);padding:2px 8px;border-radius:10px">NEXT UP · ${daysLeft}d</span>`;
    } else if (isUrgent) {
      rowBg = 'background:linear-gradient(90deg,rgba(154,123,16,0.10) 0%,rgba(154,123,16,0.04) 100%);';
      highlightBar = 'border-left:3px solid var(--yellow);';
      urgencyBadge = `<span style="background:var(--yellow);color:#fff;font:700 10px var(--font-mono);padding:2px 8px;border-radius:10px">${daysLeft}d</span>`;
    } else if (isWarning) {
      rowBg = '';
      highlightBar = 'border-left:3px solid var(--border);';
      urgencyBadge = `<span style="font:600 11px var(--font-mono);color:var(--text-muted)">${daysLeft}d</span>`;
    } else {
      rowBg = '';
      highlightBar = 'border-left:3px solid transparent;';
      urgencyBadge = `<span style="font:600 11px var(--font-mono);color:var(--text-muted)">${daysLeft}d</span>`;
    }

    return `<div style="display:flex;align-items:center;gap:12px;padding:8px 12px;${rowBg}${highlightBar}border-radius:0 6px 6px 0;margin-bottom:4px${c.shippingPreference ? ';outline:2px solid #e8d850;outline-offset:-2px;background:#fffbea' : ''}">
      <div style="min-width:110px"><span style="font:700 13px var(--font-mono);color:${c.shippingPreference ? '#7a5c00' : 'var(--text-primary)'}">${esc(c.name)}${c.shippingPreference ? ' <span style="font:700 9px var(--font-mono);background:#fff8c5;color:#7a5c00;border:1px solid #e8d850;padding:1px 5px;border-radius:3px">SHIP PREF</span>' : ''}</span></div>
      <div style="flex:1;font-size:11px;color:var(--text-muted)">${c.width}m × ${c.height}m × ${c.length}m · ${c.weight}t</div>
      <div style="min-width:80px"><span class="badge badge-${locBadge(c.location)}" style="font-size:9px">${esc(locLabel(c))}</span></div>
      <div style="font:600 10px var(--font-mono);color:var(--purple);min-width:100px">🚢 ${c.proposedTripId ? esc(tripLabel(getBoatTrip(c.proposedTripId))) : fmt(c.proposedShipDay)}</div>
      <div style="font:600 11px var(--font-mono);color:var(--text-secondary);min-width:90px">${c.departureDate ? fmt(c.departureDate) : '<span style="color:var(--text-muted)">—</span>'}</div>
      <div style="min-width:90px;text-align:right">${urgencyBadge}</div>
    </div>`;
  }).join('');

  const overdueCount = sorted.filter(c => Math.ceil((new Date(c.proposedShipDay+'T12:00:00') - today) / 86400000) < 0).length;
  const urgentCount = sorted.filter(c => { const d = Math.ceil((new Date(c.proposedShipDay+'T12:00:00') - today) / 86400000); return d >= 0 && d <= 3; }).length;

  return `<div class="card" style="margin-bottom:14px;border-color:${overdueCount > 0 ? 'var(--red)' : urgentCount > 0 ? '#e8c8a0' : 'var(--border)'}">
    <div class="flex-between" style="margin-bottom:10px">
      <div class="card-title" style="margin:0">
        🚢 Next Due for Delivery
        ${overdueCount > 0 ? `<span style="background:var(--red);color:#fff;font:700 10px var(--font-mono);padding:2px 7px;border-radius:10px;margin-left:8px">${overdueCount} OVERDUE</span>` : ''}
        ${urgentCount > 0 ? `<span style="background:var(--orange);color:#fff;font:700 10px var(--font-mono);padding:2px 7px;border-radius:10px;margin-left:8px">${urgentCount} URGENT</span>` : ''}
      </div>
      <button class="btn btn-secondary btn-sm" onclick="switchTab('boatplan')">Boat Planner →</button>
    </div>
    <div style="display:flex;gap:6px;font:600 9px var(--font-mono);color:var(--text-muted);text-transform:uppercase;letter-spacing:0.06em;padding:0 12px;margin-bottom:6px">
      <span style="min-width:110px">Cage</span><span style="flex:1">Dimensions · Weight</span>
      <span style="min-width:80px">Location</span><span style="min-width:100px">Prop. Ship Day</span>
      <span style="min-width:90px">Leaves Facility</span><span style="min-width:90px;text-align:right">Due In</span>
    </div>
    ${cageRows}
  </div>`;
}

function renderDashboardFrames() {
  const facilityFrames = STATE.frames.filter(f => f.location === 'facility');
  if (facilityFrames.length === 0) return '';

  const _dfShipDays = getShipmentDays();
  function shipmentShade(cage) { return shipmentShadeClass(cage, _dfShipDays); }
  const nextShipDay = _dfShipDays[0] || null;
  const secondShipDay = _dfShipDays[1] || null;

  const frameCards = facilityFrames.map(f => {
    const fCages = f.cages.map(cid => getCage(cid)).filter(Boolean);
    const status = f.fixedForShipping ? 'ready' : f.cages.length === 0 ? 'empty' : 'loaded';
    const statusColor = status === 'ready' ? 'var(--accent)' : status === 'empty' ? 'var(--text-muted)' : 'var(--green)';
    const statusLabel = status === 'ready' ? '✓ SHIP READY' : status === 'empty' ? 'EMPTY' : `${fCages.length} CAGE${fCages.length>1?'S':''}`;
    const borderStyle = status === 'ready' ? 'border-color:#c0a050;background:#fdfaf0' : status === 'empty' ? '' : 'border-color:#b0dcc0;background:#f0faf4';

    const cageList = fCages.length > 0
      ? fCages.map(c => {
          const shade = shipmentShade(c);
          const shadeBg = shade === 'next'
            ? 'background:#3b1d6e;color:#e0ccff;border-radius:4px;padding:2px 6px;'
            : shade === 'second'
            ? 'background:#c8b8e8;color:#4a2a7a;border-radius:4px;padding:2px 6px;'
            : c.shippingPreference
            ? shipPrefSlotBg(c)+'border-radius:4px;padding:2px 6px;'
            : '';
          const shipLabel = shade === 'next'
            ? `<span style="font:700 9px var(--font-mono);background:#5a2d9a;color:#e0ccff;padding:1px 5px;border-radius:3px;margin-left:4px">NEXT SHIP</span>`
            : shade === 'second'
            ? `<span style="font:700 9px var(--font-mono);background:#c8b8e8;color:#4a2a7a;padding:1px 5px;border-radius:3px;margin-left:4px">2ND SHIP</span>`
            : c.shippingPreference
            ? `<span style="font:700 9px var(--font-mono);background:#fff8c5;color:#7a5c00;border:1px solid #e8d850;padding:1px 5px;border-radius:3px;margin-left:4px">SHIP PREF</span>`
            : '';
          const dep = c.departureDate;
          const daysLeft = dep ? Math.ceil((new Date(dep+'T12:00:00') - new Date()) / 86400000) : null;
          const depStr = dep ? ` · ${fmt(dep)} (${daysLeft}d)` : '';
          const depColor = daysLeft !== null && daysLeft <= 3 ? 'var(--red)' : 'var(--orange)';
          return `<div style="font-size:11px;padding:3px 0;display:flex;justify-content:space-between;align-items:center">
            <span style="font-weight:600;font-family:var(--font-mono);${shadeBg}">${esc(c.name)}${shipLabel}</span>
            <span style="color:${dep ? depColor : 'var(--text-muted)'}">${c.width}m · ${hCat(c.height)} · ${lCat(c.length)} · ${c.weight}t${depStr}</span>
          </div>`;
        }).join('')
      : '<div style="font-size:11px;color:var(--text-muted);font-style:italic">No cages loaded</div>';

    return `<div class="card" style="padding:10px;${borderStyle}">
      <div class="flex-between" style="margin-bottom:5px">
        <span style="font:700 13px var(--font-mono);color:var(--accent)">${esc(f.name)}</span>
        <div style="display:flex;gap:5px;align-items:center">
          <span style="font:600 10px var(--font-mono);color:${statusColor}">${statusLabel}</span>
          ${f.hasWaler ? '<span class="badge badge-blue" style="font-size:8px;padding:1px 4px">🔩</span>' : ''}
        </div>
      </div>
      <div style="font-size:10px;color:var(--text-muted);margin-bottom:5px">${f.width}m frame</div>
      ${cageList}
    </div>`;
  }).join('');


  return `<div class="card" style="margin-bottom:14px">
    <div class="flex-between" style="margin-bottom:10px">
      <div class="card-title" style="margin:0">Frames at Facility (${facilityFrames.length})</div>
      <button class="btn btn-secondary btn-sm" onclick="switchTab('frames')">Manage Frames →</button>
    </div>
    ${shipmentLegendHTML(_dfShipDays)}
    <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:8px">
      ${frameCards}
    </div>
  </div>`;
}

// CAGES
// ═══════════════════════════════════════════════════════════════════════════════
let cageFormOpen = false;
let cageSearch = '';
let cageFilter = 'all';
let cageSort = 'number'; // 'number' | 'name' | 'departure' | 'shipday'
let cageHeightFilter = 'all'; // 'all' | 'short' | 'medium' | 'tall'
let cageEditing = null;
let cageSelected = new Set(); // for multi-delete
let cageHideShipped = true;

// ═══════════════════════════════════════════════════════════════════════════════
// CAGE LOCATION HISTORY MODAL
// ═══════════════════════════════════════════════════════════════════════════════
function openCageHistory(cageId) {
  cageHistoryModal = cageId;
  renderHistoryModal();
}
function closeCageHistory() {
  cageHistoryModal = null;
  const el = document.getElementById('cage-history-overlay');
  if (el) el.remove();
}
function renderHistoryModal() {
  const existing = document.getElementById('cage-history-overlay');
  if (existing) existing.remove();
  if (!cageHistoryModal) return;
  const cage = getCage(cageHistoryModal);
  if (!cage) return;

  const history = (cage.locationHistory || []).slice().reverse(); // newest first
  // Also pull completed movements for this cage from planned movements
  const mvHistory = STATE.plannedMovements
    .filter(m => m.cageId === cage.id && m.completed)
    .sort((a,b) => (b.completedAt||b.date).localeCompare(a.completedAt||a.date));

  const histHTML = history.length === 0
    ? `<div class="empty-msg">No location history recorded yet.<br><span style="font-size:11px">History is recorded from this point forward when locations change.</span></div>`
    : `<ul class="loc-history-list">${history.map((h,i) => {
        const locColour = {facility:'var(--blue)',rmd:'var(--green)',frame:'var(--orange)',shipped:'var(--purple)'}[h.to] || 'var(--accent)';
        const fromLabel = h.from ? `${h.from}${h.fromDetail ? ' · '+h.fromDetail : ''}` : '—';
        const toLabel = `${h.to}${h.toDetail ? ' · '+h.toDetail : ''}`;
        return `<li class="loc-history-item">
          <div class="loc-history-dot" style="background:${locColour}"></div>
          <div class="loc-history-date">${fmt(h.date)}</div>
          <div class="loc-history-desc">
            <span style="color:var(--text-muted)">${esc(fromLabel)}</span>
            <span style="color:var(--accent);margin:0 5px">→</span>
            <span style="font-weight:600;color:${locColour}">${esc(toLabel)}</span>
          </div>
        </li>`;
      }).join('')}</ul>`;

  const mvHTML = mvHistory.length === 0
    ? `<div class="empty-msg" style="font-size:11px">No completed movements recorded for this cage.</div>`
    : `<ul class="loc-history-list">${mvHistory.map(m => `
        <li class="loc-history-item">
          <div class="loc-history-dot" style="background:var(--green)"></div>
          <div class="loc-history-date">${fmt(m.completedAt||m.date)}</div>
          <div class="loc-history-desc">
            <span style="font-weight:600">${esc(m.type)}</span>
            <span style="color:var(--text-muted);margin-left:6px">${esc(m.description)}</span>
            ${m.completionNote ? `<div style="font-style:italic;color:var(--text-muted);font-size:10px;margin-top:2px">"${esc(m.completionNote)}"</div>` : ''}
          </div>
        </li>`).join('')}</ul>`;

  const overlay = document.createElement('div');
  overlay.id = 'cage-history-overlay';
  overlay.className = 'search-overlay';
  overlay.onclick = (e) => { if (e.target === overlay) closeCageHistory(); };
  overlay.innerHTML = `
    <div class="search-modal" style="width:560px;max-height:80vh;display:flex;flex-direction:column">
      <div class="search-input-row">
        <span style="font-size:18px">📍</span>
        <div style="flex:1">
          <div style="font:700 15px var(--font-display);color:var(--text-primary)">Location History — Cage ${esc(cage.name)}</div>
          <div style="font-size:11px;color:var(--text-muted)">${cage.width}m × ${cage.height}m × ${cage.length}m · ${cage.weight}t · Currently: <span class="badge badge-${locBadge(cage.location)}" style="font-size:9px">${esc(locLabel(cage))}</span></div>
        </div>
        <button class="btn btn-secondary btn-sm" onclick="closeCageHistory()">✕</button>
      </div>
      <div style="flex:1;overflow-y:auto;padding:14px 18px">
        <div style="font:700 11px var(--font-mono);color:var(--accent);text-transform:uppercase;letter-spacing:.06em;margin-bottom:8px">Location Changes</div>
        ${histHTML}
        <div style="font:700 11px var(--font-mono);color:var(--accent);text-transform:uppercase;letter-spacing:.06em;margin-bottom:8px;margin-top:16px">Completed Movements</div>
        ${mvHTML}
      </div>
    </div>`;
  document.body.appendChild(overlay);
}

function renderCages() {
  const filtered = STATE.cages.filter(c=>{
    if (cageHideShipped && c.location === 'shipped') return false;
    if (cageSearch && !c.name.toLowerCase().includes(cageSearch.toLowerCase())) return false;
    if (cageFilter === 'has-departure') return !!c.departureDate;
    if (cageFilter === 'has-shipday') return !!c.proposedShipDay;
    if (cageFilter === 'ship-pref') return !!c.shippingPreference;
    if (cageFilter !== 'all' && c.location !== cageFilter) return false;
    if (cageHeightFilter === 'short' && hCat(c.height) !== 'Short') return false;
    if (cageHeightFilter === 'medium' && hCat(c.height) !== 'Medium') return false;
    if (cageHeightFilter === 'tall' && hCat(c.height) !== 'Tall') return false;
    return true;
  }).sort((a, b) => {
    if (cageSort === 'number') {
      return a.name.localeCompare(b.name, undefined, {numeric: true, sensitivity: 'base'});
    }
    if (cageSort === 'departure') {
      // Cages with a departure date first, ascending; nulls at end
      if (a.departureDate && b.departureDate) return a.departureDate.localeCompare(b.departureDate);
      if (a.departureDate) return -1;
      if (b.departureDate) return 1;
      return a.name.localeCompare(b.name, undefined, {numeric: true});
    }
    if (cageSort === 'shipday') {
      // Cages with a ship day first, ascending; nulls at end
      if (a.proposedShipDay && b.proposedShipDay) return a.proposedShipDay.localeCompare(b.proposedShipDay);
      if (a.proposedShipDay) return -1;
      if (b.proposedShipDay) return 1;
      return a.name.localeCompare(b.name, undefined, {numeric: true});
    }
    return a.name.localeCompare(b.name);
  });

  let formHTML = '';
  if (cageFormOpen) {
    formHTML = `<div class="card">
      <div class="form-grid form-grid-3">
        <div><label>Cage Name / ID</label><input id="cf-name" placeholder="e.g. CAGE-001"/></div>
        <div><label>Height (m) — max 10</label><input id="cf-h" type="number" step="0.1" max="10"/></div>
        <div><label>Width (m) — max 2.5</label><input id="cf-w" type="number" step="0.1" max="2.5"/></div>
        <div><label>Length (m) — max 11.5</label><input id="cf-l" type="number" step="0.1" max="11.5"/></div>
        <div><label>Weight (t) — max 28</label><input id="cf-wt" type="number" step="0.1" max="28"/></div>
        <div><label>Into RMD</label><input id="cf-into-rmd" type="date"/></div>
        <div><label>Out of RMD</label><input id="cf-out-rmd" type="date"/></div>
        <div><label>Notes</label><input id="cf-notes"/></div>
        <div><label>Tag Colour</label><select id="cf-tag">
          <option value="">None</option>

      </div>

        <button class="btn btn-secondary" onclick="cageFormOpen=false;render()">Cancel</button>
      </div>
    </div>`;
  }

  // Build per-cage location options based on compatibility
  function cageLocationOpts(c) {
    // Frame options: cage must fit by width
    let frameOpts = STATE.frames.filter(f=>{
      if(f.location!=='facility') return false;
      if(f.cages.length >= 2) return false;
      // If frame already has a cage, check double-fit rules
      if(f.cages.length === 1) {
        const existing = getCage(f.cages[0]);
        if(!existing) return false;
        return canFitTwo(existing, c, f.width);
      }
      // Empty frame: cage width must fit
      return c.width <= f.width;
    }).sort((a,b)=>a.name.localeCompare(b.name,undefined,{numeric:true})).map(f=>{
      const existing = f.cages.length===1 ? getCage(f.cages[0]) : null;
      const note = existing ? ` [with ${existing.name}]` : '';
      return `<option value="frame:${f.id}">→ ${esc(f.name)} (${f.width}m${f.hasWaler ? " 🔩" : ""})${note}</option>`;
    }).join('');

    // RMD options: check height pairing rules. Each side has exactly 2 slots: cage1 (inside) and cage2 (outside).
    let rmdOptsList = [];
    STATE.rmdSlots.forEach(r=>{
      SIDES.forEach(side=>{
        // Inside slot (cage1)
        if(!r[side].cage1 && (c.length||0) <= 13) {
          const outsideCage = r[side].cage2 ? getCage(r[side].cage2) : null;
          if(!outsideCage || canPairRMD(c, outsideCage)) {
            const note = outsideCage ? ` [with ${outsideCage.name}]` : '';
            rmdOptsList.push(`<option value="rmd:${r.number}:${side}:cage1">→ RMD-${r.number}${side} (inside)${note}</option>`);
          }
        }
        // Outside slot (cage2) — tall cages cannot go outside
        const cageH = hCat(c.height);
        if(!r[side].cage2 && cageH !== 'Tall' && (c.length||0) <= 13) {
          const insideCage = r[side].cage1 ? getCage(r[side].cage1) : null;
          if(!insideCage || canPairRMD(insideCage, c)) {
            const note = insideCage ? ` [with ${insideCage.name}]` : '';
            rmdOptsList.push(`<option value="rmd:${r.number}:${side}:cage2">→ RMD-${r.number}${side} (outside)${note}</option>`);
          }
        }
      });
    });
    let rmdOpts = rmdOptsList.sort((a,b)=>{
      const na = parseInt(a.match(/RMD-(\d+)/)?.[1]||0), nb = parseInt(b.match(/RMD-(\d+)/)?.[1]||0);
      return na!==nb ? na-nb : a.localeCompare(b);
    }).join('');

    let opts = '<option value="">Move to...</option>';
    if(c.location !== 'facility') opts += '<option value="facility">→ Facility</option>';
    if(frameOpts) opts += `<optgroup label="Frames (${STATE.frames.filter(f=>f.location==='facility'&&c.width<=f.width&&f.cages.length<2).length} available)">${frameOpts}</optgroup>`;
    if(rmdOpts) opts += `<optgroup label="RMD Storage">${rmdOpts}</optgroup>`;
    return opts;
  }

  let rows = filtered.length === 0
    ? `<tr><td colspan="13" style="text-align:center;padding:20px" class="empty-msg">No cages found</td></tr>`

      if (cageEditing === c.id) {

          <td><input id="ce-l-${c.id}" type="number" step="0.01" value="${c.length}" style="width:70px;font-size:12px"/></td>

          <td><input id="ce-dep-${c.id}" type="date" value="${c.departureDate||''}" style="width:130px;font-size:12px"/></td>

          <td><span class="badge badge-${hBadge(c.height)}">${hCat(c.height)}</span></td>

          <td>—</td>

      const cageRowStyle = sel ? 'background:#fdf8ee' : c.shippingPreference2 ? 'background:#eff6ff;border-left:3px solid #3b82f6' : c.shippingPreference ? 'background:#fffbea;border-left:3px solid #e8b800' : '';
      return `<tr style="${cageRowStyle}">
        <td style="width:32px;text-align:center">
          <input type="checkbox" ${sel?'checked':''} onchange="toggleCageSelect('${c.id}',this.checked)" style="width:14px;height:14px;cursor:pointer;accent-color:var(--accent)"/>
        </td>
        <td style="font-weight:600;color:var(--text-primary)"><span class="editable-cell" onclick="startInlineEdit('${c.id}','name',this)">${esc(c.name)}</span></td>
        <td style="font-family:var(--font-mono)"><span class="editable-cell" onclick="startInlineEdit('${c.id}','height',this)">${c.height}</span></td>
        <td style="font-family:var(--font-mono)"><span class="editable-cell" onclick="startInlineEdit('${c.id}','width',this)">${c.width}</span></td>
        <td style="font-family:var(--font-mono)"><span class="editable-cell" onclick="startInlineEdit('${c.id}','length',this)">${c.length}</span></td>

        <td style="white-space:nowrap">${(()=>{
          const fd = FACTORY_TAG_DATA[c.id] || {};
          const tags = fd.tags || {};
          const active = FACTORY_TAG_DEFS.filter(t => tags[t.key]);
          return active.length
            ? active.map(t => `<span title="${esc(t.label)}" style="display:inline-block;width:11px;height:11px;border-radius:50%;background:${t.color};border:1px solid rgba(0,0,0,0.15);margin-right:2px;vertical-align:middle"></span>`).join('')
            : '<span style="color:var(--text-muted)">—</span>';
        })()}</td>
        <td style="text-align:center">
          <input type="checkbox" title="Shipping Preference — highlights yellow across all views" ${c.shippingPreference?'checked':''} onchange="toggleShippingPreference('${c.id}',this.checked)" style="width:15px;height:15px;cursor:pointer;accent-color:#e8b800"/>

          <input type="checkbox" title="Shipping Preference 2 — highlights blue across all views" ${c.shippingPreference2?'checked':''} onchange="toggleShippingPreference2('${c.id}',this.checked)" style="width:15px;height:15px;cursor:pointer;accent-color:#3b82f6"/>
        </td>
        <td style="white-space:nowrap">
          <select style="font-size:11px;padding:3px 6px;max-width:180px" onchange="changeCageLocation('${c.id}',this.value);this.value=''">
            ${cageLocationOpts(c)}
          </select>
        </td>
        <td style="white-space:nowrap">
          <button class="btn btn-secondary btn-xs" onclick="openCageHistory('${c.id}')" title="Location history">📍</button>
          <button class="btn btn-danger btn-xs" onclick="deleteCage('${c.id}')">✕</button>
        </td>
      </tr>`;
    }).join('');

  return `
    <div class="flex-between" style="margin-bottom:16px">
      <h2 class="section-title" style="margin:0">Cage Inventory</h2>
      <div style="display:flex;gap:8px">
        <button class="btn btn-secondary" onclick="exportCagesCSV()">📤 Export CSV</button>

    </div>

    <div class="filter-bar">
      <div style="display:flex;gap:4px;align-items:center;max-width:280px;flex:1">
        <input id="cage-search-input" style="flex:1" placeholder="Search cages… (Enter)" value="${esc(cageSearch)}"
          onkeydown="if(event.key==='Enter'){cageSearch=this.value;render();}"

        ${cageSearch ? `<button class="btn btn-secondary btn-sm" style="white-space:nowrap;padding:4px 8px" onclick="cageSearch='';render()">✕</button>` : ''}
      </div>

      <button class="filter-btn ${cageFilter==='facility'?'active':''}" onclick="cageFilter='facility';render()">Facility</button>
      <button class="filter-btn ${cageFilter==='rmd'?'active':''}" onclick="cageFilter='rmd';render()">RMD</button>
      <button class="filter-btn ${cageFilter==='rss'?'active':''}" onclick="cageFilter='rss';render()">Roof Slab</button>
      <button class="filter-btn ${cageFilter==='frame'?'active':''}" onclick="cageFilter='frame';render()">Frame</button>
      <button class="filter-btn ${cageFilter==='shipped'?'active':''}" onclick="cageFilter='shipped';cageHideShipped=false;render()">Shipped</button>
      <button class="filter-btn ${cageFilter==='has-departure'?'active':''}" onclick="cageFilter='has-departure';render()" title="Cages with a Leaves Facility date set">📅 Has Departure</button>
      <button class="filter-btn ${cageFilter==='has-shipday'?'active':''}" onclick="cageFilter='has-shipday';render()" title="Cages with a Proposed Ship Day set">🚢 Has Ship Day</button>
      <button class="filter-btn ${cageFilter==='ship-pref'?'active':''}" onclick="cageFilter='ship-pref';render()" title="Cages marked as Shipping Preference">🟡 Ship Pref</button>
      <button class="filter-btn ${cageHideShipped?'active':''}" onclick="cageHideShipped=!cageHideShipped;render()" title="Toggle visibility of shipped cages" style="${cageHideShipped?'':'opacity:0.6'}">🚫 Hide Shipped</button>
      <div style="width:1px;height:20px;background:var(--border);margin:0 4px"></div>
      <span style="font:600 10px var(--font-mono);color:var(--text-muted);text-transform:uppercase;white-space:nowrap">Height:</span>
      <button class="filter-btn ${cageHeightFilter==='all'?'active':''}" onclick="cageHeightFilter='all';render()">All</button>
      <button class="filter-btn ${cageHeightFilter==='short'?'active':''}" onclick="cageHeightFilter='short';render()" style="color:var(--green)">Short</button>
      <button class="filter-btn ${cageHeightFilter==='medium'?'active':''}" onclick="cageHeightFilter='medium';render()" style="color:var(--yellow)">Medium</button>
      <button class="filter-btn ${cageHeightFilter==='tall'?'active':''}" onclick="cageHeightFilter='tall';render()" style="color:var(--red)">Tall</button>
      <div style="margin-left:auto;display:flex;align-items:center;gap:6px">
        <span style="font:600 10px var(--font-mono);color:var(--text-muted);text-transform:uppercase">Sort:</span>
        <button class="filter-btn ${cageSort==='number'?'active':''}" onclick="cageSort='number';render()" title="Sort by cage number"># Number</button>
        <button class="filter-btn ${cageSort==='name'?'active':''}" onclick="cageSort='name';render()" title="Sort alphabetically">A–Z</button>
        <button class="filter-btn ${cageSort==='departure'?'active':''}" onclick="cageSort='departure';render()" title="Sort by Leaves Facility date">📅 Departure</button>
        <button class="filter-btn ${cageSort==='shipday'?'active':''}" onclick="cageSort='shipday';render()" title="Sort by Proposed Ship Day">🚢 Ship Day</button>
      </div>
    </div>
    ${cageSelected.size > 0 ? `<div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap;background:#fef0e6;border:1px solid #e8c8a0;border-radius:8px;padding:8px 14px;margin-bottom:10px">
      <span style="font-weight:600;font-size:13px;color:var(--orange);white-space:nowrap">${cageSelected.size} cage${cageSelected.size>1?'s':''} selected</span>
      <div style="display:flex;align-items:center;gap:5px">
        <label style="font-size:11px;color:var(--text-muted);white-space:nowrap">Departure date:</label>
        <input type="date" id="bulk-dep-date" style="font-size:11px;padding:3px 7px" onchange="bulkSetDeparture(this.value)"/>
      </div>
      <div style="display:flex;align-items:center;gap:5px">
        <label style="font-size:11px;color:var(--text-muted);white-space:nowrap">Assign trip:</label>
        <select id="bulk-trip-sel" style="font-size:11px;padding:3px 7px" onchange="bulkSetTrip(this.value);this.value=''">
          <option value="">— Select trip —</option>
          ${(STATE.boatTrips||[]).sort((a,b)=>(a.departDate||a.loadDate||'').localeCompare(b.departDate||b.loadDate||'')).map(t=>`<option value="${t.id}">${esc(tripLabel(t))}</option>`).join('')}
          <option value="__clear__">✕ Clear trip</option>
        </select>
      </div>
      <button class="btn btn-danger btn-sm" onclick="deleteSelectedCages()">🗑 Delete</button>
      <button class="btn btn-secondary btn-sm" onclick="cageSelected.clear();render()">✕ Clear</button>
    </div>` : ''}
    <div class="card" style="overflow-x:auto">
      <table>
        <thead><tr>
          <th style="width:32px"><input type="checkbox" id="cage-select-all" style="width:14px;height:14px;cursor:pointer;accent-color:var(--accent)" onchange="toggleAllCages(this.checked,${JSON.stringify(filtered.map(c=>c.id))})"/></th>
          <th>Name <span style="font-weight:400;font-size:9px;color:var(--accent)">click to edit</span></th><th>H(m)</th><th>W(m)</th><th>L(m)</th><th>Wt(t)</th><th>Leaves Facility</th><th>Boat Trip</th><th>Into RMD</th><th>Out of RMD</th><th>Category</th><th>Location</th><th>Tags</th><th title="Shipping Preference — highlight yellow across all views">🟡 Ship Pref</th><th title="Shipping Preference 2 — highlight blue across all views">🔵 SP2</th><th>Move</th><th></th>

async function addCage() {
  const name = document.getElementById('cf-name').value.trim();
  const h = parseFloat(document.getElementById('cf-h').value);
  const w = parseFloat(document.getElementById('cf-w').value);
  const l = parseFloat(document.getElementById('cf-l').value);
  const wt = parseFloat(document.getElementById('cf-wt').value);
  const notes = document.getElementById('cf-notes').value.trim();
  const intoRmd = document.getElementById('cf-into-rmd').value || null;
  const outOfRmd = document.getElementById('cf-out-rmd').value || null;
  const tagColour = document.getElementById('cf-tag').value || null;
  if (!name||isNaN(h)||isNaN(w)||isNaN(l)||isNaN(wt)) return alert('Please fill all required fields.');
  const cage = {id:uid(),name,height:h,width:w,length:l,weight:wt,notes,intoRmd,outOfRmd,tagColour:tagColour||null,departureDate:null,location:'facility',locationDetail:'',createdAt:new Date().toISOString()};
  STATE.cages.push(cage);
  cageFormOpen = false;
  render();
  await addCageToAPI(cage);
}
function toggleCageSelect(id, checked) {
  if (checked) cageSelected.add(id);
  else cageSelected.delete(id);
  // Update select-all checkbox state
  render();
}

function toggleAllCages(checked, ids) {
  if (checked) ids.forEach(id => cageSelected.add(id));
  else ids.forEach(id => cageSelected.delete(id));
  render();
}

async function deleteSelectedCages() {
  if (cageSelected.size === 0) return;
  if (!confirm(`Delete ${cageSelected.size} selected cage${cageSelected.size>1?'s':''}? This cannot be undone.`)) return;
  const ids = [...cageSelected];
  ids.forEach(id => {
    STATE.cages = STATE.cages.filter(c => c.id !== id);
    STATE.frames.forEach(f => { f.cages = f.cages.filter(cid => cid !== id); });
    STATE.rmdSlots.forEach(r => {
      SIDES.forEach(s => {
        if (r[s].cage1 === id) r[s].cage1 = null;
        if (r[s].cage2 === id) r[s].cage2 = null;
      });
    });
  });
  cageSelected.clear();
  render();
  await Promise.all(ids.map(id => deleteCageFromAPI(id)));
  // Sync affected frames and RMD
  const affectedFrames = STATE.frames.filter(f => ids.some(id => f.cages.includes(id)));
  await Promise.all(affectedFrames.map(f => saveFrame(f)));
  await saveRMD();
}

// ── Bulk assignment ─────────────────────────────────────────────────────────
async function bulkSetDeparture(dateStr) {
  if (!dateStr || cageSelected.size === 0) return;
  const ids = [...cageSelected];
  const cages = ids.map(id => getCage(id)).filter(Boolean);
  cages.forEach(c => { c.departureDate = dateStr; });
  render();
  await Promise.all(cages.map(c => saveCage(c)));
}

async function bulkSetTrip(tripId) {
  if (!tripId || cageSelected.size === 0) return;
  const ids = [...cageSelected];
  const cages = ids.map(id => getCage(id)).filter(Boolean);
  if (tripId === '__clear__') {
    cages.forEach(c => { c.proposedTripId = null; c.proposedShipDay = null; });
  } else {
    const trip = getBoatTrip(tripId);
    cages.forEach(c => {
      c.proposedTripId = tripId;
      c.proposedShipDay = trip ? (trip.departDate || trip.loadDate || null) : null;
    });
  }
  render();
  await Promise.all(cages.map(c => saveCage(c)));
}

// ── CSV Export ───────────────────────────────────────────────────────────────
function exportCagesCSV() {
  const headers = ['Name','Height(m)','Width(m)','Length(m)','Weight(t)','Category','Location','Location Detail','Departure Date','Boat Trip','Shipping Preference','Notes'];
  const rows = STATE.cages.map(c => {
    const trip = c.proposedTripId ? getBoatTrip(c.proposedTripId) : null;
    return [
      c.name, c.height, c.width, c.length, c.weight,
      hCat(c.height), c.location, c.locationDetail||'',
      c.departureDate||'', trip ? tripLabel(trip) : (c.proposedShipDay||''),
      c.shippingPreference ? 'Yes' : 'No', c.notes||''
    ].map(v => `"${String(v).replace(/"/g,'""')}"`).join(',');
  });
  const csv = [headers.join(','), ...rows].join('\n');
  const blob = new Blob([csv], { type: 'text/csv' });
  const url = URL.createObjectURL(blob);

function startInlineEdit(cageId, field, spanEl) {
  const c = getCage(cageId);
  if (!c) return;
  const isDate = field === 'departureDate' || field === 'proposedShipDay' || field === 'intoRmd' || field === 'outOfRmd';
  const isNumber = ['height','width','length','weight'].includes(field);
  const currentVal = c[field] != null ? c[field] : '';
  const input = document.createElement('input');
  input.type = isDate ? 'date' : isNumber ? 'number' : 'text';
  input.value = currentVal;
  input.className = 'inline-edit-input';
  if (isNumber) { input.step = '0.01'; input.style.width = '75px'; }
  else if (isDate) { input.style.width = '145px'; }
  else { input.style.width = Math.max(80, (spanEl.offsetWidth || 80) + 20) + 'px'; }
  spanEl.replaceWith(input);
  input.focus();
  if (!isDate) input.select();
  let saved = false;
  const save = () => {
    if (saved) return;
    saved = true;
    const raw = input.value.trim();
    if (isNumber) { const n = parseFloat(raw); if (!isNaN(n)) c[field] = n; }
    else if (isDate) { c[field] = raw || null; }
    else { if (raw) c[field] = raw; }
    render();
    saveCage(c);
  };
  input.addEventListener('blur', save);
  input.addEventListener('keydown', e => {
    if (e.key === 'Enter') { input.blur(); }
    if (e.key === 'Escape') { saved = true; render(); }
  });
}

async function deleteCage(id) {
  if (!confirm('Delete this cage? It will be removed from any frame or RMD slot.')) return;
  STATE.cages = STATE.cages.filter(c=>c.id!==id);
  STATE.frames.forEach(f=>{ f.cages = f.cages.filter(cid=>cid!==id); });
  STATE.rmdSlots.forEach(r=>{
    SIDES.forEach(s=>{
      if(r[s].cage1===id) r[s].cage1=null;
      if(r[s].cage2===id) r[s].cage2=null;
    });
  });
  render();
  await deleteCageFromAPI(id);
  await saveRMD();
  const affectedFrames = STATE.frames.filter(f => !f.cages.includes(id)); // already removed above
  // Save all frames to sync cage lists
  await Promise.all(STATE.frames.map(f => saveFrame(f)));
}

// Remove a cage from whatever frame/RMD it's currently in
function clearCageFromCurrentLocation(cid) {
  // Returns array of frames that were modified (need saving)
  const modifiedFrames = [];
  STATE.frames.forEach(f=>{
    if (f.cages.includes(cid)) {
      f.cages = f.cages.filter(id=>id!==cid);
      if(f.cages.length===0) f.fixedForShipping=false;
      modifiedFrames.push(f);
    }
  });
  STATE.rmdSlots.forEach(r=>{
    SIDES.forEach(s=>{
      if(r[s].cage1===cid) r[s].cage1=null;
      if(r[s].cage2===cid) r[s].cage2=null;
    });
  });
  if (STATE.rssCages) STATE.rssCages = STATE.rssCages.filter(id => id !== cid);
  return modifiedFrames;
}

async function changeCageLocation(cid, target) {
  if(!target) return;
  const cage = getCage(cid);
  if(!cage) return;

  // Determine new location/detail for history before mutation
  let newLoc = cage.location, newDetail = cage.locationDetail || '';
  if (target === 'facility') { newLoc = 'facility'; newDetail = ''; }
  else if (target.startsWith('frame:')) { newLoc = 'frame'; const f = getFrame(target.split(':')[1]); newDetail = f ? f.name : ''; }
  else if (target.startsWith('rmd:')) { const p = target.split(':'); newLoc = 'rmd'; newDetail = `RMD-${p[1]}${p[2]}`; }
  recordLocationChange(cage, newLoc, newDetail);

  // Clear from current location first (returns frames that were modified)
  const clearedFrames = clearCageFromCurrentLocation(cid);

  if (target === 'facility') {
    cage.location = 'facility';
    cage.locationDetail = '';
  } else if (target.startsWith('frame:')) {
    const frameId = target.split(':')[1];
    const frame = getFrame(frameId);
    if (!frame) return alert('Frame not found.');
    if (frame.cages.length >= 2) return alert('Frame already has max cages.');
    if (frame.cages.length === 1) {
      const existing = getCage(frame.cages[0]);
      if (existing && !canFitTwo(existing, cage, frame.width)) {
        return alert(`Cannot fit both cages. Need combined width + 0.2m ≤ ${frame.width}m and each cage ≤ 14t.`);
      }
    }
    frame.cages.push(cid);
    cage.location = 'frame';
    cage.locationDetail = frame.name;
    cage.departureDate = null; // already in frame — no longer "leaving facility"
  } else if (target.startsWith('rmd:')) {
    const parts = target.split(':');
    const rmdNum = parseInt(parts[1]);
    const side = parts[2];
    const slot = parts[3];
    const rmdIdx = STATE.rmdSlots.findIndex(r=>r.number===rmdNum);
    if (rmdIdx === -1) return alert('RMD not found.');
    const r = STATE.rmdSlots[rmdIdx];
    // 13m length check (single cage per slot)
    if((cage.length||0) > 13) {
      cage.location = 'facility'; cage.locationDetail = '';
      render(); saveCage(cage);
      return alert(`Cannot place: cage length (${(cage.length||0).toFixed(1)}m) exceeds 13m RMD limit.`);
    }
    // Pairing check: cage1 (inside) pairs with cage2 (outside)
    const pairSlot = slot==='cage1' ? 'cage2' : 'cage1';
    const pairCid = r[side][pairSlot];
    if (pairCid) {
      const other = getCage(pairCid);
      if (other && !canPairRMD(
          slot==='cage1' ? cage : other,   // inside
          slot==='cage1' ? other : cage    // outside
        )) {
        if (!confirm(`Height pairing ${hCat(cage.height)} + ${hCat(other.height)} not standard. Override?`)) {
          cage.location = 'facility'; cage.locationDetail = '';
          render(); saveCage(cage); return;
        }
        r[side].overridden = true;
      }
    }
    r[side][slot] = cid;
    cage.location = 'rmd';
    cage.locationDetail = `RMD-${rmdNum}${side}`;
    cage.departureDate = null;
  }

  render();
  await saveCage(cage);
  await saveRMD();
  // Save source frames (cleared) AND destination frame
  const framesToSave = new Map();
  clearedFrames.forEach(f => framesToSave.set(f.id, f));
  const destFrame = STATE.frames.find(f => f.cages.includes(cage.id));
  if (destFrame) framesToSave.set(destFrame.id, destFrame);
  await Promise.all([...framesToSave.values()].map(f => saveFrame(f)));
}

async function handleExcelImport(input) {
  const file = input.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = async function(e) {
    try {
      const data = new Uint8Array(e.target.result);
      const workbook = XLSX.read(data, {type:'array'});
      const sheet = workbook.Sheets[workbook.SheetNames[0]];

      // Convert to array of arrays to find the header row
      const allRows = XLSX.utils.sheet_to_json(sheet, {header:1, defval:''});

      // Find the header row by looking for "Production Number" in any row
      let headerIdx = -1;
      let headers = [];
      for (let i = 0; i < Math.min(20, allRows.length); i++) {
        const row = allRows[i];
        const found = row.findIndex(cell => String(cell).toLowerCase().includes('production number'));
        if (found !== -1) {
          headerIdx = i;
          headers = row.map(h => String(h).trim());
          break;
        }
      }
      if (headerIdx === -1) return alert('Could not find a "Production Number" column header in the first 20 rows.');

      // Map column indices
      const findIdx = (...keywords) => {
        for (const kw of keywords) {
          const idx = headers.findIndex(h => h.toLowerCase().includes(kw.toLowerCase()));
          if (idx !== -1) return idx;
        }
        return -1;
      };

      const colProdNum = findIdx('production number');
      const colLength = findIdx('armf length', 'length');
      const colWidth = findIdx('armf width', 'width');
      const colHeight = findIdx('armf height', 'height');
      const colWeight = findIdx('pw rof weight', 'pw rof');

      if (colProdNum === -1) return alert('Could not find "Production Number" column. Found headers: ' + headers.join(', '));

      let imported = 0, skipped = 0, duplicates = 0;
      const existingNames = new Set(STATE.cages.map(c => String(c.name).toLowerCase().trim()));

      const dataRows = allRows.slice(headerIdx + 1);
      dataRows.forEach(row => {
        const rawProd = row[colProdNum];
        if (rawProd === undefined || rawProd === null || String(rawProd).trim() === '') {
          skipped++;
          return;
        }
        const name = String(rawProd).trim();

        if (existingNames.has(name.toLowerCase())) {
          duplicates++;
          return;
        }

        // Parse dimensions: mm to m
        const parseMM = (val) => {
          if (val === undefined || val === null || String(val).trim() === '') return 0;
          const n = parseFloat(String(val).replace(/[^\d.-]/g, ''));
          return isNaN(n) ? 0 : Math.round((n / 1000) * 1000) / 1000;
        };
        const parseWt = (val) => {
          if (val === undefined || val === null || String(val).trim() === '') return 0;
          const n = parseFloat(String(val).replace(/[^\d.-]/g, ''));
          if (isNaN(n)) return 0;
          return n > 100 ? Math.round((n / 1000) * 100) / 100 : Math.round(n * 100) / 100;
        };

        const height = colHeight !== -1 ? parseMM(row[colHeight]) : 0;
        const width = colWidth !== -1 ? parseMM(row[colWidth]) : 0;
        const length = colLength !== -1 ? parseMM(row[colLength]) : 0;
        const weight = colWeight !== -1 ? parseWt(row[colWeight]) : 0;

        STATE.cages.push({
          id: uid(), name, height, width, length, weight,
          notes: 'Imported from Excel',
          location: 'facility', locationDetail: '',
          createdAt: new Date().toISOString()
        });
        existingNames.add(name.toLowerCase());
        imported++;
      });

      // ── Validation: filter out formula/header rows ──
      const validCages = [];
      const invalidRows = [];
      let duplicates2 = 0, skipped2 = 0;
      const existingNames2 = new Set(STATE.cages.map(c => String(c.name).toLowerCase().trim()));

      const dataRows2 = allRows.slice(headerIdx + 1);
      dataRows2.forEach(row => {
        const rawProd = row[colProdNum];
        if (rawProd === undefined || rawProd === null || String(rawProd).trim() === '') { skipped2++; return; }
        const name = String(rawProd).trim();
        // Reject formula cells, header repeats, and non-numeric names that look like metadata
        if (name.startsWith('=') || name.toLowerCase() === 'production number' || name.toLowerCase() === 'prod number') {
          invalidRows.push({ name, reason: 'Formula or header cell' }); return;
        }
        if (existingNames2.has(name.toLowerCase())) { duplicates2++; return; }
        const parseMM = (val) => {
          if (val === undefined || val === null || String(val).trim() === '') return 0;
          const n = parseFloat(String(val).replace(/[^\d.-]/g, ''));
          return isNaN(n) ? 0 : Math.round((n / 1000) * 1000) / 1000;
        };
        const parseWt = (val) => {
          if (val === undefined || val === null || String(val).trim() === '') return 0;
          const n = parseFloat(String(val).replace(/[^\d.-]/g, ''));
          if (isNaN(n)) return 0;
          return n > 100 ? Math.round((n / 1000) * 100) / 100 : Math.round(n * 100) / 100;
        };
        const height = colHeight !== -1 ? parseMM(row[colHeight]) : 0;
        const width = colWidth !== -1 ? parseMM(row[colWidth]) : 0;
        const length = colLength !== -1 ? parseMM(row[colLength]) : 0;
        const weight = colWeight !== -1 ? parseWt(row[colWeight]) : 0;
        existingNames2.add(name.toLowerCase());
        validCages.push({ id: uid(), name, height, width, length, weight, notes: 'Imported from Excel', location: 'facility', locationDetail: '', createdAt: new Date().toISOString() });
      });

      // Show review modal
      showImportReviewModal(validCages, invalidRows, duplicates2, skipped2, colHeight, colWidth, colLength, colWeight);

    } catch(err) {
      alert('Error reading Excel file: ' + err.message);
      console.error(err);
    }
  };
  reader.readAsArrayBuffer(file);
  input.value = '';
}
