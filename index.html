async function dd_confirmPush() {
  const pin=(document.getElementById('dd_pin').value||'').trim();
  if (!pin) { document.getElementById('dd_pin').focus(); return; }
  if (!dd_allDepartures.length) { dd_closeModal(); return; }

  dd_setPushBtns(false);
  document.getElementById('dd_results').innerHTML='';
  document.getElementById('dd_results').className='dd-push-results';
  dd_pushLogChanges=[]; dd_pushLogSkipped=[];

  // 1. Auth
  dd_setProgress('Authenticating…',5);
  let authOk=false;
  try {
    const r=await fetch(DD_API+'/api/auth',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({pin})});
    authOk=(await r.json()).ok===true;
  } catch(e) { dd_showModalSummary('error','⚠️ Could not reach the Tracker API.'); dd_setPushBtns(true); return; }
  if (!authOk) { dd_showModalSummary('error','⚠️ Incorrect PIN.'); dd_setPushBtns(true); document.getElementById('dd_pin').select(); return; }

  // 2. Fetch cages
  dd_setProgress('Fetching cage list…',15);
  let trackerCages=[];
  try {
    const r=await fetch(DD_API+'/api/cages',{headers:{'Authorization':'Bearer '+pin}});
    if (!r.ok) throw new Error('HTTP '+r.status);
    const d=await r.json(); trackerCages=d.cages||d||[];
  } catch(e) { dd_showModalSummary('error','⚠️ Failed to fetch cages: '+e.message); dd_setPushBtns(true); return; }

  const cageByName=new Map(); for (const c of trackerCages) { if (c.name) cageByName.set(String(c.name).trim(),c); }

  // 3. Push updates
  const today=new Date(); today.setHours(0,0,0,0);
  const toUpdate=dd_allDepartures.filter(d=>d.date&&d.date>=today);
  let matched=0,created=0,skipped=0,failed=0;
  const total=toUpdate.length;
  const _uid=()=>Date.now().toString(36)+Math.random().toString(36).slice(2,8);
  const pad=n=>String(n).padStart(2,'0');

  for (let i=0; i<total; i++) {
    const dep=toUpdate[i];
    dd_setProgress(`Updating cage ${dep.cage} (${i+1}/${total})…`,20+Math.round((i/total)*75));
    const dateStr=`${dep.date.getFullYear()}-${pad(dep.date.getMonth()+1)}-${pad(dep.date.getDate())}`;
    const cage=cageByName.get(String(dep.cage).trim());

    if (!cage) {
      const newCage={id:_uid(),name:String(dep.cage).trim(),height:0,width:0,length:0,weight:0,notes:`Auto-created by Departure Dashboard on ${new Date().toLocaleDateString('en-GB')}`,intoRmd:null,outOfRmd:null,departureDate:dateStr,location:'facility',locationDetail:'',createdAt:new Date().toISOString()};
      try {
        const r=await fetch(DD_API+'/api/cages',{method:'POST',headers:{'Content-Type':'application/json','Authorization':'Bearer '+pin},body:JSON.stringify(newCage)});
        if (!r.ok) { const t=await r.text().catch(()=>String(r.status)); dd_addResult('dd-result-err',`✕ FAIL  Cage ${dep.cage} — create failed: ${t}`); dd_pushLogSkipped.push({cage:dep.cage,reason:`Create failed: ${t}`,type:'err',shift:dep.shift,vstLabel:dep.vstLabel}); failed++; }
        else { dd_addResult('dd-result-ok',`✦ NEW   Cage ${dep.cage} — created with date ${dateStr}`); dd_pushLogChanges.push({cage:dep.cage,oldDate:null,newDate:dateStr,shift:dep.shift,vstLabel:dep.vstLabel,isNew:true}); created++; cageByName.set(String(dep.cage).trim(),newCage); }
      } catch(e) { dd_addResult('dd-result-err',`✕ FAIL  Cage ${dep.cage} — ${e.message}`); dd_pushLogSkipped.push({cage:dep.cage,reason:`Network error: ${e.message}`,type:'err',shift:dep.shift,vstLabel:dep.vstLabel}); failed++; }
      await new Promise(r=>setTimeout(r,60)); continue;
    }

    const currentDate=cage.departure_date||cage.departureDate||null;
    if (currentDate===dateStr) { dd_addResult('dd-result-skip',`⤳ SKIP  Cage ${dep.cage} — already ${dateStr}`); dd_pushLogSkipped.push({cage:dep.cage,reason:`Already set to ${dd_fmtDateDisplay(dateStr)}`,type:'already',shift:dep.shift,vstLabel:dep.vstLabel}); skipped++; continue; }

    const payload={id:cage.id,name:cage.name,height:cage.height||0,width:cage.width||0,length:cage.length||0,weight:cage.weight||0,notes:cage.notes||'',location:cage.location||'facility',location_detail:cage.location_detail||cage.locationDetail||'',departure_date:dateStr,proposed_ship_day:cage.proposed_ship_day||cage.proposedShipDay||null,proposed_trip_id:cage.proposed_trip_id||cage.proposedTripId||null,shipping_preference:cage.shipping_preference||cage.shippingPreference||false,into_rmd:cage.into_rmd||cage.intoRmd||null,out_of_rmd:cage.out_of_rmd||cage.outOfRmd||null};
    try {
      const r=await fetch(DD_API+'/api/cages',{method:'PUT',headers:{'Content-Type':'application/json','Authorization':'Bearer '+pin},body:JSON.stringify(payload)});
      if (!r.ok) { const t=await r.text().catch(()=>String(r.status)); dd_addResult('dd-result-err',`✕ FAIL  Cage ${dep.cage} — ${t}`); dd_pushLogSkipped.push({cage:dep.cage,reason:`API error: ${t}`,type:'err',shift:dep.shift,vstLabel:dep.vstLabel}); failed++; }
      else { dd_addResult('dd-result-ok',`✓ OK    Cage ${dep.cage} → ${dateStr}  (was: ${currentDate||'none'})`); dd_pushLogChanges.push({cage:dep.cage,oldDate:currentDate,newDate:dateStr,shift:dep.shift,vstLabel:dep.vstLabel}); matched++; }
    } catch(e) { dd_addResult('dd-result-err',`✕ FAIL  Cage ${dep.cage} — ${e.message}`); dd_pushLogSkipped.push({cage:dep.cage,reason:`Network error: ${e.message}`,type:'err',shift:dep.shift,vstLabel:dep.vstLabel}); failed++; }
    await new Promise(r=>setTimeout(r,60));
  }

  dd_setProgress('Done.',100);
  const parts=[];
  if (matched>0) parts.push(`${matched} updated`);
  if (created>0) parts.push(`${created} created`);
  if (skipped>0) parts.push(`${skipped} skipped`);
  if (failed>0)  parts.push(`${failed} failed`);
  const type=failed>0?'warn':(matched===0&&created===0)?'warn':'success';
  const icon=failed>0?'⚠️':(matched===0&&created===0)?'⚠️':'✅';
  dd_showModalSummary(type,`${icon} Push complete — ${parts.join(' · ')}`);
  dd_setPushBtns(false);
  dd_tabsVisible=true;
  dd_innerTab='changes';
  // Refresh Changes/Skipped tab content (modal stays open for review; re-render on close)
}
function dd_showModalSummary(type,msg) {
  // Show summary both in modal and in left panel
  const s=document.getElementById('dd_pushSummary');
  if (s) { s.textContent=msg; s.className='dd-push-summary '+type; }
}

// ═══════════════════════════════════════════════════════════════════════════════
// DOWNTIME TRACKER — full client state, UI render, API persistence
// ═══════════════════════════════════════════════════════════════════════════════

// ── In-memory state (active tasks only — completed go to D1) ────────────────
const DT_CATEGORIES = [];

// Per-team live state — each team holds a map of taskId → taskState
// allowing multiple concurrent tasks per team
const dtState = {
  lifting:  {},
  external: {},
};

let dtLog = [];
let dtLogLoaded = false;
let dtLogLoading = false;

let dtTeamTab = 'lifting';
const dtInnerTab = { lifting: 'task', external: 'task' };
let dtPending = null;
let dtTickHandle = null;

function dtNewTaskState() {
  return {
    active: true,
    status: 'working',
    task: null,
    startTime: null,
    workSecs: 0,
    downSecs: 0,
    breakSecs: 0,
    segStart: null,
    events: [],
    dtEvents: [],
    currentDtStart: null,
    currentDtDesc: '',
    currentDtCat: '',
    breakCount: 0,
  };
}

function dtAllTasks() {
  return ['lifting','external'].flatMap(team =>
    Object.entries(dtState[team]).map(([tid, s]) => ({ team, tid, s }))
  );
}

// ── Helpers ──────────────────────────────────────────────────────────────────
function dtPad(n) { return String(n).padStart(2,'0'); }
function dtFmt(s) { return `${dtPad(Math.floor(s/3600))}:${dtPad(Math.floor(s%3600/60))}:${dtPad(s%60)}`; }
function dtFmtHM(s) { const h=Math.floor(s/3600),m=Math.floor(s%3600/60); return `${h}h ${m}m`; }
function dtTs(ms) { return new Date(ms).toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit',second:'2-digit'}); }
function dtTsm(ms) { return new Date(ms).toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit'}); }
function dtDateStr(ms) { return new Date(ms).toLocaleDateString('en-GB',{weekday:'short',day:'numeric',month:'short',year:'numeric'}); }
function dtDateISO(ms) { const d=new Date(ms); return `${d.getFullYear()}-${dtPad(d.getMonth()+1)}-${dtPad(d.getDate())}`; }

function dtCommit(team, tid) {
  const s = dtState[team][tid];
  if (!s || !s.segStart) return 0;
  const el = Math.floor((Date.now() - s.segStart) / 1000);
  if (s.status === 'working')  s.workSecs  += el;
  if (s.status === 'downtime') s.downSecs  += el;
  if (s.status === 'break')    s.breakSecs += el;
  s.segStart = null;
  return el;
}

function dtPushEv(team, tid, type, label, note) {
  dtState[team][tid].events.push({ time: Date.now(), type, label, note: note||'' });
}

// ── Chip — shows worst status across all active tasks for a team ─────────────
const DT_CHIP = {
  idle:     ['dtchip-idle',    'Idle'],
  working:  ['dtchip-working', 'Working'],
  paused:   ['dtchip-paused',  'Paused'],
  break:    ['dtchip-break',   'Break'],
  downtime: ['dtchip-downtime','Downtime'],
};
const DT_STATUS_PRIORITY = { downtime:4, break:3, working:2, paused:1, idle:0 };
function dtChip(team) {
  const tasks = Object.values(dtState[team]);
  if (!tasks.length) return `<span class="dt-status-chip dtchip-idle">Idle</span>`;
  const worst = tasks.reduce((best, s) =>
    (DT_STATUS_PRIORITY[s.status]||0) > (DT_STATUS_PRIORITY[best]||0) ? s.status : best, 'idle');
  const count = tasks.length;
  const [cls, lbl] = DT_CHIP[worst] || DT_CHIP.idle;
  return `<span class="dt-status-chip ${cls}">${lbl}${count > 1 ? ` \xd7${count}` : ''}</span>`;
}

// ── API helpers ───────────────────────────────────────────────────────────────
async function dtApiSaveTask(entry) {
  try {
    await api('/api/downtime/tasks', 'POST', entry);
  } catch(e) {
    console.warn('[Downtime] Failed to save task to D1:', e.message);
    showError('Downtime task saved locally but failed to sync to server: ' + e.message);
  }
}

async function dtApiLoadLog() {
  if (dtLogLoading) return;
  dtLogLoading = true;
  try {
    const data = await api('/api/downtime/tasks');
    dtLog = (data.tasks || []).map(t => ({
      ...t,
      events:   (typeof t.events    === 'string') ? JSON.parse(t.events)    : (t.events   || []),
      dtEvents: (typeof t.dt_events === 'string') ? JSON.parse(t.dt_events) : (t.dtEvents || []),
    }));
    dtLogLoaded = true;
  } catch(e) {
    console.warn('[Downtime] Could not load log from API:', e.message);
    dtLogLoaded = true;
  } finally {
    dtLogLoading = false;
  }
}

// Snapshot all active tasks for a team to D1 (array format)
function dtApiSaveSession(team, tid) {
  const snapshots = Object.entries(dtState[team]).map(([id, s]) => {
    const elapsed = s.segStart ? Math.floor((Date.now() - s.segStart) / 1000) : 0;
    const isThis = id === tid;
    return {
      tid: id,
      active:         s.active,
      status:         s.status,
      task:           s.task,
      startTime:      s.startTime,
      workSecs:       s.workSecs  + (s.status === 'working'  ? elapsed : 0),
      downSecs:       s.downSecs  + (s.status === 'downtime' ? elapsed : 0),
      breakSecs:      s.breakSecs + (s.status === 'break'    ? elapsed : 0),
      segStart:       s.segStart,
      events:         [...s.events],
      dtEvents:       [...s.dtEvents],
      currentDtStart: s.currentDtStart,
      currentDtDesc:  isThis && s.status === 'downtime'
        ? (document.getElementById(`dtcmt-${team}-${id}`)?.value || s.currentDtDesc || '')
        : s.currentDtDesc,
      currentDtCat:   isThis && s.status === 'downtime'
        ? (document.getElementById(`dtcat-${team}-${id}`)?.value || s.currentDtCat || '')
        : s.currentDtCat,
      breakCount:     s.breakCount,
      savedAt:        Date.now(),
    };
  });
  api('/api/downtime/active', 'PUT', { team, session: JSON.stringify(snapshots) })
    .catch(e => console.warn('[Downtime] Session save failed:', e.message));
}

function dtApiClearSession(team) {
  api('/api/downtime/active', 'DELETE', { team })
    .catch(e => console.warn('[Downtime] Session clear failed:', e.message));
}

function dtApiSaveOrClearSession(team) {
  if (Object.keys(dtState[team]).length === 0) {
    dtApiClearSession(team);
  } else {
    dtApiSaveSession(team, null);
  }
}

// Restore all active task sessions from D1 on page load
let dtSessionsRestored = false;
async function dtRestoreSessions() {
  if (dtSessionsRestored) return;
  dtSessionsRestored = true;
  try {
    const data = await api('/api/downtime/active');
    const active = data.active || {};
    let anyRestored = false;
    for (const team of ['lifting', 'external']) {
      const raw = active[team];
      if (!raw) continue;
      // Support old single-object format and new array format
      const snaps = Array.isArray(raw) ? raw : (raw.active ? [{ ...raw, tid: raw.tid || ('dt_r_' + Date.now()) }] : []);
      for (const snap of snaps) {
        if (!snap || !snap.active) continue;
        const tid = snap.tid || ('dt_r_' + Math.random().toString(36).slice(2,8));
        const gapMs   = snap.segStart && snap.savedAt ? Math.max(0, Date.now() - snap.savedAt) : 0;
        const gapSecs = Math.floor(gapMs / 1000);
        const s = dtNewTaskState();
        s.status         = snap.status;
        s.task           = snap.task;
        s.startTime      = snap.startTime;
        s.workSecs       = snap.workSecs  + (snap.status === 'working'  ? gapSecs : 0);
        s.downSecs       = snap.downSecs  + (snap.status === 'downtime' ? gapSecs : 0);
        s.breakSecs      = snap.breakSecs + (snap.status === 'break'    ? gapSecs : 0);
        s.segStart       = snap.segStart ? Date.now() : null;
        s.events         = snap.events   || [];
        s.dtEvents       = snap.dtEvents || [];
        s.currentDtStart = snap.currentDtStart || null;
        s.currentDtDesc  = snap.currentDtDesc  || '';
        s.currentDtCat   = snap.currentDtCat   || '';
        s.breakCount     = snap.breakCount || 0;
        s.events.push({ time: Date.now(), type: 'p', label: 'Page refreshed', note: `(gap: ${dtFmt(gapSecs)})` });
        dtState[team][tid] = s;
        anyRestored = true;
      }
    }
    if (anyRestored) {
      dtStartTick();
      if (activeTab === 'downtime') render();
      else showSuccess('\u23f1 Active downtime tasks restored \u2014 check the Downtime tab.');
    }
  } catch(e) {
    console.warn('[Downtime] Could not restore sessions:', e.message);
  }
}

// ── Tick ──────────────────────────────────────────────────────────────────────
function dtStartTick() {
  if (dtTickHandle) return;
  dtTickHandle = setInterval(dtTick, 1000);
}

function dtStopTick() {
  if (dtAllTasks().length === 0) {
    clearInterval(dtTickHandle);
    dtTickHandle = null;
  }
}

function dtTick() {
  dtAllTasks().forEach(({ team, tid, s }) => {
    if (!s.segStart) return;
    const el  = Math.floor((Date.now() - s.segStart) / 1000);
    const upd = (id, val) => { const el2 = document.getElementById(id); if (el2) el2.textContent = val; };
    if (s.status === 'working')  upd(`dtw-${team}-${tid}`, dtFmt(s.workSecs + el));
    if (s.status === 'downtime') upd(`dtd-${team}-${tid}`, dtFmt(s.downSecs + el));
    if (s.status === 'break')    upd(`dtb-${team}-${tid}`, dtFmt(s.breakSecs + el));
  });
}

// ── Task controls ─────────────────────────────────────────────────────────────
function dtStartTask(team) {
  const desc = document.getElementById(`dtdesc-${team}`)?.value.trim();
  const ref  = document.getElementById(`dtref-${team}`)?.value.trim();
  if (!desc) { showError('Please enter a task description.'); return; }

  const tid = 'dt_' + Date.now().toString(36) + '_' + Math.random().toString(36).slice(2,6);
  const s   = dtNewTaskState();
  s.task      = { desc, ref: ref || '' };
  s.startTime = Date.now();
  s.segStart  = Date.now();
  s.events.push({ time: Date.now(), type: 'w', label: 'Started', note: '' });
  dtState[team][tid] = s;

  const descEl = document.getElementById(`dtdesc-${team}`);
  const refEl  = document.getElementById(`dtref-${team}`);
  if (descEl) descEl.value = '';
  if (refEl)  refEl.value  = '';

  dtStartTick();
  dtApiSaveSession(team, tid);
  render();
}

function dtPauseTask(team, tid) {
  const dur = dtCommit(team, tid);
  dtPushEv(team, tid, 'p', 'Paused', `after ${dtFmt(dur)}`);
  dtState[team][tid].status = 'paused';
  dtApiSaveSession(team, tid);
  render();
}

function dtResumeTask(team, tid) {
  dtPushEv(team, tid, 'w', 'Resumed');
  dtState[team][tid].status   = 'working';
  dtState[team][tid].segStart = Date.now();
  dtApiSaveSession(team, tid);
  render();
}

function dtStartBreak(team, tid) {
  dtCommit(team, tid);
  dtState[team][tid].breakCount++;
  dtPushEv(team, tid, 'b', `Break ${dtState[team][tid].breakCount} started`);
  dtState[team][tid].status   = 'break';
  dtState[team][tid].segStart = Date.now();
  dtApiSaveSession(team, tid);
  render();
}

function dtEndBreak(team, tid) {
  const dur = dtCommit(team, tid);
  dtPushEv(team, tid, 'w', `Break ${dtState[team][tid].breakCount} ended`, `(${dtFmt(dur)})`);
  dtState[team][tid].status   = 'working';
  dtState[team][tid].segStart = Date.now();
  dtApiSaveSession(team, tid);
  render();
}

function dtStartDowntime(team, tid) {
  dtCommit(team, tid);
  dtState[team][tid].currentDtStart = Date.now();
  dtPushEv(team, tid, 'd', 'Downtime started');
  dtState[team][tid].status   = 'downtime';
  dtState[team][tid].segStart = Date.now();
  dtApiSaveSession(team, tid);
  render();
}

function dtResolveDowntime(team, tid) {
  const s   = dtState[team][tid];
  const cat = document.getElementById(`dtcat-${team}-${tid}`)?.value || 'Uncategorised';
  const cmt = document.getElementById(`dtcmt-${team}-${tid}`)?.value.trim() || '(no description)';
  const dur = dtCommit(team, tid);
  s.dtEvents.push({ start: s.currentDtStart, end: Date.now(), category: cat, comment: cmt, durSecs: dur });
  dtPushEv(team, tid, 'd', 'Downtime resolved', `${dtFmt(dur)} \u2014 [${cat}] ${cmt}`);
  s.currentDtStart = null;
  s.currentDtDesc  = '';
  s.currentDtCat   = '';
  s.status   = 'working';
  s.segStart = Date.now();
  dtApiSaveSession(team, tid);
  render();
}

function dtStopTask(team, tid) {
  const s = dtState[team][tid];
  if (!s) return;

  if (s.status === 'downtime') {
    const cat = document.getElementById(`dtcat-${team}-${tid}`)?.value || 'Uncategorised';
    const cmt = document.getElementById(`dtcmt-${team}-${tid}`)?.value.trim() || '(no description \u2014 task stopped)';
    const dur = dtCommit(team, tid);
    s.dtEvents.push({ start: s.currentDtStart, end: Date.now(), category: cat, comment: cmt, durSecs: dur });
    dtPushEv(team, tid, 'd', 'Downtime closed on stop', `${dtFmt(dur)} \u2014 [${cat}] ${cmt}`);
    s.currentDtStart = null;
  } else {
    dtCommit(team, tid);
  }
  dtPushEv(team, tid, 'e', 'Task stopped');

  const entry = {
    id:           'dt_' + Date.now().toString(36) + '_' + Math.random().toString(36).slice(2,6),
    team,
    task_desc:    s.task.desc,
    task_ref:     s.task.ref,
    start_time:   s.startTime,
    end_time:     Date.now(),
    work_secs:    s.workSecs,
    down_secs:    s.downSecs,
    break_secs:   s.breakSecs,
    break_count:  s.breakCount,
    task_comment: '',
    events:       [...s.events],
    dtEvents:     [...s.dtEvents],
  };

  const modal = document.getElementById('dt-stop-modal');
  const mname = document.getElementById('dt-modal-name');
  const mcmt  = document.getElementById('dt-modal-comment');
  if (modal && mname && mcmt) {
    mname.textContent = `"${s.task.desc}"${s.task.ref ? ' \xb7 ' + s.task.ref : ''}`;
    mcmt.value = '';
    modal.classList.add('open');
  }
  dtPending = { team, tid, entry };
}

function dtCancelStop() {
  if (!dtPending) return;
  const { team, tid } = dtPending;
  const s = dtState[team][tid];
  if (s) {
    s.active   = true;
    s.status   = 'working';
    s.segStart = Date.now();
    s.events   = s.events.filter(e => e.label !== 'Task stopped');
    dtApiSaveSession(team, tid);
  }
  document.getElementById('dt-stop-modal')?.classList.remove('open');
  dtPending = null;
  render();
}

async function dtConfirmStop() {
  if (!dtPending) return;
  const { team, tid, entry } = dtPending;
  const mcmt = document.getElementById('dt-modal-comment');
  entry.task_comment = mcmt?.value.trim() || '';

  dtLog.push(entry);
  await dtApiSaveTask({
    ...entry,
    events:    JSON.stringify(entry.events),
    dt_events: JSON.stringify(entry.dtEvents),
  });

  delete dtState[team][tid];
  dtApiSaveOrClearSession(team);
  dtStopTick();

  document.getElementById('dt-stop-modal')?.classList.remove('open');
  dtPending = null;
  dtInnerTab[team] = 'log';
  render();
}

// ── Edit & Retrospective entry helpers ───────────────────────────────────────

let dtEditId = null;       // null = new retrospective entry
let dtEditTeam = null;
let dtEditDtEvents = [];   // working copy of downtime events for the modal

// Helpers to convert between epoch ms and datetime-local string
function msToLocal(ms) {
  if (!ms) return '';
  const d = new Date(ms);
  const pad = n => String(n).padStart(2,'0');
  return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}T${pad(d.getHours())}:${pad(d.getMinutes())}`;
}
function localToMs(str) {
  if (!str) return 0;
  return new Date(str).getTime() || 0;
}

function dtOpenEditModal(id, ev) {
  if (ev) ev.stopPropagation();
  const entry = dtLog.find(e => e.id === id);
  if (!entry) return;
  dtEditId     = id;
  dtEditTeam   = entry.team || 'lifting';
  dtEditDtEvents = JSON.parse(JSON.stringify(
    (typeof entry.dt_events === 'string') ? JSON.parse(entry.dt_events) : (entry.dtEvents || [])
  ));

  document.getElementById('dt-edit-modal-title').textContent = '✏️ Edit Log Entry';
  document.getElementById('dte-team').value    = dtEditTeam;
  document.getElementById('dte-desc').value    = entry.task_desc || entry.taskDesc || '';
  document.getElementById('dte-ref').value     = entry.task_ref  || entry.taskRef  || '';
  document.getElementById('dte-start').value   = msToLocal(entry.start_time || entry.startTime);
  document.getElementById('dte-end').value     = msToLocal(entry.end_time   || entry.endTime);
  document.getElementById('dte-work').value    = Math.round((entry.work_secs  || entry.workSecs  || 0) / 60);
  document.getElementById('dte-break').value   = Math.round((entry.break_secs || entry.breakSecs || 0) / 60);
  document.getElementById('dte-bcount').value  = entry.break_count || entry.breakCount || 0;
  document.getElementById('dte-comment').value = entry.task_comment || entry.taskComment || '';
  dtEditRenderDtEvents();

async function dtSaveEditModal() {
  const desc = document.getElementById('dte-desc').value.trim();
  if (!desc) { showError('Task description is required.'); return; }

  const team     = document.getElementById('dte-team').value;
  const ref      = document.getElementById('dte-ref').value.trim();
  const startMs  = localToMs(document.getElementById('dte-start').value);
  const endMs    = localToMs(document.getElementById('dte-end').value);
  const workMins = parseFloat(document.getElementById('dte-work').value) || 0;
  const brkMins  = parseFloat(document.getElementById('dte-break').value) || 0;
  const brkCount = parseInt(document.getElementById('dte-bcount').value) || 0;
  const comment  = document.getElementById('dte-comment').value.trim();

  // Derive downSecs: total elapsed minus working minus breaks (floor at 0)
  const totalSecs = startMs && endMs ? Math.max(0, Math.floor((endMs - startMs) / 1000)) : 0;
  const workSecs  = Math.round(workMins  * 60);
  const brkSecs   = Math.round(brkMins   * 60);
  const downSecs  = Math.max(0, totalSecs - workSecs - brkSecs);

  const entry = {
    team,
    task_desc:    desc,
    task_ref:     ref,
    start_time:   startMs,
    end_time:     endMs,
    work_secs:    workSecs,
    down_secs:    downSecs,
    break_secs:   brkSecs,
    break_count:  brkCount,
    task_comment: comment,
    events:       '[]',
    dt_events:    JSON.stringify(dtEditDtEvents),
  };

  try {
    if (dtEditId) {
      // Update existing
      await api(`/api/downtime/tasks/${dtEditId}`, 'PUT', entry);
      const idx = dtLog.findIndex(e => e.id === dtEditId);
      if (idx !== -1) {
        dtLog[idx] = { ...dtLog[idx], ...entry,
          dtEvents: dtEditDtEvents,
          events: dtLog[idx].events || [],
        };
      }
    } else {
      // New retrospective entry
      const id = 'dt_retro_' + Date.now().toString(36) + '_' + Math.random().toString(36).slice(2,6);
      entry.id = id;
      await api('/api/downtime/tasks', 'POST', entry);
      dtLog.push({ ...entry, id, dtEvents: dtEditDtEvents, events: [] });
      // Keep log sorted by start time
      dtLog.sort((a,b) => (a.start_time||0) - (b.start_time||0));
    }
    dtCloseEditModal();
    // Switch to log tab for the right team
    dtInnerTab[team] = 'log';
    dtTeamTab = team;
    render();
  } catch(e) {
    showError('Failed to save: ' + e.message);
  }
}

async function dtDeleteLogEntry(id, ev) {
  if (ev) ev.stopPropagation();
  if (!confirm('Delete this downtime log entry? This cannot be undone.')) return;
  try {
    await api(`/api/downtime/tasks/${id}`, 'DELETE');
    dtLog = dtLog.filter(e => e.id !== id);
    render();
  } catch(e) {
    showError('Failed to delete log entry: ' + e.message);
  }
}

function dtBuildEntry(e, num) {
  const hdt   = (e.down_secs || e.downSecs || 0) > 0;
  const wSecs = e.work_secs  || e.workSecs  || 0;
  const dSecs = e.down_secs  || e.downSecs  || 0;
  const bSecs = e.break_secs || e.breakSecs || 0;
  const bCnt  = e.break_count|| e.breakCount|| 0;
  const desc  = e.task_desc  || e.taskDesc  || '';
  const ref   = e.task_ref   || e.taskRef   || '';
  const cmt   = e.task_comment||e.taskComment||'';
  const stMs  = e.start_time || e.startTime || 0;
  const enMs  = e.end_time   || e.endTime   || 0;
  const team  = e.team || 'lifting';
  const dtEvs = (typeof e.dt_events === 'string') ? JSON.parse(e.dt_events) : (e.dtEvents || []);
  const evs   = (typeof e.events    === 'string') ? JSON.parse(e.events)    : (e.events   || []);

  const totAct = wSecs + dSecs;
  const dtPct  = totAct > 0 ? Math.round(dSecs / totAct * 100) : 0;

  const teamLbl = team === 'lifting' ? '🏗️ Lifting' : '🔧 Ext Works';

  const evHtml = evs.map(ev => {
    const dot = {w:'dt-ew',p:'dt-ep',b:'dt-eb',d:'dt-ed',e:'dt-ee'}[ev.type] || 'dt-ew';
    return `<div class="dt-ev">
      <div class="dt-edot ${dot}"></div>
      <span class="dt-et">${dtTs(ev.time)}</span>
      <span class="dt-edur">${ev.label}</span>
      ${ev.note ? `<span class="dt-enote">${ev.note}</span>` : ''}
    </div>`;
  }).join('');

  const dtTagsHtml = hdt ? dtEvs.map(d =>
    `<span class="dt-cat-tag">⚠ ${d.category||'Uncategorised'} — ${dtFmt(d.durSecs||0)}</span>`
  ).join('') : '';

  const canWrite  = getAccessLevel() === 'write';
  const editBtn   = canWrite && e.id
    ? `<button class="dt-le-edit" onclick="dtOpenEditModal('${e.id}',event)" title="Edit this log entry">✏️</button>`
    : '';
  const deleteBtn = canWrite && e.id
    ? `<button class="dt-le-del" onclick="dtDeleteLogEntry('${e.id}',event)" title="Delete this log entry">🗑</button>`
    : '';

  return `
  <div class="dt-log-entry ${hdt?'dt-hdt':''}">
    <div class="dt-le-head">
      <div>
        <div><span class="dt-le-date">📅 ${dtDateStr(stMs)}</span></div>
        <div class="dt-le-title">#${num} — ${desc} <span style="font-size:10px;font-weight:500;color:var(--text-muted)">${teamLbl}</span></div>
        ${ref ? `<div class="dt-le-ref">Ref: ${ref}</div>` : ''}
      </div>
      <div style="display:flex;align-items:flex-start;gap:6px">
        <div class="dt-le-tr">${dtTsm(stMs)} – ${dtTsm(enMs)}</div>
        ${editBtn}${deleteBtn}
      </div>
    </div>
    <div class="dt-le-stats">
      <div class="dt-le-stat"><div class="dt-ls-lbl">Working</div><div class="dt-ls-val g">${dtFmtHM(wSecs)}</div></div>
      <div class="dt-le-stat"><div class="dt-ls-lbl">Downtime</div><div class="dt-ls-val ${hdt?'r':''}">${dtFmtHM(dSecs)}${hdt?` (${dtPct}%)`:''}</div></div>
      <div class="dt-le-stat"><div class="dt-ls-lbl">Breaks ×${bCnt}</div><div class="dt-ls-val">${dtFmtHM(bSecs)}</div></div>
    </div>
    ${hdt ? `<div class="dt-dt-tags">${dtTagsHtml}</div>` : ''}
    <div class="dt-le-body">
      <div class="dt-etl">${evHtml}</div>
      ${cmt ? `<div class="dt-le-note">📝 ${cmt}</div>` : ''}
    </div>
  </div>`;
}

// ── Render: summary ───────────────────────────────────────────────────────────
function dtRenderSummary() {
  const all  = dtLog;
  const lift = all.filter(e => e.team === 'lifting');
  const ext  = all.filter(e => e.team === 'external');

  const sumW = a => a.reduce((t,e) => t + (e.work_secs||e.workSecs||0), 0);
  const sumD = a => a.reduce((t,e) => t + (e.down_secs||e.downSecs||0), 0);
  const sumB = a => a.reduce((t,e) => t + (e.break_secs||e.breakSecs||0), 0);
  const evts = a => a.reduce((t,e) => { const d=(typeof e.dt_events==='string')?JSON.parse(e.dt_events):(e.dtEvents||[]); return t+d.length; }, 0);
  const eff  = (w,d) => { const a=w+d; return a>0?Math.round(w/a*100):null; };
  const effCls = v => v===null?'':v>=80?'g':v>=60?'o':'r';

  const aw=sumW(all),ad=sumD(all),ab=sumB(all),ae=eff(aw,ad);
  const lw=sumW(lift),ld=sumD(lift),le=eff(lw,ld);
  const ew=sumW(ext), ed=sumD(ext), ee=eff(ew,ed);

  const statCard = (lbl, val, cls) =>
    `<div class="dt-scard"><div class="dt-sc-lbl">${lbl}</div><div class="dt-sc-val ${cls}">${val}</div></div>`;

  return `
  <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px">
    <div class="dt-sec-hdr" style="margin:0">Overall Today</div>
    <button class="dt-btn dtb-export" onclick="dtExportCSV()">⬇ Export CSV</button>
  </div>
  <div class="dt-sgrid">
    ${statCard('Tasks Done', all.length, 'b')}
    ${statCard('Working Time', dtFmtHM(aw), 'g')}
    ${statCard('Total Downtime', dtFmtHM(ad), 'r')}
    ${statCard('Break Time', dtFmtHM(ab), 'o')}
    ${statCard('DT Events', evts(all), 'r')}
    ${statCard('Efficiency', ae!==null?ae+'%':'—', effCls(ae))}
  </div>

  <div class="dt-sec-hdr" style="margin-bottom:12px">🏗️ Lifting Team</div>
  <div class="dt-sgrid" style="margin-bottom:20px">
    ${statCard('Tasks', lift.length, 'b')}
    ${statCard('Working', dtFmtHM(lw), 'g')}
    ${statCard('Downtime', dtFmtHM(ld), 'r')}
    ${statCard('Efficiency', le!==null?le+'%':'—', effCls(le))}
  </div>

  <div class="dt-sec-hdr" style="margin-bottom:12px">🔧 External Works</div>
  <div class="dt-sgrid" style="margin-bottom:24px">
    ${statCard('Tasks', ext.length, 'b')}
    ${statCard('Working', dtFmtHM(ew), 'g')}
    ${statCard('Downtime', dtFmtHM(ed), 'r')}
    ${statCard('Efficiency', ee!==null?ee+'%':'—', effCls(ee))}
  </div>

  <div class="dt-sec-hdr" style="margin-bottom:12px">All Completed Tasks</div>
  ${!all.length
    ? '<div class="dt-log-empty">No tasks completed yet.</div>'
    : all.map((e,i) => dtBuildEntry(e, i+1)).join('')
  }`;
}

// ── CSV Export ────────────────────────────────────────────────────────────────
function dtExportCSV() {
  if (!dtLog.length) { showError('No completed tasks to export.'); return; }

  const maxDT = Math.max(1, ...dtLog.map(e => {
    const d = (typeof e.dt_events==='string') ? JSON.parse(e.dt_events) : (e.dtEvents||[]);
    return d.length;
  }));

  const hdr = ['#','Date','Team','Description','Ref','Start','End',
    'Work (min)','Downtime (min)','Break (min)','Total DT Events','Task Notes'];
  for (let i=1; i<=maxDT; i++) hdr.push(`DT${i} Time (min)`, `DT${i} Category`, `DT${i} Description`);

  const rows = [hdr];
  dtLog.forEach((e, i) => {
    const dtEvs = (typeof e.dt_events==='string') ? JSON.parse(e.dt_events) : (e.dtEvents||[]);
    const stMs  = e.start_time || e.startTime || 0;
    const enMs  = e.end_time   || e.endTime   || 0;
    const row = [
      i+1,
      new Date(stMs).toLocaleDateString('en-GB'),
      e.team === 'lifting' ? 'Lifting' : 'External Works',
      e.task_desc||e.taskDesc||'',
      e.task_ref||e.taskRef||'',
      dtTsm(stMs), dtTsm(enMs),
      Math.round((e.work_secs||e.workSecs||0)/60),
      Math.round((e.down_secs||e.downSecs||0)/60),
      Math.round((e.break_secs||e.breakSecs||0)/60),
      dtEvs.length,
      e.task_comment||e.taskComment||'',
    ];
    for (let j=0; j<maxDT; j++) {
      const d = dtEvs[j];
      d ? row.push(Math.round((d.durSecs||0)/60), d.category||'Uncategorised', d.comment||'')
        : row.push('','','');
    }
    rows.push(row);
  });

  const csv = rows.map(r => r.map(c => `"${String(c).replace(/"/g,'""')}"`).join(',')).join('\n');
  const a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob([csv], { type:'text/csv' }));
  const d = new Date();
  a.download = `downtime_${d.getFullYear()}-${dtPad(d.getMonth()+1)}-${dtPad(d.getDate())}.csv`;
  a.click();
}

</script>
