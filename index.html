        const lblBg = svgEl('text', { x: bx, y: by, fill: '#fff', 'font-size': '9', 'font-weight': 'bold', 'font-family': 'monospace', 'text-anchor': 'middle', stroke: '#fff', 'stroke-width': '3', 'paint-order': 'stroke' });
        lblBg.textContent = cLabel + ' →🚢';
        svg.appendChild(lblBg);
        const lblTxt = svgEl('text', { x: bx, y: by, fill: color, 'font-size': '9', 'font-weight': 'bold', 'font-family': 'monospace', 'text-anchor': 'middle' });
        lblTxt.textContent = cLabel + ' →🚢';
        svg.appendChild(lblTxt);
      }
    }
  });

  // Setup facility box hover fade toggle (re-bind after each render)
  _setupFacilityBoxFade();
}

function _setupFacilityBoxFade() {
  const box = document.getElementById('mv-facility-box');
  const fade = document.querySelector('.mv-facility-fade');
  if (!box || !fade) return;
  // Only show fade if content overflows
  if (box.scrollHeight <= box.clientHeight + 10) { fade.style.display = 'none'; return; }
  fade.style.display = '';
  box.onmouseenter = () => fade.classList.add('hidden');
  box.onmouseleave = () => fade.classList.remove('hidden');
}

function updateUKClock() {
  const now = new Date();
  const opts = { timeZone: 'Europe/London', hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: false };
  const dateOpts = { timeZone: 'Europe/London', weekday: 'short', day: 'numeric', month: 'short', year: 'numeric' };
  const tEl = document.getElementById('hdr-time');
  const dEl = document.getElementById('hdr-date');
  if (tEl) tEl.textContent = now.toLocaleTimeString('en-GB', opts);
  if (dEl) dEl.textContent = now.toLocaleDateString('en-GB', dateOpts).toUpperCase();
}
setInterval(updateUKClock, 1000);
document.addEventListener("DOMContentLoaded", () => updateUKClock());

  if ((e.ctrlKey || e.metaKey) && e.key === 'k') { e.preventDefault(); openGlobalSearch(); }

  if (e.key === 'Escape' && cageHistoryModal) closeCageHistory();
});

// ── PIN Screen ──────────────────────────────────────────────────────
let _lockoutTimer = null;

function showPinScreen(errorMsg = '', isLocked = false, remaining = 0) {
  document.getElementById('pin-overlay').style.display = 'flex';
  document.getElementById('app-wrapper').style.display = 'none';
  const errEl = document.getElementById('pin-error');
  const inp   = document.getElementById('pin-input');
  const btn   = document.getElementById('pin-submit-btn');
  if (errorMsg) { errEl.textContent = errorMsg; errEl.style.display = 'block'; }
  else { errEl.style.display = 'none'; }
  if (isLocked) {
    inp.disabled = false;  // keep input enabled so admin PIN can still be typed
    inp.value = '';
    inp.focus();
    btn.disabled = true;
    startLockoutCountdown(remaining);
  } else {
    inp.disabled = false;
    btn.disabled = false;
    btn.textContent = 'Unlock';
    clearLockoutCountdown();
    setTimeout(() => { if (inp) { inp.value = ''; inp.focus(); } }, 100);
  }
}

function startLockoutCountdown(seconds) {
  clearLockoutCountdown();
  const btn = document.getElementById('pin-submit-btn');
  const inp = document.getElementById('pin-input');
  let remaining = seconds;
  function tick() {
    if (remaining <= 0) {
      clearLockoutCountdown();
      btn.disabled = false; btn.textContent = 'Unlock';
      inp.disabled = false;
      document.getElementById('pin-error').style.display = 'none';
      inp.value = ''; inp.focus();
      return;
    }
    const m = Math.floor(remaining / 60);
    const s = String(remaining % 60).padStart(2, '0');
    btn.textContent = `Locked — ${m}:${s}`;
    remaining--;
    _lockoutTimer = setTimeout(tick, 1000);
  }
  tick();
}

function clearLockoutCountdown() {
  if (_lockoutTimer) { clearTimeout(_lockoutTimer); _lockoutTimer = null; }
}

function renderSettings() {

  const field = (id, label, val, step, helpText) => `
    <div style="margin-bottom:16px">
      <label for="setting-${id}">${label}</label>
      <input type="number" id="setting-${id}" value="${val}" step="${step}" min="0"
        style="max-width:160px" ${ro ? 'disabled' : ''}>

  return `
    <div class="section-title">&#9881; Settings</div>
    ${ro ? `<div style="background:#fef0e6;border:1px solid #e8c8a0;border-radius:8px;padding:10px 14px;margin-bottom:18px;font-size:13px;color:var(--orange)">&#128065; Read-only access — settings cannot be changed</div>` : ''}

    <div class="card" style="max-width:620px">
      <div class="card-title">&#128197; Movement Rules</div>
      ${field('movementsPerDay', 'Max movements per day', s.movementsPerDay || 4, 1, 'Warnings are shown when planned movements on any day exceed this limit.')}
    </div>

      <p style="font-size:12px;color:var(--text-muted);margin-bottom:14px">Cages are classified as <strong>Short</strong>, <strong>Medium</strong>, or <strong>Tall</strong> based on their height. These thresholds control the classification and affect RMD pairing rules.</p>
      ${field('heightShortMax', 'Short / Medium threshold (m)', s.heightShortMax || 2.7, 0.05, 'Cages with height below this value are classified as Short. Default: 2.7m')}
      ${field('heightMedMax', 'Medium / Tall threshold (m)', s.heightMedMax || 4.7, 0.05, 'Cages with height at or below this value are classified as Medium; above it are Tall. Default: 4.7m')}
    </div>

    <div class="card" style="max-width:620px">
      <div class="card-title">&#128697; RMD Pairing Rules</div>
      <p style="font-size:12px;color:var(--text-muted);margin-bottom:10px">Each RMD area holds a maximum of <strong>2 cages per side</strong>. The first cage placed goes on the <strong>inside</strong>; the second goes on the <strong>outside</strong>. To remove the inside cage, the outside cage must be removed first.</p>
      <p style="font-size:12px;color:var(--text-muted);margin-bottom:6px">Valid height pairings (inside → outside):</p>
      <table style="font-size:12px;border-collapse:collapse;width:100%">

async function runMigration() {
  const btn = document.getElementById('migrate-btn');
  const msg = document.getElementById('migrate-msg');
  if (btn) { btn.disabled = true; btn.textContent = '⏳ Running…'; }
  if (msg) { msg.style.display = 'none'; }
  try {
    const res = await api('/api/migrate', 'POST', {});
    if (msg) {
      msg.style.display = 'inline';
      msg.style.color = 'var(--green)';
      msg.textContent = '✓ Migration complete — new columns added successfully.';
    }
  } catch(e) {

async function applyShipmentAssignment() {

  STATE.settings.nextShipTripId   = nextEl.value   || null;
  STATE.settings.secondShipTripId = secondEl.value || null;
  render();
  await saveSettings(STATE.settings);
}

async function clearShipmentAssignment() {
  STATE.settings.nextShipTripId   = null;
  STATE.settings.secondShipTripId = null;

}

async function applySettings() {
  const get = id => {
    const el = document.getElementById('setting-' + id);
    return el ? parseFloat(el.value) : null;
  };
  const newSettings = {
    movementsPerDay: Math.max(1, Math.round(get('movementsPerDay') || 4)),
    heightShortMax:  Math.max(0.1, get('heightShortMax') || 2.7),
    heightMedMax:    Math.max(0.1, get('heightMedMax') || 4.7),
    walerLengthThreshold: Math.max(0.1, get('walerLengthThreshold') || 6.5),
    doubleSpareWidth: Math.max(0, get('doubleSpareWidth') !== null ? get('doubleSpareWidth') : 0.2),
    doubleMaxWeight:  Math.max(0, get('doubleMaxWeight') || 14),
    frameSpare:     Math.max(0, get('frameSpare')     !== null ? get('frameSpare')     : 0.2),
    frameTierSmall: Math.max(0.1, get('frameTierSmall') || 1.1),
    frameTierMed:   Math.max(0.1, get('frameTierMed')   || 1.5),
    nextShipTripId:   STATE.settings.nextShipTripId   || null,
    secondShipTripId: STATE.settings.secondShipTripId || null,
  };
  if (newSettings.heightShortMax >= newSettings.heightMedMax) {
    showError('Short/Medium threshold must be less than Medium/Tall threshold.');
    return;
  }
  if (newSettings.frameTierSmall >= newSettings.frameTierMed) {
    showError('Frame Tier 1 width must be less than Frame Tier 2 width.');
    return;
  }
  STATE.settings = newSettings;
  render();
  // Show saved message after render (element will be recreated)
  setTimeout(() => {
    const msg = document.getElementById('settings-saved-msg');
    if (msg) { msg.style.display = 'inline'; setTimeout(() => { if(msg) msg.style.display = 'none'; }, 3000); }
  }, 50);
  await saveSettings(newSettings);
}


function hidePinScreen() {
  document.getElementById('pin-overlay').style.display = 'none';
  document.getElementById('app-wrapper').style.display = 'flex';
  document.querySelectorAll('.write-only').forEach(el => {
    el.style.display = isReadOnly() ? 'none' : '';
  });
  const badge = document.getElementById('access-badge');
  if (badge) {
    if (_sessionLevel === 'ship') {
      badge.textContent = '⛴ SHIPPING';
      badge.style.background = '#7040c0';
    } else {
      badge.textContent = isReadOnly() ? '👁 READ ONLY' : '✏ READ & WRITE';
      badge.style.background = isReadOnly() ? '#2563b0' : '#1a8a4a';
    }
  }
  // Initialise mobile nav visibility
  renderMobileNav();

  window.addEventListener('resize', () => renderMobileNav(), { passive: true });
}

async function submitPin() {
  const pin = document.getElementById('pin-input').value.trim();
  if (!pin) return;
  const btn = document.getElementById('pin-submit-btn');
  const wasLocked = btn.disabled;
  if (!wasLocked) { btn.disabled = true; btn.textContent = 'Checking...'; }
  try {
    const res = await fetch(API_BASE + '/api/auth', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ pin })
    });
    const data = await res.json();

    if (res.status === 429 || data.locked) {
      // Locked out
      showPinScreen(data.error || 'Too many attempts. Please wait.', true, data.remaining || 300);
      return;
    }

    if (data.ok && data.level === 'admin_unlock') {
      // Admin PIN used — IP unlocked, prompt for real PIN
      showPinScreen('');
      const errEl = document.getElementById('pin-error');
      errEl.textContent = '✓ Unlocked by admin. Enter your access PIN.';
      errEl.style.color = '#1a8a4a';
      errEl.style.background = 'rgba(26,138,74,0.1)';
      errEl.style.borderColor = 'rgba(26,138,74,0.3)';
      errEl.style.display = 'block';
      return;
    }

    if (data.ok) {
      _sessionPin = pin;
      _sessionLevel = data.level;
      // Cache PIN for today — won't ask again until tomorrow
      try {
        localStorage.setItem('ct_pin_cache', JSON.stringify({
          pin, level: data.level, date: new Date().toISOString().slice(0,10)
        }));
      } catch(e) {}
      // Reset error style in case admin unlock changed it
      const errEl = document.getElementById('pin-error');
      errEl.style.color = ''; errEl.style.background = ''; errEl.style.borderColor = '';
      hidePinScreen();
      try { await loadState(); } catch(e) { console.error('loadState failed:', e); }
      try { render(); } catch(e) {
        console.error('render failed:', e);
        const main = document.getElementById('main-content');
        if (main) main.innerHTML = `<div style="padding:40px;color:#c93030;font-size:14px">
          <strong>Error rendering page:</strong> ${e.message}<br><br>
          <button onclick="location.reload()" style="padding:8px 16px;background:#e8a830;border:none;border-radius:6px;cursor:pointer;font-weight:600">Reload</button>
        </div>`;
      }
    } else {
      // Wrong PIN — show attempts remaining or generic error
      const msg = data.error || 'Incorrect PIN. Please try again.';
      showPinScreen(msg, false, 0);
    }
  } catch(e) {
    showPinScreen('Connection error. Please try again.', false, 0);
    const btn2 = document.getElementById('pin-submit-btn');
    btn2.disabled = false; btn2.textContent = 'Unlock';
  }
}

function logout() {
  _sessionPin = null;
  _sessionLevel = null;
  try { localStorage.removeItem('ct_pin_cache'); } catch(e) {}
  document.getElementById('pin-overlay').style.display = 'flex';
  document.getElementById('app-wrapper').style.display = 'none';
  const inp = document.getElementById('pin-input');
  if (inp) { inp.value = ''; setTimeout(() => inp.focus(), 100); }
  const errEl = document.getElementById('pin-error');
  if (errEl) { errEl.style.display = 'none'; }
}

// Tab passwords removed — access is controlled by PIN level (write / read / ship)

document.addEventListener("DOMContentLoaded", async function() {
  // Restore last active tab from session
  try {
    const savedTab = sessionStorage.getItem('ct_activeTab');
    if (savedTab) activeTab = savedTab;
  } catch(e) {}

  // Try today's cached PIN first — skip PIN screen if valid
  try {
    const cached = JSON.parse(localStorage.getItem('ct_pin_cache') || 'null');
    const today = new Date().toISOString().slice(0,10);
    if (cached && cached.pin && cached.date === today) {
      // Attempt silent auth with cached PIN
      const res = await fetch(API_BASE + '/api/auth', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ pin: cached.pin })
      });
      const data = await res.json();
      if (data.ok && (data.level === cached.level || data.level)) {
        _sessionPin = cached.pin;
        _sessionLevel = data.level || cached.level;
        hidePinScreen();
        try { await loadState(); } catch(e) { console.error('loadState failed:', e); }
        try { render(); } catch(e) { console.error('render failed:', e); }
        // Set up Enter key listener still
        document.getElementById('pin-input').addEventListener('keydown', e => {
          if (e.key === 'Enter') submitPin();
        });
        document.getElementById('pin-input').addEventListener('input', e => {
          const btn = document.getElementById('pin-submit-btn');
          if (e.target.value.trim().length > 0) {
            btn.disabled = false;
            if (btn.textContent.startsWith('Locked')) btn.textContent = 'Unlock';
          } else {
            if (_lockoutTimer) { btn.disabled = true; }
          }
        });
        return; // Skip showing PIN screen
      }
    }
  } catch(e) { /* silent fail — fall through to PIN screen */ }

  // Check if IP is already locked before showing screen
  try {
    const res = await fetch(API_BASE + '/api/lockout-status');
    const data = await res.json();
    if (data.locked) {
      showPinScreen('Too many previous attempts.', true, data.remaining);
    } else {
      showPinScreen();
    }
  } catch(e) {
    showPinScreen();
  }
  document.getElementById('pin-input').addEventListener('keydown', e => {
    if (e.key === 'Enter') submitPin();  // always fires, even during lockout (admin PIN)
  });
  // Re-enable the Unlock button as soon as the user starts typing (allows admin PIN during lockout)
  document.getElementById('pin-input').addEventListener('input', e => {
    const btn = document.getElementById('pin-submit-btn');
    if (e.target.value.trim().length > 0) {
      btn.disabled = false;
      if (btn.textContent.startsWith('Locked')) btn.textContent = 'Unlock';
    } else {
      // If they clear the box while locked, re-disable
      if (_lockoutTimer) { btn.disabled = true; }
    }
  });
});

// ── State ──────────────────────────────────────────────────────────────────
// STATE.customTabs    = array of { id, label, icon, sortOrder }
// STATE.customTabItems = array of { id, tabId, type, title, content, metadata, sortOrder }

const CUSTOM_ITEM_TYPES = [
  { key: 'note',      label: 'Note',      icon: '📝', color: '#2563b0', bg: '#e6f0fa' },
  { key: 'checklist', label: 'Checklist', icon: '✅', color: '#1a8a4a', bg: '#e6f5ec' },
  { key: 'actions',   label: 'Actions',   icon: '⚡', color: '#c08520', bg: '#f5e6c8' },

];

const TAB_ICONS = ['📋','📌','⭐','🔖','🗂','📁','💡','🧪','🔬','📦','🚢','⚙','🗒','🎯','📅','🔔','🧭','💬','🔧','🛠','📐','🗃','📂','🌊','🐟','🏗','📈','🔍','✅','⚡'];

function getCustomTabs() { return (STATE.customTabs || []); }
function getCustomTabItems(tabId) { return (STATE.customTabItems || []).filter(i => i.tabId === tabId); }

// ── API helpers ────────────────────────────────────────────────────────────
async function apiAddCustomTab(tab) {
  try { await api('/api/custom_tabs', 'POST', tab); } catch(e) { showError('Failed to save tab: ' + e.message); }
}
async function apiUpdateCustomTab(tab) {
  try { await api('/api/custom_tabs', 'PUT', tab); } catch(e) { showError('Failed to update tab: ' + e.message); }
}
async function apiDeleteCustomTab(id) {
  try { await api('/api/custom_tabs', 'DELETE', { id }); } catch(e) { showError('Failed to delete tab: ' + e.message); }
}
async function apiAddCustomTabItem(item) {
  try { await api('/api/custom_tab_items', 'POST', item); } catch(e) { showError('Failed to save item: ' + e.message); }
}
async function apiUpdateCustomTabItem(item) {
  try { await api('/api/custom_tab_items', 'PUT', item); } catch(e) { showError('Failed to update item: ' + e.message); }
}
async function apiDeleteCustomTabItem(id) {
  try { await api('/api/custom_tab_items', 'DELETE', { id }); } catch(e) { showError('Failed to delete item: ' + e.message); }
}

// ── Render a custom tab's content ─────────────────────────────────────────
function renderCustomTab(tab) {
  const items = getCustomTabItems(tab.id).sort((a,b) => a.sortOrder - b.sortOrder);
  const ro = isReadOnly();

  const itemsHTML = items.length
    ? items.map(item => renderCustomTabItem(item, ro)).join('')
    : `<div style="text-align:center;padding:60px 20px;color:var(--text-muted)">
        <div style="font-size:48px;margin-bottom:12px">${tab.icon}</div>
        <div style="font-size:15px;font-weight:600;margin-bottom:6px">No items yet</div>
        <div style="font-size:12px">Add a note, checklist, action list, table, or links below.</div>
      </div>`;

  // Schedule textarea auto-height init for any table items
  setTimeout(() => {
    items.filter(i => i.type === 'table').forEach(i => ctTableInitResize(i.id));
  }, 50);

  return `
    <div class="section-title">${tab.icon} ${esc(tab.label)}</div>
    ${!ro ? `
    <div class="ct-toolbar">
      ${CUSTOM_ITEM_TYPES.map(t => `
        <button class="btn btn-secondary" onclick="ctAddItem('${tab.id}','${t.key}')">
          ${t.icon} ${t.label}
        </button>
      `).join('')}
      <button class="btn btn-secondary" style="margin-left:auto" onclick="openCustomTabManager()">⚙ Manage Tabs</button>
    </div>
    ` : ''}
    <div id="ct-items-${tab.id}">
      ${itemsHTML}
    </div>
  `;
}

function ctItemTypeMeta(type) {
  return CUSTOM_ITEM_TYPES.find(t => t.key === type) || CUSTOM_ITEM_TYPES[0];
}

function renderCustomTabItem(item, ro) {
  const meta = ctItemTypeMeta(item.type);
  const bodyHTML = ctRenderItemBody(item, ro);
  return `
    <div class="ct-item-card" id="ct-item-${item.id}">
      <div class="ct-item-header">
        <span class="ct-item-type-badge" style="color:${meta.color};background:${meta.bg}">${meta.icon} ${meta.label}</span>
        <input class="ct-item-title-input" value="${esc(item.title)}" placeholder="Title…"
          ${ro ? 'disabled' : `onblur="ctSaveTitle('${item.id}',this.value)"`}
          onkeydown="if(event.key==='Enter')this.blur()">
        ${!ro ? `
        <button class="btn btn-secondary btn-xs" onclick="ctCopyItemPicker(event,'${item.id}')"
          style="flex-shrink:0" title="Copy to another tab">⎘ Copy to…</button>
        <button class="btn btn-secondary btn-xs" onclick="ctDeleteItem('${item.id}')"
          style="color:var(--red);flex-shrink:0" title="Delete">✕</button>
        ` : ''}
      </div>
      <div class="ct-item-body">${bodyHTML}</div>
    </div>
  `;
}

function ctRenderItemBody(item, ro) {
  switch(item.type) {
    case 'note':      return ctRenderNote(item, ro);
    case 'checklist': return ctRenderChecklist(item, ro);
    case 'actions':   return ctRenderActions(item, ro);
    case 'table':     return ctRenderTable(item, ro);
    case 'links':     return ctRenderLinks(item, ro);
    default:          return ctRenderNote(item, ro);
  }
}

// ── Note ──────────────────────────────────────────────────────────────────
function ctRenderNote(item, ro) {
  return `<textarea class="ct-note-textarea" placeholder="Write your note here…"
    ${ro ? 'disabled' : `onblur="ctSaveNoteContent('${item.id}',this.value)"`}
  >${esc(item.content)}</textarea>`;
}

async function ctSaveNoteContent(itemId, value) {
  const item = (STATE.customTabItems||[]).find(i => i.id === itemId);
  if (!item) return;
  item.content = value;
  item.updatedAt = new Date().toISOString();
  await apiUpdateCustomTabItem(item);
}

// ── Checklist ─────────────────────────────────────────────────────────────
function ctRenderChecklist(item, ro) {
  const rows = (item.metadata.rows || []);
  const checkItems = rows.map((r, idx) => `
    <li class="ct-checklist-item">
      <input type="checkbox" ${r.done ? 'checked' : ''}
        ${ro ? 'disabled' : `onchange="ctChecklistToggle('${item.id}',${idx},this.checked)"`}>
      <input class="ct-checklist-text ${r.done ? 'done' : ''}" value="${esc(r.text||'')}"
        placeholder="Item…"
        ${ro ? 'disabled' : `onblur="ctChecklistEditText('${item.id}',${idx},this.value)"`}
        onkeydown="if(event.key==='Enter'){event.preventDefault();ctChecklistAdd('${item.id}');}">
      ${!ro ? `<button class="btn btn-secondary btn-xs" style="color:var(--red)"
        onclick="ctChecklistDelete('${item.id}',${idx})">✕</button>` : ''}
    </li>
  `).join('');

  const done = rows.filter(r=>r.done).length;
  return `
    ${rows.length ? `<div style="font:600 10px var(--font-mono);color:var(--text-muted);margin-bottom:8px">${done}/${rows.length} completed</div>` : ''}
    <ul class="ct-checklist">${checkItems}</ul>
    ${!ro ? `<button class="btn btn-secondary btn-sm" style="margin-top:8px" onclick="ctChecklistAdd('${item.id}')">＋ Add item</button>` : ''}
  `;
}

async function ctChecklistToggle(itemId, idx, checked) {
  const item = (STATE.customTabItems||[]).find(i => i.id === itemId);
  if (!item) return;
  if (!item.metadata.rows) item.metadata.rows = [];
  item.metadata.rows[idx].done = checked;
  await apiUpdateCustomTabItem(item);
  ctRefreshItem(item);
}

async function ctChecklistEditText(itemId, idx, text) {
  const item = (STATE.customTabItems||[]).find(i => i.id === itemId);
  if (!item || !item.metadata.rows) return;
  item.metadata.rows[idx].text = text;
  await apiUpdateCustomTabItem(item);
}

async function ctChecklistAdd(itemId) {
  const item = (STATE.customTabItems||[]).find(i => i.id === itemId);
  if (!item) return;
  if (!item.metadata.rows) item.metadata.rows = [];
  item.metadata.rows.push({ text: '', done: false });
  await apiUpdateCustomTabItem(item);
  ctRefreshItem(item);
  // Focus last input
  setTimeout(() => {
    const card = document.getElementById('ct-item-' + itemId);
    if (card) {
      const inputs = card.querySelectorAll('.ct-checklist-text');
      if (inputs.length) inputs[inputs.length-1].focus();
    }

// ── Table ─────────────────────────────────────────────────────────────────
function ctRenderTable(item, ro) {
  const headers   = item.metadata.headers   || ['Column 1', 'Column 2', 'Column 3'];
  const rows      = item.metadata.rows      || [];
  const colWidths = item.metadata.colWidths || [];
  const rowHeights= item.metadata.rowHeights|| [];
  const hCols     = headers.length;

  const headerCells = headers.map((h, hi) => {
    const wStyle = colWidths[hi] ? `width:${colWidths[hi]}px;min-width:${colWidths[hi]}px;max-width:${colWidths[hi]}px;` : 'min-width:80px;';
    return `<th style="${wStyle}" data-col-idx="${hi}" data-item-id="${item.id}">
      ${!ro ? `<div class="ct-col-drag-handle" onmousedown="ctColDragStart(event,'${item.id}',${hi})" title="Drag to reorder column">⠿</div>` : ''}
      <input value="${esc(h)}"
        ${ro ? 'disabled' : `onblur="ctTableEditHeader('${item.id}',${hi},this.value)"`}
        onkeydown="if(event.key==='Enter')this.blur()" title="${esc(h)}"
        style="${!ro ? 'padding-left:14px;' : ''}">
      ${!ro ? `<div class="ct-col-resize-handle" onmousedown="ctColResizeStart(event,'${item.id}',${hi})" title="Drag to resize column"></div>` : ''}
    </th>`;
  }).join('');

  const dataRows = rows.map((row, ri) => {
    const minH = rowHeights[ri] ? `min-height:${rowHeights[ri]}px;` : '';
    const cells = headers.map((_,ci) => {
      const cellVal = esc(row[ci]||'');
      const taMinH  = rowHeights[ri] ? `min-height:${Math.max(34, rowHeights[ri] - 14)}px;` : '';
      return `<td>
        <textarea
          ${ro ? 'disabled' : `onblur="ctTableEditCell('${item.id}',${ri},${ci},this.value)"`}
          oninput="ctTableTAResize(this)"
          style="${taMinH}"
          placeholder="—">${cellVal}</textarea>
        ${!ro && ci === 0 ? `<div class="ct-row-resize-handle" onmousedown="ctRowResizeStart(event,'${item.id}',${ri})" title="Drag to resize row"></div>` : ''}
      </td>`;
    }).join('');
    return `<tr style="${minH}">${cells}${!ro ? `<td style="width:52px;padding:4px 3px;vertical-align:top"><div style="display:flex;flex-direction:column;gap:2px;align-items:center"><button class="btn btn-secondary btn-xs" style="font-size:9px;padding:1px 5px;color:var(--text-muted)" onclick="ctTableMoveRow('${item.id}',${ri},-1)" title="Move row up">▲</button><button class="btn btn-secondary btn-xs" style="font-size:9px;padding:1px 5px;color:var(--text-muted)" onclick="ctTableMoveRow('${item.id}',${ri},1)" title="Move row down">▼</button><button class="btn btn-secondary btn-xs" style="font-size:9px;padding:1px 5px;color:var(--accent)" onclick="ctTableInsertRow('${item.id}',${ri})" title="Insert row below">＋</button><button class="btn btn-secondary btn-xs" style="color:var(--red);padding:1px 5px" onclick="ctTableDeleteRow('${item.id}',${ri})">✕</button></div></td>` : ''}</tr>`;
  }).join('');

  return `
    <div class="ct-table-wrapper">
      <table class="ct-data-table" id="ct-tbl-${item.id}">
        <thead><tr>${headerCells}${!ro ? '<th style="width:28px"></th>' : ''}</tr></thead>
        <tbody>${dataRows}</tbody>
      </table>
    </div>
    ${!ro ? `
    <div style="display:flex;gap:8px;margin-top:8px;flex-wrap:wrap;align-items:center">
      <button class="btn btn-secondary btn-sm" onclick="ctTableAddRow('${item.id}')">＋ Row</button>
      <button class="btn btn-secondary btn-sm" onclick="ctTableAddCol('${item.id}')">＋ Column</button>
      ${hCols > 1 ? `<button class="btn btn-secondary btn-sm" style="color:var(--red)" onclick="ctTableRemoveCol('${item.id}')">− Column</button>` : ''}
      <div style="margin-left:auto;display:flex;gap:6px;align-items:center">
        ${(item.metadata.snapshots||[]).length > 0 ? `<span style="font:600 10px var(--font-mono);color:var(--text-muted)">${(item.metadata.snapshots||[]).length} snapshot${(item.metadata.snapshots||[]).length===1?'':'s'}</span>` : ''}
        <button class="btn btn-secondary btn-sm" onclick="ctTableSaveSnapshot('${item.id}')" title="Save a named snapshot of this table">📸 Snapshot</button>
        <button class="btn btn-secondary btn-sm" onclick="ctTableShowHistory('${item.id}')" title="View saved snapshots">🕐 History</button>
        <button class="btn btn-secondary btn-sm" onclick="ctTableResetLayout('${item.id}')" title="Reset column widths and row heights">↺ Layout</button>
      </div>
    </div>
    ` : `
    <div style="display:flex;gap:8px;margin-top:8px">
      ${(item.metadata.snapshots||[]).length > 0 ? `<button class="btn btn-secondary btn-sm" onclick="ctTableShowHistory('${item.id}')">🕐 History (${(item.metadata.snapshots||[]).length})</button>` : ''}
    </div>
    `}
  `;
}

// Auto-resize textarea to fit content
function ctTableTAResize(ta) {
  ta.style.height = 'auto';
  ta.style.height = ta.scrollHeight + 'px';
}

// Initialise textarea heights after render (called after DOM is ready)
function ctTableInitResize(tableId) {
  const tbl = document.getElementById('ct-tbl-' + tableId);
  if (!tbl) return;
  tbl.querySelectorAll('td textarea').forEach(ta => ctTableTAResize(ta));
}

// Column resize drag
// Column drag-to-reorder
let _ctColDrag = null;

function ctColDragStart(e, itemId, colIdx) {
  e.preventDefault();
  e.stopPropagation();
  const th = e.target.closest('th');
  const table = th.closest('table');
  _ctColDrag = { itemId, colIdx, th, table, overIdx: null };
  th.classList.add('ct-col-dragging');

  const onMove = (ev) => {
    if (!_ctColDrag) return;
    // Find which th we're over
    const ths = Array.from(table.querySelectorAll('thead tr th'));
    let targetIdx = null;
    for (let i = 0; i < ths.length; i++) {
      const rect = ths[i].getBoundingClientRect();
      if (ev.clientX >= rect.left && ev.clientX <= rect.right) {
        targetIdx = i;
        break;
      }
    }
    // Clear previous highlights
    ths.forEach(t => t.classList.remove('ct-col-drag-over'));
    if (targetIdx !== null && targetIdx !== colIdx) {
      ths[targetIdx].classList.add('ct-col-drag-over');
      _ctColDrag.overIdx = targetIdx;
    } else {
      _ctColDrag.overIdx = null;
    }
  };

  const onUp = async () => {
    document.removeEventListener('mousemove', onMove);
    document.removeEventListener('mouseup', onUp);
    if (!_ctColDrag) return;
    const { itemId, colIdx, th, table, overIdx } = _ctColDrag;
    _ctColDrag = null;
    th.classList.remove('ct-col-dragging');
    table.querySelectorAll('thead tr th').forEach(t => t.classList.remove('ct-col-drag-over'));

    if (overIdx === null || overIdx === colIdx) return;

    const item = (STATE.customTabItems||[]).find(i => i.id === itemId);
    if (!item) return;

    // Reorder headers
    const headers = [...(item.metadata.headers || [])];
    const [movedHeader] = headers.splice(colIdx, 1);
    headers.splice(overIdx, 0, movedHeader);
    item.metadata.headers = headers;

    // Reorder colWidths
    if (item.metadata.colWidths && item.metadata.colWidths.length) {
      const cw = [...item.metadata.colWidths];
      const [movedW] = cw.splice(colIdx, 1);
      cw.splice(overIdx, 0, movedW);
      item.metadata.colWidths = cw;
    }

    // Reorder cell data in each row
    if (item.metadata.rows) {
      item.metadata.rows = item.metadata.rows.map(row => {
        const newRow = [...row];
        const [movedCell] = newRow.splice(colIdx, 1);
        newRow.splice(overIdx, 0, movedCell);
        return newRow;
      });
    }

    await apiUpdateCustomTabItem(item);
    ctRefreshItem(item);
  };

  document.addEventListener('mousemove', onMove);
  document.addEventListener('mouseup', onUp);
}

function ctColResizeStart(e, itemId, colIdx) {
  e.preventDefault();
  const startX = e.clientX;
  const th = e.target.closest('th');
  const startW = th.offsetWidth;
  const handle = e.target;
  handle.classList.add('resizing');

  const onMove = (ev) => {
    const newW = Math.max(60, startW + ev.clientX - startX);
    th.style.width = newW + 'px';
    th.style.minWidth = newW + 'px';
    th.style.maxWidth = newW + 'px';
  };
  const onUp = async () => {
    document.removeEventListener('mousemove', onMove);
    document.removeEventListener('mouseup', onUp);
    handle.classList.remove('resizing');
    const item = (STATE.customTabItems||[]).find(i => i.id === itemId);
    if (!item) return;
    if (!item.metadata.colWidths) item.metadata.colWidths = [];
    item.metadata.colWidths[colIdx] = th.offsetWidth;
    await apiUpdateCustomTabItem(item);
  };
  document.addEventListener('mousemove', onMove);
  document.addEventListener('mouseup', onUp);
}

// Row resize drag
function ctRowResizeStart(e, itemId, rowIdx) {
  e.preventDefault();
  const startY = e.clientY;
  const tr = e.target.closest('tr');
  const startH = tr.offsetHeight;
  const handle = e.target;
  handle.classList.add('resizing');

  const onMove = (ev) => {
    const newH = Math.max(34, startH + ev.clientY - startY);
    tr.style.minHeight = newH + 'px';
    tr.querySelectorAll('textarea').forEach(ta => {
      ta.style.minHeight = Math.max(20, newH - 14) + 'px';
      ta.style.height = Math.max(20, newH - 14) + 'px';
    });
  };
  const onUp = async () => {
    document.removeEventListener('mousemove', onMove);
    document.removeEventListener('mouseup', onUp);
    handle.classList.remove('resizing');
    const item = (STATE.customTabItems||[]).find(i => i.id === itemId);
    if (!item) return;
    if (!item.metadata.rowHeights) item.metadata.rowHeights = [];
    item.metadata.rowHeights[rowIdx] = tr.offsetHeight;
    await apiUpdateCustomTabItem(item);
  };
  document.addEventListener('mousemove', onMove);
  document.addEventListener('mouseup', onUp);
}

// Reset all column widths and row heights
async function ctTableResetLayout(itemId) {
  const item = (STATE.customTabItems||[]).find(i => i.id === itemId);
  if (!item) return;
  item.metadata.colWidths = [];
  item.metadata.rowHeights = [];
  await apiUpdateCustomTabItem(item);
  ctRefreshItem(item);
  setTimeout(() => ctTableInitResize(itemId), 50);
}


// ── Table Snapshots ───────────────────────────────────────────────────────

// Save a named snapshot of the current table state
async function ctTableSaveSnapshot(itemId) {
  const item = (STATE.customTabItems||[]).find(i => i.id === itemId);
  if (!item) return;

  const label = prompt('Name this snapshot (e.g. "Week 12 meeting"):');
  if (!label || !label.trim()) return;

  const snap = {
    id: uid(),
    label: label.trim(),
    savedAt: new Date().toISOString(),
    headers:    JSON.parse(JSON.stringify(item.metadata.headers   || [])),
    rows:       JSON.parse(JSON.stringify(item.metadata.rows      || [])),
    colWidths:  JSON.parse(JSON.stringify(item.metadata.colWidths || [])),
    rowHeights: JSON.parse(JSON.stringify(item.metadata.rowHeights|| [])),
  };

  if (!item.metadata.snapshots) item.metadata.snapshots = [];
  item.metadata.snapshots.push(snap);
  await apiUpdateCustomTabItem(item);
  ctRefreshItem(item);
  setTimeout(() => ctTableInitResize(itemId), 30);
  showToast('Snapshot "' + snap.label + '" saved');
}

// Show history modal listing all snapshots
function ctTableShowHistory(itemId) {
  const item = (STATE.customTabItems||[]).find(i => i.id === itemId);
  if (!item) return;
  const snaps = (item.metadata.snapshots || []).slice().reverse(); // newest first

  const rows = snaps.length ? snaps.map((s, ri) => {
    const realIdx = (item.metadata.snapshots.length - 1) - ri;
    const d = new Date(s.savedAt);
    const dateStr = d.toLocaleDateString('en-GB', {day:'2-digit',month:'short',year:'numeric'});
    const timeStr = d.toLocaleTimeString('en-GB', {hour:'2-digit',minute:'2-digit'});
    const dims = `${(s.headers||[]).length} col × ${(s.rows||[]).length} row`;
    return `
      <div class="ct-snap-row">
        <div class="ct-snap-row-icon">📋</div>
        <div class="ct-snap-row-info">
          <div class="ct-snap-row-label">${esc(s.label)}</div>
          <div class="ct-snap-row-meta">${dateStr} ${timeStr} &nbsp;·&nbsp; ${dims}</div>
        </div>
        <div class="ct-snap-row-actions">
          <button class="btn btn-secondary btn-xs" onclick="ctTableViewSnapshot('${itemId}',${realIdx})" title="View this snapshot">👁 View</button>
          <button class="btn btn-primary btn-xs" onclick="ctTableRestoreSnapshot('${itemId}',${realIdx})" title="Restore this snapshot to the live table">↩ Restore</button>
          <button class="btn btn-secondary btn-xs" style="color:var(--red)" onclick="ctTableDeleteSnapshot('${itemId}',${realIdx})" title="Delete this snapshot">✕</button>
        </div>

  }).join('') : `<div class="ct-snap-empty">📭 No snapshots yet.<br><span style="font-size:11px">Use <strong>📸 Snapshot</strong> on the table to save one.</span></div>`;

  const html = `
    <div class="ct-snap-overlay" id="ct-snap-history-overlay" onclick="if(event.target===this)this.remove()">
      <div class="ct-snap-modal">
        <div class="ct-snap-modal-hdr">
          <span style="font-size:20px">🕐</span>
          <div class="ct-snap-modal-title">Snapshot History — ${esc(item.title||'Table')}</div>
          <button class="btn btn-secondary btn-xs" onclick="document.getElementById('ct-snap-history-overlay').remove()">✕ Close</button>
        </div>
        <div class="ct-snap-modal-body">${rows}</div>
        <div class="ct-snap-modal-footer">
          <span style="font:400 11px var(--font-mono);color:var(--text-muted)">${snaps.length} snapshot${snaps.length===1?'':'s'} stored</span>
        </div>
      </div>

  document.getElementById('ct-snap-history-overlay')?.remove();
  document.body.insertAdjacentHTML('beforeend', html);
}

// Restore a snapshot back to the live table (with confirmation)
async function ctTableRestoreSnapshot(itemId, snapIdx) {
  const item = (STATE.customTabItems||[]).find(i => i.id === itemId);
  if (!item) return;
  const snap = (item.metadata.snapshots||[])[snapIdx];
  if (!snap) return;

  const d = new Date(snap.savedAt).toLocaleDateString('en-GB',{day:'2-digit',month:'short',year:'numeric'});
  if (!confirm(`Restore snapshot "${snap.label}" (${d})?

This will overwrite the live table with the saved version. The current live table will be saved as a new snapshot first so you don't lose anything.`)) return;

  // Auto-save current state as a snapshot before restoring
  const autoSnap = {
    id: uid(),
    label: 'Auto-save before restore (' + new Date().toLocaleDateString('en-GB',{day:'2-digit',month:'short'}) + ')',
    savedAt: new Date().toISOString(),
    headers:    JSON.parse(JSON.stringify(item.metadata.headers   || [])),
    rows:       JSON.parse(JSON.stringify(item.metadata.rows      || [])),
    colWidths:  JSON.parse(JSON.stringify(item.metadata.colWidths || [])),
    rowHeights: JSON.parse(JSON.stringify(item.metadata.rowHeights|| [])),
  };
  if (!item.metadata.snapshots) item.metadata.snapshots = [];
  item.metadata.snapshots.push(autoSnap);

  // Copy snapshot data into live table
  item.metadata.headers    = JSON.parse(JSON.stringify(snap.headers   || []));
  item.metadata.rows       = JSON.parse(JSON.stringify(snap.rows      || []));
  item.metadata.colWidths  = JSON.parse(JSON.stringify(snap.colWidths || []));
  item.metadata.rowHeights = JSON.parse(JSON.stringify(snap.rowHeights|| []));

  await apiUpdateCustomTabItem(item);
  document.getElementById('ct-snap-history-overlay')?.remove();
  document.getElementById('ct-snap-view-overlay')?.remove();
  ctRefreshItem(item);
  setTimeout(() => ctTableInitResize(itemId), 30);
  showToast('Restored "' + snap.label + '"');
}

// Delete a snapshot
async function ctTableDeleteSnapshot(itemId, snapIdx) {
  const item = (STATE.customTabItems||[]).find(i => i.id === itemId);
  if (!item || !item.metadata.snapshots) return;
  const snap = item.metadata.snapshots[snapIdx];
  if (!confirm('Delete snapshot "' + (snap?.label||'') + '"? This cannot be undone.')) return;
  item.metadata.snapshots.splice(snapIdx, 1);
  await apiUpdateCustomTabItem(item);
  document.getElementById('ct-snap-history-overlay')?.remove();
  ctTableShowHistory(itemId);
  ctRefreshItem(item);
  setTimeout(() => ctTableInitResize(itemId), 30);
}

// Simple toast notification
function showToast(msg) {
  const existing = document.getElementById('ct-toast');
  if (existing) existing.remove();
  const t = document.createElement('div');
  t.id = 'ct-toast';
  t.textContent = msg;
  t.style.cssText = 'position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:#1a2235;color:#fff;padding:10px 20px;border-radius:8px;font:600 13px var(--font-display);z-index:9999;box-shadow:0 4px 16px rgba(0,0,0,0.25);opacity:0;transition:opacity 0.2s';
  document.body.appendChild(t);
  requestAnimationFrame(() => { t.style.opacity = '1'; });
  setTimeout(() => { t.style.opacity = '0'; setTimeout(()=>t.remove(), 200); }, 2400);
}

  if (!item) return;
  if (!item.metadata.headers) item.metadata.headers = [];
  item.metadata.headers[idx] = val;
  await apiUpdateCustomTabItem(item);
}
async function ctTableEditCell(itemId, ri, ci, val) {
  const item = (STATE.customTabItems||[]).find(i => i.id === itemId);
  if (!item || !item.metadata.rows) return;
  if (!item.metadata.rows[ri]) item.metadata.rows[ri] = [];
  item.metadata.rows[ri][ci] = val;
  await apiUpdateCustomTabItem(item);
}
async function ctTableAddRow(itemId) {
  const item = (STATE.customTabItems||[]).find(i => i.id === itemId);
  if (!item) return;
  const cols = (item.metadata.headers || []).length || 3;
  if (!item.metadata.rows) item.metadata.rows = [];
  item.metadata.rows.push(Array(cols).fill(''));
  await apiUpdateCustomTabItem(item);
  ctRefreshItem(item);
  setTimeout(() => ctTableInitResize(itemId), 30);
}

async function ctTableInsertRow(itemId, afterIdx) {
  const item = (STATE.customTabItems||[]).find(i => i.id === itemId);
  if (!item) return;
  const cols = (item.metadata.headers || []).length || 3;
  if (!item.metadata.rows) item.metadata.rows = [];
  item.metadata.rows.splice(afterIdx + 1, 0, Array(cols).fill(''));
  if (item.metadata.rowHeights) item.metadata.rowHeights.splice(afterIdx + 1, 0, undefined);
  await apiUpdateCustomTabItem(item);
  ctRefreshItem(item);
  setTimeout(() => ctTableInitResize(itemId), 30);
}
async function ctTableAddCol(itemId) {
  const item = (STATE.customTabItems||[]).find(i => i.id === itemId);
  if (!item) return;
  if (!item.metadata.headers) item.metadata.headers = ['Column 1','Column 2','Column 3'];
  item.metadata.headers.push('Column ' + (item.metadata.headers.length + 1));
  if (item.metadata.rows) item.metadata.rows.forEach(r => r.push(''));
  await apiUpdateCustomTabItem(item);
  ctRefreshItem(item);
}
async function ctTableRemoveCol(itemId) {
  const item = (STATE.customTabItems||[]).find(i => i.id === itemId);
  if (!item || !item.metadata.headers || item.metadata.headers.length <= 1) return;
  item.metadata.headers.pop();
  if (item.metadata.rows) item.metadata.rows.forEach(r => r.pop());
  await apiUpdateCustomTabItem(item);
  ctRefreshItem(item);
}
async function ctTableDeleteRow(itemId, ri) {
  const item = (STATE.customTabItems||[]).find(i => i.id === itemId);
  if (!item || !item.metadata.rows) return;
  item.metadata.rows.splice(ri, 1);
  await apiUpdateCustomTabItem(item);
  ctRefreshItem(item);
}

async function ctTableMoveRow(itemId, ri, direction) {
  const item = (STATE.customTabItems||[]).find(i => i.id === itemId);
  if (!item || !item.metadata.rows) return;
  const rows = item.metadata.rows;
  const swapIdx = ri + direction;
  if (swapIdx < 0 || swapIdx >= rows.length) return;
  const tmp = rows[ri];
  rows[ri] = rows[swapIdx];
  rows[swapIdx] = tmp;
  // Also swap rowHeights if present
  if (item.metadata.rowHeights) {
    const rh = item.metadata.rowHeights;
    const tmpH = rh[ri];
    rh[ri] = rh[swapIdx];
    rh[swapIdx] = tmpH;
  }
  await apiUpdateCustomTabItem(item);
  ctRefreshItem(item);
  setTimeout(() => ctTableInitResize(itemId), 30);
}

async function ctSaveTitle(itemId, val) {

  item.title = val;

// Re-render just a single item card in-place (avoids full tab re-render)
function ctRefreshItem(item) {
  const card = document.getElementById('ct-item-' + item.id);
  if (!card) return;
  const ro = isReadOnly();
  card.outerHTML = renderCustomTabItem(item, ro);
  if (item.type === 'table') setTimeout(() => ctTableInitResize(item.id), 30);
}

async function ctAddItem(tabId, type) {
  const tab = getCustomTabs().find(t => t.id === tabId);
  if (!tab) return;
  const existing = getCustomTabItems(tabId);
  const defaultMeta = {
    note:      {},
    checklist: { rows: [] },
    actions:   { rows: [] },
    table:     { headers: ['Column 1','Column 2','Column 3'], rows: [] },
    links:     { links: [] },
  };
  const item = {
    id: uid(),
    tabId,
    type,
    title: '',
    content: '',
    metadata: defaultMeta[type] || {},
    sortOrder: existing.length,
    createdAt: new Date().toISOString(),
  };
  if (!STATE.customTabItems) STATE.customTabItems = [];
  STATE.customTabItems.push(item);
  await apiAddCustomTabItem(item);
  // Re-render the items container for this tab
  const container = document.getElementById('ct-items-' + tabId);
  if (container) {
    container.innerHTML = getCustomTabItems(tabId)
      .sort((a,b)=>a.sortOrder-b.sortOrder)
      .map(i => renderCustomTabItem(i, false))
      .join('');
  }
  // Init textarea auto-heights for any table items
  if (type === 'table') setTimeout(() => ctTableInitResize(item.id), 30);
}

async function ctDeleteItem(itemId) {
  const item = (STATE.customTabItems||[]).find(i => i.id === itemId);
  if (!item) return;
  if (!confirm('Delete this item? This cannot be undone.')) return;
  STATE.customTabItems = STATE.customTabItems.filter(i => i.id !== itemId);
  await apiDeleteCustomTabItem(itemId);
  const card = document.getElementById('ct-item-' + itemId);
  if (card) card.remove();
}

async function ctMoveItem(itemId, tabId, direction) {
  const items = getCustomTabItems(tabId).slice().sort((a,b) => a.sortOrder - b.sortOrder);
  const idx = items.findIndex(i => i.id === itemId);
  if (idx === -1) return;
  const swapIdx = idx + direction;
  if (swapIdx < 0 || swapIdx >= items.length) return;
  const tmp = items[idx].sortOrder;
  items[idx].sortOrder = items[swapIdx].sortOrder;
  items[swapIdx].sortOrder = tmp;
  items.sort((a,b) => a.sortOrder - b.sortOrder);
  items.forEach((it, i) => { it.sortOrder = i; });
  await Promise.all([apiUpdateCustomTabItem(items[idx]), apiUpdateCustomTabItem(items[swapIdx])]);
  const container = document.getElementById('ct-items-' + tabId);
  if (container) {
    container.innerHTML = getCustomTabItems(tabId)
      .sort((a,b) => a.sortOrder - b.sortOrder)
      .map(i => renderCustomTabItem(i, false))
      .join('');
    getCustomTabItems(tabId).filter(i => i.type === 'table').forEach(i => ctTableInitResize(i.id));
  }
}

function ctCopyItemPicker(e, itemId) {

  const otherTabs = (STATE.customTabs||[])
    .slice().sort((a,b) => a.sortOrder - b.sortOrder)

  if (!otherTabs.length) {
    showError('No other tabs to copy to. Create another tab first.');

  }

  picker.className = 'ct-copy-picker';
  picker.innerHTML = `
    <div style="font:600 10px var(--font-mono);color:var(--text-muted);text-transform:uppercase;letter-spacing:0.06em;margin-bottom:6px">Copy to tab…</div>

  `;

async function ctCopyItemToTab(itemId, destTabId, btnEl) {
  const src = (STATE.customTabItems||[]).find(i => i.id === itemId);
  const destTab = (STATE.customTabs||[]).find(t => t.id === destTabId);
  if (!src || !destTab) return;

  // Show feedback on button
  const origText = btnEl.textContent;
  btnEl.textContent = 'Copying…';
  btnEl.disabled = true;

  // Deep-clone the item with a new id and new tabId
  const existing = getCustomTabItems(destTabId);
  const copy = {
    id: uid(),
    tabId: destTabId,
    type: src.type,
    title: src.title ? src.title + ' (copy)' : '',
    content: src.content || '',
    metadata: JSON.parse(JSON.stringify(src.metadata || {})),
    // Reset checklist / action done-states so it's a fresh copy
    sortOrder: existing.length,
    createdAt: new Date().toISOString(),
  };

  if (!STATE.customTabItems) STATE.customTabItems = [];
  STATE.customTabItems.push(copy);
  await apiAddCustomTabItem(copy);

  // Close picker
  document.querySelectorAll('.ct-copy-picker').forEach(p => p.remove());

  // Confirm with a brief toast-style message on the button's card, then offer to navigate
  const card = document.getElementById('ct-item-' + itemId);
  if (card) {
    const toast = document.createElement('div');
    toast.style.cssText = 'position:absolute;bottom:8px;right:8px;background:#1a8a4a;color:#fff;font:600 11px var(--font-mono);padding:4px 10px;border-radius:6px;z-index:100;pointer-events:none';
    toast.textContent = `✓ Copied to "${destTab.label}"`;
    card.style.position = 'relative';
    card.appendChild(toast);
    setTimeout(() => toast.remove(), 2500);
  }
}

async function ctMgrAddTab() {
  const newTab = {
    id: uid(),
    label: 'New Tab',
    icon: '📋',

    createdAt: new Date().toISOString(),

async function ctMgrUpdateLabel(tabId, label) {
  const tab = (STATE.customTabs||[]).find(t => t.id === tabId);
  if (!tab) return;
  tab.label = label || 'New Tab';
  await apiUpdateCustomTab(tab);

  renderSidebar();
}

async function ctMgrDeleteTab(tabId) {
  const tab = (STATE.customTabs||[]).find(t => t.id === tabId);
  if (!tab) return;
  const itemCount = getCustomTabItems(tabId).length;
  const msg = itemCount > 0
    ? `Delete tab "${tab.label}" and its ${itemCount} item(s)? This cannot be undone.`
    : `Delete tab "${tab.label}"?`;
  if (!confirm(msg)) return;
  STATE.customTabs = (STATE.customTabs||[]).filter(t => t.id !== tabId);
  STATE.customTabItems = (STATE.customTabItems||[]).filter(i => i.tabId !== tabId);
  await apiDeleteCustomTab(tabId);
  if (activeTab === 'custom_' + tabId) switchTab('dashboard');
  renderCustomTabManager();
}

// ── Drag & drop reorder in manager ────────────────────────────────────────
function ctMgrDragStart(tabId) { _ctManagerDragId = tabId; }
function ctMgrDragEnd() { _ctManagerDragId = null; document.querySelectorAll('.ct-tab-row').forEach(r=>r.classList.remove('drag-over')); }
function ctMgrDragOver(e, tabId) { e.preventDefault(); if(_ctManagerDragId && _ctManagerDragId!==tabId) document.getElementById('ctmgr-row-'+tabId)?.classList.add('drag-over'); }
async function ctMgrDrop(e, targetId) {
  e.preventDefault();
  if (!_ctManagerDragId || _ctManagerDragId === targetId) return;
  const tabs = (STATE.customTabs||[]).slice().sort((a,b)=>a.sortOrder-b.sortOrder);
  const fromIdx = tabs.findIndex(t=>t.id===_ctManagerDragId);
  const toIdx   = tabs.findIndex(t=>t.id===targetId);
  if (fromIdx < 0 || toIdx < 0) return;
  const [moved] = tabs.splice(fromIdx, 1);
  tabs.splice(toIdx, 0, moved);
  tabs.forEach((t,i)=>{ t.sortOrder=i; });
  STATE.customTabs = tabs;
  // Persist each reordered tab
  await Promise.all(tabs.map(t => apiUpdateCustomTab(t)));
  renderCustomTabManager();
  renderSidebar();
}

function bdr_esc(s) { return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

function bdr_fmtDate(v) {
  if (!v) return '—';
  if (v instanceof Date || (typeof v === 'string' && v.match(/^\d{4}-\d{2}-\d{2}/))) {
    const d = v instanceof Date ? v : new Date(v);
    if (!isNaN(d)) return d.toLocaleDateString('en-GB', {day:'2-digit',month:'short',year:'numeric'});
  }
  // Try Excel serial
  if (typeof v === 'number' && v > 10000) {
    const d = new Date(Math.round((v - 25569) * 86400 * 1000));
    if (!isNaN(d)) return d.toLocaleDateString('en-GB', {day:'2-digit',month:'short',year:'numeric'});
  }
  return String(v);
}

function bdr_toISODate(v) {
  if (!v) return null;
  const s = String(v).trim();
  if (!s) return null;

  // DD/MM/YYYY  or  DD-MM-YYYY  or  DD.MM.YYYY  (Excel en-GB format)
  const dmyMatch = s.match(/^(\d{1,2})[\/\-\.](\d{1,2})[\/\-\.](\d{4})$/);
  if (dmyMatch) {
    const [, dd, mm, yyyy] = dmyMatch;
    const d = new Date(`${yyyy}-${mm.padStart(2,'0')}-${dd.padStart(2,'0')}T12:00:00`);
    if (!isNaN(d)) return d.toISOString().slice(0,10);
  }

  // ISO: YYYY-MM-DD
  if (s.match(/^\d{4}-\d{2}-\d{2}/)) return s.slice(0,10);

  // Excel serial number
  if (/^\d+(\.\d+)?$/.test(s)) {
    const n = parseFloat(s);
    if (n > 10000) {
      const d = new Date(Math.round((n - 25569) * 86400 * 1000));
      if (!isNaN(d)) return d.toISOString().slice(0,10);
    }
  }

  return null;
}

function bdr_parseTsv(raw) {
  // Parse tab-separated values from Excel paste.
  // Excel wraps cells containing newlines or tabs in double-quotes, e.g. "Shape\nCode"
  // We must respect those quotes before splitting on newlines, otherwise a header
  // like "Shape\nCode" splits the header row into two lines.
  const result = [];
  let row = [];
  let cell = '';
  let inQuote = false;
  let i = 0;
  while (i < raw.length) {
    const ch = raw[i];
    if (inQuote) {
      if (ch === '"') {
        // Peek ahead: "" inside quotes = escaped quote
        if (raw[i+1] === '"') { cell += '"'; i += 2; continue; }
        inQuote = false; i++; continue;
      }
      cell += ch; i++; continue;
    }
    if (ch === '"') { inQuote = true; i++; continue; }
    if (ch === '\t') { row.push(cell.trim()); cell = ''; i++; continue; }
    if (ch === '\r') { i++; continue; } // skip CR
    if (ch === '\n') {
      row.push(cell.trim()); cell = '';
      if (row.some(c => c !== '')) result.push(row);
      row = []; i++; continue;
    }
    cell += ch; i++;
  }
  // flush last row
  row.push(cell.trim());
  if (row.some(c => c !== '')) result.push(row);
  return result;
}

function bdr_findHeaderRow(rows) {
  // Scan all rows to find the one containing 'Production no' — handles cases where
  // a prior row contains a multi-line cell that spills onto an extra line.
  for (let i = 0; i < Math.min(rows.length, 10); i++) {
    for (let j = 0; j < rows[i].length; j++) {
      const h = (rows[i][j]||'').toLowerCase().replace(/\s+/g,' ').trim();
      if (h === 'production no' || h === 'production no.') return i;
    }
  }
  return 0; // fallback
}

function bdr_parseHs(raw) {
  // HS-BDR: user copies H3:AC3 and down
  // Hidden cols (O, Q, T, U, V, Z) are excluded from paste — use header names only.
  // Col H = "Production no", Col AA = " Delivery date " (leading space).
  if (!raw.trim()) return { rows: [], error: 'No data pasted.' };
  const rows = bdr_parseTsv(raw);
  if (rows.length < 2) return { rows: [], error: 'Need at least a header row and one data row.' };

  const hdrIdx = bdr_findHeaderRow(rows);
  const hdr = rows[hdrIdx];

  let colProd = -1, colDel = -1;
  for (let i = 0; i < hdr.length; i++) {
    const h = (hdr[i]||'').toLowerCase().replace(/\s+/g, ' ').trim();
    if (h === 'production no' || h === 'production no.') colProd = i;
    // Col AA = "Delivery date". Col O also has "Delivery Date" but is hidden
    // so it is never present in the paste — simple match is safe.
    if (h === 'delivery date') colDel = i;
  }
  if (colProd < 0) colProd = 0;
  if (colDel < 0) return { rows: [], error: 'Could not find the "Delivery date" column (col AA) in the pasted data. Make sure row 3 (the header row) is included in your copy.' };

  const cutoff = bdr_cutoffDate();
  const result = [];
  for (let i = hdrIdx + 1; i < rows.length; i++) {
    const r = rows[i];
    const prodRaw = r[colProd] || '';
    const delRaw  = r[colDel]  || '';
    if (!prodRaw.trim()) continue;
    const prodNo = String(prodRaw).trim();
    const delDate = bdr_toISODate(delRaw);
    if (!delDate) continue;
    if (delDate < cutoff) continue;
    result.push({ prodNo, deliveryDate: delDate, deliveryDateRaw: delRaw.trim(), source: 'HS', rowIdx: i });
  }
  if (!result.length) return { rows: [], error: 'No valid rows found. Rows must have a delivery date within the last 7 days or future. Check the " Delivery date " column has values and you copied from H3 down.' };
  return { rows: result, error: null };
}

function bdr_parseNi(raw) {
  // NI-BDR: user copies H1:AC1 and down
  // Hidden columns may shift positional indices — use header names only.
  if (!raw.trim()) return { rows: [], error: 'No data pasted.' };
  const rows = bdr_parseTsv(raw);
  if (rows.length < 2) return { rows: [], error: 'Need at least a header row and one data row.' };

  const hdrIdx = bdr_findHeaderRow(rows);
  const hdr = rows[hdrIdx];

  let colProd = -1, colDel = -1;
  for (let i = 0; i < hdr.length; i++) {
    const h = (hdr[i]||'').toLowerCase().replace(/\s+/g,' ').trim();
    if (h === 'production no' || h === 'production no.') colProd = i;
    if (h === 'expected delivery date bylor') colDel = i;
  }
  if (colProd < 0) colProd = 0;
  if (colDel < 0) return { rows: [], error: 'Could not find an "Expected Delivery Date Bylor" column header in the pasted data. Make sure row 1 (the header row) is included in your copy.' };

  const cutoff = bdr_cutoffDate();
  const result = [];
  for (let i = hdrIdx + 1; i < rows.length; i++) {
    const r = rows[i];
    const prodRaw = r[colProd] || '';
    const delRaw  = r[colDel]  || '';
    if (!prodRaw.trim()) continue;
    const prodNo = String(prodRaw).trim();
    const delDate = bdr_toISODate(delRaw);
    if (!delDate) continue;
    if (delDate < cutoff) continue;
    result.push({ prodNo, deliveryDate: delDate, deliveryDateRaw: delRaw.trim(), source: 'NI', rowIdx: i });
  }
  if (!result.length) return { rows: [], error: 'No valid rows found. Rows must have a delivery date within the last 7 days or future. Check the "Expected Delivery Date Bylor" column has values and you copied from H1 down.' };
  return { rows: result, error: null };
}

function bdr_cutoffDate() {
  // Returns ISO date string for today minus 7 days
  const d = new Date();
  d.setDate(d.getDate() - 7);
  return d.toISOString().slice(0, 10);
}

function bdr_setSource(src) {
  bdr_activeSource = src;
  renderMain();
}

function bdr_savePaste(v) {
  if (bdr_activeSource === 'hs') bdr_hsPaste = v;
  else bdr_niPaste = v;
}

function bdr_clearPaste() {
  if (bdr_activeSource === 'hs') bdr_hsPaste = '';
  else bdr_niPaste = '';
  bdr_previewRows = [];
  renderMain();
}

function bdr_showStatus(msg, type) {
  const e = document.getElementById('bdr_status');
  if (e) { e.textContent = msg; e.className = 'bdr-status ' + type; }
}

async function bdr_doImport() {
  const raw = (document.getElementById('bdr_paste') || {}).value
    || (bdr_activeSource === 'hs' ? bdr_hsPaste : bdr_niPaste);
  if (bdr_activeSource === 'hs') bdr_hsPaste = raw;
  else bdr_niPaste = raw;

  const parsed = bdr_activeSource === 'hs' ? bdr_parseHs(raw) : bdr_parseNi(raw);
  if (parsed.error) { bdr_showStatus(parsed.error, 'error'); bdr_previewRows = []; renderMain(); return; }

  // Merge into bdr_records — update if same prodNo+source exists, else add new
  let added = 0, updated = 0;
  const toUpsert = [];
  parsed.rows.forEach(r => {
    const existing = bdr_records.find(x => x.prodNo === r.prodNo && x.source === r.source);
    if (existing) {
      const changed = existing.deliveryDate !== r.deliveryDate;
      existing.deliveryDate = r.deliveryDate;
      existing.deliveryDateRaw = r.deliveryDateRaw;
      existing.importedAt = new Date().toISOString();
      if (changed) updated++;
      toUpsert.push(existing);
    } else {
      const rec = {
        id: Date.now().toString(36) + Math.random().toString(36).slice(2,6),
        prodNo: r.prodNo,
        deliveryDate: r.deliveryDate,
        deliveryDateRaw: r.deliveryDateRaw,
        source: r.source,
        importedAt: new Date().toISOString(),
      };
      bdr_records.push(rec);
      toUpsert.push(rec);
      added++;
    }
  });

  bdr_previewRows = parsed.rows;
  const msg = `✓ Imported ${parsed.rows.length} rows from ${bdr_activeSource.toUpperCase()}-BDR. ${added} new, ${updated} updated.`;
  bdr_showStatus(msg, 'success');
  renderMain();

  // Persist to API
  try {
    await api('/api/bdr-records', 'PUT', { records: toUpsert });
  } catch(e) {
    console.warn('[BDR] Failed to save to API:', e.message);
  }
}

function renderBdrsTab() {
  let records = [...bdr_records];

  // Filter by source

  // Filter by search

      (r.prodNo||'').toLowerCase().includes(q) ||
      (r.deliveryDateRaw||'').toLowerCase().includes(q) ||
      (r.source||'').toLowerCase().includes(q)

  }

  // Sort by delivery date asc (nulls last), then prodNo
  records.sort((a, b) => {
    if (a.deliveryDate && b.deliveryDate) return a.deliveryDate.localeCompare(b.deliveryDate);

      <div class="bdr-stat"><div class="bdr-stat-label">HS-BDR</div><div class="bdr-stat-value" style="color:var(--blue)">${totalHs}</div></div>
      <div class="bdr-stat"><div class="bdr-stat-label">NI-BDR</div><div class="bdr-stat-value" style="color:var(--purple)">${totalNi}</div></div>

  const toolbarHtml = `
    <div class="bdr-tab-toolbar">
      <input class="bdr-tab-search" type="text" placeholder="🔍 Search production no…" oninput="bdr_setSearch(this.value)" value="${bdr_esc(bdr_searchTerm)}" />
      <button class="bdr-filter-btn ${bdr_filterSource==='ALL'?'active':''}" onclick="bdr_setFilter('ALL')">All</button>
      <button class="bdr-filter-btn ${bdr_filterSource==='HS'?'active':''}" onclick="bdr_setFilter('HS')">HS-BDR</button>
      <button class="bdr-filter-btn ${bdr_filterSource==='NI'?'active':''}" onclick="bdr_setFilter('NI')">NI-BDR</button>

      <button class="bdr-filter-btn ${bdr_grouping==='day'?'active':''}"  onclick="bdr_setGrouping('day')">📆 By Day</button>

      <span style="margin-left:auto;font-size:0.75rem;color:var(--text-muted)">${records.length} record${records.length!==1?'s':''}</span>
      ${bdr_records.length ? `<button class="btn btn-danger btn-sm" onclick="bdr_clearAll()" title="Remove all BDR records">🗑 Clear All</button>` : ''}
    </div>`;

      <div class="bdr-empty-icon">🔍</div>

      }).join('');
      tableHtml = `<div class="bdr-records-scroll" style="padding:16px 20px">${sections}</div>`;
    } else {
      // Group by week (Mon–Sun)
      const getWeekMonday = (iso) => {
        const d = new Date(iso + 'T12:00:00');
        const day = d.getDay(); // 0=Sun
        const diff = (day === 0 ? -6 : 1 - day);
        d.setDate(d.getDate() + diff);
        return d.toISOString().slice(0,10);
      };
      const weekLabel = (mondayIso) => {
        const mon = new Date(mondayIso + 'T12:00:00');
        const sun = new Date(mon); sun.setDate(sun.getDate() + 6);
        const fmt2 = d => d.toLocaleDateString('en-GB',{day:'2-digit',month:'short'});
        return `${fmt2(mon)} – ${fmt2(sun)} ${sun.getFullYear()}`;
      };
      const groups = {};
      const noDateKey = '__nodate__';
      records.forEach(r => {
        const key = r.deliveryDate ? getWeekMonday(r.deliveryDate) : noDateKey;
        if (!groups[key]) groups[key] = [];
        groups[key].push(r);
      });
      const keys = Object.keys(groups).sort((a,b) => {
        if (a === noDateKey) return 1;
        if (b === noDateKey) return -1;
        return a.localeCompare(b);
      });
      const todayIso = new Date().toISOString().slice(0,10);

      const sections = keys.map(key => {
        const wkRecords = groups[key];
        const label = key === noDateKey ? 'No Delivery Date' : weekLabel(key);
        const isCurrentWeek = key !== noDateKey && key === getWeekMonday(todayIso);
        const currentPill = isCurrentWeek ? `<span style="background:#fce8e8;color:var(--red);border:1px solid #e8b0b0;border-radius:4px;padding:1px 7px;font-size:0.62rem;font-weight:700;margin-left:8px">THIS WEEK</span>` : '';
        const trs = wkRecords.map(r => buildRow(r)).join('');
        return `<div style="margin-bottom:24px">
          <div style="background:var(--accent-dim);border:1px solid var(--accent);border-radius:8px;color:var(--accent);font-weight:700;font-size:0.85rem;padding:8px 14px;display:flex;align-items:center;gap:8px;margin-bottom:0">
            📅 Week of ${bdr_esc(label)}${currentPill}
            <span style="background:var(--bg-card);color:var(--text-muted);font-size:0.7rem;font-weight:600;border-radius:10px;padding:2px 10px;margin-left:auto">${wkRecords.length} BDR${wkRecords.length!==1?'s':''}</span>
          </div>
          <table class="bdr-records-tbl">${tblHeader}<tbody>${trs}</tbody></table>
        </div>`;
      }).join('');
      tableHtml = `<div class="bdr-records-scroll" style="padding:16px 20px">${sections}</div>`;
    }
  }

  return `<div class="bdr-tab-wrap">${statsHtml}${toolbarHtml}${tableHtml}</div>`;
}

function dd_parseData() {
  const raw = (document.getElementById('dd_paste') || {}).value || dd_pasteContent;
  dd_pasteContent = raw;
  if (!raw.trim()) { dd_showStatus('Please paste your Excel data first.', 'error'); return; }

  const lines = raw.replace(/\r\n/g,'\n').replace(/\r/g,'\n').split('\n');
  const rows  = lines.map(l => l.split('\t').map(c => c.trim()));

  let headerIdx=-1, colShift=-1, colDate=-1, colAS=-1, colAT=-1, colAU=-1, colAV=-1;
  outer:
  for (let i=0; i<Math.min(20,rows.length); i++) {
    for (let j=0; j<rows[i].length; j++) {
      if (rows[i][j].toLowerCase() === 'shift') {
        headerIdx=i; colShift=j;
        for (let k=0; k<rows[i].length; k++) {
          const h=rows[i][k].toLowerCase().replace(/\s+/g,' ').trim();
          if (h==='date')    colDate=k;
          if (h==='vst 110') colAS=k;
          if (h==='vst 120') colAT=k;
          if (h==='vst 130') colAU=k;
          if (h==='vst 140') colAV=k;
        }
        break outer;
      }
    }
  }
  if (headerIdx < 0) { colDate=0; colShift=43; colAS=44; colAT=45; colAU=46; colAV=47; }

  const missing=[];
  if (colShift<0) missing.push('Shift');
  if (colAS<0) missing.push('VST 110');
  if (colAT<0) missing.push('VST 120');
  if (colAU<0) missing.push('VST 130');
  if (colAV<0) missing.push('VST 140');
  if (missing.length) { dd_showStatus(`Columns not found: ${missing.join(', ')}\n\nEnsure the header row includes Shift, VST 110, VST 120, VST 130, VST 140.`, 'error'); return; }

  const vstCols = [
    {key:'VST110',label:'VST 110'},{key:'VST120',label:'VST 120'},
    {key:'VST130',label:'VST 130'},{key:'VST140',label:'VST 140'},
  ];
  const SHIFT_KW = new Set(['AM','MID','PM','N','NIGHTS','NIGHT']);
  let currentDate=null;
  const rowsData=[];
  for (let i=headerIdx+1; i<rows.length; i++) {
    const row=rows[i];
    if (!row||row.every(c=>!c)) continue;
    const rawDate=row[colDate>=0?colDate:0]||row[0]||'';
    if (rawDate) { const p=dd_parseDate(rawDate); if (p) currentDate=p; }
    let shiftIdx=-1;
    const hc=(row[colShift]||'').trim().toUpperCase();
    if (SHIFT_KW.has(hc)) { shiftIdx=colShift; }
    else { for (let k=row.length-1;k>=0;k--) { if (SHIFT_KW.has((row[k]||'').trim().toUpperCase())) { shiftIdx=k; break; } } }
    if (shiftIdx<0) continue;
    let shift=row[shiftIdx].trim().toUpperCase();
    if (shift==='NIGHTS'||shift==='NIGHT') shift='N';
    if (!['AM','MID','PM','N'].includes(shift)) continue;
    const entry={date:currentDate,shift};
    entry['VST110']=(row[shiftIdx+1]||'').trim();
    entry['VST120']=(row[shiftIdx+2]||'').trim();
    entry['VST130']=(row[shiftIdx+3]||'').trim();
    entry['VST140']=(row[shiftIdx+4]||'').trim();
    rowsData.push(entry);
  }
  if (!rowsData.length) { dd_showStatus('No shift rows found (AM / MID / PM / N).', 'error'); return; }

  dd_allDepartures = dd_findDepartures(rowsData, vstCols);
  dd_showStatus(`✓ ${rowsData.length} shift rows · ${dd_allDepartures.length} cage departures found`, 'success');
  renderMain();
}

function dd_parseDate(val) {
  if (!val) return null;
  const num=parseFloat(val);
  if (!isNaN(num)&&num>40000&&num<70000) {
    const d=new Date(Math.round((num-25569)*86400000));
    if (!isNaN(d)) return new Date(d.getFullYear(),d.getMonth(),d.getDate());
  }
  if (/^(AM|PM|N|MID|NIGHTS?|[A-Z]{1,6})$/i.test(val.trim())) return null;
  const m=val.match(/^(\d{1,2})[\/\-\.](\d{1,2})[\/\-\.](\d{2,4})$/);
  if (m) { const yr=m[3].length===2?2000+parseInt(m[3]):parseInt(m[3]); return new Date(yr,parseInt(m[2])-1,parseInt(m[1])); }
  const d=new Date(val);
  if (!isNaN(d)&&d.getFullYear()>2000) return new Date(d.getFullYear(),d.getMonth(),d.getDate());
  return null;
}

function dd_extractCage(val) {
  if (!val||val==='-') return null;
  const s=val.trim();
  const mC=s.match(/^[Cc](\d+)/); if (mC) return mC[1];
  const mL=s.match(/^([A-BD-Za-bd-z]\d+)/i); if (mL) return mL[1].toUpperCase();
  const mN=s.match(/^(\d+)/); if (mN) return mN[1];
  return null;
}

function dd_findDepartures(rowsData, vstCols) {
  const deps=[];
  for (const vst of vstCols) {
    let prev=null, prevRow=null;
    for (const r of rowsData) {
      const cage=dd_extractCage(r[vst.key]);
      if (cage!==prev&&prev!==null&&prevRow) {
        deps.push({date:prevRow.date,shift:prevRow.shift,cage:prev,vst:vst.key,vstLabel:vst.label,rawVal:prevRow[vst.key]});
      }
      prev=cage; prevRow=r;
    }
  }
  const cageMap=new Map();
  for (const dep of deps) {
    const ex=cageMap.get(dep.cage);
    if (!ex) { cageMap.set(dep.cage,dep); continue; }
    const ed=ex.date?ex.date.getTime():-Infinity, nd=dep.date?dep.date.getTime():-Infinity;
    if (nd>ed) { cageMap.set(dep.cage,dep); }
    else if (nd===ed && (DD_SHIFT_ORDER[dep.shift]??99)>(DD_SHIFT_ORDER[ex.shift]??99)) { cageMap.set(dep.cage,dep); }
  }
  return Array.from(cageMap.values()).sort((a,b)=>{
    if (!a.date&&!b.date) return 0; if (!a.date) return 1; if (!b.date) return -1;
    const d=a.date-b.date; return d!==0?d:(DD_SHIFT_ORDER[a.shift]??99)-(DD_SHIFT_ORDER[b.shift]??99);
  });
}

function dd_getWeekMonday(d) {
  const t=new Date(d); const day=t.getDay(); t.setDate(t.getDate()+(day===0?-6:1-day)); t.setHours(0,0,0,0); return t;
}
function dd_weekLabel(mon) {
  const fri=new Date(mon); fri.setDate(mon.getDate()+4);
  const fmt=dt=>dt.toLocaleDateString('en-GB',{day:'2-digit',month:'short'});
  return `w/c ${fmt(mon)} – ${fmt(fri)}`;
}
function dd_fmtDateDisplay(dateStr) {
  if (!dateStr||dateStr==='(none)') return null;
  const [y,m,d]=dateStr.split('-');
  if (!y) return dateStr;
  return new Date(parseInt(y),parseInt(m)-1,parseInt(d)).toLocaleDateString('en-GB',{weekday:'short',day:'2-digit',month:'short',year:'numeric'});
}

function dd_buildScheduleHtml() {
  const today=new Date(); today.setHours(0,0,0,0);
  const filtered=dd_allDepartures.filter(d=>
    (d.date&&d.date>=today) &&
    (dd_filterShift==='ALL'||d.shift===dd_filterShift) &&
    (!dd_searchTerm||d.cage.toLowerCase().includes(dd_searchTerm.toLowerCase()))
  );
  const totalCages=new Set(dd_allDepartures.map(d=>d.cage)).size;
  const thisWeek=dd_allDepartures.filter(d=>{if(!d.date)return false;const diff=(d.date-today)/86400000;return diff>=0&&diff<7;}).length;
  const sc={}; dd_allDepartures.forEach(d=>{sc[d.shift]=(sc[d.shift]||0)+1;});
  const topShift=Object.entries(sc).sort((a,b)=>b[1]-a[1])[0];
  const upcoming=dd_allDepartures.filter(d=>d.date&&d.date>=today).length;

  const weekMap=new Map();
  for (const d of filtered) {
    const mon=dd_getWeekMonday(d.date); const key=mon.getTime();
    if (!weekMap.has(key)) weekMap.set(key,{monday:mon,deps:[]});
    weekMap.get(key).deps.push(d);
  }
  const weeks=Array.from(weekMap.values()).sort((a,b)=>a.monday-b.monday);

  let weeksHtml='';
  if (weeks.length) {
    let rowNum=1;
    for (const wk of weeks) {
      let lastDate=null;
      let rows='';
      for (const d of wk.deps) {
        const ds=d.date.toLocaleDateString('en-GB',{weekday:'short',day:'2-digit',month:'short',year:'numeric'});
        const isToday=d.date.getTime()===today.getTime();
        if (ds!==lastDate) { rows+=`<tr class="dd-date-grp"><td colspan="6">${ds}${isToday?'<span class="dd-today-pill">Today</span>':''}</td></tr>`; lastDate=ds; }
        rows+=`<tr>
          <td style="color:var(--text-muted);font-size:0.7rem">${rowNum++}</td>
          <td style="color:var(--text-muted);font-size:0.76rem">${ds}</td>
          <td><span class="dd-shift dd-shift-${d.shift}">${d.shift}</span></td>
          <td><span class="dd-cage-badge">${d.cage}</span></td>
          <td><span class="dd-vst-badge">${d.vstLabel}</span></td>
          <td style="color:var(--text-muted);font-size:0.73rem;font-style:italic">${d.rawVal}</td>
        </tr>`;
      }
      weeksHtml+=`<div>
        <div class="dd-week-hdr">📅 ${dd_weekLabel(wk.monday)}<span class="dd-week-count">${wk.deps.length} cage${wk.deps.length!==1?'s':''}</span></div>
        <table class="dd-tbl"><thead><tr><th>#</th><th>Date</th><th>Shift</th><th>Cage</th><th>VST</th><th>Status</th></tr></thead><tbody>${rows}</tbody></table>
      </div>`;
    }
  } else {
    weeksHtml='<div class="dd-empty"><div class="dd-empty-icon">🔍</div><h3>No upcoming departures</h3><p>Try adjusting your filters.</p></div>';
  }

  return `
    <div class="dd-stats-row">
      <div class="dd-stat"><div class="dd-stat-label">Upcoming</div><div class="dd-stat-value">${upcoming}</div><div class="dd-stat-sub">from today</div></div>
      <div class="dd-stat"><div class="dd-stat-label">Unique Cages</div><div class="dd-stat-value">${totalCages}</div><div class="dd-stat-sub">in program</div></div>
      <div class="dd-stat"><div class="dd-stat-label">Next 7 Days</div><div class="dd-stat-value">${thisWeek}</div><div class="dd-stat-sub">departures</div></div>
      <div class="dd-stat"><div class="dd-stat-label">Busiest Shift</div><div class="dd-stat-value" style="font-size:1.2rem">${topShift?topShift[0]:'—'}</div><div class="dd-stat-sub">${topShift?topShift[1]+' departures':''}</div></div>
    </div>
    <div class="dd-filters">
      <span style="font-size:0.77rem;color:var(--text-muted)">Filter:</span>
      ${['ALL','AM','MID','PM','N'].map(f=>`<button class="dd-fbtn ${dd_filterShift===f?'active':''}" onclick="dd_setFilter('${f}')">${f==='N'?'Nights':f}</button>`).join('')}
      <input class="dd-search" type="text" placeholder="🔍 Search cage…" oninput="dd_setSearch(this.value)" value="${dd_esc(dd_searchTerm)}" />
      <span style="font-size:0.75rem;color:var(--text-muted);margin-left:auto">${filtered.length} result${filtered.length!==1?'s':''}</span>
    </div>
    ${weeksHtml}`;
}

function dd_buildChangesHtml() {

  const pushTime=new Date().toLocaleString('en-GB',{day:'2-digit',month:'short',year:'numeric',hour:'2-digit',minute:'2-digit'});
  const newlyCreated=dd_pushLogChanges.filter(c=>c.isNew);
  const dateUpdated=dd_pushLogChanges.filter(c=>!c.isNew&&c.oldDate);
  const dateFirstSet=dd_pushLogChanges.filter(c=>!c.isNew&&!c.oldDate);
  let rows='';
  dd_pushLogChanges.forEach((c,i)=>{
    const oldDisplay=c.oldDate?dd_fmtDateDisplay(c.oldDate):null;
    const newDisplay=dd_fmtDateDisplay(c.newDate);
    const newBadge=c.isNew?`<span style="background:#0d2a1a;border:1px solid #1a5c30;color:#4caf80;border-radius:4px;padding:1px 7px;font-size:0.62rem;font-weight:700;margin-right:5px">✦ NEW</span>`:'';
    const oldCell=c.isNew?`<span class="dd-date-none">new entry</span><span class="dd-date-arrow">→</span>`:oldDisplay?`<span class="dd-date-old">${oldDisplay}</span><span class="dd-date-arrow">→</span>`:`<span class="dd-date-none">not set</span><span class="dd-date-arrow">→</span>`;
    rows+=`<tr><td style="color:var(--text-muted);font-size:0.7rem">${i+1}</td><td>${newBadge}<span class="dd-cage-badge">${c.cage}</span></td><td><span class="dd-shift dd-shift-${c.shift}">${c.shift}</span></td><td><span class="dd-vst-badge">${c.vstLabel}</span></td><td>${oldCell}<span class="dd-date-new">${newDisplay}</span></td></tr>`;
  });
  return `

      <div class="dd-stat"><div class="dd-stat-label">Total Actions</div><div class="dd-stat-value" style="color:#4caf80">${dd_pushLogChanges.length}</div><div class="dd-stat-sub">this push</div></div>
      <div class="dd-stat"><div class="dd-stat-label">Created</div><div class="dd-stat-value" style="color:var(--accent)">${newlyCreated.length}</div><div class="dd-stat-sub">new cages</div></div>
      <div class="dd-stat"><div class="dd-stat-label">Dates Updated</div><div class="dd-stat-value" style="color:#e8b840">${dateUpdated.length}</div><div class="dd-stat-sub">replaced</div></div>
      <div class="dd-stat"><div class="dd-stat-label">Dates First Set</div><div class="dd-stat-value" style="color:#a080f0">${dateFirstSet.length}</div><div class="dd-stat-sub">previously empty</div></div>
    </div>
    <div><span class="dd-section-pill">🕐 Push run: ${pushTime}</span></div>
    <table class="dd-tbl"><thead><tr><th>#</th><th>Cage</th><th>Shift</th><th>VST</th><th>Result</th></tr></thead><tbody>${rows}</tbody></table>`;
}

function dd_buildSkippedHtml() {
  if (!dd_pushLogSkipped.length) return `<div class="dd-empty"><div class="dd-empty-icon">⚠️</div><h3>No push run yet</h3><p>After you push, this tab will show any cages that were already up-to-date or failed.</p></div>`;
  const errCount=dd_pushLogSkipped.filter(s=>s.type==='err').length;
  const alreadySet=dd_pushLogSkipped.filter(s=>s.type==='already');
  const errors=dd_pushLogSkipped.filter(s=>s.type==='err');
  function makeRows(items,cls) { return items.map((s,i)=>`<tr><td style="color:var(--text-muted);font-size:0.7rem">${i+1}</td><td><span class="dd-cage-badge">${s.cage}</span></td><td><span class="dd-shift dd-shift-${s.shift}">${s.shift}</span></td><td><span class="dd-vst-badge">${s.vstLabel}</span></td><td class="${cls}" style="font-size:0.73rem">${s.reason}</td></tr>`).join(''); }
  let secs='';
  if (alreadySet.length) secs+=`<div><div class="dd-section-title">✓ Already Up-to-Date (${alreadySet.length})</div><table class="dd-tbl"><thead><tr><th>#</th><th>Cage</th><th>Shift</th><th>VST</th><th>Reason</th></tr></thead><tbody>${makeRows(alreadySet,'dd-result-ok')}</tbody></table></div>`;
  if (errors.length) secs+=`<div><div class="dd-section-title">✕ Failed (${errors.length})</div><table class="dd-tbl"><thead><tr><th>#</th><th>Cage</th><th>Shift</th><th>VST</th><th>Reason</th></tr></thead><tbody>${makeRows(errors,'dd-result-err')}</tbody></table></div>`;
  return `
    <div class="dd-stats-row">
      <div class="dd-stat"><div class="dd-stat-label">Already Up-to-Date</div><div class="dd-stat-value" style="color:var(--accent)">${alreadySet.length}</div><div class="dd-stat-sub">unchanged</div></div>
