async function autoplanDepartures() {
  // Find all cages in 'facility' that have a departureDate set
  const dueToLeave = STATE.cages.filter(c => c.location === 'facility' && c.departureDate);

  if (dueToLeave.length === 0) {
    return alert('No facility cages have a departure date set. Edit cages to add expected departure dates.');
  }

  // Sort by departure date ascending
  dueToLeave.sort((a, b) => a.departureDate.localeCompare(b.departureDate));

  const warnings = [];
  const newMovements = [];
  const DAILY_LIMIT = STATE.settings.movementsPerDay || MAX_MOVES;

  // Build daily count from existing planned movements
  const existingCounts = {};
  STATE.plannedMovements.forEach(m => {
    if (!m.completed) existingCounts[m.date] = (existingCounts[m.date] || 0) + 1;
  });

  // Track frames being used across this auto-plan run (in addition to already loaded frames)
  // A frame is "in use" if it already has cages, or we've assigned it in this run
  const frameAssignments = {}; // cageId -> frameId (planned this run)

  // Available frames at facility (not currently fixed for shipping)
  const facilityFrames = STATE.frames.filter(f => f.location === 'facility' && !f.fixedForShipping);

  // Helper to find the best fitting frame for a cage, considering this run's assignments
  function findFrameForCage(cage) {
    const cageNeedsWaler = needsWaler(cage);
    const sorted = [...facilityFrames].sort((a, b) => a.width - b.width);

    // Count how many cages are virtually assigned to each frame this run
    const virtualCounts = {};
    Object.values(frameAssignments).forEach(fid => {
      virtualCounts[fid] = (virtualCounts[fid] || 0) + 1;
    });

    for (const f of sorted) {
      if (cage.width > f.width) continue;
      const realCount = f.cages.length;
      const virtualExtra = virtualCounts[f.id] || 0;
      const totalCount = realCount + virtualExtra;
      if (totalCount >= 2) continue;

      // Check waler
      if (cageNeedsWaler && !f.hasWaler) continue;

      // Check if pairing fits
      if (totalCount === 1) {
        // Find the partner cage (real or planned)
        const partnerCid = f.cages[0] || Object.keys(frameAssignments).find(cid => frameAssignments[cid] === f.id);
        if (partnerCid) {
          const partner = getCage(partnerCid);
          if (partner && !canFitTwo(partner, cage, f.width)) continue;
        }
      }
      return f;
    }

    // Relax waler restriction
    for (const f of sorted) {
      if (cage.width > f.width) continue;
      const realCount = f.cages.length;
      const virtualExtra = (Object.values(frameAssignments).filter(fid => fid === f.id).length);
      const totalCount = realCount + virtualExtra;
      if (totalCount >= 2) continue;
      if (totalCount === 1) {
        const partnerCid = f.cages[0] || Object.keys(frameAssignments).find(cid => frameAssignments[cid] === f.id);
        if (partnerCid) {
          const partner = getCage(partnerCid);
          if (partner && !canFitTwo(partner, cage, f.width)) continue;
        }
      }
      return f;
    }
    return null;
  }

  // Helper: find a free working day on or before a target date, respecting daily limits
  function findWorkingDay(targetDateStr, lookBackDays = 7) {
    // Try from target date backwards
    let d = new Date(targetDateStr + 'T12:00:00');
    for (let i = 0; i <= lookBackDays; i++) {
      const attempt = new Date(d);
      attempt.setDate(attempt.getDate() - i);
      const dow = attempt.getDay();
      if (dow === 0 || dow === 6) continue; // skip weekends
      const iso = toISO(attempt);
      if ((existingCounts[iso] || 0) < DAILY_LIMIT) return iso;
    }
    // Fallback: try days after target date
    d = new Date(targetDateStr + 'T12:00:00');
    for (let i = 1; i <= lookBackDays; i++) {
      const attempt = new Date(d);
      attempt.setDate(attempt.getDate() + i);
      const dow = attempt.getDay();
      if (dow === 0 || dow === 6) continue;
      const iso = toISO(attempt);
      if ((existingCounts[iso] || 0) < DAILY_LIMIT) return iso;
    }
    return targetDateStr; // last resort
  }

  let planned = 0;
  let skipped = 0;

  for (const cage of dueToLeave) {
    // Check if this cage already has a planned facility-to-frame movement
    const alreadyPlanned = STATE.plannedMovements.some(m =>
      m.cageId === cage.id && !m.completed &&
      (m.typeKey === 'facility-to-frame' || (m.type && m.type.includes('Facility') && m.type.includes('Frame')))
    );
    if (alreadyPlanned) {
      skipped++;
      continue;
    }

    // Find a suitable frame
    const frame = findFrameForCage(cage);
    if (!frame) {
      warnings.push(`⚠ No suitable frame found for cage ${cage.name} (${cage.width}m wide${needsWaler(cage) ? ' + needs waler' : ''}). Check frame availability.`);
      continue;
    }

    // Schedule the movement on the departure date itself (or nearest working day)
    const depDate = cage.departureDate;
    const plannedDate = findWorkingDay(depDate, 10);

    // Register in existingCounts
    existingCounts[plannedDate] = (existingCounts[plannedDate] || 0) + 1;
    frameAssignments[cage.id] = frame.id;

    const walerNote = needsWaler(cage) && !frame.hasWaler ? ' [⚠ waler may be needed]' : '';
    const desc = `${cage.name} → ${frame.name} (${frame.width}m${frame.hasWaler ? ' 🔩' : ''})`;

    newMovements.push({
      id: uid(),
      type: 'Facility → Frame',
      typeKey: 'facility-to-frame',
      cageId: cage.id,
      frameId: frame.id,
      date: plannedDate,
      shift: 'day',
      notes: `Auto-planned · Departs ${fmt(depDate)}${walerNote}`,
      completed: false,
      description: desc,
      createdAt: new Date().toISOString()
    });

    // Also add a fix-for-shipping step if only 1 cage will be in frame after this
    // (schedule it on the same day, it counts as 1 move)
    // We'll let the user manually fix — don't auto-generate fix steps to avoid confusion

    planned++;
  }

  if (planned === 0 && skipped === 0 && warnings.length === 0) {
    return alert('No cages need auto-planning at this time.');
  }

  STATE.plannedMovements.push(...newMovements);

  let msg = `✅ Auto-planned ${planned} movement${planned !== 1 ? 's' : ''}.`;
  if (skipped > 0) msg += ` ${skipped} cage${skipped !== 1 ? 's' : ''} already had planned movements (skipped).`;
  if (warnings.length > 0) msg += '\n\n' + warnings.join('\n');

  render();
  alert(msg);
  await Promise.all(newMovements.map(m => addMovementToAPI(m)));
}

async function blankCanvasPlanner() {
  const pending = STATE.plannedMovements.filter(m => !m.completed);
  const count = pending.length;
  if (count === 0) return alert('No pending planned movements to clear.');
  if (!confirm(`Clear all ${count} pending planned movement${count!==1?'s':''}? Actioned movements will not be affected. This cannot be undone.`)) return;
  const pendingIds = new Set(pending.map(m => m.id));
  STATE.plannedMovements = STATE.plannedMovements.filter(m => m.completed);
  planWeekStart = (() => { const d=new Date(); d.setDate(d.getDate()-d.getDay()+1); return toISO(d); })();
  render();
  await Promise.all([...pendingIds].map(id => deleteMovementFromAPI(id)));
}

// ── Drag & drop reordering for planned movements ──────────────────────────────
let _dragSrcId = null;

function onMoveDragStart(e) {
  _dragSrcId = e.currentTarget.dataset.id;
  e.currentTarget.classList.add('dragging');
  e.dataTransfer.effectAllowed = 'move';
}

function onMoveDragOver(e) {
  e.preventDefault();
  e.dataTransfer.dropEffect = 'move';
  const row = e.currentTarget;
  if (row.dataset.id !== _dragSrcId) row.classList.add('drag-over');
}

function onMoveDragLeave(e) {
  e.currentTarget.classList.remove('drag-over');
}

function onMoveDragEnd(e) {
  document.querySelectorAll('tr.dragging').forEach(r => r.classList.remove('dragging'));
  document.querySelectorAll('tr.drag-over').forEach(r => r.classList.remove('drag-over'));
  _dragSrcId = null;
}

async function onMoveDrop(e) {
  e.preventDefault();
  const targetId = e.currentTarget.dataset.id;
  if (!targetId || targetId === _dragSrcId || !_dragSrcId) return;

  // Reorder in STATE — use the currently displayed sorted order as the base
  const allMovements = [...STATE.plannedMovements];
  const srcIdx = allMovements.findIndex(m => m.id === _dragSrcId);
  const tgtIdx = allMovements.findIndex(m => m.id === targetId);
  if (srcIdx === -1 || tgtIdx === -1) return;

  const [moved] = allMovements.splice(srcIdx, 1);
  allMovements.splice(tgtIdx, 0, moved);
  allMovements.forEach((m, i) => { m.sortOrder = i; });
  STATE.plannedMovements = allMovements;
  render();

  try {
    await api('/api/movements/reorder', 'PUT', { ids: allMovements.map(m => m.id) });
  } catch(err) {
    console.warn('Reorder save failed', err);
  }
}
function shiftWeek(dir) {
  const d = new Date(planWeekStart+'T12:00:00');
  d.setDate(d.getDate()+dir*14);
  planWeekStart = toISO(d);
  render();
}

    if (t) { t.label=label; t.loadDate=loadDate||null; t.departDate=departDate||null; t.unloadDate=unloadDate||null; t.returnDate=returnDate||null; t.notes=notes; }
    btEditId=null; btFormOpen=false; render();
    await updateBoatTripInAPI(t);
  } else {
    const t = {id:uid(), label, loadDate:loadDate||null, departDate:departDate||null, unloadDate:unloadDate||null, returnDate:returnDate||null, notes, createdAt:new Date().toISOString()};
    STATE.boatTrips.push(t);
    btFormOpen=false; render();
    await addBoatTripToAPI(t);
  }

  // Index boat trip events by date

    if(t.loadDate)    { if(!loadByDay[t.loadDate])       loadByDay[t.loadDate]=[];       loadByDay[t.loadDate].push(t); }
    if(t.departDate)  { if(!departByDay[t.departDate])   departByDay[t.departDate]=[];   departByDay[t.departDate].push(t); }
    if(t.unloadDate)  { if(!unloadByDay[t.unloadDate])   unloadByDay[t.unloadDate]=[];   unloadByDay[t.unloadDate].push(t); }
    if(t.returnDate)  { if(!returnByDay2[t.returnDate])  returnByDay2[t.returnDate]=[];  returnByDay2[t.returnDate].push(t); }

    const returns = returnByDay2[day]||[];
    const hasEvents = loads.length+departs.length+unloads.length+returns.length>0;

    departs.forEach(t=>{ evHTML+=`<div class="bt-event depart" onclick="editBoatTrip('${t.id}')" title="${esc(t.label)}${t.notes?': '+t.notes:''}">⛵ ${esc(t.label)}</div>`; });

          ${t.returnDate?`<span style="padding:2px 8px;border-radius:10px;background:#fce7f3;color:#9d174d;font-weight:600;font-size:11px">🏠 Return: ${fmt(t.returnDate)}</span>`:''}

          </span>
        </div>`;
      }).join('');

  let formHTML = '';
  if (btFormOpen) {
    const editing = btEditId ? STATE.boatTrips.find(t=>t.id===btEditId) : null;
    formHTML = `<div class="card" style="border-color:var(--accent)">
      <div class="card-title">${editing?'Edit':'Add'} Boat Trip</div>
      <div class="form-grid form-grid-3">
        <div><label>Trip Label</label><input id="bt-label" placeholder="e.g. Trip 1, Run A..." value="${esc(editing?.label||'')}"/></div>
        <div><label>🔵 Load Date <span style="font-weight:400;font-size:10px;color:var(--text-muted)">(boat filled at facility)</span></label><input id="bt-load" type="date" value="${editing?.loadDate||''}"/></div>
        <div><label>🟢 Depart Date <span style="font-weight:400;font-size:10px;color:var(--text-muted)">(boat sets sail)</span></label><input id="bt-depart" type="date" value="${editing?.departDate||''}"/></div>

        <div><label>🔴 Return Date <span style="font-weight:400;font-size:10px;color:var(--text-muted)">(boat returns from client)</span></label><input id="bt-return" type="date" value="${editing?.returnDate||''}"/></div>
        <div><label>Notes</label><input id="bt-notes" placeholder="Optional notes..." value="${esc(editing?.notes||'')}"/></div>
      </div>
      <div class="form-actions">
        <button class="btn btn-primary" onclick="saveBoatTrip()">${editing?'Save Changes':'Add Trip'}</button>
        <button class="btn btn-secondary" onclick="btFormOpen=false;btEditId=null;render()">Cancel</button>
      </div>
    </div>`;
  }

  return `
    <div style="margin-bottom:16px">
      <div class="flex-between" style="margin-bottom:8px">
        <h3 style="font-size:16px;font-weight:700;margin:0">🚢 Boat Schedule Diary</h3>
        <button class="btn btn-primary btn-sm" onclick="btFormOpen=!btFormOpen;btEditId=null;render()">+ Add Trip</button>
      </div>
      <div style="display:flex;gap:10px;margin-bottom:8px;font-size:10px;align-items:center;flex-wrap:wrap">
        <span style="padding:2px 8px;background:#e0f2fe;color:#075985;border:1px solid #7dd3fc;border-radius:3px;font-weight:600">⬇ Boat loaded at facility</span>
        <span style="padding:2px 8px;background:#dcfce7;color:#166534;border:1px solid #86efac;border-radius:3px;font-weight:600">⛵ Boat sets sail</span>
        <span style="padding:2px 8px;background:#fff7ed;color:#9a3412;border:1px solid #fed7aa;border-radius:3px;font-weight:600">📦 Cages unloaded at client</span>

      </div>
      ${formHTML}
      <div class="card" style="padding:12px">
        <div class="bt-nav">
          <button class="btn btn-secondary btn-sm" onclick="shiftBtWeek(-1)">◄ Prev 3 Weeks</button>

        </div>
        <div style="font:600 10px var(--font-mono);color:var(--text-muted);text-transform:uppercase;letter-spacing:0.06em;margin-bottom:4px">Week 1</div>
        <div class="bt-week-grid" style="margin-bottom:10px">${week1HTML}</div>
        <div style="font:600 10px var(--font-mono);color:var(--text-muted);text-transform:uppercase;letter-spacing:0.06em;margin-bottom:4px">Week 2</div>
        <div class="bt-week-grid" style="margin-bottom:10px">${week2HTML}</div>
        <div style="font:600 10px var(--font-mono);color:var(--text-muted);text-transform:uppercase;letter-spacing:0.06em;margin-bottom:4px">Week 3</div>
        <div class="bt-week-grid">${week3HTML}</div>
      </div>
      <div class="card">
        <div class="card-title">All Planned Boat Trips</div>
        ${tripRows}
      </div>
    </div>
  `;
}

function isoWeek(dateStr) {
  // Returns "YYYY-Www" ISO week key for a given YYYY-MM-DD string (or today)
  const d = dateStr ? new Date(dateStr + 'T12:00:00') : new Date();
  const jan4 = new Date(d.getFullYear(), 0, 4);
  const startOfWeek1 = new Date(jan4);
  startOfWeek1.setDate(jan4.getDate() - ((jan4.getDay() + 6) % 7));
  const diffMs = d - startOfWeek1;
  const weekNum = Math.floor(diffMs / 604800000) + 1;
  // Handle year boundary — if weekNum < 1, it belongs to previous year's last week
  if (weekNum < 1) {
    const prevJan4 = new Date(d.getFullYear() - 1, 0, 4);
    const prevStart = new Date(prevJan4);
    prevStart.setDate(prevJan4.getDate() - ((prevJan4.getDay() + 6) % 7));
    const prevDiff = d - prevStart;
    const prevWeek = Math.floor(prevDiff / 604800000) + 1;
    return `${d.getFullYear() - 1}-W${String(prevWeek).padStart(2, '0')}`;
  }
  return `${d.getFullYear()}-W${String(weekNum).padStart(2, '0')}`;
}

function isoWeekMonday(weekKey) {
  // Returns the Monday date of a given "YYYY-Www" week key
  const [year, wPart] = weekKey.split('-W');
  const w = parseInt(wPart);
  const jan4 = new Date(parseInt(year), 0, 4);
  const monday = new Date(jan4);
  monday.setDate(jan4.getDate() - ((jan4.getDay() + 6) % 7) + (w - 1) * 7);
  return toISO(monday);
}

function fmtWeekRange(weekKey) {
  const mon = isoWeekMonday(weekKey);
  const sun = new Date(mon + 'T12:00:00');
  sun.setDate(sun.getDate() + 6);
  return `${fmt(mon)} – ${fmt(toISO(sun))}`;
}

async function saveLashingEntry(weekKey, field, value) {
  if (!STATE.lashingLog) STATE.lashingLog = {};
  if (!STATE.lashingLog[weekKey]) STATE.lashingLog[weekKey] = {};
  STATE.lashingLog[weekKey][field] = value;
  try { await api('/api/lashing-log', 'PUT', STATE.lashingLog); }
  catch(e) { showError('Failed to save lashing entry: ' + e.message); }
}

function renderLashingLog() {
  const thisWeek = isoWeek();
  const log = STATE.lashingLog || {};

  // Collect all weeks that have data, plus the current week, sorted newest first
  const weekSet = new Set(Object.keys(log));
  weekSet.add(thisWeek);
  const weeks = [...weekSet].sort((a, b) => b.localeCompare(a));

  const totalReturned = Object.values(log).reduce((sum, e) => sum + (parseInt(e.returned) || 0), 0);
  const totalUsed = Object.values(log).reduce((sum, e) => sum + (parseInt(e.used) || 0), 0);
  const inSystem = totalReturned - totalUsed;

  const rows = weeks.map(wk => {
    const entry = log[wk] || {};
    const returned = entry.returned !== undefined ? entry.returned : '';
    const used = entry.used !== undefined ? entry.used : '';
    const notes = entry.notes || '';
    const isThisWeek = wk === thisWeek;
    const rowBg = isThisWeek ? 'background:#fdf8ee;' : '';
    return `<tr style="vertical-align:top;${rowBg}">
      <td style="padding:10px 12px;white-space:nowrap">
        <div style="font:700 12px var(--font-mono);color:${isThisWeek ? 'var(--accent)' : 'var(--text-primary)'}">${wk}${isThisWeek ? ' <span style="font-size:9px;font-weight:400;color:var(--accent)">THIS WEEK</span>' : ''}</div>
        <div style="font-size:10px;color:var(--text-muted);margin-top:1px">${fmtWeekRange(wk)}</div>
      </td>
      <td style="padding:10px 12px;width:120px">
        <input type="number" min="0" value="${esc(String(returned))}"
          placeholder="0"
          onchange="saveLashingEntry('${wk}','returned',this.value===''?'':parseInt(this.value)||0)"
          style="width:80px;text-align:center;font:700 16px var(--font-mono);background:var(--bg-input);border:1px solid var(--border);border-radius:5px;padding:5px 8px;color:${parseInt(returned)>0?'var(--green)':'var(--text-muted)'}"/>
      </td>
      <td style="padding:10px 12px;width:120px">
        <input type="number" min="0" value="${esc(String(used))}"
          placeholder="0"
          onchange="saveLashingEntry('${wk}','used',this.value===''?'':parseInt(this.value)||0)"
          style="width:80px;text-align:center;font:700 16px var(--font-mono);background:var(--bg-input);border:1px solid var(--border);border-radius:5px;padding:5px 8px;color:${parseInt(used)>0?'var(--orange)':'var(--text-muted)'}"/>
      </td>
      <td style="padding:10px 12px;min-width:220px">
        <input type="text" value="${esc(notes)}" placeholder="Notes (optional)…"
          onchange="saveLashingEntry('${wk}','notes',this.value)"
          style="width:100%;background:var(--bg-input);border:1px solid var(--border);border-radius:5px;padding:6px 8px;font-size:12px;color:var(--text-primary)"/>
      </td>
      <td style="padding:10px 12px;width:40px;text-align:center">
        <button onclick="deleteLashingWeek('${wk}')" title="Delete this week" style="background:none;border:none;cursor:pointer;font-size:15px;color:var(--text-muted);padding:2px 4px;border-radius:4px;transition:color .12s" onmouseover="this.style.color='var(--red)'" onmouseout="this.style.color='var(--text-muted)'">🗑</button>
      </td>
    </tr>`;
  }).join('');

  return `<div class="card" style="margin-bottom:14px">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;flex-wrap:wrap;gap:8px">
      <div class="card-title" style="margin:0">🔗 Lashings</div>
      <div style="display:flex;gap:10px;align-items:center;flex-wrap:wrap">
        <div style="text-align:center;padding:6px 14px;background:var(--bg-elevated);border:2px solid ${inSystem>=0?'var(--green)':'var(--red)'};border-radius:8px">
          <div style="font:700 20px var(--font-mono);color:${inSystem>=0?'var(--green)':'var(--red)'}">${inSystem}</div>
          <div style="font-size:10px;color:var(--text-muted);font-weight:600">In system</div>
        </div>
        <div style="text-align:center;padding:6px 14px;background:var(--bg-elevated);border:1px solid var(--border);border-radius:8px">
          <div style="font:700 20px var(--font-mono);color:var(--green)">${totalReturned}</div>
          <div style="font-size:10px;color:var(--text-muted)">Total returned</div>
        </div>
        <div style="text-align:center;padding:6px 14px;background:var(--bg-elevated);border:1px solid var(--border);border-radius:8px">
          <div style="font:700 20px var(--font-mono);color:var(--orange)">${totalUsed}</div>
          <div style="font-size:10px;color:var(--text-muted)">Total used</div>
        </div>
        <button class="btn btn-secondary btn-sm" onclick="lashingAddWeek()">+ Add week</button>
      </div>
    </div>
    <div style="overflow-x:auto">
      <table style="width:100%;border-collapse:collapse">
        <thead>
          <tr style="border-bottom:2px solid var(--border);background:var(--bg-deep)">
            <th style="padding:8px 12px;text-align:left;font:700 10px var(--font-mono);color:var(--text-muted);text-transform:uppercase;letter-spacing:.06em">Week (Mon – Sun)</th>
            <th style="padding:8px 12px;text-align:left;font:700 10px var(--font-mono);color:var(--green);text-transform:uppercase;letter-spacing:.06em">Returned</th>
            <th style="padding:8px 12px;text-align:left;font:700 10px var(--font-mono);color:var(--orange);text-transform:uppercase;letter-spacing:.06em">Used</th>
            <th style="padding:8px 12px;text-align:left;font:700 10px var(--font-mono);color:var(--text-muted);text-transform:uppercase;letter-spacing:.06em">Notes</th>
            <th style="padding:8px 12px;width:40px"></th>
          </tr>
        </thead>
        <tbody>${rows}</tbody>
      </table>
    </div>
  </div>`;
}

function lashingAddWeek() {
  const input = prompt('Enter week start date (YYYY-MM-DD) to add:', todayStr());
  if (!input || !/^\d{4}-\d{2}-\d{2}$/.test(input)) return;
  const wk = isoWeek(input);
  if (!STATE.lashingLog) STATE.lashingLog = {};
  if (!STATE.lashingLog[wk]) STATE.lashingLog[wk] = {};
  render();
}

async function deleteLashingWeek(weekKey) {
  if (!confirm(`Delete lashing entry for ${weekKey}?`)) return;
  if (STATE.lashingLog && STATE.lashingLog[weekKey]) {
    delete STATE.lashingLog[weekKey];
    try { await api('/api/lashing-log', 'PUT', STATE.lashingLog); }
    catch(e) { showError('Failed to delete lashing entry: ' + e.message); }
  }
  render();
}

function renderShipping() {
  const ready = STATE.frames.filter(f=>f.fixedForShipping && f.location==='facility');

  let readyHTML = ready.length === 0
    ? '<div class="empty-msg">No frames fixed for shipping. Go to Frames tab to fix cages to frames.</div>'
    : '<div style="display:flex;flex-wrap:wrap;gap:0">' + ready.map(f=>{
      const cage = f.cages.map(cid=>getCage(cid)).filter(Boolean)[0];
      const sel = shipSelected.includes(f.id);
      return `<div class="ship-frame-select ${sel?'selected':''}" onclick="${shipFormOpen?`toggleShipSelect('${f.id}')`:''}" style="cursor:${shipFormOpen?'pointer':'default'};opacity:${shipFormOpen?1:0.7}">
        <div><div class="ship-frame-name">${esc(f.name)}</div>${cage ? `<div class="ship-frame-cage">${esc(cage.name)}${f.hasWaler?' 🔩':''}</div>` : ''}</div>
      </div>`;
    }).join('') + '</div>';

  let formHTML = '';
  if (shipFormOpen) {
    formHTML = `<div class="card">
      <div class="form-grid form-grid-2">
        <div><label>Ship Date</label><input id="sf-date" type="date" value="${todayStr()}"/></div>
        <div><label>Notes</label><input id="sf-notes"/></div>
      </div>
      <div style="font-size:12px;color:var(--text-muted);margin:8px 0">Selected: ${shipSelected.length} frames — click frames above to select</div>

        <button class="btn btn-primary" onclick="createShipment()">Ship ${shipSelected.length} Frames</button>
        <button class="btn btn-secondary" onclick="shipFormOpen=false;shipSelected=[];render()">Cancel</button>
      </div>
    </div>`;
  }

  let historyHTML = STATE.shipments.length === 0
    ? '<div class="empty-msg">No shipments yet</div>'
    : [...STATE.shipments].sort((a,b)=>b.date.localeCompare(a.date)).map(sh=>{
      const statusBadge = {['in-transit']:'blue', delivered:'purple', ['frames-returned']:'green'}[sh.status]||'accent';
      const frameNames = sh.frameIds.map(fid=>{ const f=getFrame(fid); return f?f.name:'?'; }).join(', ');
      let actions = '';
      if(sh.status==='in-transit') actions = `<button class="btn btn-secondary btn-xs" onclick="markDelivered('${sh.id}')">Mark Delivered</button>`;
      if(sh.status==='delivered') actions = `<button class="btn btn-secondary btn-xs" onclick="returnFrames('${sh.id}')">Frames Returned</button>`;
      return `<div class="shipment-row">
        <div class="flex-between">
          <div>
            <span style="font-weight:600;color:var(--text-primary)">${fmt(sh.date)}</span>
            <span style="margin-left:12px;font-size:12px;color:var(--text-muted)">${sh.frameIds.length} frames: ${esc(frameNames)}</span>
          </div>
          <div style="display:flex;gap:8px;align-items:center">
            <span class="badge badge-${statusBadge}">${sh.status}</span>
            ${actions}
          </div>
        </div>
        ${sh.notes ? `<div style="font-size:12px;color:var(--text-muted);margin-top:4px">${esc(sh.notes)}</div>` : ''}
      </div>`;
    }).join('');

  return `
    <div class="flex-between" style="margin-bottom:16px">
      <h2 class="section-title" style="margin:0">Shipping Management</h2>
      <button class="btn btn-primary" onclick="shipFormOpen=!shipFormOpen;shipSelected=[];render()">+ New Shipment</button>
    </div>
    ${renderLashingLog()}
    ${renderBoatDiary()}
    <div class="card">
      <div class="card-title">Ready to Ship (${ready.length} frames fixed)</div>
      ${readyHTML}
    </div>
    ${formHTML}
    <div class="card">
      <div class="flex-between" style="margin-bottom:12px">
        <div class="card-title" style="margin:0">Shipment History</div>
        ${STATE.shipments.length > 0 ? `<button class="btn btn-danger btn-sm" onclick="clearShipmentHistory()">🗑 Clear History</button>` : ''}
      </div>
      ${historyHTML}
    </div>
  `;
}

function toggleShipSelect(fid) {
  if(shipSelected.includes(fid)) shipSelected=shipSelected.filter(id=>id!==fid);
  else shipSelected.push(fid);
  render();
}
function addAuditEvent(type, description, detail, relatedIds) {
  const event = {
    id: uid(), type, description, detail: detail || '',
    relatedIds: relatedIds || [],
    timestamp: new Date().toISOString(),
    date: new Date().toISOString().slice(0,10),
  };
  if (!STATE.auditEvents) STATE.auditEvents = [];
  STATE.auditEvents.unshift(event);
  if (STATE.auditEvents.length > 500) STATE.auditEvents = STATE.auditEvents.slice(0, 500);
  saveAuditEventToAPI(event);
}

async function createShipment() {
  if(shipSelected.length===0) return alert('Select frames to ship.');
  const date = document.getElementById('sf-date').value;
  const notes = document.getElementById('sf-notes').value.trim();
  const shipment = {id:uid(), date, notes, frameIds:[...shipSelected], status:'in-transit', createdAt:new Date().toISOString()};
  STATE.shipments.push(shipment);
  const updatedFrames = [];
  const updatedCages = [];
  shipSelected.forEach(fid=>{
    const f=getFrame(fid);
    f.location='boat';
    updatedFrames.push(f);
    f.cages.forEach(cid=>{ const c=getCage(cid); if(c){c.location='shipped';c.locationDetail='In transit'; updatedCages.push(c);} });
  });
  // Audit log entry for shipment
  {
    const frameNames = shipSelected.map(fid => getFrame(fid)?.name || fid).join(', ');
    const cageNames = shipSelected.flatMap(fid => (getFrame(fid)?.cages || []).map(cid => getCage(cid)?.name || cid)).join(', ');
    addAuditEvent('🚢 Shipped', `${shipSelected.length} frame(s) shipped: ${frameNames}`, cageNames ? `Cages aboard: ${cageNames}` : '', shipSelected);
  }
  shipFormOpen=false; shipSelected=[];
  render();
  await addShipmentToAPI(shipment);
  await Promise.all(updatedFrames.map(f => saveFrame(f)));
  await Promise.all(updatedCages.map(c => saveCage(c)));
}
async function markDelivered(sid) {
  const sh = STATE.shipments.find(s=>s.id===sid);
  sh.status = 'delivered';
  const updatedFrames = [];
  const updatedCages = [];
  sh.frameIds.forEach(fid=>{
    const f=getFrame(fid);
    if(f){
      // Clear cages from the frame on delivery — they are now classed as shipped
      f.cages.forEach(cid=>{
        const c=getCage(cid);
        if(c){ c.location='shipped'; c.locationDetail='Delivered'; c.departureDate=null; updatedCages.push(c); }
      });
      f.cages=[];
      f.fixedForShipping=false;
      f.location='client';
      updatedFrames.push(f);
    }
  });
  render();
  await updateShipmentInAPI(sh);
  await Promise.all(updatedFrames.map(f => saveFrame(f)));
  await Promise.all(updatedCages.map(c => saveCage(c)));
}
async function clearShipmentHistory() {
  const count = STATE.shipments.length;
  if (count === 0) return;
  if (!confirm(`Clear all ${count} shipment record${count!==1?'s':''}? This cannot be undone.`)) return;
  const ids = STATE.shipments.map(s=>s.id);
  STATE.shipments = [];
  render();
  await Promise.all(ids.map(id => deleteShipmentFromAPI(id)));
}

async function returnFrames(sid) {
  const sh = STATE.shipments.find(s=>s.id===sid);
  sh.status = 'frames-returned';
  const updatedFrames = [];
  const returnedFrameNames = [];
  sh.frameIds.forEach(fid=>{
    const f=getFrame(fid);
    if(f){ returnedFrameNames.push(f.name + (f.width ? ` [${f.width}m]` : '')); f.location='facility'; f.fixedForShipping=false; updatedFrames.push(f); }
  });
  addAuditEvent('↩ Frame Return', `${updatedFrames.length} frame(s) returned to facility`, returnedFrameNames.join(', '), sh.frameIds);
  render();
  await updateShipmentInAPI(sh);
  await Promise.all(updatedFrames.map(f => saveFrame(f)));
}

async function returnFromClient(fid) {
  const f = getFrame(fid);
  if (!f) return;
  addAuditEvent('↩ Frame Return', `${f.name}${f.width ? ` [${f.width}m]` : ''} returned from client`, 'Frame returned to facility', [fid]);
  f.fixedForShipping = false;
  f.location = 'facility';
  f.returnDate = null;
  render();
  await saveFrame(f);
}

function renderOverview() {
  const chipClass = (h) => hCat(h).toLowerCase();
  const cageChip = (c) => `<span class="overview-cage-chip ${chipClass(c.height)}">${esc(c.name)}</span>`;

  // RMD section - spatial layout, A on top, B on bottom, inside slots face each other
  let rmdRows = RMD_LAYOUT.map(row=>{
    let items = row.items.map(item=>{
      const r = getRMDByNum(item);
      if(!r) return '';
      // Side A: outside (cage2) on top row, inside (cage1) on bottom row
      // Side B: inside (cage1) on top row, outside (cage2) on bottom row
      function chipOrEmpty(side, slot) {
        const cid = r[side][slot];
        if(!cid) return '';
        const c = getCage(cid);
        return c ? cageChip(c) : '';
      }
      let aOut = chipOrEmpty('A','cage2');
      let aIn = chipOrEmpty('A','cage1');
      let bIn = chipOrEmpty('B','cage1');
      let bOut = chipOrEmpty('B','cage2');

      return `<div style="flex:0 0 auto;min-width:160px">
        <div style="font:700 13px var(--font-mono);color:var(--accent);text-align:center;margin-bottom:4px">RMD-${item}</div>
        <div class="overview-side-box" style="margin-bottom:2px">
          <div class="overview-side-label">A outside</div>${aOut || '<span style="font-size:10px;color:var(--text-muted)">—</span>'}
        </div>
        <div class="overview-side-box" style="margin-bottom:2px;border-color:var(--accent);border-style:dashed">
          <div class="overview-side-label">A inside / B inside</div>${aIn} ${bIn || ''} ${!aIn && !bIn ? '<span style="font-size:10px;color:var(--text-muted)">—</span>' : ''}
        </div>
        <div class="overview-side-box">
          <div class="overview-side-label">B outside</div>${bOut || '<span style="font-size:10px;color:var(--text-muted)">—</span>'}
        </div>
      </div>`;
    }).join('');
    return `<div class="rmd-site-row row-${row.row}">${items}</div>`;
  }).join('');

  // Frames with cages
  let framesWithCages = STATE.frames.filter(f=>f.cages.length>0).map(f=>{
    const fCages = f.cages.map(cid=>getCage(cid)).filter(Boolean);
    const cls = f.fixedForShipping ? 'shipping' : 'has-cage';
    let badges = `<div class="overview-frame-badges">`;
    badges += `<span class="badge badge-blue" style="font-size:9px;padding:1px 6px">${f.width}m</span>`;
    if(f.hasWaler) badges += `<span class="badge badge-blue" style="font-size:9px;padding:1px 6px">🔩</span>`;
    if(f.fixedForShipping) badges += `<span class="badge badge-accent" style="font-size:9px;padding:1px 6px">SHIP</span>`;
    const locBdg = f.location!=='facility' ? `<span class="badge badge-purple" style="font-size:9px;padding:1px 6px">${f.location}</span>` : '';
    badges += locBdg + `</div>`;
    let cageInfo = fCages.map(c=>`${cageChip(c)} <span style="font-size:10px;color:var(--text-muted)">${c.height}m × ${c.width}m × ${c.length}m | ${c.weight}t</span>`).join('<br/>');
    return `<div class="overview-frame-card ${cls}">
      <div class="overview-frame-name">${esc(f.name)}</div>
      <div class="overview-frame-info">${cageInfo}</div>
      ${badges}
    </div>`;
  }).join('') || '<div class="empty-msg">No cages in any frames</div>';

  // Empty frames at facility
  let emptyFrames = STATE.frames.filter(f=>f.cages.length===0 && f.location==='facility');
  let emptyFramesSummary = emptyFrames.length > 0
    ? `<div style="font-size:12px;color:var(--text-muted);margin-top:8px">${emptyFrames.length} empty frames at facility: <span style="font-family:var(--font-mono);font-size:11px">${emptyFrames.map(f=>f.name).join(', ')}</span></div>`
    : '';

  // Stats
  const totalInRMD = STATE.cages.filter(c=>c.location==='rmd').length;
  const totalInRSS = STATE.cages.filter(c=>c.location==='rss').length;
  const totalInFrames = STATE.cages.filter(c=>c.location==='frame').length;
  const totalReady = STATE.frames.filter(f=>f.fixedForShipping).length;

  return `
    <div class="flex-between" style="margin-bottom:16px">
      <h2 class="section-title" style="margin:0">Storage & Frame Overview</h2>
      <div style="display:flex;gap:12px;font-size:13px">
        <span><strong style="color:var(--green)">${totalInRMD}</strong> in RMD</span>
        <span><strong style="color:var(--blue)">${totalInFrames}</strong> in Frames</span>
        <span><strong style="color:var(--accent)">${totalReady}</strong> ready to ship</span>
      </div>
    </div>
    <div>
      <div class="card">
        <div class="card-title">RMD Storage Bays</div>
        <div style="display:flex;gap:8px;margin-bottom:10px;font-size:10px">
          <span class="overview-cage-chip short">Short &lt;${STATE.settings.heightShortMax||H_SHORT}m</span>
          <span class="overview-cage-chip medium">Medium ≤${STATE.settings.heightMedMax||H_MED}m</span>
          <span class="overview-cage-chip tall">Tall &gt;${STATE.settings.heightMedMax||H_MED}m</span>
        </div>
        <div class="rmd-site-layout">${rmdRows}</div>
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-top:16px">
        <div class="card">
          <div class="card-title">Frames with Cages (${STATE.frames.filter(f=>f.cages.length>0).length})</div>
          ${framesWithCages}
        </div>
        <div class="card">
          <div class="card-title">Empty Frames at Facility (${emptyFrames.length})</div>
          ${emptyFramesSummary || '<div class="empty-msg">None</div>'}
        </div>
      </div>
    </div>
  `;
}

async function saveKpiCell(weekKey, field, valueType, value) {
  // valueType: 'target', 'targetHi', 'actual'
  if (!STATE.kpiData) STATE.kpiData = {};
  if (!STATE.kpiData[weekKey]) STATE.kpiData[weekKey] = {};
  if (!STATE.kpiData[weekKey][field]) STATE.kpiData[weekKey][field] = {};
  STATE.kpiData[weekKey][field][valueType] = value;
  try { await api('/api/kpi-data', 'PUT', STATE.kpiData); } catch(e) {}
}

async function saveKpiLabel(key, value) {
  if (!STATE.kpiData) STATE.kpiData = {};
  if (!STATE.kpiData._labels) STATE.kpiData._labels = {};
  STATE.kpiData._labels[key] = value;
  try { await api('/api/kpi-data', 'PUT', STATE.kpiData); } catch(e) {}
}

function kpiGetLabel(key, defaultLabel) {
  return (STATE.kpiData?._labels?.[key]) || defaultLabel;
}

async function kpiCellChange(input, weekKey, field, type) {
  await saveKpiCell(weekKey, field, type, input.value.trim());
  kpiRefreshColors();
}

function kpiRefreshColors() {
  const kpi = STATE.kpiData || {};
  document.querySelectorAll('input[data-kpi-type="actual"]').forEach(inp => {
    const wk    = inp.dataset.kpiWeek;
    const fld   = inp.dataset.kpiField;
    const lower = inp.dataset.kpiLower === 'true';
    const tgt   = kpi[wk]?.[fld]?.target   ?? '';
    const tgtHi = kpi[wk]?.[fld]?.targetHi ?? '';
    inp.style.color = kpiColorVal(inp.value, tgt, tgtHi, lower);
  });
}

function kpiColorVal(actual, target, targetHi, lowerIsBetter) {
  if (actual === '' || actual === null || actual === undefined) return 'var(--text-muted)';
  const a = parseFloat(actual);
  if (isNaN(a)) return 'var(--text-primary)';
  if (targetHi !== '' && targetHi !== undefined) {
    const lo = parseFloat(target), hi = parseFloat(targetHi);
    return (a >= lo && a <= hi) ? 'var(--green)' : 'var(--red)';
  }
  if (target === '' || target === undefined) return 'var(--text-primary)';
  const t = parseFloat(target);
  if (lowerIsBetter) return a <= t ? 'var(--green)' : 'var(--red)';
  return a >= t ? 'var(--green)' : 'var(--red)';
}

function monthRangeForWeek(weekKey) {
  const mon = isoWeekMonday(weekKey);
  const d = new Date(mon + 'T12:00:00');
  const year = d.getFullYear(), month = d.getMonth();
  const start = `${year}-${String(month+1).padStart(2,'0')}-01`;
  const lastDay = new Date(year, month+1, 0).getDate();
  const end = `${year}-${String(month+1).padStart(2,'0')}-${String(lastDay).padStart(2,'0')}`;
  const monthName = d.toLocaleString('en-GB', { month: 'long' });
  return { year, month, monthName, start, end };
}

function renderKpiTable() {
  const thisWeek  = isoWeek();
  const lastWeekD = new Date(); lastWeekD.setDate(lastWeekD.getDate() - 7);
  const lastWeek  = isoWeek(toISO(lastWeekD));

  const thisMonthRange = monthRangeForWeek(thisWeek);
  const lastMonthD = new Date(); lastMonthD.setDate(1); lastMonthD.setMonth(lastMonthD.getMonth() - 1);
  const lastMonthRange = monthRangeForWeek(isoWeek(toISO(lastMonthD)));
  const lmKey = 'lastmonth_' + lastMonthRange.monthName.slice(0,3).toUpperCase();

  const kpi = STATE.kpiData || {};

  function getVal(wk, field, type) {
    return kpi[wk]?.[field]?.[type] ?? '';
  }

  const inputBase = `background:transparent;border:1px solid transparent;border-radius:4px;padding:2px 5px;cursor:text;outline:none;transition:border-color .12s,background .12s`;
  const inputFocus = `onfocus="this.style.borderColor='var(--accent)';this.style.background='var(--bg-base)'" onblur="this.style.borderColor='transparent';this.style.background='transparent'"`;
  const inputEnter = `onkeydown="if(event.key==='Enter'){this.blur()}"`;

  // Single data cell (target or actual)
  function dataInput(wk, field, type, lowerIsBetter) {
    const val = getVal(wk, field, type);
    const isActual = type === 'actual';
    const tgt   = getVal(wk, field, 'target');
    const tgtHi = getVal(wk, field, 'targetHi');
    const color = isActual ? kpiColorVal(val, tgt, tgtHi, lowerIsBetter) : 'var(--text-secondary)';
    const fw = isActual ? '700' : '600';
    return `<input type="text"
      value="${esc(String(val))}" placeholder="—"
      data-kpi-type="${type}" data-kpi-week="${wk}" data-kpi-field="${field}" data-kpi-lower="${lowerIsBetter ? 'true' : 'false'}"
      style="${inputBase};width:64px;text-align:right;font:${fw} 13px var(--font-mono);color:${color}"
      ${inputFocus} ${inputEnter}
      onchange="kpiCellChange(this,'${wk}','${field}','${type}')"
    />`;
  }

  function singleCell(wk, field, type, borderLeft, lowerIsBetter) {
    return `<td style="padding:4px 6px;text-align:right${borderLeft ? ';border-left:1px solid var(--border)' : ''}">
      ${dataInput(wk, field, type, lowerIsBetter)}
    </td>`;
  }

  // Range target cell: lo – hi pair of inputs
  function rangeTargetCell(wk, field, borderLeft) {
    const lo = getVal(wk, field, 'target');
    const hi = getVal(wk, field, 'targetHi');
    const inpStyle = `${inputBase};width:30px;text-align:right;font:600 12px var(--font-mono);color:var(--text-secondary)`;

          onchange="kpiCellChange(this,'${wk}','${field}','target')"
        />
        <span style="color:var(--text-muted);font-size:10px">–</span>
        <input type="text" value="${esc(String(hi))}" placeholder="hi"
          data-kpi-type="targetHi" data-kpi-week="${wk}" data-kpi-field="${field}"
          style="${inpStyle}" ${inputFocus} ${inputEnter}
          onchange="kpiCellChange(this,'${wk}','${field}','targetHi')"
        />
      </div>
    </td>`;
  }

  // Editable row label cell
  function labelCell(id, defaultLabel) {
    const label = kpiGetLabel(id, defaultLabel);
    return `<td style="padding:5px 12px">
      <input type="text" value="${esc(label)}" title="Click to rename"

        </td>
      </tr>`;
    }
    const { id, rangeTarget, defaultLabel, lowerIsBetter } = row;
    const cwKey  = thisWeek;

    const mtdKey = thisWeek + '_mtd';

    return `<tr style="border-bottom:1px solid var(--border-light)">

      ${singleCell(lwKey,  id, 'actual',  false, lowerIsBetter)}
      ${rangeTarget ? rangeTargetCell(mtdKey, id, true)  : singleCell(mtdKey, id, 'target', true,  false)}
      ${singleCell(mtdKey, id, 'actual',  false, lowerIsBetter)}
      ${rangeTarget ? rangeTargetCell(lmKey,  id, true)  : singleCell(lmKey,  id, 'target', true,  false)}
      ${singleCell(lmKey,  id, 'actual',  false, lowerIsBetter)}
    </tr>`;
  }

  const lwMon = isoWeekMonday(lastWeek);
  const lwMonFmt = new Date(lwMon + 'T12:00:00').toLocaleDateString('en-GB', { day:'numeric', month:'numeric', year:'2-digit' });
  const cwDate = new Date().toLocaleDateString('en-GB', { day:'numeric', month:'2-digit', year:'numeric' });

  // Shared styles for ALL header inputs
  const thBase  = `background:transparent;border:1px solid transparent;border-radius:4px;padding:1px 4px;outline:none;width:100%;transition:border-color .12s,background .12s;cursor:text`;

  const thEnter = `onkeydown="if(event.key==='Enter'){this.blur()}"`;
  // Top-row group headers (bold, centred, uppercase)
  const thGroup = `${thBase};text-align:center;font:700 11px var(--font-mono);color:var(--text-muted);text-transform:uppercase;letter-spacing:.05em`;
  // Sub-date labels beneath group headers (lighter)
  const thSub   = `${thBase};text-align:center;font:400 10px var(--font-mono);color:var(--text-muted)`;
  // Second-row Target/Actual sub-headers (right-aligned)
  const thSub2  = `${thBase};text-align:right;font:600 10px var(--font-mono);color:var(--text-muted)`;
  // First column header
  const thCol0  = `${thBase};text-align:left;font:700 11px var(--font-mono);color:var(--text-muted);text-transform:uppercase;letter-spacing:.05em`;

  // Helper: render a header input
  function thInput(key, def, style, borderLeft) {
    const val = kpiGetLabel(key, def);
    const bl  = borderLeft ? 'border-left:1px solid var(--border);' : '';
    return `<input type="text" value="${esc(val)}" style="${style};${bl}" ${thFocus} ${thEnter} onchange="saveKpiLabel('${key}',this.value.trim())" />`;
  }

  return `<div class="card" style="margin-bottom:20px;overflow-x:auto">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;flex-wrap:wrap;gap:8px">
      <div class="card-title" style="margin:0">📋 Weekly KPI Report</div>

function renderAnalytics() {
  destroyAnalyticsCharts();

  const cages = STATE.cages;
  const today = todayStr();

  // ── Live inventory stats ──────────────────────────────────────────────────
  const HEAVY = 6.5; // tonne threshold
  const rmdCages   = cages.filter(c => c.location === 'rmd');
  const frameCages = cages.filter(c => c.location === 'frame');
  const inRMD      = rmdCages.length;
  const inFrames   = frameCages.length;

  const emptyFrames = STATE.frames.filter(f => f.location === 'facility' && f.cages.length === 0).length;

  // Weight split across RMD + frames combined
  const activeCages = [...rmdCages, ...frameCages];
  const heavy  = activeCages.filter(c => (c.weight || 0) >= HEAVY).length;
  const light  = activeCages.filter(c => (c.weight || 0) > 0 && (c.weight || 0) < HEAVY).length;
  const noWt   = activeCages.filter(c => !c.weight).length;
  const total  = activeCages.length;
  const pctHeavy = total > 0 ? Math.round((heavy / total) * 100) : 0;
  const pctLight = total > 0 ? Math.round((light / total) * 100) : 0;

  // Weight split for RMD only
  const rmdHeavy = rmdCages.filter(c => (c.weight||0) >= HEAVY).length;
  const rmdLight = rmdCages.filter(c => (c.weight||0) > 0 && (c.weight||0) < HEAVY).length;
  const frmHeavy = frameCages.filter(c => (c.weight||0) >= HEAVY).length;
  const frmLight = frameCages.filter(c => (c.weight||0) > 0 && (c.weight||0) < HEAVY).length;

  // ── Per-trip data ─────────────────────────────────────────────────────────
  // Shipped cages: use proposedTripId (works for both live & historical as long as it was set)
  // Frames returned: match f.returnDate to trip.unloadDate (historical) OR f.returnedAt (live action)
  const trips = [...(STATE.boatTrips || [])].sort((a, b) => {
    return (a.departDate||a.loadDate||'').localeCompare(b.departDate||b.loadDate||'');
  });

  const tripRows = trips.map(t => {
    const tDate = t.departDate || t.loadDate || '';
    const isPast = tDate && tDate < today;

    // Cages shipped on this trip — combine location='shipped' (live) with historical shipped
    // A cage is "confirmed shipped" on this trip if proposedTripId matches and location='shipped'
    // A cage is "planned" if proposedTripId matches and not yet shipped
    const confirmedCages = cages.filter(c => c.proposedTripId === t.id && c.location === 'shipped');
    const plannedCages   = cages.filter(c => c.proposedTripId === t.id && c.location !== 'shipped');

    // Frames that returned on this trip
    // Historical: f.returnDate matches trip.unloadDate
    // Live-returned: f.returnedAt matches trip.unloadDate (set when "Return to Facility" is clicked)
    const unload = t.unloadDate || t.returnDate || '';
    const returnedFrames = STATE.frames.filter(f => {
      if (!unload) return false;
      // Primary: direct trip link
      if (f.returnTripId === t.id) return true;
      // Fallback: returnDate matches trip unload/return date
      return (f.returnDate === unload) || (f.returnedAt && f.returnedAt === unload);
    });

    // Frames that were shipped on this trip (via shipments record)
    const shipment = (STATE.shipments || []).find(s => s.frameIds && s.date === tDate);
    const shippedFrameIds = shipment ? shipment.frameIds : [];
    // Count frames currently on boat/with client that depart-date matches (fallback)
    const shippedFrameCount = shippedFrameIds.length ||
      STATE.frames.filter(f => (f.location === 'boat' || f.location === 'client') && f.returnDate === unload).length;

    // Empty frames returned = returned frames with 0 cages at time of return
    // We can only know this if cages are now at facility (they were emptied before shipping)
    const emptyReturned = returnedFrames.filter(f => f.cages.length === 0).length;
    const nonEmptyReturned = returnedFrames.length - emptyReturned;

    return {
      t, tDate, isPast,
      confirmedCount: confirmedCages.length,
      plannedCount: plannedCages.length,
      confirmedWeight: confirmedCages.reduce((s,c)=>s+(c.weight||0),0),
      plannedWeight: plannedCages.reduce((s,c)=>s+(c.weight||0),0),
      returnedFrames: returnedFrames.length,
      emptyReturned,
      nonEmptyReturned,
      shippedFrameCount,
      hasData: confirmedCages.length > 0 || plannedCages.length > 0 || returnedFrames.length > 0,
    };
  }).filter(r => r.hasData || !r.isPast);

  // ── Build chart data ──────────────────────────────────────────────────────
  const chartData = {
    weightLabels: ['Heavy (≥6.5t)', `Light (<6.5t)`, 'Unknown'],
    weightCounts: [heavy, light, noWt],
    rmdWeightCounts: [rmdHeavy, rmdLight, rmdCages.filter(c=>!c.weight).length],
    frmWeightCounts: [frmHeavy, frmLight, frameCages.filter(c=>!c.weight).length],
    tripLabels: tripRows.map(r => tripLabel(r.t)),
    tripShipped: tripRows.map(r => r.confirmedCount),
    tripPlanned: tripRows.map(r => r.plannedCount),
    tripFramesReturned: tripRows.map(r => r.returnedFrames),
    tripEmptyReturned: tripRows.map(r => r.emptyReturned),
  };

  // ── Weight bar helper ─────────────────────────────────────────────────────
  function weightBar(heavy, light, total) {
    if (total === 0) return '<span style="color:var(--text-muted);font-style:italic;font-size:11px">no data</span>';
    const pH = Math.round((heavy/total)*100);
    const pL = light > 0 ? Math.round((light/total)*100) : 0;
    const pU = 100 - pH - pL;
    return `<div style="display:flex;height:10px;border-radius:5px;overflow:hidden;width:100%;background:var(--border)">
      ${pH > 0 ? `<div style="width:${pH}%;background:#c93030" title="${heavy} heavy (≥6.5t)"></div>` : ''}
      ${pL > 0 ? `<div style="width:${pL}%;background:#27a060" title="${light} light (<6.5t)"></div>` : ''}
      ${pU > 0 ? `<div style="width:${pU}%;background:var(--bg-deep)" title="${total-heavy-light} unknown weight"></div>` : ''}
    </div>
    <div style="display:flex;gap:10px;margin-top:4px;font:500 10px var(--font-mono)">
      ${heavy > 0 ? `<span style="color:#c93030">● ${pH}% heavy</span>` : ''}
      ${light > 0 ? `<span style="color:#27a060">● ${pL}% light</span>` : ''}
      ${(total-heavy-light) > 0 ? `<span style="color:var(--text-muted)">● ${pU}% unknown</span>` : ''}
    </div>`;
  }

  // ── Per-trip table rows ───────────────────────────────────────────────────
  const tripTableRows = tripRows.length === 0
    ? `<tr><td colspan="7" style="text-align:center;padding:24px;color:var(--text-muted)">No boat trips configured yet</td></tr>`
    : tripRows.map(r => {
        const { t, isPast, confirmedCount, plannedCount, confirmedWeight, plannedWeight, returnedFrames, emptyReturned } = r;
        const tDate = t.departDate || t.loadDate || '';
        const retDate = t.unloadDate || t.returnDate || '';
        const isLive = !isPast || plannedCount > 0;
        const statusBadge = confirmedCount > 0
          ? `<span class="badge badge-purple">Confirmed (${confirmedCount})</span>`
          : plannedCount > 0
          ? `<span class="badge badge-yellow">Planned (${plannedCount})</span>`
          : `<span class="badge" style="background:var(--bg-elevated);color:var(--text-muted)">—</span>`;
        const dataSource = confirmedCount > 0 && isPast
          ? `<span style="font-size:9px;color:var(--text-muted)" title="Historical confirmed data">📁 audit</span>`
          : confirmedCount > 0
          ? `<span style="font-size:9px;color:#27a060" title="Live data">● live</span>`
          : plannedCount > 0
          ? `<span style="font-size:9px;color:var(--orange)" title="Planned, not yet shipped">⏳ planned</span>`
          : '';
        return `<tr style="${isPast && confirmedCount === 0 && plannedCount === 0 ? 'opacity:0.5' : ''}">
          <td style="font-weight:700;color:var(--accent);white-space:nowrap">${esc(tripLabel(t))}</td>
          <td style="font-family:var(--font-mono);font-size:11px">${tDate ? fmt(tDate) : '—'}</td>
          <td style="font-family:var(--font-mono);font-size:11px">${retDate ? fmt(retDate) : '—'}</td>
          <td style="text-align:right;font-family:var(--font-mono)">
            ${confirmedCount > 0 ? `<span style="color:var(--purple);font-weight:700">${confirmedCount}</span>` : ''}
            ${plannedCount > 0 ? `<span style="color:var(--orange);font-weight:700">${plannedCount > 0 && confirmedCount > 0 ? '+' : ''}${plannedCount} planned</span>` : ''}
            ${confirmedCount === 0 && plannedCount === 0 ? '—' : ''}
          </td>
          <td style="text-align:right;font-family:var(--font-mono);font-size:11px;color:var(--text-muted)">
            ${(confirmedCount + plannedCount) > 0 ? (confirmedCount > 0 ? confirmedWeight : plannedWeight).toFixed(1) + 't' : '—'}
          </td>
          <td style="text-align:right;font-family:var(--font-mono)">
            ${returnedFrames > 0 ? `<span style="color:#0e7490;font-weight:700">${returnedFrames}</span>` : '—'}
          </td>
          <td>${statusBadge} ${dataSource}</td>
        </tr>`;
      }).join('');

  return `
  <div style="padding:0 0 32px">
    <h2 class="section-title" style="margin-bottom:20px">Analytics</h2>

    <!-- Live inventory stats row -->
    <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:20px">
      <div class="card">
        <div class="card-title" style="margin-bottom:8px">🗄 Cages in RMD</div>
        <div style="font:700 32px var(--font-mono);color:var(--green);margin-bottom:8px">${inRMD}</div>
        ${weightBar(rmdHeavy, rmdLight, rmdCages.length)}
      </div>
      <div class="card">
        <div class="card-title" style="margin-bottom:8px">🖼 Cages in Frames</div>
        <div style="font:700 32px var(--font-mono);color:var(--orange);margin-bottom:8px">${inFrames}</div>
        ${weightBar(frmHeavy, frmLight, frameCages.length)}
      </div>
      <div class="card">
        <div class="card-title" style="margin-bottom:8px">🔲 Empty Frames at Facility</div>
        <div style="font:700 32px var(--font-mono);color:var(--blue);margin-bottom:8px">${emptyFrames}</div>
        <div style="font-size:11px;color:var(--text-muted)">of ${STATE.frames.filter(f=>f.location==='facility').length} total at facility</div>
      </div>
    </div>

    <!-- Combined weight breakdown -->
    <div class="card" style="margin-bottom:20px">
      <div class="card-title" style="margin-bottom:12px">⚖ Weight Breakdown — RMD + Frames Combined (${total} cages)</div>
      <div style="display:flex;align-items:center;gap:20px;flex-wrap:wrap">
        <div style="flex:1;min-width:200px">${weightBar(heavy, light, total)}</div>
        <div style="display:flex;gap:16px;flex-shrink:0;font:600 13px var(--font-mono)">
          <div style="text-align:center"><div style="color:#c93030;font-size:22px;font-weight:700">${heavy}</div><div style="font-size:10px;color:var(--text-muted)">≥ 6.5t</div></div>
          <div style="text-align:center"><div style="color:#27a060;font-size:22px;font-weight:700">${light}</div><div style="font-size:10px;color:var(--text-muted)">< 6.5t</div></div>
          ${noWt > 0 ? `<div style="text-align:center"><div style="color:var(--text-muted);font-size:22px;font-weight:700">${noWt}</div><div style="font-size:10px;color:var(--text-muted)">no weight</div></div>` : ''}
        </div>
      </div>
      <div style="margin-top:12px;display:flex;gap:24px;font-size:11px;color:var(--text-muted)">
        <span>RMD: ${rmdHeavy} heavy / ${rmdLight} light${rmdCages.filter(c=>!c.weight).length > 0 ? ` / ${rmdCages.filter(c=>!c.weight).length} unknown` : ''}</span>
        <span>Frames: ${frmHeavy} heavy / ${frmLight} light${frameCages.filter(c=>!c.weight).length > 0 ? ` / ${frameCages.filter(c=>!c.weight).length} unknown` : ''}</span>
      </div>
    </div>

    <!-- Charts row -->
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:20px">
      <div class="card">
        <div class="card-title" style="margin-bottom:4px">Cages per Trip — Confirmed vs Planned</div>
        <div style="font-size:10px;color:var(--text-muted);margin-bottom:8px">Confirmed = location is "shipped" · Planned = assigned trip, not yet shipped</div>
        <div style="position:relative;height:220px"><canvas id="ac-trip-cages"></canvas></div>
      </div>
      <div class="card">
        <div class="card-title" style="margin-bottom:4px">Frames Returned per Trip</div>
        <div style="font-size:10px;color:var(--text-muted);margin-bottom:8px">Matched by trip link or unload/return date</div>
        <div style="position:relative;height:220px"><canvas id="ac-trip-frames"></canvas></div>
      </div>
    </div>

    <!-- Per-trip detail table -->
    <div class="card">
      <div class="card-title" style="margin-bottom:4px">Trip-by-Trip Breakdown</div>
      <div style="font-size:11px;color:var(--text-muted);margin-bottom:10px">
        <span style="color:#27a060">● live</span> = cage currently location "shipped" &nbsp;·&nbsp;
        <span style="color:var(--orange)">⏳ planned</span> = assigned to trip, not yet shipped &nbsp;·&nbsp;
        <span style="color:var(--text-muted)">📁 audit</span> = past confirmed trip

function drawAnalyticsCharts() {
  const el = document.getElementById('analytics-data');
  if (!el) return;
  let d;
  try { d = JSON.parse(decodeURIComponent(el.getAttribute('data-json'))); } catch(e) { return; }

  const font = { family: "'JetBrains Mono', monospace", size: 11 };
  Chart.defaults.color = '#8895a7';
  const gridColor = 'rgba(255,255,255,0.05)';
  const noData = d.tripLabels.length === 0;

  function mkChart(id, cfg) {
    const canvas = document.getElementById(id);
    if (!canvas) return;
    try { Chart.getChart(canvas)?.destroy(); } catch(e) {}
    _analyticsCharts[id] = new Chart(canvas, cfg);
  }

  const baseScales = {
    x: { grid: { color: gridColor }, ticks: { font, maxRotation: 40 } },
    y: { beginAtZero: true, ticks: { font, stepSize: 1 }, grid: { color: gridColor } }
  };

  // Cages per trip: confirmed (shipped) stacked with planned
  mkChart('ac-trip-cages', {
    type: 'bar',
    data: {
      labels: noData ? ['No trips'] : d.tripLabels,
      datasets: noData ? [{ data: [0], backgroundColor: '#444', label: 'No data' }] : [
        { label: 'Confirmed shipped', data: d.tripShipped,  backgroundColor: '#7040c0cc', borderRadius: 3, stack: 'cages' },
        { label: 'Planned (not yet shipped)', data: d.tripPlanned, backgroundColor: '#c0852066', borderRadius: 3, stack: 'cages', borderWidth: 1, borderColor: '#c08520' },
      ]
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: { legend: { position: 'bottom', labels: { boxWidth: 12, font } } },
      scales: { ...baseScales, x: { ...baseScales.x, stacked: true }, y: { ...baseScales.y, stacked: true } }
    }
  });

  // Frames returned per trip
  mkChart('ac-trip-frames', {
    type: 'bar',
    data: {
      labels: noData ? ['No trips'] : d.tripLabels,
      datasets: noData ? [{ data: [0], backgroundColor: '#444', label: 'No data' }] : [
        { label: 'Frames Returned', data: d.tripFramesReturned, backgroundColor: '#0e749099', borderRadius: 3 },
      ]
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: { legend: { position: 'bottom', labels: { boxWidth: 12, font } } },
      scales: { ...baseScales }
    }
  });
}


async function saveActionedLogEntry(date, field, value) {

// ── Actioned Log state ──
let alDateFrom = '';
let alDateTo   = '';

function alApplyFilter() {
  alDateFrom = document.getElementById('al-from')?.value || '';
  alDateTo   = document.getElementById('al-to')?.value   || '';
  const el = document.getElementById('al-table-wrap');
  if (el) el.innerHTML = buildActionedLogTable();
  updateAlStats();
}

function alClearFilter() {
  alDateFrom = ''; alDateTo = '';
  const f = document.getElementById('al-from'); if (f) f.value = '';
  const t = document.getElementById('al-to');   if (t) t.value = '';
  const el = document.getElementById('al-table-wrap');
  if (el) el.innerHTML = buildActionedLogTable();
  updateAlStats();
}

function getAlDates() {
  const completed = STATE.plannedMovements.filter(m => m.completed);
  const dateSet = new Set(completed.map(m => (m.date||'').slice(0,10)).filter(Boolean));
  Object.keys(STATE.actionedLog || {}).forEach(d => dateSet.add(d));
  (STATE.auditEvents || []).forEach(ev => {
    if (ev.timestamp) dateSet.add(new Date(ev.timestamp).toISOString().slice(0,10));
  });

  // Expand to include every working day (Mon–Fri) between the earliest and latest known date
  if (dateSet.size > 0) {
    const knownDates = [...dateSet].sort();
    const rangeStart = alDateFrom || knownDates[0];
    const rangeEnd   = alDateTo   || knownDates[knownDates.length - 1];
    const cur = new Date(rangeStart + 'T12:00:00');
    const end = new Date(rangeEnd   + 'T12:00:00');
    while (cur <= end) {
      const dow = cur.getDay();
      if (dow !== 0 && dow !== 6) {           // Mon–Fri only
        dateSet.add(cur.toISOString().slice(0, 10));
      }
      cur.setDate(cur.getDate() + 1);
    }
  }

  let dates = [...dateSet].sort((a,b) => b.localeCompare(a));
  if (alDateFrom) dates = dates.filter(d => d >= alDateFrom);
  if (alDateTo)   dates = dates.filter(d => d <= alDateTo);
  return dates;
}

function updateAlStats() {
  const completed = STATE.plannedMovements.filter(m => m.completed);
  const RMD_TYPES = new Set(['rmd-to-frame','frame-to-rmd','facility-to-rmd']);
  const dates = getAlDates();
  const filteredMoves = completed.filter(m => dates.includes((m.date||'').slice(0,10)));
  const filteredRmd = filteredMoves.filter(m => RMD_TYPES.has(m.typeKey)).length;
  const el = document.getElementById('al-stats');
  if (!el) return;
  el.innerHTML = `
    <div class="card" style="padding:10px 16px;text-align:center;min-width:80px">
      <div style="font:700 20px var(--font-mono);color:var(--accent)">${dates.length}</div>
      <div style="font-size:10px;color:var(--text-muted)">Days shown</div>
    </div>
    <div class="card" style="padding:10px 16px;text-align:center;min-width:80px">
      <div style="font:700 20px var(--font-mono);color:var(--accent)">${filteredMoves.length}</div>
      <div style="font-size:10px;color:var(--text-muted)">Movements</div>
    </div>
    <div class="card" style="padding:10px 16px;text-align:center;min-width:80px">
      <div style="font:700 20px var(--font-mono);color:#0e7490">${filteredRmd}</div>
      <div style="font-size:10px;color:var(--text-muted)">RMD moves</div>
    </div>
    <div class="card" style="padding:10px 16px;text-align:center;min-width:80px">
      <div style="font:700 20px var(--font-mono);color:#0e7490">${filteredRmd*2}h</div>
      <div style="font-size:10px;color:var(--text-muted)">Total hours</div>
    </div>`;
}

async function alAddBlankDay() {
  const dateStr = prompt('Enter date for the no-movement day (YYYY-MM-DD):',
    new Date().toISOString().slice(0, 10));
  if (!dateStr || !/^\d{4}-\d{2}-\d{2}$/.test(dateStr)) return;

  if (!STATE.actionedLog[dateStr]) STATE.actionedLog[dateStr] = {};
