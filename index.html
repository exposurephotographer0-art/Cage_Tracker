            <div style="display:flex;align-items:center;">${arrow}${slotTag}${cageNameHTML}</div>
            <div style="font-size:9px;padding-left:${arrow?'14':'0'}px;${detailStyle||'color:var(--text-muted);'}">${cage.width}m · ${hCat(cage.height)} · ${lCat(cage.length)} · ${cage.weight}t</div>
          </div>`;
        }
      });
      if (!sideHasContent) {
        slotsHTML += `<div style="font-size:10px;color:var(--text-muted);font-style:italic;padding:2px 6px;margin-bottom:2px">empty</div>`;
      }
    });

    // Show cages planned to move INTO this RMD slot (frame-to-rmd) that aren't already in an RMD slot shown above
    const existingCageIds = new Set(['cage1','cage2'].flatMap(sk => ['A','B'].map(side => rmdData[side][sk])).filter(Boolean));
    const incomingCages = movesForRmd.filter(m => (m.typeKey === 'frame-to-rmd' || m.typeKey === 'facility-to-rmd') && m.cageId && !existingCageIds.has(m.cageId));
    if (incomingCages.length > 0) {
      // Group incoming cages by which side (A/B) they're going to
      const incomingBySide = {A:[], B:[], unknown:[]};
      incomingCages.forEach(m => {
        const slot = resolveRmdSlot(m) || '';
        const sideMatch = String(slot).match(/([ABab])$/);
        const side = sideMatch ? sideMatch[1].toUpperCase() : 'unknown';
        incomingBySide[side].push(m);
      });
      ['A','B','unknown'].forEach(side => {
        if (incomingBySide[side].length === 0) return;
        const sideLabel = side === 'unknown' ? 'Incoming' : `Side ${side} Incoming`;
        slotsHTML += `<div style="font:700 8px var(--font-mono);color:#27a060;text-transform:uppercase;letter-spacing:.05em;margin:5px 0 3px">${sideLabel}</div>`;
        incomingBySide[side].forEach(m => {
          const c = getCage(m.cageId); if (!c) return;
          slotsHTML += `<div style="font-size:10px;padding:3px 6px;border-radius:4px;border:1px solid #4aad72;background:#f0faf4;margin-bottom:2px;">
            <div style="display:flex;align-items:center;gap:3px;"><span style="color:#27a060;font-weight:800;margin-right:2px">←</span><span style="font:600 10px var(--font-mono)">${esc(c.name)}</span></div>
            <div style="color:var(--text-muted);font-size:9px;padding-left:14px">${c.width}m · ${hCat(c.height)} · ${lCat(c.length)} · ${c.weight}t</div>
          </div>`;
        });
      });
    }

    const border = isActive ? 'border:2px solid var(--accent);box-shadow:0 0 0 3px rgba(192,133,32,0.15);' : 'border:1px solid var(--border);';
    return `<div id="mvr-${rmdNum}" style="background:var(--bg-card);${border}border-radius:8px;padding:9px 11px;min-width:145px;flex:0 0 auto;">
      <div style="font:700 13px var(--font-mono);color:${isActive?'var(--accent)':'var(--text-primary)'};margin-bottom:1px;">RMD-${rmdNum}</div>
      ${slotsHTML}
    </div>`;
  }

  // ── RSS card HTML ──
  function buildRssCard() {
    const rssCages = isDayView
      ? [...dayCtx.cageLocSim.entries()].filter(([,loc]) => loc.location==='rss').map(([cid]) => getCage(cid)).filter(Boolean)
      : (STATE.rssCages || []).map(id => getCage(id)).filter(Boolean);
    const pendingOut = filtered.filter(m => m.typeKey === 'rss-to-frame');
    const pendingIn  = filtered.filter(m => m.typeKey === 'facility-to-rss' || m.typeKey === 'frame-to-rss' || m.typeKey === 'rmd-to-rss' || (m.typeKey === 'frame-to-rmd' && m.rmdSlot === 'RSS'));
    const isActive = pendingOut.length > 0 || pendingIn.length > 0;
    const border = isActive ? 'border:2px solid var(--accent);box-shadow:0 0 0 3px rgba(192,133,32,0.15);' : 'border:1px solid #a0c8e8;';
    let html = '';
    if (!rssCages.length && !pendingIn.length) {
      html = '<div style="font-size:10px;color:var(--text-muted);font-style:italic;padding:4px 6px">empty</div>';
    } else {
      rssCages.forEach(cage => {
        const mvOut = pendingOut.some(m => m.cageId === cage.id);
        const _rs = shipmentShadeClass(cage, _mvShipDays);
        let bg = mvOut ? 'background:#fff7ed;border-color:#f5a742;' : 'background:rgba(37,99,176,0.06);border-color:#a0c8e8;';
        const nameStyle = shipmentShadeNameColor(_rs) || '';
        const isPickedCage = mvPick && mvPick.cageId === cage.id;
        const pickBtn = `<button onclick="mvPickCage('${cage.id}')" title="Plan movement for cage ${esc(cage.name)}" style="border:none;background:${isPickedCage?'var(--accent)':'rgba(192,133,32,0.15)'};color:${isPickedCage?'#fff':'var(--accent)'};border-radius:4px;padding:1px 5px;font-size:9px;cursor:pointer;margin-left:4px;flex-shrink:0;font-weight:700">${isPickedCage?'✓':'🏷'}</button>`;
        html += `<div style="font-size:10px;padding:3px 6px;border-radius:4px;border:1px solid;margin-bottom:2px;${bg}">
          <div style="display:flex;align-items:center;">${mvOut?'<span style="color:#c08520;font-weight:800;margin-right:4px">→</span>':''}<span style="font:600 10px var(--font-mono);${nameStyle}">${hDot(cage.height)}${tagDot(cage)}${esc(cage.name)}</span>${pickBtn}</div>
          <div style="font-size:9px;color:var(--text-muted)">${cage.width}m · ${hCat(cage.height)} · ${lCat(cage.length)} · ${cage.weight}t</div>
        </div>`;
      });
      // Incoming cages
      pendingIn.forEach(m => {
        const cage = getCage(m.cageId); if (!cage || rssCages.find(x=>x.id===cage.id)) return;
        html += `<div style="font-size:10px;padding:3px 6px;border-radius:4px;border:1px solid #4aad72;background:#f0faf4;margin-bottom:2px;">
          <div style="display:flex;align-items:center;gap:3px;"><span style="color:#27a060;font-weight:800">←</span><span style="font:600 10px var(--font-mono)">${esc(cage.name)}</span></div>
          <div style="color:var(--text-muted);font-size:9px;padding-left:14px">${cage.width}m · ${hCat(cage.height)} · ${lCat(cage.length)} · ${cage.weight}t</div>
        </div>`;
      });
    }
    const rssMvPickBtn = mvPick ? `<button onclick="mvPickDestination('rss','RSS','Roof Slab Storage')" style="font:700 9px var(--font-mono);background:#1a2235;color:#e8a830;border:1.5px solid #e8a830;border-radius:5px;padding:2px 8px;cursor:pointer;text-transform:uppercase;letter-spacing:.05em">▶ Roof Slab</button>` : '';
    return `<div id="mv-rss-card" style="background:var(--bg-card);${border}border-radius:8px;padding:9px 11px;min-width:145px;flex:0 0 auto;">
      <div style="font:700 12px var(--font-mono);color:${isActive?'var(--accent)':'var(--blue)'};margin-bottom:1px;">Roof Slab ${rssMvPickBtn}</div>
      <div style="font-size:9px;color:var(--text-muted);margin-bottom:5px">${rssCages.length} cage${rssCages.length!==1?'s':''} stored</div>
      ${html}
    </div>`;
  }

  const rmdRowsHTML = RMD_LAYOUT.map(row =>
    `<div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:8px">${row.items.map(n=>buildRmdCard(n)).join('')}</div>`
  ).join('');

  // ── Frame cards HTML ──
  // In day view (preview), also include any non-facility frames referenced in movements
  // (e.g. returning frames assigned as boat frames by the boat planner).
  const facilityFrames = STATE.frames.filter(f=>f.location==='facility');
  const relevantFrames = STATE.frames.filter(f =>
    f.location === 'facility' ||
    (activeFrames.has(f.id) && f.location !== 'client' && f.location !== 'boat') ||
    (isDayView && dayCtx.simFrameCages && (dayCtx.simFrameCages[f.id]?.length > 0) && f.location !== 'client'));
  const sortedFrames = [...relevantFrames].sort((a,b)=>{
    return (activeFrames.has(b.id)?1:0)-(activeFrames.has(a.id)?1:0);
  });

  function buildFrameCard(f) {
    const isActive = activeFrames.has(f.id);
    const movesForFrame = filtered.filter(m => resolveFrameId(m) === f.id);
    // In day view use simulated cage occupancy; otherwise real frame.cages
    const frameCageIds = isDayView ? (dayCtx.simFrameCages[f.id] || []) : f.cages;
    const fCages = frameCageIds.map(cid=>getCage(cid)).filter(Boolean);
    const outIds  = movesForFrame.filter(m=>m.typeKey==='frame-to-rmd'||(m.typeKey==='frame-to-frame'&&m.srcFrameId===f.id)).map(m=>m.cageId);
    const inIds   = movesForFrame.filter(m=>m.typeKey==='rmd-to-frame'||m.typeKey==='facility-to-frame'||m.typeKey==='frame-to-frame').map(m=>m.cageId);
    // facility-exit cages: planned Facility→Frame then Frame→RMD — show them as incoming+outgoing
    const transitIds = movesForFrame.filter(m=>m.typeKey==='frame-to-rmd').map(m=>m.cageId)
      .filter(cid => filtered.some(m2=>m2.cageId===cid && m2.typeKey==='facility-to-frame' && resolveFrameId(m2)===f.id));
    let html = '';
    // Show cages physically on the frame
    fCages.forEach(c=>{
      const out = outIds.includes(c.id);
      const _fShade = shipmentShadeClass(c, _mvShipDays);
      let fBg;
      if (_fShade && out) fBg = 'background:#fff8c5;border-color:#e8b800;';
      else if (_fShade === 'next') fBg = 'background:#3b1d6e;border-color:#7040c0;';
      else if (_fShade === 'second') fBg = 'background:#c8b8e8;border-color:#9070c8;';
      else if (c.shippingPreference2) fBg = 'background:#dbeafe;border-color:#3b82f6;';
      else if (c.shippingPreference) fBg = 'background:#fff8c5;border-color:#e8d850;';
      else fBg = `background:${out?'#fff7ed':'var(--bg-input)'};border-color:${out?'#f5a742':'var(--border)'};`;
      const fNameStyle = (_fShade && out) ? 'color:#7a5000;' : _fShade === 'next' ? 'color:#e0ccff;' : _fShade === 'second' ? 'color:#4a2a7a;' : c.shippingPreference2 ? 'color:#1e40af;' : c.shippingPreference ? 'color:#7a5c00;' : '';
      const fDetailStyle = (_fShade && out) ? 'color:#a07000;' : _fShade === 'next' ? 'color:#c0a8ee;' : _fShade === 'second' ? 'color:#6a4a9a;' : c.shippingPreference2 ? 'color:#3b82f6;' : 'color:var(--text-muted);';
      const fMoveCount = STATE.plannedMovements.filter(m=>m.cageId===c.id&&!m.completed).length;
      const fIsPickedCage = mvPick && mvPick.cageId === c.id;
      const fPickBtn = `<button onclick="event.stopPropagation();mvPickCage('${c.id}')" title="Plan movement for cage ${esc(c.name)}" style="border:none;background:${fIsPickedCage?'var(--accent)':'rgba(192,133,32,0.15)'};color:${fIsPickedCage?'#fff':'var(--accent)'};border-radius:4px;padding:1px 5px;font-size:9px;cursor:pointer;margin-left:4px;flex-shrink:0;font-weight:700">${fIsPickedCage?'✓':'🏷'}</button>`;
      html += `<div style="font-size:10px;padding:2px 5px;border-radius:4px;border:1px solid;margin-bottom:2px;${fBg}">
        <div style="display:flex;align-items:center;gap:2px;">${out?'<span style="color:#c08520;font-weight:800">→</span>':''}<span style="font:600 10px var(--font-mono);${fNameStyle}cursor:pointer;text-decoration:underline dotted;text-underline-offset:2px;display:inline-flex;align-items:center;" onclick="openMvCageMovements('${c.id}')" title="Click to view/edit movements">${hDot(c.height)}${tagDot(c)}${esc(c.name)}${fMoveCount>0?` <span style="font-size:8px;background:rgba(192,133,32,0.2);color:var(--accent);border-radius:3px;padding:0 3px">${fMoveCount}</span>`:''}</span>${fPickBtn}</div>
        <div style="font-size:9px;padding-left:${out?'13':'0'}px;${fDetailStyle}">${c.width}m · ${hCat(c.height)} · ${lCat(c.length)} · ${c.weight}t</div>
      </div>`;
    });
    inIds.forEach(cid=>{
      const c=getCage(cid); if(!c)return;
      if(fCages.find(x=>x.id===cid))return; // already shown above
      const isTransit = transitIds.includes(cid); // passes through: facility→frame→rmd
      const _iShade = shipmentShadeClass(c, _mvShipDays);
      let iBg;
      if (_iShade === 'next') iBg = 'background:#3b1d6e;border-color:#7040c0;';
      else if (_iShade === 'second') iBg = 'background:#c8b8e8;border-color:#9070c8;';
      else if (c.shippingPreference2) iBg = 'background:#dbeafe;border-color:#3b82f6;';
      else if (c.shippingPreference) iBg = 'background:#fff8c5;border-color:#e8d850;';
      else if (isTransit) iBg = 'background:#fff7ed;border-color:#f5a742;';
      else iBg = 'background:#f0faf4;border-color:#4aad72;';
      const iNameStyle = _iShade === 'next' ? 'color:#e0ccff;' : _iShade === 'second' ? 'color:#4a2a7a;' : c.shippingPreference2 ? 'color:#1e40af;' : c.shippingPreference ? 'color:#7a5c00;' : '';
      const iDetailStyle = _iShade === 'next' ? 'color:#c0a8ee;' : _iShade === 'second' ? 'color:#6a4a9a;' : c.shippingPreference2 ? 'color:#3b82f6;' : 'color:var(--text-muted);';
      const iMoveCount = STATE.plannedMovements.filter(m=>m.cageId===c.id&&!m.completed).length;
      const iIsPickedCage = mvPick && mvPick.cageId === c.id;
      const iPickBtn = `<button onclick="event.stopPropagation();mvPickCage('${c.id}')" title="Plan movement for cage ${esc(c.name)}" style="border:none;background:${iIsPickedCage?'var(--accent)':'rgba(192,133,32,0.15)'};color:${iIsPickedCage?'#fff':'var(--accent)'};border-radius:4px;padding:1px 5px;font-size:9px;cursor:pointer;margin-left:4px;flex-shrink:0;font-weight:700">${iIsPickedCage?'✓':'🏷'}</button>`;
      const iArrow = isTransit
        ? `<span style="color:#27a060;font-weight:800">←</span><span style="color:#c08520;font-weight:800">→</span>`
        : `<span style="color:#27a060;font-weight:800">←</span>`;
      html+=`<div style="font-size:10px;padding:2px 5px;border-radius:4px;border:1px solid;margin-bottom:2px;${iBg}">
        <div style="display:flex;align-items:center;gap:2px;">${iArrow}<span style="font:600 10px var(--font-mono);${iNameStyle}cursor:pointer;text-decoration:underline dotted;text-underline-offset:2px;display:inline-flex;align-items:center;" onclick="openMvCageMovements('${c.id}')" title="Click to view/edit movements">${hDot(c.height)}${tagDot(c)}${esc(c.name)}${iMoveCount>0?` <span style="font-size:8px;background:rgba(192,133,32,0.2);color:var(--accent);border-radius:3px;padding:0 3px">${iMoveCount}</span>`:''}</span>${iPickBtn}</div>
        <div style="font-size:9px;padding-left:13px;${iDetailStyle}">${c.width}m · ${hCat(c.height)} · ${lCat(c.length)} · ${c.weight}t</div>
      </div>`;
    });
    if(!html) html='<div style="font-size:10px;color:var(--text-muted);font-style:italic">empty</div>';
    const border = isActive ? 'border:2px solid var(--accent);box-shadow:0 0 0 3px rgba(192,133,32,0.15);' : mvPick ? 'border:2px dashed #e8a830;cursor:pointer;' : 'border:1px solid var(--border);';
    const frameClickHandler = mvPick ? `onclick="mvPickDestination('frame','${f.id}','${esc(f.name)} [${f.width}m]')"` : '';
    const framePickHint = mvPick ? `<div style="font-size:9px;color:#e8a830;font-weight:600;margin-top:4px;text-align:center">▶ Move here</div>` : '';
    return `<div id="mvf-${f.id}" style="background:${mvPick?'#1e2a1e':'var(--bg-card)'};${border}border-radius:8px;padding:9px 10px;min-width:100px;transition:all 0.1s" ${frameClickHandler} title="${mvPick?`Move cage ${esc(mvPick.cageName)} to ${esc(f.name)}`:''}">
      <div style="font:700 12px var(--font-mono);color:${isActive?'var(--accent)':mvPick?'#b0d890':'var(--text-primary)'}">${esc(f.name)}</div>
      <div style="font-size:9px;color:var(--text-muted);margin-bottom:4px">${f.width}m${f.hasWaler?' 🔩':''}</div>
      ${html}
      ${framePickHint}
    </div>`;
  }

  const framesHTML = sortedFrames.map(f=>buildFrameCard(f)).join('');

  // ── Facility box: all cages with departure date, sorted by date ──
  const facilityMoves = filtered.filter(m => m.typeKey === 'facility-to-frame' || m.typeKey === 'facility-to-rmd');
  // In day view use simulated cage locations so cages moved out on prior days are removed
  const facilityDepartureCages = STATE.cages
    .filter(c => {
      if (!c.departureDate) return false;
      if (isDayView && dayCtx.cageLocSim) {
        const sim = dayCtx.cageLocSim.get(c.id);
        return sim ? sim.location === 'facility' : c.location === 'facility';
      }
      return c.location === 'facility';
    })
    .sort((a, b) => a.departureDate.localeCompare(b.departureDate));
  const facilityCageIdsWithPlan = new Set(facilityMoves.map(m => m.cageId));
  const boatMoves = filtered.filter(m => m.typeKey === 'frame-return-from-client');

  // ── Movement list sidebar ──
  const MVCOLS = {'rmd-to-frame':'#27a060','frame-to-rmd':'#7040c0','facility-to-frame':'#2563b0','facility-to-rmd':'#0d9488','frame-fix-shipping':'#c08520','rss-to-frame':'#0891b2','frame-to-rss':'#7040c0','rmd-to-rss':'#0891b2','rss-to-rmd':'#7c3aed','rss-to-frame':'#0891b2'};
  const moveListHTML = filtered.map((m,i)=>{
    const col = MVCOLS[m.typeKey]||'var(--accent)';
    const cage = getCage(m.cageId);
    // Resolve frame: use stored frameId, or find from cage location / pending moves
    let frame = getFrame(m.frameId);
    if (!frame && cage && (m.typeKey === 'frame-to-rmd' || m.typeKey === 'rmd-to-frame')) {
      if (cage.location === 'frame') {
        frame = STATE.frames.find(f => f.cages.includes(m.cageId)) || null;
      }
      if (!frame) {
        const pending = STATE.plannedMovements.find(
          pm => !pm.completed && pm.cageId === m.cageId && pm.typeKey === 'facility-to-frame' && pm.frameId
        );
        if (pending) frame = getFrame(pending.frameId);
      }
    }
    const resolvedRmdSlot = resolveRmdSlot(m);
    const dir = m.typeKey==='rmd-to-frame' ? `RMD-${resolvedRmdSlot||'?'} → ${frame?frame.name:'?'}`
              : m.typeKey==='frame-to-rmd' ? `${frame?frame.name:'?'} → RMD-${resolvedRmdSlot||'?'}`
              : m.typeKey==='facility-to-frame' ? `Facility → ${frame?frame.name:'?'}`
              : m.typeKey==='facility-to-rmd' ? `Facility → RMD-${m.rmdNumber!=null?m.rmdNumber+(m.rmdSide||''):'?'}`
              : m.typeKey==='frame-return-from-client' ? `🚢 ${frame?frame.name:'?'} → Facility`
              : m.description;
    const _posNum = _mvGlobalPos[m.id] != null ? _mvGlobalPos[m.id] : (i+1);
    return `<div style="display:flex;align-items:flex-start;gap:8px;padding:7px 0;border-bottom:1px solid var(--border-light)">
      <div style="width:22px;height:22px;border-radius:50%;background:${col};color:#fff;font:700 11px var(--font-mono);display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px">${_posNum}</div>
      <div style="flex:1;min-width:0">
        <div style="font:700 12px var(--font-mono);color:var(--text-primary);cursor:pointer;text-decoration:underline dotted;text-underline-offset:2px" onclick="openMvCageMovements('${m.cageId}')" title="Click to view/edit movements">${cage?esc(cage.name):'?'}</div>
        <div style="font-size:11px;color:var(--text-muted);margin-top:1px">${dir}</div>
      </div>
      <div style="font-size:10px;color:var(--text-muted);white-space:nowrap">${m.date?fmt(m.date):''}</div>
    </div>`;
  }).join('');

  // Store moves globally so the draw function can access them after DOM update
  // Resolve missing frameId for frame-to-rmd movements (older data may lack it)
  window._mvMovesData = filtered.map(m=>{
    let frameId = m.frameId || '';
    let rmdSlot = '';
    // For boat-planner movements: rmdNumber+rmdSide is the canonical reference
    if (m.rmdNumber != null) {
      rmdSlot = String(m.rmdNumber) + (m.rmdSide || '');
    } else if (m.rmdSlot && /^\d/.test(String(m.rmdSlot))) {
      // Manual planner: rmdSlot is already in "NNA" format
      rmdSlot = m.rmdSlot;
    }
    // Fallback: infer from cage's current RMD locationDetail
    if (!rmdSlot && (m.typeKey === 'frame-to-rmd' || m.typeKey === 'rmd-to-frame')) {
      const cage = getCage(m.cageId);
      if (cage && cage.location === 'rmd' && cage.locationDetail) {
        const detailMatch = String(cage.locationDetail).match(/(\d+)\s*([ABab]?)\s*$/);
        if (detailMatch) {
          rmdSlot = String(parseInt(detailMatch[1], 10)) + (detailMatch[2] || '');
        } else {
          rmdSlot = cage.locationDetail;
        }
      }
    }
    // Resolve missing frameId for frame-to-rmd / rmd-to-frame
    if (!frameId && (m.typeKey === 'frame-to-rmd' || m.typeKey === 'rmd-to-frame')) {
      // Try to find the frame from the cage's current location
      const cage = getCage(m.cageId);
      if (cage && cage.location === 'frame') {
        const f = STATE.frames.find(fr => fr.cages.includes(m.cageId));
        if (f) frameId = f.id;
      }
      // Or from a pending facility-to-frame movement
      if (!frameId) {
        const pending = STATE.plannedMovements.find(
          pm => !pm.completed && pm.cageId === m.cageId && pm.typeKey === 'facility-to-frame' && pm.frameId
        );
        if (pending) frameId = pending.frameId;
      }
    }
    // Resolve srcFrameId for frame-to-frame if missing
    let srcFrameId = m.srcFrameId || '';
    if (!srcFrameId && m.typeKey === 'frame-to-frame' && m.cageId) {
      const cage = getCage(m.cageId);
      if (cage && cage.location === 'frame') {
        const f = STATE.frames.find(fr => fr.cages.includes(m.cageId));
        if (f) srcFrameId = f.id;
      }
    }
    return {
      id:m.id, typeKey:m.typeKey, cageId:m.cageId,
      rmdSlot:rmdSlot, frameId:frameId,
      rmdNumber: m.rmdNumber != null ? m.rmdNumber : null,
      rmdSide: m.rmdSide || null,
      srcFrameId:srcFrameId,
      description:m.description, date:m.date,
    };
  });

  // Also inject virtual "frame-return-from-client" entries for frames that have a returnDate set
  // These appear as arrows in the map without needing a planned movement
  STATE.frames.forEach(f => {
    if ((f.location === 'client' || f.location === 'boat') && f.returnDate) {
      window._mvMovesData.push({
        id: 'ret-' + f.id, typeKey: 'frame-return-from-client', cageId: null,
        rmdSlot: '', frameId: f.id,
        description: f.name + ' → Facility', date: f.returnDate, isReturnDate: true,
      });
    }
  });

  // Inject virtual "cage-to-boat-frame" entries: cages planned into frames currently away
  // These replace the standard facility-to-frame / rmd-to-frame arrows so there is only ONE arrow.
  filtered.forEach(m => {
    if (m.typeKey !== 'rmd-to-frame' && m.typeKey !== 'facility-to-frame') return;
    const frame = getFrame(m.frameId);
    if (!frame) return;
    if (frame.location === 'facility') return; // only away frames
    if (!frame.returnDate) return; // only if they have a return date
    // Remove the original move from _mvMovesData so it doesn't also draw a blue/green arrow
    const idx = window._mvMovesData.findIndex(x => x.id === m.id);
    if (idx !== -1) window._mvMovesData.splice(idx, 1);
    window._mvMovesData.push({
      id: 'ctbf-' + m.id, typeKey: 'cage-to-boat-frame', cageId: m.cageId,
      rmdSlot: m.rmdSlot || '', frameId: m.frameId,
      description: (getCage(m.cageId)?.name || '?') + ' → ' + frame.name + (frame.width ? ` [${frame.width}m]` : '') + ' (on boat)',
      date: m.date, sourceTypeKey: m.typeKey,
    });
  });


  return `
    ${isDayView ? `
    <!-- Day view header -->
    <div style="display:flex;align-items:center;gap:12px;margin-bottom:10px;flex-wrap:wrap">
      <h2 class="section-title" style="margin:0">📅 Day-by-Day Movements</h2>
      <div style="margin-left:auto;display:flex;gap:8px;align-items:center">
        ${dayCtx.prevDay ? `<button class="btn btn-secondary btn-sm" onclick="mvDayDate='${dayCtx.prevDay}';render()">◄ ${fmtShort(dayCtx.prevDay)}</button>` : ''}
        <span style="font:600 13px var(--font-mono);color:var(--text-primary)">${mvDayDate === todayStr() ? 'Today' : fmt(mvDayDate)}</span>
        ${dayCtx.nextDay ? `<button class="btn btn-primary btn-sm" onclick="mvDayDate='${dayCtx.nextDay}';render()">${fmtShort(dayCtx.nextDay)} ►</button>` : ''}
        <button class="btn btn-secondary btn-sm" onclick="mvDayView=false;render()">↔ All Movements</button>
      </div>
    </div>
    <!-- Day tabs -->
    <div style="display:flex;gap:5px;flex-wrap:wrap;margin-bottom:12px;padding-bottom:10px;border-bottom:2px solid var(--border);overflow-x:auto">
      ${dayCtx.dayTabsHTML}
    </div>
    ${(() => {
      if (pendingMoves.length > 0) return '';
      const isGhostDay = mvDayDate === dayCtx.dates[dayCtx.dates.length - 1] &&
        !STATE.plannedMovements.filter(m=>!m.completed).some(m=>m.date===mvDayDate);
      return isGhostDay
        ? `<div class="card" style="text-align:center;padding:20px 32px;color:#5a8090;background:#eef4f7;border:2px dashed #9bb8c8;">
            <div style="font-size:18px;margin-bottom:6px">🔭</div>
            <div style="font-weight:600;font-size:13px">Simulation view — no moves planned for ${fmt(mvDayDate)}</div>
            <div style="font-size:11px;margin-top:4px;opacity:.8">This shows where everything will be after all prior planned moves are completed.</div>
          </div>`
        : `<div class="card" style="text-align:center;padding:32px;color:var(--text-muted);font-style:italic">No movements scheduled for ${mvDayDate === todayStr() ? 'today' : fmt(mvDayDate)}.</div>`;
    })()}
    ` : `
    <!-- Normal map header -->
    <div style="display:flex;align-items:center;gap:12px;margin-bottom:4px;flex-wrap:wrap">
      <h2 class="section-title" style="margin:0">↔ Movements Map</h2>
      <button class="btn btn-primary btn-sm" style="margin-left:auto" onclick="mvDayDate=null;mvDayView=true;render()">📅 Day-by-Day View</button>
    </div>
    <div style="font-size:12px;color:var(--text-muted);margin-bottom:14px">Arrows show all planned, not-yet-actioned movements between RMD storage and frames. Use <strong>Day-by-Day View</strong> to step through one day at a time.</div>
    `}

    ${!isDayView ? `<div style="display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap;align-items:center">
      ${filterBtns}
      <button class="btn btn-secondary btn-sm" style="margin-left:auto" onclick="mvRedraw()">↺ Redraw</button>
      <div id="zoom-bar-movements">${zoomBarHTML('movements')}</div>
    </div>` : `<div style="display:flex;gap:8px;margin-bottom:10px;align-items:center;justify-content:flex-end">
      <button class="btn btn-secondary btn-sm" onclick="mvRedraw()">↺ Redraw</button>
      <div id="zoom-bar-movements">${zoomBarHTML('movements')}</div>
    </div>`}

    <div style="display:flex;gap:6px;align-items:center;margin-bottom:14px;flex-wrap:wrap">
      <span style="display:inline-flex;align-items:center;gap:5px;font:500 11px var(--font-display);color:var(--text-secondary)"><span style="width:24px;height:3px;background:#27a060;border-radius:2px;display:inline-block"></span>RMD → Frame</span>
      <span style="display:inline-flex;align-items:center;gap:5px;font:500 11px var(--font-display);color:var(--text-secondary)"><span style="width:24px;height:3px;background:#7040c0;border-radius:2px;display:inline-block"></span>Frame → RMD</span>
      <span style="display:inline-flex;align-items:center;gap:5px;font:500 11px var(--font-display);color:var(--text-secondary)"><span style="width:24px;height:3px;background:#e05c1a;border-radius:2px;display:inline-block"></span>Frame → Frame</span>
      <span style="display:inline-flex;align-items:center;gap:5px;font:500 11px var(--font-display);color:var(--text-secondary)"><span style="width:24px;height:3px;background:#2563b0;border-radius:2px;display:inline-block;border-top:3px dashed #2563b0"></span>Facility → Frame</span>
      <span style="display:inline-flex;align-items:center;gap:5px;font:500 11px var(--font-display);color:var(--text-secondary)"><span style="width:24px;height:3px;background:#0e7490;border-radius:2px;display:inline-block;border-top:3px dashed #0e7490"></span>Boat → Frame</span>
      <span style="display:inline-flex;align-items:center;gap:5px;font:500 11px var(--font-display);color:var(--text-secondary)"><span style="width:14px;height:14px;background:#3b1d6e;border-radius:3px;display:inline-block"></span>Next shipment</span>
      <span style="display:inline-flex;align-items:center;gap:5px;font:500 11px var(--font-display);color:var(--text-secondary)"><span style="width:14px;height:14px;background:#c8b8e8;border-radius:3px;display:inline-block"></span>2nd shipment</span>
      <span style="display:inline-flex;align-items:center;gap:5px;font:500 11px var(--font-display);color:var(--text-secondary)"><span style="width:14px;height:14px;background:#fff8c5;border:1px solid #e8d850;border-radius:3px;display:inline-block"></span>Ship preference</span>
      <span style="display:inline-flex;align-items:center;gap:5px;font:500 11px var(--font-display);color:var(--text-secondary)"><span style="width:24px;height:3px;background:#0891b2;border-radius:2px;display:inline-block"></span>Roof Slab in/out</span>
      <span style="display:inline-flex;align-items:center;gap:5px;font:500 11px var(--font-display);color:var(--text-secondary)"><span style="width:24px;height:3px;background:#7c3aed;border-radius:2px;display:inline-block"></span>Roof Slab → RMD</span>
      <span style="margin-left:auto;font-size:11px;color:var(--text-muted)">${filtered.length} movement${filtered.length!==1?'s':''}</span>
    </div>

    <!-- ── Click-to-Plan Banner ── -->
    ${mvPick ? `
    <div style="display:flex;align-items:center;gap:10px;background:#1a2235;border:2px solid var(--accent);border-radius:8px;padding:10px 16px;margin-bottom:14px;flex-wrap:wrap">
      <span style="font-size:18px">📍</span>
      <div style="flex:1;min-width:0">
        <div style="font:700 13px var(--font-display);color:#e8a830">Planning mode — cage <span style="font-family:var(--font-mono)">${esc(mvPick.cageName)}</span> selected</div>
        <div style="font:400 11px var(--font-display);color:#8899aa;margin-top:2px">Now click a <strong style="color:#e8d090">frame card</strong> or <strong style="color:#e8d090">RMD slot side (A/B)</strong> below as the destination</div>
      </div>
      <button class="btn btn-secondary btn-sm" onclick="mvPick=null;render()" style="flex-shrink:0">✕ Cancel</button>
    </div>` : `
    <div style="display:flex;align-items:center;gap:8px;background:var(--bg-elevated);border:1px solid var(--border);border-radius:8px;padding:8px 14px;margin-bottom:14px">
      <span style="font-size:14px">☞</span>
      <span style="font:500 12px var(--font-display);color:var(--text-muted)"><strong style="color:var(--text-secondary)">Click-to-Plan:</strong> Click the 🏷 icon next to any cage name to start planning its next movement</span>
    </div>`}

    <div id="zoom-outer-movements" class="zoom-outer">
      <div id="zoom-wrap-movements" class="zoom-wrap">
        <div style="display:grid;grid-template-columns:1fr 260px;gap:16px;align-items:start">

          <!-- Canvas map -->
          <div id="mv-map-wrapper" style="position:relative">
            <div id="mv-content">

              <!-- RMD zone -->
              <div style="display:flex;gap:16px;align-items:flex-start">
                <div style="flex:1">
                  <div style="display:flex;gap:16px;align-items:flex-start;flex-wrap:wrap">
                    <div>
                      <div style="font:700 11px var(--font-mono);color:var(--text-muted);text-transform:uppercase;letter-spacing:.06em;margin-bottom:10px">🗄 RMD Storage</div>
                      <div id="mv-rmd-zone">
                        ${rmdRowsHTML}
                      </div>
                    </div>
                    <div>
                      <div style="font:700 11px var(--font-mono);color:var(--blue);text-transform:uppercase;letter-spacing:.06em;margin-bottom:10px">🏗 Roof Slab Storage</div>
                      <div id="mv-rss-zone">
                        ${buildRssCard()}
                      </div>
                    </div>
                  </div>
                </div>
                <div>
                  <div style="font:700 11px var(--font-mono);color:var(--text-muted);text-transform:uppercase;letter-spacing:.06em;margin-bottom:10px">🏭 Facility</div>
                  <div style="position:relative">
                  <div id="mv-facility-box" style="background:var(--bg-card);border:${facilityMoves.length?'2px solid #2563b0;box-shadow:0 0 0 3px rgba(37,99,176,0.12);':'1px solid var(--border);'}border-radius:8px;padding:12px 16px;min-width:150px;">
                    <div style="font:700 13px var(--font-mono);color:${facilityMoves.length?'#2563b0':'var(--text-muted)'};margin-bottom:8px">Facility</div>
                    ${(() => {
                      if (!facilityDepartureCages.length) return '<div style="font-size:10px;color:var(--text-muted);font-style:italic">no departures set</div>';
                      // Group by working week (Monday key)
                      function _wkMon(dateStr) {
                        const d = new Date(dateStr + 'T12:00:00');
                        const day = d.getDay();
                        const diff = day === 0 ? -6 : 1 - day;
                        const m = new Date(d); m.setDate(d.getDate() + diff);
                        return m.toISOString().slice(0,10);
                      }
                      function _wkFri(monStr) {
                        const d = new Date(monStr + 'T12:00:00'); d.setDate(d.getDate() + 4);
                        return d.toISOString().slice(0,10);
                      }
                      const _todayMon = _wkMon(todayStr());
                      const _wkGroups = {}; const _wkOrder = [];
                      facilityDepartureCages.forEach(c => {
                        const mk = _wkMon(c.departureDate);
                        if (!_wkGroups[mk]) { _wkGroups[mk] = []; _wkOrder.push(mk); }
                        _wkGroups[mk].push(c);
                      });
                      return _wkOrder.map(mk => {
                        const isPast = mk < _todayMon;
                        const isCurrent = mk === _todayMon;
                        const wkLabel = isPast ? 'Overdue' : isCurrent ? 'This Week' : 'w/c ' + fmt(mk);
                        const hdrCol = isPast ? 'var(--red)' : isCurrent ? 'var(--orange)' : '#2563b0';
                        const hdrBg = isPast ? 'rgba(201,48,48,0.08)' : isCurrent ? 'rgba(184,92,26,0.08)' : 'rgba(37,99,176,0.07)';
                        const rows = _wkGroups[mk].map(c => {
                          const hasPlan = facilityCageIdsWithPlan.has(c.id);
                          const _now = new Date(); _now.setHours(0,0,0,0);
                          const depDate = new Date(c.departureDate + 'T00:00:00');
                          const daysLeft = Math.ceil((depDate - _now) / 86400000);
                          const isOverdue = daysLeft < 0;
                          const datCol = isOverdue ? 'var(--red)' : daysLeft <= 3 ? 'var(--orange)' : 'var(--text-muted)';
                          return `<div style="font-size:10px;padding:2px 5px;border-radius:4px;border:1px solid ${hasPlan?'#93c5fd':'var(--border)'};background:${hasPlan?'#eff6ff':'var(--bg-input)'};margin-bottom:2px;">
                            <div style="display:flex;align-items:center;gap:3px;">
                              ${hasPlan ? '<span style="color:#2563b0;font-weight:800;flex-shrink:0">→</span>' : '<span style="width:9px;flex-shrink:0"></span>'}
                              ${hDot(c.height)}${tagDot(c)}<span style="font:600 10px var(--font-mono)">${esc(c.name)}</span>
                              <span style="color:${datCol};font-size:9px;margin-left:auto;white-space:nowrap">${isOverdue ? '⚠' : ''}${fmt(c.departureDate)}</span>
                              <button onclick="mvPickCage('${c.id}')" title="Plan movement for cage ${esc(c.name)}" style="border:none;background:${mvPick&&mvPick.cageId===c.id?'var(--accent)':'rgba(192,133,32,0.15)'};color:${mvPick&&mvPick.cageId===c.id?'#fff':'var(--accent)'};border-radius:4px;padding:1px 5px;font-size:9px;cursor:pointer;margin-left:4px;font-weight:700">${mvPick&&mvPick.cageId===c.id?'✓':'🏷'}</button>
                            </div>
                            <div style="font-size:9px;color:var(--text-muted);padding-left:12px">${c.width}m · ${hCat(c.height)} · ${lCat(c.length)} · ${c.weight}t</div>
                          </div>`;
                        }).join('');
                        return `<div style="margin-bottom:6px">
                          <div style="display:flex;align-items:center;justify-content:space-between;padding:2px 5px;background:${hdrBg};border-radius:3px;margin-bottom:3px">
                            <span style="font:700 9px var(--font-mono);color:${hdrCol};text-transform:uppercase;letter-spacing:0.05em">${wkLabel}</span>
                            <span style="font:600 9px var(--font-mono);color:${hdrCol}">${_wkGroups[mk].length}c</span>
                          </div>
                          ${rows}
                        </div>`;
                      }).join('');
                    })()}
                  </div>
                  <div class="mv-facility-fade"><span>▾ hover to scroll</span></div>
                  </div>
                </div>
              </div>

              <!-- Divider -->
              <div style="border-top:2px dashed var(--border);margin:20px 0 16px;position:relative">
                <span style="position:absolute;top:-9px;left:50%;transform:translateX(-50%);background:var(--bg-deep);padding:0 12px;font:600 10px var(--font-mono);color:var(--text-muted);letter-spacing:.06em">FRAMES AT FACILITY</span>
              </div>

              <!-- Frames zone -->
              <div id="mv-frame-zone" style="display:flex;gap:6px;flex-wrap:wrap;">
                ${framesHTML}
              </div>

              <!-- Boat / Client divider and frames -->
              ${(() => {
                const framesWithReturn = STATE.frames
                  .filter(f =>
                    (f.location==='client'||f.location==='boat') &&
                    (f.returnDate || activeFrames.has(f.id)) &&
                    !(isDayView && dayCtx.simReturnedFrameIds && dayCtx.simReturnedFrameIds.has(f.id)))
                  .sort((a,b) => (a.returnDate||'').localeCompare(b.returnDate||''));
                const hasAny = framesWithReturn.length > 0;

                function buildBoatFrameCard(f) {
                  const isActive = activeFrames.has(f.id);
                  const movesForFrame = filtered.filter(m => resolveFrameId(m) === f.id);
                  const daysLeft = f.returnDate ? Math.ceil((new Date(f.returnDate+'T12:00:00') - new Date()) / 86400000) : null;
                  const retCol = daysLeft === null ? '#0e7490' : daysLeft < 0 ? 'var(--red)' : daysLeft <= 7 ? 'var(--orange)' : '#0e7490';
                  const retStr = f.returnDate ? (fmt(f.returnDate) + ` (${daysLeft < 0 ? Math.abs(daysLeft)+'d OVR' : daysLeft+'d'})`) : 'no return date';
                  // Cages planned to go into this frame
                  const plannedIntoCages = filtered
                    .filter(m => (m.typeKey === 'facility-to-frame' || m.typeKey === 'rmd-to-frame') && m.frameId === f.id)
                    .map(m => getCage(m.cageId)).filter(Boolean);
                  // Cages planned to exit from this frame via RMD
                  const exitingCages = filtered
                    .filter(m => m.typeKey === 'frame-to-rmd' && m.frameId === f.id)
                    .map(m => getCage(m.cageId)).filter(Boolean);
                  // Cages returning to facility
                  const returningMoves = boatMoves.filter(m => m.frameId === f.id);
                  const isReturning = returningMoves.length > 0;
                  // Cages already in this frame from prior-day moves (simulated occupancy)
                  const simResidentCageIds = isDayView && dayCtx.simFrameCages
                    ? (dayCtx.simFrameCages[f.id] || []) : [];
                  const plannedIntoIds = new Set(plannedIntoCages.map(c => c.id));
                  const exitingIds = new Set(exitingCages.map(c => c.id));
                  const simResidentCages = simResidentCageIds
                    .filter(cid => !plannedIntoIds.has(cid) && !exitingIds.has(cid))
                    .map(cid => getCage(cid)).filter(Boolean);
                  const hasActivity = plannedIntoCages.length > 0 || exitingCages.length > 0 || isReturning || simResidentCages.length > 0;
                  const border = isActive
                    ? 'border:2px solid var(--accent);box-shadow:0 0 0 3px rgba(192,133,32,0.15);'
                    : hasActivity
                      ? 'border:2px solid #0e7490;box-shadow:0 0 0 3px rgba(14,116,144,0.10);'
                      : 'border:1px solid #a5f3fc;';
                  let cageHTML = '';
                  // Returning to facility
                  returningMoves.forEach(m => {
                    cageHTML += `<div style="font-size:10px;padding:2px 5px;border-radius:4px;border:1px solid #a5f3fc;background:#ecfeff;margin-bottom:2px;display:flex;align-items:center;gap:3px;">
                      <span style="color:#0e7490;font-weight:800">→Fac</span>
                      <span style="font:600 10px var(--font-mono)">return</span>
                    </div>`;
                  });
                  // Planned into this boat frame
                  plannedIntoCages.forEach(c => {
                    const _shade = shipmentShadeClass(c, _mvShipDays);
                    let bg, nameCol, detailCol;
                    if (_shade === 'next')        { bg = 'background:#3b1d6e;border-color:#7040c0;'; nameCol = 'color:#e0ccff;'; detailCol = 'color:#c0a8ee;'; }
                    else if (_shade === 'second') { bg = 'background:#c8b8e8;border-color:#9070c8;'; nameCol = 'color:#4a2a7a;'; detailCol = 'color:#6a4a9a;'; }
                    else if (c.shippingPreference2) { bg = 'background:#dbeafe;border-color:#3b82f6;'; nameCol = 'color:#1e40af;'; detailCol = 'color:#3b82f6;'; }
                    else if (c.shippingPreference)  { bg = 'background:#fff8c5;border-color:#e8d850;'; nameCol = 'color:#7a5c00;'; detailCol = 'color:var(--text-muted);'; }
                    else { bg = 'background:#fffbeb;border-color:#fbbf24;'; nameCol = 'color:#92400e;'; detailCol = 'color:var(--text-muted);'; }
                    const fMoveCount = STATE.plannedMovements.filter(m=>m.cageId===c.id&&!m.completed).length;
                    cageHTML += `<div id="mvboat-cage-${c.id}-${f.id}" style="font-size:10px;padding:2px 5px;border-radius:4px;border:1px solid;margin-bottom:2px;${bg}">
                      <div style="display:flex;align-items:center;gap:2px;"><span style="color:#b45309;font-weight:800">→</span><span style="font:600 10px var(--font-mono);${nameCol}cursor:pointer;text-decoration:underline dotted;text-underline-offset:2px" onclick="openMvCageMovements('${c.id}')" title="Click to view/edit movements">${esc(c.name)}${fMoveCount>0?` <span style="font-size:8px;background:rgba(192,133,32,0.2);color:var(--accent);border-radius:3px;padding:0 3px">${fMoveCount}</span>`:''}</span></div>
                      <div style="font-size:9px;padding-left:13px;${detailCol}">${c.width}m · ${hCat(c.height)} · ${lCat(c.length)} · ${c.weight}t</div>
                    </div>`;
                  });
                  // Exiting to RMD from this boat frame
                  exitingCages.forEach(c => {
                    const _shade = shipmentShadeClass(c, _mvShipDays);
                    let bg, nameCol, detailCol;
                    if (_shade === 'next')        { bg = 'background:#3b1d6e;border-color:#7040c0;'; nameCol = 'color:#e0ccff;'; detailCol = 'color:#c0a8ee;'; }
                    else if (_shade === 'second') { bg = 'background:#c8b8e8;border-color:#9070c8;'; nameCol = 'color:#4a2a7a;'; detailCol = 'color:#6a4a9a;'; }
                    else if (c.shippingPreference2) { bg = 'background:#dbeafe;border-color:#3b82f6;'; nameCol = 'color:#1e40af;'; detailCol = 'color:#3b82f6;'; }
                    else if (c.shippingPreference)  { bg = 'background:#fff8c5;border-color:#e8d850;'; nameCol = 'color:#7a5c00;'; detailCol = 'color:var(--text-muted);'; }
                    else { bg = 'background:#f5f3ff;border-color:#c4b5fd;'; nameCol = 'color:#5b21b6;'; detailCol = 'color:var(--text-muted);'; }
                    const fMoveCount = STATE.plannedMovements.filter(m=>m.cageId===c.id&&!m.completed).length;
                    cageHTML += `<div style="font-size:10px;padding:2px 5px;border-radius:4px;border:1px solid;margin-bottom:2px;${bg}">
                      <div style="display:flex;align-items:center;gap:2px;"><span style="color:#7040c0;font-weight:800">→RMD</span><span style="font:600 10px var(--font-mono);${nameCol}cursor:pointer;text-decoration:underline dotted;text-underline-offset:2px" onclick="openMvCageMovements('${c.id}')" title="Click to view/edit movements">${esc(c.name)}${fMoveCount>0?` <span style="font-size:8px;background:rgba(192,133,32,0.2);color:var(--accent);border-radius:3px;padding:0 3px">${fMoveCount}</span>`:''}</span></div>
                      <div style="font-size:9px;padding-left:30px;${detailCol}">${c.width}m · ${hCat(c.height)} · ${lCat(c.length)} · ${c.weight}t</div>
                    </div>`;
                  });
                  // Already-resident cages (placed here on a prior day)
                  simResidentCages.forEach(c => {
                    const _shade = shipmentShadeClass(c, _mvShipDays);
                    let bg, nameCol, detailCol;
                    if (_shade === 'next')        { bg = 'background:#3b1d6e;border-color:#7040c0;'; nameCol = 'color:#e0ccff;'; detailCol = 'color:#c0a8ee;'; }
                    else if (_shade === 'second') { bg = 'background:#c8b8e8;border-color:#9070c8;'; nameCol = 'color:#4a2a7a;'; detailCol = 'color:#6a4a9a;'; }
                    else if (c.shippingPreference2) { bg = 'background:#dbeafe;border-color:#3b82f6;'; nameCol = 'color:#1e40af;'; detailCol = 'color:#3b82f6;'; }
                    else if (c.shippingPreference)  { bg = 'background:#fff8c5;border-color:#e8d850;'; nameCol = 'color:#7a5c00;'; detailCol = 'color:var(--text-muted);'; }
                    else { bg = 'background:#fffbeb;border-color:#fbbf24;'; nameCol = 'color:#92400e;'; detailCol = 'color:var(--text-muted);'; }
                    const fMoveCount = STATE.plannedMovements.filter(m=>m.cageId===c.id&&!m.completed).length;
                    cageHTML += `<div style="font-size:10px;padding:2px 5px;border-radius:4px;border:1px solid;margin-bottom:2px;${bg}">
                      <div style="display:flex;align-items:center;gap:2px;"><span style="font:600 10px var(--font-mono);${nameCol}cursor:pointer;text-decoration:underline dotted;text-underline-offset:2px" onclick="openMvCageMovements('${c.id}')" title="Click to view/edit movements">${esc(c.name)}${fMoveCount>0?` <span style="font-size:8px;background:rgba(192,133,32,0.2);color:var(--accent);border-radius:3px;padding:0 3px">${fMoveCount}</span>`:''}</span></div>
                      <div style="font-size:9px;padding-left:4px;${detailCol}">${c.width}m · ${hCat(c.height)} · ${lCat(c.length)} · ${c.weight}t</div>
                    </div>`;
                  });
                  if (!cageHTML) cageHTML = '<div style="font-size:10px;color:var(--text-muted);font-style:italic">away</div>';
                  const boatBorder = isActive
                    ? 'border:2px solid var(--accent);box-shadow:0 0 0 3px rgba(192,133,32,0.15);'
                    : mvPick
                      ? 'border:2px dashed #e8a830;cursor:pointer;'
                      : hasActivity
                        ? 'border:2px solid #0e7490;box-shadow:0 0 0 3px rgba(14,116,144,0.10);'
                        : 'border:1px solid #a5f3fc;';
                  const boatClickHandler = mvPick ? `onclick="mvPickDestination('frame','${f.id}','${esc(f.name)} [${f.width}m] (returning ${f.returnDate ? fmt(f.returnDate) : ''})')"` : '';
                  const boatPickHint = mvPick ? `<div style="font-size:9px;color:#e8a830;font-weight:600;margin-top:4px;text-align:center">▶ Move here (pre-plan)</div>` : '';
                  return `<div id="mvboat-${f.id}" style="background:${mvPick?'#1a2520':'var(--bg-card)'};${boatBorder}border-radius:8px;padding:9px 10px;min-width:100px;transition:all 0.1s" ${boatClickHandler} title="${mvPick?`Pre-plan cage ${esc(mvPick?.cageName||'')} into ${esc(f.name)} (returns ${f.returnDate||'?'})`:''}">
                    <div style="font:700 12px var(--font-mono);color:${isActive?'var(--accent)':mvPick?'#b0d890':'#0e7490'}">${esc(f.name)}</div>
                    <div style="font-size:9px;color:var(--text-muted);margin-bottom:2px">${f.width}m${f.hasWaler?' 🔩':''} · ${f.location}</div>
                    <div style="font-size:9px;color:${retCol};font-family:var(--font-mono);margin-bottom:4px">↩ ${retStr}</div>
                    ${cageHTML}
                    ${boatPickHint}
                  </div>`;
                }

                if (!hasAny) return '';
                const boatFramesHTML = framesWithReturn.map(f => buildBoatFrameCard(f)).join('');
                return `
                  <div style="border-top:2px dashed #a5f3fc;margin:20px 0 16px;position:relative">
                    <span style="position:absolute;top:-9px;left:50%;transform:translateX(-50%);background:var(--bg-deep);padding:0 12px;font:600 10px var(--font-mono);color:#0e7490;letter-spacing:.06em">🚢 FRAMES AT BOAT / CLIENT</span>
                  </div>
                  <div id="mv-boat-zone" style="display:flex;gap:6px;flex-wrap:wrap;">
                    ${boatFramesHTML}
                  </div>`;
              })()}
            </div>

            <!-- SVG overlay: absolutely positioned within mv-content for reliable arrow drawing -->
            <svg id="mv-svg-arrows" style="position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:10;overflow:visible"></svg>
          </div>

          <!-- Sidebar -->
          <div style="display:flex;flex-direction:column;gap:12px">
            <div class="card" style="position:sticky;top:20px;max-height:calc(100vh - 120px);overflow-y:auto">
              <div class="card-title" style="margin-bottom:10px">Planned Movements</div>
              ${moveListHTML||'<div class="empty-msg">No movements match filter</div>'}
              <div style="margin-top:14px;padding-top:12px;border-top:1px solid var(--border)">
                <button class="btn btn-primary" style="width:100%" onclick="planFormOpen=!planFormOpen;render()" title="Plan a new movement">+ Plan Movements</button>
              </div>
            </div>
            ${planFormOpen ? buildPlanFormHTML() : ''}
          </div>
        </div>
      </div>
    </div>
  `;
  // Note: mvRedraw is now called by renderMain() after DOM update
}


// ═══════════════════════════════════════════════════════════════════════════════
// ═══════════════════════════════════════════════════════════════════════════════
// MOVEMENTS SVG DRAW — uses absolute-positioned SVG within mv-content container
// Positions calculated relative to the container, not the viewport
// ═══════════════════════════════════════════════════════════════════════════════
function mvRedraw() {
  const svg = document.getElementById('mv-svg-arrows');
  const container = document.getElementById('mv-content');
  if (!svg || !container) return;

  svg.innerHTML = '';
  const MOVES = window._mvMovesData || [];
  if (!MOVES.length) { _setupFacilityBoxFade(); return; }

  const COLORS = {
    'rmd-to-frame':        '#27a060',
    'frame-to-rmd':        '#7040c0',
    'frame-to-frame':      '#e05c1a',
    'facility-to-frame':   '#2563b0',
    'facility-to-rmd':     '#0d9488',
    'frame-fix-shipping':  '#c08520',
    'frame-return-from-client': '#0e7490',
    'cage-to-boat-frame':  '#b45309',
    'rss-to-frame':         '#0891b2',
    'frame-to-rss':         '#7040c0',
    'rmd-to-rss':           '#0891b2',
    'rss-to-rmd':           '#7c3aed',
  };

  const cRect = container.getBoundingClientRect();

  // Get element position relative to the mv-content container
  function getPos(id) {
    const el = document.getElementById(id);
    if (!el) return null;
    const r = el.getBoundingClientRect();
    return {
      left:   r.left - cRect.left,
      right:  r.right - cRect.left,
      top:    r.top - cRect.top,
      bottom: r.bottom - cRect.top,
      cx:     (r.left + r.right) / 2 - cRect.left,
      cy:     (r.top + r.bottom) / 2 - cRect.top,
      w:      r.width,
      h:      r.height
    };
  }

  // SVG namespace
  const NS = 'http://www.w3.org/2000/svg';
  function svgEl(tag, attrs) {
    const el = document.createElementNS(NS, tag);
    for (const [k, v] of Object.entries(attrs)) el.setAttribute(k, v);
    return el;
  }

  // Define arrow markers per color
  const defs = svgEl('defs', {});
  Object.entries(COLORS).forEach(([key, col]) => {
    const marker = svgEl('marker', {
      id: 'arrow-' + key, markerWidth: '10', markerHeight: '8',
      refX: '9', refY: '4', orient: 'auto', markerUnits: 'userSpaceOnUse'
    });
    const poly = svgEl('polygon', { points: '0,0 10,4 0,8', fill: col });
    marker.appendChild(poly);
    defs.appendChild(marker);
  });
  svg.appendChild(defs);

  // Count per node for offset spreading
  // Helper to extract just the RMD number from rmdSlot (handles "3A", "RMD-04A", etc.)
  function cleanRk(slot) {
    const s = String(slot||'').replace(/[ABab]$/,'');
    const m = s.match(/(\d+)/);
    return m ? String(parseInt(m[1],10)) : s;
  }
  const rET={}, fET={}, fXT={}, rNT={};
  MOVES.forEach(m => {
    const rk = cleanRk(m.rmdSlot);
    const fk = String(m.frameId||'');
    if (m.typeKey === 'rmd-to-frame') { rET[rk]=(rET[rk]||0)+1; fET[fk]=(fET[fk]||0)+1; }
    if (m.typeKey === 'frame-to-rmd') { fXT[fk]=(fXT[fk]||0)+1; rNT[rk]=(rNT[rk]||0)+1; }
  });
  const rEI={}, fEI={}, fXI={}, rNI={};

  MOVES.forEach((m, idx) => {
    const color = COLORS[m.typeKey] || '#c08520';
    const cage = getCage(m.cageId);
    const cLabel = cage ? cage.name : '';
    const num = idx + 1;

    if (m.typeKey === 'rmd-to-frame' || m.typeKey === 'frame-to-rmd') {
      const rk = cleanRk(m.rmdSlot);
      const fk = String(m.frameId||'');
      const rPos = getPos('mvr-' + rk);
      // Frame may be a facility frame (mvf-) or a boat frame (mvboat-) — try both
      const fPos = getPos('mvf-' + fk) || getPos('mvboat-' + fk);
      if (!rPos || !fPos) {
        console.warn('[mvRedraw] missing element:', !rPos ? 'mvr-'+rk : '', !fPos ? 'mvf-'+fk+' / mvboat-'+fk : '', 'rmdSlot='+m.rmdSlot, 'frameId='+m.frameId);
        return;
      }

      let ri, fi, rTot, fTot;
      if (m.typeKey === 'rmd-to-frame') {
        ri=(rEI[rk]=(rEI[rk]||0)); rEI[rk]++;
        fi=(fEI[fk]=(fEI[fk]||0)); fEI[fk]++;
        rTot=rET[rk]||1; fTot=fET[fk]||1;
      } else {
        ri=(rNI[rk]=(rNI[rk]||0)); rNI[rk]++;
        fi=(fXI[fk]=(fXI[fk]||0)); fXI[fk]++;
        rTot=rNT[rk]||1; fTot=fXT[fk]||1;
      }

      const rX = rPos.left + rPos.w * (rTot > 1 ? (0.2 + 0.6 * ri / (rTot - 1)) : 0.5);
      const fX = fPos.left + fPos.w * (fTot > 1 ? (0.2 + 0.6 * fi / (fTot - 1)) : 0.5);

      // RMD is above, Frames below. Always draw: start → end with arrowhead at end
      let sx, sy, ex, ey;
      if (m.typeKey === 'rmd-to-frame') {
        // FROM RMD (bottom edge) TO Frame (top edge)
        sx = rX; sy = rPos.bottom;
        ex = fX; ey = fPos.top;
      } else {
        // FROM Frame (top edge) TO RMD (bottom edge)
        sx = fX; sy = fPos.top;
        ex = rX; ey = rPos.bottom;
      }

      // Bezier control points — always curve through the gap between RMD and frames
      const gap = Math.abs(ey - sy);
      const cpOff = Math.max(gap * 0.35, 40);
      let c1x, c1y, c2x, c2y;
      if (m.typeKey === 'rmd-to-frame') {
        c1x = sx; c1y = sy + cpOff;
        c2x = ex; c2y = ey - cpOff;
      } else {
        c1x = sx; c1y = sy - cpOff;
        c2x = ex; c2y = ey + cpOff;
      }

      // Draw the bezier path
      const path = svgEl('path', {
        d: `M${sx},${sy} C${c1x},${c1y} ${c2x},${c2y} ${ex},${ey}`,
        stroke: color, 'stroke-width': '2.5', fill: 'none',
        'stroke-linecap': 'round',
        'marker-end': `url(#arrow-${m.typeKey})`
      });
      svg.appendChild(path);

      // Midpoint label (numbered circle)
      const mt = 0.5;
      const bx = (1-mt)*(1-mt)*(1-mt)*sx + 3*(1-mt)*(1-mt)*mt*c1x + 3*(1-mt)*mt*mt*c2x + mt*mt*mt*ex;
      const by = (1-mt)*(1-mt)*(1-mt)*sy + 3*(1-mt)*(1-mt)*mt*c1y + 3*(1-mt)*mt*mt*c2y + mt*mt*mt*ey;

      const circle = svgEl('circle', { cx: bx, cy: by, r: '12', fill: color, stroke: '#fff', 'stroke-width': '2' });
      svg.appendChild(circle);
      const numText = svgEl('text', {
        x: bx, y: by, fill: '#fff', 'font-size': '11', 'font-weight': 'bold',
        'font-family': 'monospace', 'text-anchor': 'middle', 'dominant-baseline': 'central'
      });
      numText.textContent = String(num);
      svg.appendChild(numText);

      if (cLabel) {
        const labelBg = svgEl('text', {
          x: bx, y: by + 18, fill: '#fff', 'font-size': '10', 'font-weight': 'bold',
          'font-family': 'monospace', 'text-anchor': 'middle', 'dominant-baseline': 'hanging',
          stroke: '#fff', 'stroke-width': '3', 'paint-order': 'stroke'
        });
        labelBg.textContent = cLabel;
        svg.appendChild(labelBg);
        const labelTxt = svgEl('text', {
          x: bx, y: by + 18, fill: color, 'font-size': '10', 'font-weight': 'bold',
          'font-family': 'monospace', 'text-anchor': 'middle', 'dominant-baseline': 'hanging'
        });
        labelTxt.textContent = cLabel;
        svg.appendChild(labelTxt);
      }

    } else if (m.typeKey === 'frame-to-frame') {
      // Arrow from source frame card to destination frame card
      // Frame may be at facility (mvf-) or at boat/client (mvboat-) — try both
      const srcFk  = String(m.srcFrameId || '');
      const destFk = String(m.frameId || '');
      const srcPos  = getPos('mvf-' + srcFk) || getPos('mvboat-' + srcFk);
      const destPos = getPos('mvf-' + destFk) || getPos('mvboat-' + destFk);
      if (!srcPos || !destPos) return;

      // Draw a curved arrow between the two frame cards
      const sx = srcPos.cx;
      const sy = srcPos.top;    // leave from top of source frame
      const ex = destPos.cx;
      const ey = destPos.top;   // arrive at top of destination frame
      const midY = Math.min(sy, ey) - 40; // arc above both cards
      const path = svgEl('path', {
        d: `M${sx},${sy} C${sx},${midY} ${ex},${midY} ${ex},${ey}`,
        stroke: color, 'stroke-width': '2.5', fill: 'none',
        'stroke-linecap': 'round',
        'marker-end': `url(#arrow-frame-to-frame)`
      });
      svg.appendChild(path);

      // Midpoint label
      const bx = (sx + ex) / 2;
      const by = midY - 8;
      const circle = svgEl('circle', { cx: bx, cy: by + 8, r: '12', fill: color, stroke: '#fff', 'stroke-width': '2' });
      svg.appendChild(circle);
      const numText = svgEl('text', { x: bx, y: by + 8, fill: '#fff', 'font-size': '11', 'font-weight': 'bold', 'font-family': 'monospace', 'text-anchor': 'middle', 'dominant-baseline': 'central' });
      numText.textContent = String(num);
      svg.appendChild(numText);
      if (cLabel) {
        const lblBg = svgEl('text', { x: bx, y: by - 6, fill: '#fff', 'font-size': '10', 'font-weight': 'bold', 'font-family': 'monospace', 'text-anchor': 'middle', stroke: '#fff', 'stroke-width': '3', 'paint-order': 'stroke' });
        lblBg.textContent = cLabel;
        svg.appendChild(lblBg);
        const lblTxt = svgEl('text', { x: bx, y: by - 6, fill: color, 'font-size': '10', 'font-weight': 'bold', 'font-family': 'monospace', 'text-anchor': 'middle' });
        lblTxt.textContent = cLabel;
        svg.appendChild(lblTxt);
      }

    } else if (m.typeKey === 'frame-return-from-client') {
      // For isReturnDate frames: draw a dashed arrow from the individual frame's card in the boat box
      // pointing downward toward the facility frames zone (using mv-facility-box as anchor)
      const fk = String(m.frameId||'');
      const boatFramePos = getPos('mvboat-' + fk);
      const boatPos = getPos('mv-boat-zone') || getPos('mvboat-' + fk);
      const facilityPos = getPos('mv-facility-box');

      if (m.isReturnDate) {
        // Draw a short dashed arrow below/from the individual frame card inside the boat box
        const refPos = boatFramePos || boatPos;
        if (!refPos) return;
        const x = refPos.cx;
        const y1 = refPos.bottom + 4;
        const y2 = y1 + 36;
        const line = svgEl('line', { x1:x, y1:y1, x2:x, y2:y2-5, stroke:'#0e7490', 'stroke-width':'2.5', 'stroke-dasharray':'6,4', 'stroke-linecap':'round' });
        svg.appendChild(line);
        const tri = svgEl('polygon', { points:`${x},${y2+1} ${x-7},${y2-11} ${x+7},${y2-11}`, fill:'#0e7490' });
        svg.appendChild(tri);
        // Date label
        if (m.date) {
          const fr = getFrame(m.frameId);
          const lbl = (fr ? fr.name : '') + ' ↩ ' + fmt(m.date);
          const t1 = svgEl('text',{x:x,y:y1-2,fill:'#fff','font-size':'8','font-weight':'bold','font-family':'monospace','text-anchor':'middle',stroke:'#fff','stroke-width':'3','paint-order':'stroke'}); t1.textContent=lbl; svg.appendChild(t1);
          const t2 = svgEl('text',{x:x,y:y1-2,fill:'#0e7490','font-size':'8','font-weight':'bold','font-family':'monospace','text-anchor':'middle'}); t2.textContent=lbl; svg.appendChild(t2);
        }
        return;
      }

      // Arrow from Boat box → Frame card (planned frame-return-from-client movement)
      const fPos = getPos('mvf-' + fk);
      const frameZonePos = getPos('mv-frame-zone');
      // Add marker for this colour if not already added
      if (!document.getElementById('arrow-frame-return-from-client')) {
        const mk = svgEl('marker', { id:'arrow-frame-return-from-client', markerWidth:'10', markerHeight:'8', refX:'9', refY:'4', orient:'auto', markerUnits:'userSpaceOnUse' });
        mk.appendChild(svgEl('polygon', { points:'0,0 10,4 0,8', fill:'#0e7490' }));
        svg.querySelector('defs').appendChild(mk);
      }
      // If the frame card exists in the frames zone, draw arrow to it
      if (fPos && (boatFramePos || boatPos)) {
        const refSrc = boatFramePos || boatPos;
        const sx = refSrc.cx;
        const sy = refSrc.bottom;
        const ex = fPos.cx;
        const ey = fPos.top;
        const gap = Math.abs(ey - sy);
        const cpOff = Math.max(gap * 0.35, 40);
        const bPath = svgEl('path', {
          d: `M${sx},${sy} C${sx},${sy+cpOff} ${ex},${ey-cpOff} ${ex},${ey}`,
          stroke: '#0e7490', 'stroke-width': '2.5', fill: 'none',
          'stroke-linecap': 'round', 'stroke-dasharray': '7,4',
          'marker-end': 'url(#arrow-frame-return-from-client)'
        });
        svg.appendChild(bPath);
        const mt2=0.5;
        const lbx=(1-mt2)**3*sx+3*(1-mt2)**2*mt2*sx+3*(1-mt2)*mt2**2*ex+mt2**3*ex;
        const lby=(1-mt2)**3*sy+3*(1-mt2)**2*mt2*(sy+cpOff)+3*(1-mt2)*mt2**2*(ey-cpOff)+mt2**3*ey;
        const fr = getFrame(m.frameId);
        const lbl = fr ? fr.name : (cLabel || '');
        if (lbl) {
          const lb1 = svgEl('text',{x:lbx+14,y:lby,fill:'#fff','font-size':'9','font-weight':'bold','font-family':'monospace','text-anchor':'middle',stroke:'#fff','stroke-width':'3','paint-order':'stroke'}); lb1.textContent=lbl; svg.appendChild(lb1);
          const lb2 = svgEl('text',{x:lbx+14,y:lby,fill:'#0e7490','font-size':'9','font-weight':'bold','font-family':'monospace','text-anchor':'middle'}); lb2.textContent=lbl; svg.appendChild(lb2);
        }
      }
      // If frame card not in facility zone, draw dashed arrow from boat box/card down toward frame zone
      else if (boatFramePos || boatPos) {
        const refSrc = boatFramePos || boatPos;
        const targetPos = frameZonePos || facilityPos;
        if (targetPos) {
          const sx = refSrc.cx;
          const sy = refSrc.bottom + 4;
          const ex = targetPos.cx;
          const ey = targetPos.top;
          const gap = Math.abs(ey - sy);
          const cpOff = Math.max(gap * 0.35, 40);
          const bPath = svgEl('path', {
            d: `M${sx},${sy} C${sx},${sy+cpOff} ${ex},${ey-cpOff} ${ex},${ey}`,
            stroke: '#0e7490', 'stroke-width': '2.5', fill: 'none',
            'stroke-linecap': 'round', 'stroke-dasharray': '7,4',
            'marker-end': 'url(#arrow-frame-return-from-client)'
          });
          svg.appendChild(bPath);
          const fr = getFrame(m.frameId);
          const lbl = fr ? fr.name + ' ↩' : (cLabel || '');
          if (lbl) {
            const mx = (sx + ex)/2, my = (sy + ey)/2 - 8;
            const lb1 = svgEl('text',{x:mx,y:my,fill:'#fff','font-size':'9','font-weight':'bold','font-family':'monospace','text-anchor':'middle',stroke:'#fff','stroke-width':'3','paint-order':'stroke'}); lb1.textContent=lbl; svg.appendChild(lb1);
            const lb2 = svgEl('text',{x:mx,y:my,fill:'#0e7490','font-size':'9','font-weight':'bold','font-family':'monospace','text-anchor':'middle'}); lb2.textContent=lbl; svg.appendChild(lb2);
          }
        }
      }

    } else if (m.typeKey === 'facility-to-frame' || m.typeKey === 'frame-fix-shipping') {
      if (m.typeKey === 'facility-to-frame') {
        // Draw bezier from Facility box to Frame card (similar to rmd-to-frame)
        const facPos = getPos('mv-facility-box');
        const fk = String(m.frameId||'');
        const fPos = getPos('mvf-' + fk);
        // If no facility frame card found (frame is away/boat), skip — handled by cage-to-boat-frame
        if (!facPos || !fPos) return;

        // FROM Facility box (bottom edge) TO Frame (top edge) — bezier curve
        const sx = facPos.cx;
        const sy = facPos.bottom;
        const ex = fPos.cx;
        const ey = fPos.top;
        const gap = Math.abs(ey - sy);
        const cpOff = Math.max(gap * 0.35, 40);

        const path = svgEl('path', {
          d: `M${sx},${sy} C${sx},${sy+cpOff} ${ex},${ey-cpOff} ${ex},${ey}`,
          stroke: color, 'stroke-width': '2.5', fill: 'none',
          'stroke-linecap': 'round', 'stroke-dasharray': '7,4',
          'marker-end': `url(#arrow-facility-to-frame)`
        });
        svg.appendChild(path);

        // Midpoint label
        const mt = 0.5;
        const bx = (1-mt)*(1-mt)*(1-mt)*sx + 3*(1-mt)*(1-mt)*mt*sx + 3*(1-mt)*mt*mt*ex + mt*mt*mt*ex;
        const by = (1-mt)*(1-mt)*(1-mt)*sy + 3*(1-mt)*(1-mt)*mt*(sy+cpOff) + 3*(1-mt)*mt*mt*(ey-cpOff) + mt*mt*mt*ey;
        if (cLabel) {
          const lblBg = svgEl('text', { x: bx+14, y: by, fill: '#fff', 'font-size': '9', 'font-weight': 'bold', 'font-family': 'monospace', 'text-anchor': 'middle', stroke: '#fff', 'stroke-width': '3', 'paint-order': 'stroke' });
          lblBg.textContent = cLabel;
          svg.appendChild(lblBg);
          const lblTxt = svgEl('text', { x: bx+14, y: by, fill: color, 'font-size': '9', 'font-weight': 'bold', 'font-family': 'monospace', 'text-anchor': 'middle' });
          lblTxt.textContent = cLabel;
          svg.appendChild(lblTxt);
        }
      } else {
        // frame-fix-shipping: keep original dashed vertical line
        const fPos = getPos('mvf-' + String(m.frameId||''));
        if (!fPos) return;
        const x = fPos.cx;
        const y2 = fPos.top;
        const y1 = y2 - 48;

        // Dashed line
        const line = svgEl('line', {
          x1: x, y1: y1, x2: x, y2: y2 - 5,
          stroke: color, 'stroke-width': '2.5', 'stroke-dasharray': '7,4', 'stroke-linecap': 'round'
        });
        svg.appendChild(line);

        // Arrowhead triangle
        const tri = svgEl('polygon', {
          points: `${x},${y2+1} ${x-7},${y2-11} ${x+7},${y2-11}`, fill: color
        });
        svg.appendChild(tri);

        // Label
        const lbl = cLabel || 'FIX';
        const lblBg = svgEl('text', {
          x: x, y: y1 - 3, fill: '#fff', 'font-size': '9', 'font-weight': 'bold',
          'font-family': 'monospace', 'text-anchor': 'middle', 'dominant-baseline': 'auto',
          stroke: '#fff', 'stroke-width': '3', 'paint-order': 'stroke'
        });
        lblBg.textContent = lbl;
        svg.appendChild(lblBg);
        const lblTxt = svgEl('text', {
          x: x, y: y1 - 3, fill: color, 'font-size': '9', 'font-weight': 'bold',
          'font-family': 'monospace', 'text-anchor': 'middle', 'dominant-baseline': 'auto'
        });
        lblTxt.textContent = lbl;
        svg.appendChild(lblTxt);
      }
    } else if (m.typeKey === 'facility-to-rmd') {
      // Arrow from Facility box to RMD card (teal dashed, similar style to facility-to-frame)
      const facPos = getPos('mv-facility-box');
      const rk = m.rmdNumber != null ? String(parseInt(m.rmdNumber, 10)) : cleanRk(m.rmdSlot);
      const rPos = getPos('mvr-' + rk);
      if (!facPos || !rPos) return;

      // FROM Facility box (bottom edge) TO RMD card (bottom edge — RMD is above frames)
      const sx = facPos.cx;
      const sy = facPos.bottom;
      const ex = rPos.cx;
      const ey = rPos.bottom;
      const gap = Math.abs(ey - sy);
      const cpOff = Math.max(gap * 0.35, 40);

      const path = svgEl('path', {
        d: `M${sx},${sy} C${sx},${sy+cpOff} ${ex},${ey+cpOff} ${ex},${ey}`,
        stroke: color, 'stroke-width': '2.5', fill: 'none',
        'stroke-linecap': 'round', 'stroke-dasharray': '7,4',
        'marker-end': `url(#arrow-facility-to-rmd)`
      });
      svg.appendChild(path);

      // Midpoint label
      const mt = 0.5;
      const bx = (1-mt)**3*sx + 3*(1-mt)**2*mt*sx + 3*(1-mt)*mt**2*ex + mt**3*ex;
      const by = (1-mt)**3*sy + 3*(1-mt)**2*mt*(sy+cpOff) + 3*(1-mt)*mt**2*(ey+cpOff) + mt**3*ey;
      const circle = svgEl('circle', { cx: bx, cy: by, r: '12', fill: color, stroke: '#fff', 'stroke-width': '2' });
      svg.appendChild(circle);
      const numText = svgEl('text', { x: bx, y: by, fill: '#fff', 'font-size': '11', 'font-weight': 'bold', 'font-family': 'monospace', 'text-anchor': 'middle', 'dominant-baseline': 'central' });
      numText.textContent = String(num);
      svg.appendChild(numText);
      if (cLabel) {
        const lblBg = svgEl('text', { x: bx, y: by + 18, fill: '#fff', 'font-size': '10', 'font-weight': 'bold', 'font-family': 'monospace', 'text-anchor': 'middle', 'dominant-baseline': 'hanging', stroke: '#fff', 'stroke-width': '3', 'paint-order': 'stroke' });
        lblBg.textContent = cLabel;
        svg.appendChild(lblBg);
        const lblTxt = svgEl('text', { x: bx, y: by + 18, fill: color, 'font-size': '10', 'font-weight': 'bold', 'font-family': 'monospace', 'text-anchor': 'middle', 'dominant-baseline': 'hanging' });
        lblTxt.textContent = cLabel;
        svg.appendChild(lblTxt);
      }

    } else if (['rss-to-frame','frame-to-rss','rmd-to-rss','rss-to-rmd'].includes(m.typeKey)) {
      const rssPos = getPos('mv-rss-card');
      if (!rssPos) return;

      if (m.typeKey === 'rss-to-frame') {
        // RSS → Frame: identical pattern to rmd-to-frame
        // RSS card sits in the same top zone as RMD, frames are below.
        // FROM RSS (bottom edge) TO Frame (top edge), bezier curving down.
        const fk = String(m.frameId||'');
        const fPos = getPos('mvf-' + fk) || getPos('mvboat-' + fk);
        if (!fPos) return;

        const sx = rssPos.cx; const sy = rssPos.bottom;
        const ex = fPos.cx;   const ey = fPos.top;
        const gap = Math.abs(ey - sy);
        const cpOff = Math.max(gap * 0.35, 40);

        svg.appendChild(svgEl('path', {
          d: `M${sx},${sy} C${sx},${sy+cpOff} ${ex},${ey-cpOff} ${ex},${ey}`,
          stroke: color, 'stroke-width': '2.5', fill: 'none', 'stroke-linecap': 'round',
          'marker-end': `url(#arrow-rss-to-frame)`
        }));
        const mt = 0.5;
        const bx = (1-mt)**3*sx + 3*(1-mt)**2*mt*sx + 3*(1-mt)*mt**2*ex + mt**3*ex;
        const by = (1-mt)**3*sy + 3*(1-mt)**2*mt*(sy+cpOff) + 3*(1-mt)*mt**2*(ey-cpOff) + mt**3*ey;
        svg.appendChild(svgEl('circle', { cx:bx, cy:by, r:'12', fill:color, stroke:'#fff', 'stroke-width':'2' }));
        const nt = svgEl('text', { x:bx, y:by, fill:'#fff', 'font-size':'11', 'font-weight':'bold', 'font-family':'monospace', 'text-anchor':'middle', 'dominant-baseline':'central' });
        nt.textContent = String(num); svg.appendChild(nt);
        if (cLabel) {
          const lb = svgEl('text', { x:bx, y:by+18, fill:'#fff', 'font-size':'10', 'font-weight':'bold', 'font-family':'monospace', 'text-anchor':'middle', 'dominant-baseline':'hanging', stroke:'#fff', 'stroke-width':'3', 'paint-order':'stroke' });
          lb.textContent = cLabel; svg.appendChild(lb);
          const lt = svgEl('text', { x:bx, y:by+18, fill:color, 'font-size':'10', 'font-weight':'bold', 'font-family':'monospace', 'text-anchor':'middle', 'dominant-baseline':'hanging' });
          lt.textContent = cLabel; svg.appendChild(lt);
        }

      } else if (m.typeKey === 'frame-to-rss') {
        // Frame → RSS: identical pattern to frame-to-rmd
        // FROM Frame top edge TO RSS bottom edge (frame is below, RSS is above in the zone)
        const fk = String(m.frameId||'');
        const fPos = getPos('mvf-' + fk) || getPos('mvboat-' + fk);
        if (!fPos) return;

        // Frame is below RSS in the layout (same as frame→RMD where frame top → RMD bottom)
        const sx = fPos.cx;   const sy = fPos.top;
        const ex = rssPos.cx; const ey = rssPos.bottom;
        const gap = Math.abs(ey - sy);
        const cpOff = Math.max(gap * 0.35, 40);
        svg.appendChild(svgEl('path', {
          d: `M${sx},${sy} C${sx},${sy-cpOff} ${ex},${ey+cpOff} ${ex},${ey}`,
          stroke: color, 'stroke-width': '2.5', fill: 'none', 'stroke-linecap': 'round',
          'marker-end': `url(#arrow-frame-to-rss)`
        }));
        const mt = 0.5;
        const bx = (1-mt)**3*sx + 3*(1-mt)**2*mt*sx + 3*(1-mt)*mt**2*ex + mt**3*ex;
        const by = (1-mt)**3*sy + 3*(1-mt)**2*mt*(sy-cpOff) + 3*(1-mt)*mt**2*(ey+cpOff) + mt**3*ey;
        svg.appendChild(svgEl('circle', { cx:bx, cy:by, r:'12', fill:color, stroke:'#fff', 'stroke-width':'2' }));
        const nt = svgEl('text', { x:bx, y:by, fill:'#fff', 'font-size':'11', 'font-weight':'bold', 'font-family':'monospace', 'text-anchor':'middle', 'dominant-baseline':'central' });
        nt.textContent = String(num); svg.appendChild(nt);
        if (cLabel) {
          const lb = svgEl('text', { x:bx, y:by+18, fill:'#fff', 'font-size':'10', 'font-weight':'bold', 'font-family':'monospace', 'text-anchor':'middle', 'dominant-baseline':'hanging', stroke:'#fff', 'stroke-width':'3', 'paint-order':'stroke' });
          lb.textContent = cLabel; svg.appendChild(lb);
          const lt = svgEl('text', { x:bx, y:by+18, fill:color, 'font-size':'10', 'font-weight':'bold', 'font-family':'monospace', 'text-anchor':'middle', 'dominant-baseline':'hanging' });
          lt.textContent = cLabel; svg.appendChild(lt);
        }

      } else if (m.typeKey === 'rmd-to-rss') {
        // RMD → RSS: both in same top row, draw horizontal bezier
        // FROM right edge of RMD card TO left edge of RSS card
        const rk = cleanRk(m.rmdSlot || (m.rmdNumber != null ? String(m.rmdNumber) : ''));
        const rPos = rk ? getPos('mvr-' + rk) : null;
        if (!rPos) return;
        const sx = rPos.right;  const sy = rPos.cy;
        const ex = rssPos.left; const ey = rssPos.cy;
        const cpOff = Math.max(Math.abs(ex - sx) * 0.5, 30);
        svg.appendChild(svgEl('path', {
          d: `M${sx},${sy} C${sx+cpOff},${sy} ${ex-cpOff},${ey} ${ex},${ey}`,
          stroke: color, 'stroke-width': '2.5', fill: 'none', 'stroke-linecap': 'round',
          'marker-end': `url(#arrow-rmd-to-rss)`
        }));
        const bx = (sx+ex)/2; const by = Math.min(sy,ey) - 18;
        svg.appendChild(svgEl('circle', { cx:bx, cy:by, r:'12', fill:color, stroke:'#fff', 'stroke-width':'2' }));
        const nt = svgEl('text', { x:bx, y:by, fill:'#fff', 'font-size':'11', 'font-weight':'bold', 'font-family':'monospace', 'text-anchor':'middle', 'dominant-baseline':'central' });
        nt.textContent = String(num); svg.appendChild(nt);
        if (cLabel) {
          const lb = svgEl('text', { x:bx, y:by-14, fill:'#fff', 'font-size':'10', 'font-weight':'bold', 'font-family':'monospace', 'text-anchor':'middle', stroke:'#fff', 'stroke-width':'3', 'paint-order':'stroke' });
          lb.textContent = cLabel; svg.appendChild(lb);
          const lt = svgEl('text', { x:bx, y:by-14, fill:color, 'font-size':'10', 'font-weight':'bold', 'font-family':'monospace', 'text-anchor':'middle' });
          lt.textContent = cLabel; svg.appendChild(lt);
        }

      } else if (m.typeKey === 'rss-to-rmd') {
        // RSS → RMD: horizontal bezier from left edge of RSS → right edge of RMD card
        const rk = cleanRk(m.rmdSlot || '');
        const rPos = rk ? getPos('mvr-' + rk) : null;
        if (!rPos) return;
        const sx = rssPos.left; const sy = rssPos.cy;
        const ex = rPos.right;  const ey = rPos.cy;
        const cpOff = Math.max(Math.abs(ex - sx) * 0.5, 30);
        svg.appendChild(svgEl('path', {
          d: `M${sx},${sy} C${sx-cpOff},${sy} ${ex+cpOff},${ey} ${ex},${ey}`,
          stroke: color, 'stroke-width': '2.5', fill: 'none', 'stroke-linecap': 'round',
          'marker-end': `url(#arrow-rss-to-rmd)`
        }));
        const bx = (sx+ex)/2; const by = Math.min(sy,ey) - 18;
        svg.appendChild(svgEl('circle', { cx:bx, cy:by, r:'12', fill:color, stroke:'#fff', 'stroke-width':'2' }));
        const nt = svgEl('text', { x:bx, y:by, fill:'#fff', 'font-size':'11', 'font-weight':'bold', 'font-family':'monospace', 'text-anchor':'middle', 'dominant-baseline':'central' });
        nt.textContent = String(num); svg.appendChild(nt);
        if (cLabel) {
          const lb = svgEl('text', { x:bx, y:by-14, fill:'#fff', 'font-size':'10', 'font-weight':'bold', 'font-family':'monospace', 'text-anchor':'middle', stroke:'#fff', 'stroke-width':'3', 'paint-order':'stroke' });
          lb.textContent = cLabel; svg.appendChild(lb);
          const lt = svgEl('text', { x:bx, y:by-14, fill:color, 'font-size':'10', 'font-weight':'bold', 'font-family':'monospace', 'text-anchor':'middle' });
          lt.textContent = cLabel; svg.appendChild(lt);
        }
      }

    } else if (m.typeKey === 'cage-to-boat-frame') {
      // Dashed amber arrow from the cage's source (RMD or Facility box) to the cage chip inside the boat frame card
      const fk = String(m.frameId || '');
      const cageId = m.cageId || '';
      // Try to find the specific cage chip node inside the boat frame card
      const cageNodePos = getPos('mvboat-cage-' + cageId + '-' + fk);
      const boatFramePos = getPos('mvboat-' + fk);
      const targetPos = cageNodePos || boatFramePos;
      if (!targetPos) return;

      // Source: RMD card if cage is in RMD, otherwise Facility box
      const cage = getCage(cageId);
      let srcPos = null;
      if (cage && cage.location === 'rmd' && cage.locationDetail) {
        // locationDetail is like "RMD-04A" — extract just the numeric part for the element ID
        const rmdMatch = String(cage.locationDetail).match(/(\d+)[ABab]?$/);
        const rk = rmdMatch ? String(parseInt(rmdMatch[1], 10)) : String(cage.locationDetail).replace(/[^0-9]/g,'');
        srcPos = getPos('mvr-' + rk);
      }
      if (!srcPos) srcPos = getPos('mv-facility-box');
      if (!srcPos) return;

      // Draw a dashed curved arrow from source → cage chip in the boat box
      const sx = srcPos.right;
      const sy = srcPos.cy;
      const ex = targetPos.left;
      const ey = targetPos.cy;
      const cpOff = Math.max(Math.abs(ex - sx) * 0.4, 40);

      const path = svgEl('path', {
        d: `M${sx},${sy} C${sx+cpOff},${sy} ${ex-cpOff},${ey} ${ex},${ey}`,
        stroke: color, 'stroke-width': '2', fill: 'none',
        'stroke-linecap': 'round', 'stroke-dasharray': '6,4',
        'marker-end': `url(#arrow-cage-to-boat-frame)`
      });
      svg.appendChild(path);

      // Label at midpoint
      const bx = (sx + ex) / 2;
      const by = (sy + ey) / 2 - 8;
      if (cLabel) {
